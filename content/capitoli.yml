# Capitoli del manuale "How to Survive Neuro 2.0"
# Ogni procedura/workflow può referenziare un capitolo via frontmatter:
#   capitolo: giornata-reparto
#   ordine_nel_capitolo: 3
# L'app aggrega i pezzi in sequenza nella vista "Manuale → capitolo".

capitoli:
  - id: obiettivi
    titolo: Obiettivi
    ordine: 1
    descrizione: Scopo del manuale e come leggerlo

  - id: sistema-galileo
    titolo: Sistema operativo eHealth (Galileo)
    ordine: 2
    descrizione: Schermate principali, navigazione, funzioni base

  - id: attivita-reparto
    titolo: Introduzione all'attività di reparto
    ordine: 3
    descrizione: Struttura del reparto, team, kit di sopravvivenza, skill di base

  - id: giornata-reparto
    titolo: Giornata di reparto (lun-ven)
    ordine: 4
    descrizione: Dal giro visite alla gestione quotidiana, richieste esami e consulenze

  - id: ingressi-dimissioni
    titolo: Ingressi, dimissioni e completamenti
    ordine: 5
    descrizione: Gestione burocratica dell'entrata e uscita dal reparto

  - id: coguardia
    titolo: Co-guardia
    ordine: 6
    descrizione: Organizzazione dei turni di co-guardia

  - id: coordinamento-personale
    titolo: Coordinamento con il personale
    ordine: 7
    descrizione: Comunicazione con infermieri, OSS, ausiliari, coordinatrice

  - id: attivita-internistiche
