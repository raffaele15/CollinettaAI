    descrizione: Preparazione, esecuzione, richieste di analisi, spedizione campioni

  - id: trasfusione
    titolo: Trasfusione di emoderivati
    ordine: 11
    descrizione: Richiesta, verifica, documentazione trasfusionale

  - id: day-hospital
    titolo: Day Hospital
    ordine: 12
    descrizione: Organizzazione e workflow del DH neurologico

  - id: esame-obiettivo
    titolo: Esame obiettivo neurologico
    ordine: 13
