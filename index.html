  session: null,
  tokensFile: null,
  index: { procedure: [], clinica: [], moduli: [], tabelle: [], cestino: [], numeri: null, capitoli: [], lastIndexed: null },
  currentView: 'home',
  editorInstance: null,
  editingContext: null,
  fuse: null,
  userPrefs: null,          // {pins: [...], _sha: null, _saveTimer: null, _pending: false}
  userPrefsPath: null,
  pendingTagEdits: new Map()  // Map<contactId, newKind|null> — modifiche pending ai tag kind (guardia/reparto/utile)
};

const SESSION_KEY = 'collinettaai.session';
// Usa localStorage solo se l'app è installata come PWA (mobile "Aggiungi a home")
// Negli altri casi usa sessionStorage (si cancella a fine sessione).
function isStandalonePWA() {
  return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
    || window.navigator.standalone === true;
}
function sessionStore() {
  return isStandalonePWA() ? localStorage : sessionStorage;
}
function saveSession() {
  if (state.session) sessionStore().setItem(SESSION_KEY, JSON.stringify(state.session));
}
function loadSession() {
  // Cerca sia in localStorage (PWA) sia in sessionStorage (web)
  const raw = localStorage.getItem(SESSION_KEY) || sessionStorage.getItem(SESSION_KEY);
  if (!raw) return null;
  try { return JSON.parse(raw); } catch { return null; }
}
function clearSession() {
  localStorage.removeItem(SESSION_KEY);
  sessionStorage.removeItem(SESSION_KEY);
  state.session = null;
}


/* ============================ INDEX BUILD ============================ */
async function buildIndex() {
  const startTime = Date.now();
  loadEtagCacheFromSession();
  const index = { procedure: [], clinica: [], moduli: [], tabelle: [], cestino: [], numeri: null, capitoli: [], lastIndexed: nowIso() };

  // Single tree call to discover all files
  let tree;
  try {
    tree = await gh.getTree();
  } catch (e) {
    console.warn('Tree API failed, falling back to recursive walk', e);
    return await buildIndexFallback();
  }

  // Filter file paths by section
  const procPaths = [], clinicaPaths = [], moduliPaths = [], tabellePaths = [], cestinoPaths = [];
  const specialFiles = { numeri: null, capitoli: null, numeriOsa: null, numeriIov: null };
  (tree.tree || []).forEach(item => {
    if (item.type !== 'blob') return;
    const p = item.path;
    if (p === 'content/numeri.yml') specialFiles.numeri = p;
    else if (p === 'content/numeri-osa.yml') specialFiles.numeriOsa = p;
    else if (p === 'content/numeri-iov.yml') specialFiles.numeriIov = p;
    else if (p === 'content/capitoli.yml') specialFiles.capitoli = p;
    else if (p.startsWith('content/procedure/') && p.endsWith('.md')) procPaths.push(p);
    else if (p.startsWith('content/clinica/') && p.endsWith('.md')) clinicaPaths.push(p);
    else if (p.startsWith('content/moduli/') && p.endsWith('.md')) moduliPaths.push(p);
    else if (p.startsWith('content/tabelle/') && p.endsWith('.md')) tabellePaths.push(p);
    else if (p.startsWith('cestino/') && p.endsWith('.md')) cestinoPaths.push(p);
  });
  // Track which extended directories exist (for lazy-load toggles)
  state.numeriExtendedAvailable = {
    osa: !!specialFiles.numeriOsa,
    iov: !!specialFiles.numeriIov
  };

  // Parallel fetch all md files in batches of 10 to avoid overwhelming API
  async function fetchBatch(paths) {
    const results = [];
    const batchSize = 10;
    for (let i = 0; i < paths.length; i += batchSize) {
      const batch = paths.slice(i, i + batchSize);
      const batchResults = await Promise.all(batch.map(p =>
        gh.getFile(p).catch(e => { console.warn('fetch error', p, e); return null; })
      ));
      results.push(...batchResults);
    }
    return results;
  }

  // Fetch everything in parallel
  const [procFiles, clinicaFiles, moduliFiles, tabelleFiles, cestinoFiles, numeriFile, capitoliFile] = await Promise.all([
    fetchBatch(procPaths),
    fetchBatch(clinicaPaths),
    fetchBatch(moduliPaths),
    fetchBatch(tabellePaths),
    fetchBatch(cestinoPaths),
    specialFiles.numeri ? gh.getFile(specialFiles.numeri).catch(() => null) : Promise.resolve(null),
    specialFiles.capitoli ? gh.getFile(specialFiles.capitoli).catch(() => null) : Promise.resolve(null)
  ]);

  // Process procedure files
  procFiles.forEach((file, i) => {
    if (!file) return;
    const path = procPaths[i];
    const slug = path.split('/').pop().replace(/\.md$/, '');
    const { frontmatter, body } = parseMarkdown(file.content);
    const relPath = path.replace(/^content\/procedure\//, '');
    const parts = relPath.split('/');
    const autoCategoria = parts.length >= 2 ? parts[0] : (frontmatter.categoria || 'altre');
    const autoSottocategoria = parts.length >= 3 ? parts[1] : null;
    const autoSottoSotto = parts.length >= 4 ? parts[2] : null;
    index.procedure.push({
      slug, path, sha: file.sha,
      categoria: frontmatter.categoria || autoCategoria,
      sottocategoria: frontmatter.sottocategoria || autoSottocategoria || autoSottoSotto,
      ...frontmatter,
      body_preview: body.substring(0, 300),
      body
    });
  });

  // Process clinica files
  clinicaFiles.forEach((file, i) => {
    if (!file) return;
    const path = clinicaPaths[i];
    const slug = path.split('/').pop().replace(/\.md$/, '');
    const { frontmatter, body } = parseMarkdown(file.content);
    const relPath = path.replace(/^content\/clinica\//, '');
    const parts = relPath.split('/');
    // parts = [sottocategoria, ...(optional nested), filename.md]
    const autoSottocategoria = parts.length >= 2 ? parts[0] : null;
    const autoSottoSotto = parts.length >= 3 ? parts[1] : null;
    index.clinica.push({
      slug, path, sha: file.sha,
      categoria: 'clinica',
      sottocategoria: frontmatter.sottocategoria || autoSottocategoria,
      sotto_sottocategoria: frontmatter.sotto_sottocategoria || autoSottoSotto,
      ...frontmatter,
      body_preview: body.substring(0, 300),
      body
    });
  });

  // Process moduli
  moduliFiles.forEach((file, i) => {
    if (!file) return;
    const path = moduliPaths[i];
    const slug = path.split('/').pop().replace(/\.md$/, '');
    const { frontmatter, body } = parseMarkdown(file.content);
    index.moduli.push({ slug, path, sha: file.sha, ...frontmatter, body });
  });

  // Process tabelle
  tabelleFiles.forEach((file, i) => {
    if (!file) return;
    const path = tabellePaths[i];
    const slug = path.split('/').pop().replace(/\.md$/, '');
    const { frontmatter, body } = parseMarkdown(file.content);
    index.tabelle.push({ slug, path, sha: file.sha, ...frontmatter, body });
  });

  // Process cestino
  cestinoFiles.forEach((file, i) => {
    if (!file) return;
    const path = cestinoPaths[i];
    const filename = path.split('/').pop();
    const { frontmatter } = parseMarkdown(file.content);
    index.cestino.push({ filename, path, sha: file.sha, ...frontmatter });
  });

  // Numeri.yml (AOPD — sempre caricato)
  if (numeriFile) {
    try {
      const parsed = jsyaml.load(numeriFile.content) || {};
      // Tag every group with its source ospedale (default 'aopd')
      const ospedaleId = (parsed.ospedale && parsed.ospedale.id) || 'aopd';
      (parsed.gruppi || []).forEach(g => { g._source = ospedaleId; });
      index.numeri = { ...parsed, _sha: numeriFile.sha, _path: numeriFile.path };
    } catch (e) { console.warn('numeri parse error', e); }
  }
  // Initialize extended numeri stash (filled on demand by loadExtendedNumeri)
  index.numeriExtended = { osa: null, iov: null };

  // Capitoli.yml
  if (capitoliFile) {
    try {
      const parsed = jsyaml.load(capitoliFile.content) || {};
      index.capitoli = (parsed.capitoli || []).sort((a, b) => (a.ordine || 99) - (b.ordine || 99));
    } catch (e) { console.warn('capitoli parse error', e); }
  }

  state.index = index;
  // Restore extended-numeri toggles from session (load in background)
  try {
    const saved = JSON.parse(sessionStorage.getItem('numeri_show_ext') || '{}');
    state.showExtendedNumeri = { osa: !!saved.osa, iov: !!saved.iov };
    // Trigger background loads (non-blocking)
    if (state.showExtendedNumeri.osa && state.numeriExtendedAvailable.osa) {
      loadExtendedNumeri('osa').catch(e => console.warn('OSA load failed', e));
    }
    if (state.showExtendedNumeri.iov && state.numeriExtendedAvailable.iov) {
      loadExtendedNumeri('iov').catch(e => console.warn('IOV load failed', e));
    }
  } catch (e) {
    state.showExtendedNumeri = { osa: false, iov: false };
  }
  rebuildSearchIndex();
  updateNavCounts();
  saveEtagCacheToSession();
  updateRateLimitIndicator();

  const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
  console.log(`[buildIndex] ${elapsed}s — ${index.procedure.length}p ${index.clinica.length}c ${index.moduli.length}m ${index.tabelle.length}t · rate ${rateLimit.remaining}/${rateLimit.limit}`);
  return index;
}

// ---- Extended numeri (OSA / IOV) lazy loading ----------------------------

async function loadExtendedNumeri(source) {
  // source = 'osa' | 'iov'
  if (!state.index) return null;
  if (!state.index.numeriExtended) state.index.numeriExtended = { osa: null, iov: null };
  if (state.index.numeriExtended[source]) return state.index.numeriExtended[source]; // already loaded
  const path = `content/numeri-${source}.yml`;
  try {
    const file = await gh.getFile(path);
    if (!file) return null;
    const parsed = jsyaml.load(file.content) || {};
    const ospedaleId = (parsed.ospedale && parsed.ospedale.id) || source;
    (parsed.gruppi || []).forEach(g => { g._source = ospedaleId; });
    state.index.numeriExtended[source] = parsed;
    rebuildSearchIndex();
    return parsed;
  } catch (e) {
    console.warn(`Errore caricamento numeri-${source}.yml`, e);
    toast(`Impossibile caricare la rubrica ${source.toUpperCase()}`, 'error');
    return null;
  }
}

function getVisibleNumeriGroups() {
  // Returns the union of AOPD groups + any toggled-on extended source.
  const groups = [];
  if (state.index?.numeri?.gruppi) groups.push(...state.index.numeri.gruppi);
  const ext = state.index?.numeriExtended || {};
  const showExt = state.showExtendedNumeri || {};
  if (showExt.osa && ext.osa?.gruppi) groups.push(...ext.osa.gruppi);
  if (showExt.iov && ext.iov?.gruppi) groups.push(...ext.iov.gruppi);
  return groups;
}

async function toggleExtendedNumeri(source, on) {
  if (!state.showExtendedNumeri) state.showExtendedNumeri = { osa: false, iov: false };
  state.showExtendedNumeri[source] = !!on;
  try { sessionStorage.setItem('numeri_show_ext', JSON.stringify(state.showExtendedNumeri)); } catch (e) {}
  if (on && state.numeriExtendedAvailable?.[source] && !state.index.numeriExtended?.[source]) {
    toast(`Caricamento rubrica ${source.toUpperCase()}...`, 'info', 1500);
    await loadExtendedNumeri(source);
  }
  rebuildSearchIndex();
  renderNavTree();
  if (state.currentView === 'numeri') navigate('numeri', state.currentParams || {});
}

// Legacy fallback in case the tree API fails
async function buildIndexFallback() {
  console.warn('Using legacy recursive index walk (slower)');
  const index = { procedure: [], clinica: [], moduli: [], tabelle: [], cestino: [], numeri: null, capitoli: [], lastIndexed: nowIso() };
  async function walk(dir, target) {
    try {
      const items = await gh.listDir(dir);
      for (const it of items) {
        if (it.type === 'dir') await walk(it.path, target);
        else if (it.type === 'file' && it.name.endsWith('.md')) {
          const file = await gh.getFile(it.path);
          if (!file) continue;
          const { frontmatter, body } = parseMarkdown(file.content);
          target.push({ slug: it.name.replace(/\.md$/, ''), path: it.path, sha: file.sha, ...frontmatter, body, body_preview: body.substring(0,300) });
        }
      }
    } catch (e) {}
  }
  await walk('content/procedure', index.procedure);
  await walk('content/clinica', index.clinica);
  await walk('content/moduli', index.moduli);
  await walk('content/tabelle', index.tabelle);
  state.index = index;
  rebuildSearchIndex();
  updateNavCounts();
  return index;
}

function rebuildSearchIndex() {
  const docs = [];
  state.index.procedure.forEach(p => docs.push({
    type: 'procedura', slug: p.slug,
    titolo: p.titolo || p.slug,
    tag: (p.tag || []).join(' '),
    termini: (p.termini_equivalenti || []).join(' '),
    body: p.body_preview || ''
  }));
  (state.index.clinica || []).forEach(c => docs.push({
    type: 'clinica', slug: c.slug,
    titolo: c.titolo || c.slug,
    tag: (c.tag || []).join(' '),
    termini: (c.termini_equivalenti || []).join(' '),
    body: c.body_preview || ''
  }));
  state.index.moduli.forEach(m => docs.push({
    type: 'modulo', slug: m.slug,
    titolo: m.titolo || m.slug,
    tag: (m.tag || []).join(' ')
  }));
  state.index.tabelle.forEach(t => docs.push({
    type: 'tabella', slug: t.slug,
    titolo: t.titolo || t.slug
  }));
  getVisibleNumeriGroups().forEach(g => {
    const groupAliases = (g.alias || []).join(' ');
    // Precomputo il bucketing contatto→tipo_sede una volta per gruppo
    let sedeBuckets = [];
    try {
      if (typeof groupContattiBySede === 'function') {
        sedeBuckets = groupContattiBySede(g.contatti || [], g.sedi_operative, g.sede_operativa);
      }
    } catch {}
    const contactToSedeTipo = new Map();
    sedeBuckets.forEach(b => {
      const tipo = b.sede && b.sede.tipo ? b.sede.tipo : '';
      if (tipo) (b.contatti || []).forEach(c => contactToSedeTipo.set(c.id, tipo));
    });
    // Sinonimi per tipi di sede, così cercare "ucic" matcha anche "unità coronarica"
    const sedeTipoAliases = {
      ucic: 'ucic unità coronarica terapia intensiva cardiologica',
      utic: 'utic unità terapia intensiva',
      emodinamica: 'emodinamica cardiologia interventistica',
      elettrofisiologia: 'elettrofisiologia',
      riabilitazione: 'riabilitazione',
      terapia_intensiva: 'terapia intensiva rianimazione',
      sub_intensiva: 'sub intensiva subintensiva',
      day_hospital: 'day hospital dh',
      sala_operatoria: 'sala operatoria so',
      degenze: 'degenze reparto',
      studi_medici: 'studi medici studio medico',
      ambulatori: 'ambulatori ambulatorio amb',
      laboratorio: 'laboratorio',
      segreteria: 'segreteria',
      portineria: 'portineria',
      libera_professione: 'libera professione intramoenia'
    };
    (g.contatti || []).forEach(c => {
      const numeriStr = [...(c.numeri || []), c.cellulare, c.breve].filter(Boolean).join(' ');
      const sedi = g.sedi_operative && g.sedi_operative.length ? g.sedi_operative : (g.sede_operativa ? [g.sede_operativa] : []);
      const sedeStr = sedi.map(s => [s.edificio, s.piano, s.area].filter(Boolean).join(' ')).join(' ');
      const kind = (typeof classifyContatto === 'function') ? classifyContatto(c).kind : '';
      const kindAliases = {
        guardia: 'guardia mdg reperibile',
        reparto: 'reparto degenza degenze infermieri guardiola caposala coordinatore bancone',
        ambulatorio: 'ambulatorio amb',
        direzione: 'direttore direzione segreteria'
      };
      const sedeTipo = contactToSedeTipo.get(c.id) || '';
      const sedeTipoStr = sedeTipoAliases[sedeTipo] || sedeTipo;
      const termini = [
        c.sezione || '',
        kind,
        kindAliases[kind] || '',
        sedeTipoStr,
        (c.alias || []).join(' '),
        groupAliases
      ].filter(Boolean).join(' ');
      docs.push({
        type: 'numero', slug: c.id,
        titolo: c.etichetta,
        gruppo: g.nome,
        gruppoId: g.id,
        direttore: g.direttore || '',
        numeri: numeriStr,
        ospedale: g._source || 'aopd',
        sezione: c.sezione || '',
        tag: (c.tag || []).join(' '),
        alias: [...(c.alias || []), ...(g.alias || [])].join(' '),
        termini: termini
      });
    });
  });
  state.fuse = new Fuse(docs, {
    keys: [
      { name: 'gruppo', weight: 4 },
      { name: 'titolo', weight: 3 },
      { name: 'alias', weight: 3 },
      { name: 'termini', weight: 2 },
      { name: 'tag', weight: 2 },
      { name: 'numeri', weight: 1 },
      { name: 'sezione', weight: 1 },
      { name: 'body', weight: 0.5 }
    ],
    threshold: 0.35, includeMatches: true, includeScore: true, minMatchCharLength: 1,
    ignoreLocation: true,
    useExtendedSearch: true
  });
}

/* ============================ LOCKS ============================ */
const locks = {
  _renewTimer: null,
  async load() {
    const file = await gh.getFile('locks.yml');
    if (!file) return { locks: {}, _sha: null };
    const data = jsyaml.load(file.content) || {};
    return { locks: data.locks || {}, _sha: file.sha };
  },
  async write(locksObj, sha, action) {
    const header = "# Lock advisory per edit simultanei\n# Gestito dall'app, non modificare a mano\n\n";
    const locksYaml = Object.keys(locksObj).length === 0
      ? 'locks: {}\n'
      : 'locks:\n' + jsyaml.dump(locksObj, { indent: 2, lineWidth: 120 }).replace(/^/gm, '  ');
    const content = header + locksYaml;
    return gh.putFile('locks.yml', content, sha, `chore(locks): ${action}`);
  },
  isExpired(lock) {
    if (!lock || !lock.scade) return true;
    return new Date(lock.scade) < new Date();
  },
  async acquire(slug) {
    try {
      const { locks: all, _sha } = await this.load();
      const existing = all[slug];
      if (existing && !this.isExpired(existing) && existing.utente !== state.session.username) {
        return { acquired: false, heldBy: existing.utente, since: existing.iniziato, expires: existing.scade };
      }
      const now = new Date();
      all[slug] = {
        utente: state.session.username,
        iniziato: now.toISOString(),
        scade: new Date(now.getTime() + CONFIG.LOCK_DURATION_MS).toISOString()
      };
      await this.write(all, _sha, `acquire ${slug} by ${state.session.username}`);
      this._startRenew(slug);
      return { acquired: true };
    } catch (e) {
      console.warn('lock acquire failed', e);
      return { acquired: true, warning: 'Lock non registrato' };
    }
  },
  async release(slug) {
    this._stopRenew();
    try {
      const { locks: all, _sha } = await this.load();
      if (all[slug] && all[slug].utente === state.session.username) {
        delete all[slug];
        await this.write(all, _sha, `release ${slug} by ${state.session.username}`);
      }
    } catch (e) { console.warn('lock release failed', e); }
  },
  _startRenew(slug) {
    this._stopRenew();
    this._renewTimer = setTimeout(async () => {
      try {
        const { locks: all, _sha } = await this.load();
        if (all[slug] && all[slug].utente === state.session.username) {
          all[slug].scade = new Date(Date.now() + CONFIG.LOCK_DURATION_MS).toISOString();
          await this.write(all, _sha, `renew ${slug}`);
          this._startRenew(slug);
        }
      } catch (e) { console.warn('lock renew failed', e); }
    }, CONFIG.LOCK_RENEW_MS);
  },
  _stopRenew() { if (this._renewTimer) { clearTimeout(this._renewTimer); this._renewTimer = null; } }
};

/* ============================ LOGIN ============================ */
async function loadTokensFile() {
  try {
    const url = `${CONFIG.API_BASE}/repos/${CONFIG.REPO_OWNER}/${CONFIG.AUTH_REPO_NAME}/contents/data/encrypted-tokens.json?ref=${CONFIG.BRANCH}&t=${Date.now()}`;
    const res = await fetch(url, {
      headers: {
        'Authorization': `token ${BOOTSTRAP_PAT}`,
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28'
      },
      cache: 'no-store'
    });
    if (res.status === 404) throw new Error('File data/encrypted-tokens.json non trovato nel repo auth');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const meta = await res.json();
    if (!meta.content) throw new Error('File auth vuoto');
    const json = new TextDecoder().decode(base64ToBuffer(meta.content.replace(/\n/g, '')));
    return JSON.parse(json);
  } catch (e) {
    throw new Error(`Impossibile caricare credenziali dal repo auth. Verifica PAT-1 e nome repo. (${e.message})`);
  }
}

async function attemptLogin(username, passphrase) {
  const loginError = $('login-error');
  const btn = $('login-submit');
  const btnText = $('login-submit-text');
  loginError.classList.remove('visible');
  btn.classList.add('is-loading');
  btn.setAttribute('aria-busy', 'true');
  btn.style.pointerEvents = 'none';
  btnText.innerHTML = '<span class="btn-spinner"></span>';

  try {
    if (!state.tokensFile) state.tokensFile = await loadTokensFile();
    const entry = (state.tokensFile.utenti || {})[username];
    if (!entry) throw new Error('Username non riconosciuto.');
    let payload;
    try { payload = await decryptUserData(entry, passphrase); }
    catch { throw new Error('Passphrase errata.'); }
    if (!payload || !payload.token) throw new Error('Payload cifrato non valido.');
    const testRes = await fetch(`${CONFIG.API_BASE}/repos/${CONFIG.REPO_OWNER}/${CONFIG.REPO_NAME}`, {
      headers: { 'Authorization': `token ${payload.token}`, 'Accept': 'application/vnd.github+json' }
    });
    if (!testRes.ok) throw new Error(`Token non valido (HTTP ${testRes.status}).`);
    state.session = {
      username,
      token: payload.token,
      nome: payload.nome || null,
      cognome: payload.cognome || null
    };
    saveSession();
    await enterApp();
  } catch (e) {
    loginError.textContent = e.message;
    loginError.classList.add('visible');
  } finally {
    btn.classList.remove('is-loading');
    btn.removeAttribute('aria-busy');
    btn.style.pointerEvents = '';
    btnText.textContent = 'Accedi';
  }
}

async function enterApp() {
  $('login-view').classList.add('hidden');
  $('app-view').classList.remove('hidden');
  const displayName = (state.session.nome && state.session.cognome)
    ? `${state.session.nome} ${state.session.cognome}`
    : state.session.username;
  $('user-name-display').textContent = displayName;
  const avatarSource = (state.session.nome && state.session.cognome)
    ? state.session.nome[0] + state.session.cognome[0]
    : state.session.username.substring(0, 2);
  $('user-avatar').textContent = avatarSource.toUpperCase();
  $('nav-utenti').classList.toggle('hidden', state.session.username !== 'admin');
  if (state.session.username === 'admin') {
    document.getElementById('rate-limit-indicator').classList.remove('hidden');
  }
  renderLoading('Caricamento…');
  try {
    await buildIndex();
    await userPrefs.load();
    navigate('home');
  } catch (e) {
    renderError('Errore caricamento indice', e.message);
  }
}

function toggleUserMenu(e) {
  if (e) e.stopPropagation();
  const dd = document.getElementById('user-menu-dropdown');
  if (dd) dd.classList.toggle('hidden');
}
function closeUserMenu() {
  const dd = document.getElementById('user-menu-dropdown');
  if (dd) dd.classList.add('hidden');
}
function setTheme(theme) {
  try { localStorage.setItem('collinetta-theme', theme); } catch {}
  applyTheme(theme);
  document.querySelectorAll('.theme-opt').forEach(b => b.classList.toggle('active', b.dataset.theme === theme));
}
const FONT_SIZES = ['sm', 'md', 'lg', 'xl'];
const FONT_LABELS = { sm: 'Piccolo', md: 'Medio', lg: 'Grande', xl: 'Extra grande' };
function setFontSize(size) {
  if (!FONT_SIZES.includes(size)) size = 'md';
  try { localStorage.setItem('collinetta-font-size', size); } catch {}
  document.documentElement.setAttribute('data-font-size', size);
  const label = document.getElementById('font-size-label');
  if (label) label.textContent = FONT_LABELS[size];
  // Update button states
  const idx = FONT_SIZES.indexOf(size);
  const btns = document.querySelectorAll('.font-step-btn');
  if (btns.length === 2) {
    btns[0].disabled = idx === 0;
    btns[1].disabled = idx === FONT_SIZES.length - 1;
  }
}
function changeFontSize(delta) {
  let current = 'md';
  try { current = localStorage.getItem('collinetta-font-size') || 'md'; } catch {}
  const idx = FONT_SIZES.indexOf(current);
  const next = Math.max(0, Math.min(FONT_SIZES.length - 1, idx + delta));
  setFontSize(FONT_SIZES[next]);
}
function applyTheme(theme) {
  let effective = theme;
  if (theme === 'auto' || !theme) {
    effective = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  document.documentElement.setAttribute('data-theme', effective);
}
function initTheme() {
  let saved = 'auto';
  try { saved = localStorage.getItem('collinetta-theme') || 'auto'; } catch {}
  applyTheme(saved);
  // Font size init
  let fontSize = 'md';
  try { fontSize = localStorage.getItem('collinetta-font-size') || 'md'; } catch {}
  document.documentElement.setAttribute('data-font-size', fontSize);
  setTimeout(() => {
    document.querySelectorAll('.theme-opt').forEach(b => b.classList.toggle('active', b.dataset.theme === saved));
    setFontSize(fontSize);
  }, 0);
  if (window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      let s = 'auto';
      try { s = localStorage.getItem('collinetta-theme') || 'auto'; } catch {}
      if (s === 'auto') applyTheme('auto');
    });
  }
}
// Close dropdown on outside click
document.addEventListener('click', (e) => {
  const dd = document.getElementById('user-menu-dropdown');
  const btn = document.getElementById('user-menu-btn');
  if (!dd || dd.classList.contains('hidden')) return;
  if (btn && btn.contains(e.target)) return;
  if (dd.contains(e.target)) return;
  closeUserMenu();
});

function logout() {
  // Flush any pending pin saves before losing session
  if (state.userPrefs && state.userPrefs._pending) {
    if (state.userPrefs._saveTimer) clearTimeout(state.userPrefs._saveTimer);
    userPrefs.persist().catch(() => {}); // fire-and-forget
  }
  clearSession();
  state.index = { procedure: [], clinica: [], moduli: [], tabelle: [], cestino: [], numeri: null, capitoli: [], lastIndexed: null };
  state.editingContext = null;
  state.userPrefs = null;
  state.userPrefsPath = null;
  if (state.editorInstance) { try { state.editorInstance.destroy(); } catch {} state.editorInstance = null; }
  // Clear ETag cache + rate limit indicator
  etagCache.clear();
  try { sessionStorage.removeItem('collinettaai.etags'); } catch {}
  rateLimit.remaining = null; rateLimit.limit = null; rateLimit.resetAt = null;
  const rl = document.getElementById('rate-limit-indicator');
  if (rl) { rl.classList.add('hidden'); rl.textContent = '— /—'; }
  $('app-view').classList.add('hidden');
  $('login-view').classList.remove('hidden');
  $('login-username').value = '';
  $('login-passphrase').value = '';
  $('login-error').classList.remove('visible');
}


/* ============================ ROUTER ============================ */
function navigate(route, params = {}) {
  if (state.editingContext && state.editingContext.isDirty) {
    if (!confirm("Hai modifiche non salvate. Sicuro di uscire dall'editor?")) return;
  }
  if (state.editorInstance) { try { state.editorInstance.destroy(); } catch {} state.editorInstance = null; }
  if (state.editingContext && state.editingContext.hasLock) {
    locks.release(state.editingContext.slug).catch(() => {});
  }
  state.editingContext = null;
  state.currentView = route;
  window.removeEventListener('beforeunload', beforeUnloadHandler);

  // Highlight active nav-tree row by route
  $$('.nav-tree-row').forEach(el => {
    el.classList.remove('active');
  });
  $$('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.route === route || (route.startsWith(el.dataset.route + '-') && el.dataset.route));
  });
  // Save current view+params for re-render after edit toggle
  state.currentView = route;
  state.currentParams = params;
  pushHistory(route, params);
  if (route !== 'search') $('global-search').value = '';

  switch (route) {
    case 'home': renderHome(); break;
    case 'manuale': renderManuale(); break;
    case 'capitolo': renderCapitolo(params.id); break;
    case 'procedure': renderProcedureList(); break;
    case 'procedure-cat': renderProcedureByCategoria(params.cat, params.sub); break;
    case 'clinica': renderClinicaList(params.sub); break;
    case 'clinica-scheda': renderSchedaClinica(params.slug); break;
    case 'clinica-edit': renderSchedaClinicaEditor(params.slug); break;
    case 'procedura': renderProcedura(params.slug); break;
    case 'procedura-edit': renderProceduraEditor(params.slug); break;
    case 'numeri': renderNumeri(params.filter); break;
    case 'moduli': renderModuliList(); break;
    case 'modulo': renderModulo(params.slug); break;
    case 'tabelle': renderTabelleList(); break;
    case 'tabella': renderTabella(params.slug); break;
    case 'cestino': renderCestino(); break;
    case 'utenti': renderGestioneUtenti(); break;
    case 'search': renderSearchResults(params.query); break;
    case 'tag': renderTagPage(params.tag); break;
    default: renderHome();
  }
  window.scrollTo({ top: 0, behavior: 'instant' });
}

  if (pin.type === 'clinica') {
    const c = (state.index.clinica || []).find(x => x.slug === pin.slug);
    return c ? renderClinicaCard(c) : null;
  }
  if (pin.type === 'modulo') {
    const m = state.index.moduli.find(x => x.slug === pin.slug);
    if (!m) return null;
    return `<div class="procedure-card" onclick="navigate('modulo', {slug:'${escapeJs(m.slug)}'})">

    ${pezzi.length === 0 ? '<p style="color:var(--ink-muted);">Nessun pezzo assegnato a questo capitolo. Assegna procedure con <code>capitolo: ' + escapeHtml(capId) + '</code> nel frontmatter.</p>' : tocHtml + pezzi.map(p => {
      const bodyHtml = renderMarkdownWithImages(p.body || '', p.path);
      return `
        <article id="p-${escapeHtml(p.slug)}" style="margin-bottom:56px;padding-bottom:32px;border-bottom:1px solid var(--rule);">
          <div style="display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:16px;">
            <h2 style="font-family:var(--serif);font-weight:500;font-size:26px;line-height:1.15;letter-spacing:-.01em;color:var(--ink);">${escapeHtml(p.titolo || p.slug)}</h2>
            <button class="btn ghost sm edit-only" onclick="event.stopPropagation();navigate('procedura-edit', {slug:'${escapeHtml(p.slug)}'})">Modifica</button>
          </div>
          <div class="procedura-body" style="font-size:15px;">${bodyHtml}</div>
        </article>`;
    }).join('')}`;
}

function renderProcedureList() {
  const procs = state.index.procedure;
  const byCat = {};
  procs.forEach(p => {
    const c = p.categoria || 'altre';
    if (!byCat[c]) byCat[c] = [];
    byCat[c].push(p);
  });
  const catOrder = ['bedside','richieste','farmacologiche','emergenze','gestione'];
  const cats = [...catOrder.filter(c => byCat[c]), ...Object.keys(byCat).filter(c => !catOrder.includes(c))];

  // Auto-expand procedure node in sidebar
  navState.expanded.add('procedure');
  renderNavTree();

  $('main-content').innerHTML = `
    <div class="page-head">
      <div class="page-eyebrow">${buildBreadcrumb([{label:'Home', route:'home'}])}</div>
      <h1 class="page-title">Procedure</h1>
      <div style="margin-top:8px;font-size:13px;color:var(--ink-muted);">${procs.length} schede, organizzate in ${cats.length} categorie.</div>
      <div class="page-actions">
        <button class="btn edit-only" onclick="nuovaProcedura()">+ Nuova procedura</button>
      </div>
    </div>
    ${cats.map(cat => renderCategoriaBlock(cat, byCat[cat], false)).join('')}`;
  attachCategoriaToggle();
}

function renderCategoriaBlock(cat, items, openByDefault) {
  const label = CATEGORIA_LABELS[cat] || cat;
  // Group by sottocategoria
  const bySub = {};
  items.forEach(p => {
    const s = p.sottocategoria || '_senza';
    if (!bySub[s]) bySub[s] = [];
    bySub[s].push(p);
  });
  const subs = Object.keys(bySub).sort();

  return `
    <details class="categoria-block" ${openByDefault ? 'open' : ''} data-cat="${escapeHtml(cat)}">
      <summary class="categoria-summary">
        <span class="categoria-title">${escapeHtml(label)}</span>
        <span class="categoria-count">${items.length}</span>
      </summary>
      <div class="categoria-content">
        ${subs.length > 1 || (subs.length === 1 && subs[0] !== '_senza')
          ? subs.map(s => `
              <div class="sottocategoria-block">
                <div class="sottocategoria-title" onclick="navigate('procedure-cat', {cat:'${escapeHtml(cat)}', sub:'${escapeHtml(s)}'})">
                  ${escapeHtml(SOTTO_LABELS[s] || (s === '_senza' ? 'Senza sottocategoria' : s))}
                  <span class="sottocategoria-count">${bySub[s].length}</span>
                </div>
                <div class="procedure-grid">
                  ${bySub[s].map(p => renderProcedureCard(p)).join('')}
                </div>
              </div>
            `).join('')
          : `<div class="procedure-grid">${items.map(p => renderProcedureCard(p)).join('')}</div>`
        }
      </div>
    </details>`;
}

function attachCategoriaToggle() {
  // Sync details open state to left sidebar active (optional visual enhancement)
}

function renderProcedureByCategoria(cat, subFilter) {
  const procs = state.index.procedure.filter(p => p.categoria === cat);
  if (procs.length === 0) return renderError('Categoria vuota', cat);

  const bySub = {};
  procs.forEach(p => {
    const s = p.sottocategoria || '_senza';
    if (!bySub[s]) bySub[s] = [];
    bySub[s].push(p);
  });
  const subs = Object.keys(bySub).sort();
  const filtered = subFilter ? bySub[subFilter] || [] : procs;

  // Auto-expand procedure + macro + (sub) in sidebar
  navState.expanded.add('procedure');
  navState.expanded.add('macro:' + cat);
  if (subFilter) navState.expanded.add('sub:' + cat + ':' + subFilter);
  renderNavTree();

  // Title: use the sottocategoria name if filtered, else the macro name
  const pageTitle = subFilter
    ? (SOTTO_LABELS[subFilter] || subFilter)
    : (CATEGORIA_LABELS[cat] || cat);
  const breadcrumb = subFilter
    ? buildBreadcrumb([
        { label: 'Procedure', route: 'procedure' },
        { label: CATEGORIA_LABELS[cat] || cat, route: 'procedure-cat', params: { cat } }
      ])
    : buildBreadcrumb([{ label: 'Procedure', route: 'procedure' }]);

  $('main-content').innerHTML = `
    <div class="page-head">
      <div class="page-eyebrow">${breadcrumb}</div>
      <h1 class="page-title">${escapeHtml(pageTitle)} ${subFilter ? renderPinButton('sottocategoria', cat, subFilter) : renderPinButton('categoria', cat)}</h1>
      <div style="margin-top:8px;font-size:13px;color:var(--ink-muted);">${filtered.length} procedur${filtered.length === 1 ? 'a' : 'e'}</div>
      <div class="page-actions">
        <button class="btn edit-only" onclick="nuovaProcedura({categoria:'${escapeHtml(cat)}'${subFilter && subFilter !== '_senza' ? `, sottocategoria:'${escapeHtml(subFilter)}'` : ''}})">+ Nuova procedura</button>
      </div>
    </div>
    ${subFilter || (subs.length === 1 && subs[0] === '_senza')
      ? `<div class="procedure-grid">${filtered.map(p => renderProcedureCard(p)).join('')}</div>`
      : subs.map(s => `
          <details class="categoria-block sottocategoria-standalone">
            <summary class="categoria-summary">
              <span class="categoria-title">${escapeHtml(SOTTO_LABELS[s] || (s === '_senza' ? 'Senza sottocategoria' : s))}</span>
              <span class="categoria-count">${bySub[s].length}</span>
            </summary>
            <div class="categoria-content">
              <div class="procedure-grid">
                ${bySub[s].map(p => renderProcedureCard(p)).join('')}
              </div>
            </div>
          </details>
        `).join('')
    }`;
}

/* ============================ VIEW — PROCEDURA ============================ */
function renderSchedaBody(scheda) {
  const sections = [];

  if (scheda.sintesi) {
    sections.push(schedaSection('Sintesi', `<p style="font-family:var(--serif);font-size:17px;line-height:1.55;font-style:italic;color:var(--ink-soft);">${escapeHtml(scheda.sintesi)}</p>`, true));
  }

  if (Array.isArray(scheda.indicazioni) || Array.isArray(scheda.controindicazioni)) {
    const ind = Array.isArray(scheda.indicazioni) && scheda.indicazioni.length
      ? `<div><div class="scheda-subtitle">Indicazioni</div><ul class="scheda-list">${scheda.indicazioni.map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul></div>` : '';
    const ctr = Array.isArray(scheda.controindicazioni) && scheda.controindicazioni.length
      ? `<div><div class="scheda-subtitle scheda-subtitle-warn">Controindicazioni</div><ul class="scheda-list">${scheda.controindicazioni.map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul></div>` : '';
    if (ind || ctr) sections.push(schedaSection('Indicazioni e controindicazioni', `<div class="scheda-two-col">${ind}${ctr}</div>`, true));
  }

  if (Array.isArray(scheda.criteri_valutazione) && scheda.criteri_valutazione.length) {
    sections.push(schedaSection('Criteri di valutazione', `<ul class="scheda-list">${scheda.criteri_valutazione.map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul>`));
  }
  if (scheda.punteggio) {
    const p = scheda.punteggio;
    const intBlock = Array.isArray(p.interpretazione) ? `<ul class="scheda-list" style="margin-top:8px;">${p.interpretazione.map(x => `<li>${escapeHtml(x)}</li>`).join('')}</ul>` : '';
    sections.push(schedaSection('Punteggio', `<div><strong>Range:</strong> ${escapeHtml(p.range || '—')}</div>${intBlock}`));
  }
  if (scheda.interpretazione && typeof scheda.interpretazione === 'string') {
    sections.push(schedaSection('Interpretazione', renderMarkdownWithImages(scheda.interpretazione, scheda.path)));
  }

  if (Array.isArray(scheda.prerequisiti) && scheda.prerequisiti.length) {
    sections.push(schedaSection('Prerequisiti', `<ul class="scheda-list scheda-checklist">${scheda.prerequisiti.map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul>`));
  }

  if (scheda.preparazione && typeof scheda.preparazione === 'object') {
    const p = scheda.preparazione;
    const rows = [];
    if (p.diluizione) rows.push(['Diluizione', p.diluizione]);
    if (p.concentrazione) rows.push(['Concentrazione', p.concentrazione]);
    if (p.via_somministrazione) rows.push(['Via', p.via_somministrazione]);
    if (p.compatibilita) rows.push(['Compatibilità', p.compatibilita]);
    if (p.materiale) rows.push(['Materiale', p.materiale]);
    if (p.note) rows.push(['Note', p.note]);
    if (rows.length) sections.push(schedaSection('Preparazione', scheda2ColTable(rows)));
  }

  if (scheda.dosaggio && typeof scheda.dosaggio === 'object') {
    const d = scheda.dosaggio;
    const rows = [];
    if (d.carico) rows.push(['Carico', d.carico]);
    if (d.mantenimento) rows.push(['Mantenimento', d.mantenimento]);
    if (d.titolazione) rows.push(['Titolazione', d.titolazione]);
    if (d.massimo) rows.push(['Dose massima', d.massimo]);
    if (rows.length) sections.push(schedaSection('Dosaggio', scheda2ColTable(rows)));
  }

  if (scheda.algoritmo_linee && typeof scheda.algoritmo_linee === 'object') {
    const lineeHtml = Object.entries(scheda.algoritmo_linee).map(([key, linea]) => {
      const nome = key.replace(/_/g, ' ').replace(/linea (\d)/, 'Linea $1');
      const finestra = linea.finestra_temporale ? `<div style="font-family:var(--mono);font-size:11px;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;">⏱ ${escapeHtml(linea.finestra_temporale)}</div>` : '';
      const cond = linea.condizione ? `<div style="font-style:italic;color:var(--ink-muted);margin-bottom:8px;font-size:14px;">${escapeHtml(linea.condizione)}</div>` : '';
      const req = linea.richiede ? `<div style="background:var(--danger-soft);border-left:3px solid var(--danger);padding:8px 12px;margin-bottom:10px;font-size:13px;color:var(--danger);">${escapeHtml(linea.richiede)}</div>` : '';
      const farmaci = Array.isArray(linea.farmaci) ? linea.farmaci.map(f => `
        <div style="padding:10px 0;border-bottom:1px solid var(--rule-soft);">
          <div style="font-family:var(--serif);font-weight:600;font-size:15px;color:var(--ink);">${escapeHtml(f.nome)}</div>
          <div style="font-size:13px;color:var(--ink-soft);margin-top:2px;"><strong>Dose:</strong> ${escapeHtml(f.dose || '—')}</div>
          ${f.via ? `<div style="font-size:13px;color:var(--ink-soft);"><strong>Via:</strong> ${escapeHtml(f.via)}</div>` : ''}
          ${f.alternative ? `<div style="font-size:12px;color:var(--ink-muted);font-style:italic;">Alt: ${escapeHtml(f.alternative)}</div>` : ''}
          ${f.note ? `<div style="font-size:12px;color:var(--ink-muted);font-style:italic;">${escapeHtml(f.note)}</div>` : ''}
          ${f.controindicazioni ? `<div style="font-size:12px;color:var(--danger);">⚠ ${escapeHtml(f.controindicazioni)}</div>` : ''}
        </div>`).join('') : '';
      const rip = linea.ripetibile ? `<div style="font-size:12px;color:var(--ink-muted);margin-top:8px;font-style:italic;">Ripetibile: ${escapeHtml(linea.ripetibile)}</div>` : '';
      return `
        <div style="margin-bottom:20px;padding:16px;background:var(--bg-paper);border:1px solid var(--rule);border-radius:2px;">
          <div style="font-family:var(--serif);font-size:18px;font-weight:500;text-transform:capitalize;margin-bottom:8px;">${escapeHtml(nome)}</div>
          ${finestra}${cond}${req}${farmaci}${rip}
        </div>`;
    }).join('');
    sections.push(schedaSection('Algoritmo terapeutico', lineeHtml, true));
  }

  if (Array.isArray(scheda.target_clinici) && scheda.target_clinici.length) {
    sections.push(schedaSection('Target clinici', `<ul class="scheda-list">${scheda.target_clinici.map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul>`));
  }

  if (scheda.richiesta_galileo && typeof scheda.richiesta_galileo === 'object') {
    const rg = scheda.richiesta_galileo;
    const rows = [];
    if (rg.percorso) rows.push(['Percorso', rg.percorso]);
    if (rg.urgenza) rows.push(['Urgenza', rg.urgenza]);
    if (rg.note_quesito) rows.push(['Note quesito', rg.note_quesito]);
    if (rg.allegati) rows.push(['Allegati', rg.allegati]);
    if (rows.length) sections.push(schedaSection('Richiesta Galileo', scheda2ColTable(rows), true));
  }

  if (Array.isArray(scheda.numeri_chiave) && scheda.numeri_chiave.length) {
    const numsHtml = scheda.numeri_chiave.map(n => {
      const nums = (n.numeri || []).map(num => `<button class="numero-btn" onclick="copyNumber('${escapeHtml(num)}')">${escapeHtml(num)}</button>`).join(' ');
      return `
        <div class="numero-row">
          <div>
            <div class="numero-label">${escapeHtml(n.etichetta)}${n.orari ? ` <span style="color:var(--ink-muted);font-size:12px;">· ${escapeHtml(n.orari)}</span>` : ''}</div>
            ${n.note ? `<div class="numero-note">${escapeHtml(n.note)}</div>` : ''}
          </div>
          <div class="numero-nums">${nums}</div>
        </div>`;
    }).join('');
    sections.push(schedaSection('Numeri chiave', numsHtml, true));
  }

  if (scheda.orari || scheda.tempistica || scheda.durata_tipica) {
    const rows = [];
    if (scheda.orari) rows.push(['Orari', scheda.orari]);
    if (scheda.tempistica) rows.push(['Tempistica', scheda.tempistica]);
    if (scheda.durata_tipica) rows.push(['Durata tipica', scheda.durata_tipica]);
    sections.push(schedaSection('Tempistiche', scheda2ColTable(rows)));
  }

  if (scheda.monitoraggio && typeof scheda.monitoraggio === 'object') {
    const m = scheda.monitoraggio;
    const parts = [];
    if (Array.isArray(m.parametri)) parts.push(`<div><strong>Parametri:</strong> ${m.parametri.map(escapeHtml).join(', ')}</div>`);
    if (m.frequenza) parts.push(`<div><strong>Frequenza:</strong> ${escapeHtml(m.frequenza)}</div>`);
    if (m.target) parts.push(`<div><strong>Target:</strong> ${escapeHtml(m.target)}</div>`);
    if (Array.isArray(m.allarmi) && m.allarmi.length) parts.push(`<div style="margin-top:8px;"><strong>Allarmi</strong><ul class="scheda-list" style="margin-top:4px;">${m.allarmi.map(a => `<li>${escapeHtml(a)}</li>`).join('')}</ul></div>`);
    sections.push(schedaSection('Monitoraggio', parts.join(''), true));
  }

  if (scheda.sospensione_weaning) sections.push(schedaSection('Sospensione / Weaning', `<p>${escapeHtml(scheda.sospensione_weaning)}</p>`));
  if (scheda.sospensione_farmaci) sections.push(schedaSection('Sospensione farmaci', typeof scheda.sospensione_farmaci === 'string' ? `<p>${escapeHtml(scheda.sospensione_farmaci)}</p>` : `<p>Vedi tabella correlata.</p>`));

  if (Array.isArray(scheda.post_procedura) && scheda.post_procedura.length) {
    sections.push(schedaSection('Post-procedura', `<ul class="scheda-list">${scheda.post_procedura.map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul>`));
  }
  if (Array.isArray(scheda.effetti_avversi) && scheda.effetti_avversi.length) {
    sections.push(schedaSection('Effetti avversi', `<ul class="scheda-list">${scheda.effetti_avversi.map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul>`));
  }
  if (Array.isArray(scheda.interazioni) && scheda.interazioni.length) {
    sections.push(schedaSection('Interazioni', `<ul class="scheda-list">${scheda.interazioni.map(i => `<li>${escapeHtml(i)}</li>`).join('')}</ul>`));
  }
  if (scheda.accesso_venoso) sections.push(schedaSection('Accesso venoso', `<p>${escapeHtml(scheda.accesso_venoso)}</p>`));

  if (scheda.nota_diario_template) {
    sections.push(schedaSection('Nota diario (template)',
      `<div style="position:relative;">
        <pre style="font-family:var(--serif);font-size:14px;line-height:1.6;background:var(--bg-sink);padding:16px 20px;border-left:3px solid var(--ink-faint);border-radius:0 2px 2px 0;white-space:pre-wrap;font-style:italic;color:var(--ink-soft);margin:0;">${escapeHtml(scheda.nota_diario_template)}</pre>
        <button class="btn sm ghost" style="position:absolute;top:8px;right:8px;" onclick="copyDiarioNote(this)" data-text="${escapeHtml(scheda.nota_diario_template)}">Copia</button>
      </div>`));
  }
  if (scheda.note_libere) sections.push(schedaSection('Note libere', renderMarkdownWithImages(scheda.note_libere, scheda.path)));
  if (scheda.riferimenti_bibliografici) sections.push(schedaSection('Riferimenti bibliografici', renderMarkdownWithImages(scheda.riferimenti_bibliografici, scheda.path)));

  return sections.join('');
}

function renderSchedaRelated(scheda, isClinica) {
  const related = [];
  (scheda.moduli_correlati || []).forEach(mid => {
    const m = state.index.moduli.find(x => x.slug === mid);
    if (m) related.push({ label: 'Modulo', title: m.titolo, click: `navigate('modulo', {slug:'${m.slug}'})` });
  });
  (scheda.tabelle_correlate || []).forEach(tid => {
    const t = state.index.tabelle.find(x => x.slug === tid);
    if (t) related.push({ label: 'Tabella', title: t.titolo, click: `navigate('tabella', {slug:'${t.slug}'})` });
  });
  (scheda.procedure_correlate || []).forEach(pid => {
    const p = state.index.procedure.find(x => x.slug === pid);
    if (p) related.push({ label: 'Procedura', title: p.titolo, click: `navigate('procedura', {slug:'${p.slug}'})` });
    else {
      const c = (state.index.clinica || []).find(x => x.slug === pid);
      if (c) related.push({ label: 'Clinica', title: c.titolo, click: `navigate('clinica-scheda', {slug:'${c.slug}'})` });
    }
  });
  (scheda.invii_campioni_correlati || []).forEach(pid => {
    const p = state.index.procedure.find(x => x.slug === pid);
    if (p) related.push({ label: 'Invio campione', title: p.titolo, click: `navigate('procedura', {slug:'${p.slug}'})` });
  });
  (scheda.numeri_correlati || []).forEach(nid => {
    const n = findContattoBySlug(nid);
    if (n) related.push({ label: 'Numero', title: `${n.etichetta} (${(n.numeri || []).join(', ')})`, click: `navigate('numeri', {filter:'${escapeHtml(nid)}'})` });
  });
  if (!related.length) return '';
  return `<div class="related-grid">${related.map(r => `
    <div class="related-card" onclick="${r.click}">
      <div class="related-card-label">${escapeHtml(r.label)}</div>
      <div class="related-card-title">${escapeHtml(r.title)}</div>
    </div>`).join('')}</div>`;
}

function renderProcedura(slug) {
  const proc = state.index.procedure.find(p => p.slug === slug);
  if (!proc) return renderError('Procedura non trovata', slug);
  const tagsHtml = (proc.tag || []).map(t => `<span class="tag tag-procedura clickable" onclick="navigate('tag', {tag:'${escapeJs(t)}'})">${escapeHtml(t)}</span>`).join('');

  const catLabel = proc.categoria ? CATEGORIA_LABELS[proc.categoria] || proc.categoria : 'Procedure';
  const subLabel = proc.sottocategoria ? SOTTO_LABELS[proc.sottocategoria] || proc.sottocategoria : null;
  const breadcrumb = proc.capitolo
    ? buildBreadcrumb([
        { label: 'Manuale', route: 'manuale' },
        { label: (state.index.capitoli || []).find(c => c.id === proc.capitolo)?.titolo || proc.capitolo, route: 'capitolo', params: { id: proc.capitolo } }
      ])
    : buildBreadcrumb([
        { label: 'Procedure', route: 'procedure' },
        { label: catLabel, route: 'procedure-cat', params: { cat: proc.categoria } },
        ...(subLabel ? [{ label: subLabel, route: 'procedure-cat', params: { cat: proc.categoria, sub: proc.sottocategoria } }] : [])
      ]);

  const bodyHtml = proc.body && proc.body.trim() ? renderMarkdownWithImages(proc.body, proc.path) : '';

  $('main-content').innerHTML = `
    <div class="page-head">
      <div class="page-eyebrow">${breadcrumb}</div>
      <h1 class="page-title">${escapeHtml(proc.titolo || proc.slug)} ${renderPinButton('procedura', proc.slug)}</h1>
      <div style="margin-top:12px;">${tagsHtml}</div>
      <div class="page-meta">
        <div class="page-meta-item">Aggiornata ${timeAgo(proc.ultima_modifica)} da <strong style="color:var(--ink-soft);font-family:var(--mono);font-size:12px;margin-left:4px;">${escapeHtml(proc.modificato_da || '—')}</strong></div>
        ${proc.urgenza_tipica ? `<div class="page-meta-item">Urgenza: ${escapeHtml(proc.urgenza_tipica)}</div>` : ''}
      </div>
      <div class="page-actions">
        <button class="btn edit-only" onclick="navigate('procedura-edit', {slug:'${escapeHtml(slug)}'})">Modifica</button>
        <button class="btn ghost edit-only" onclick="showHistoryModal('${escapeHtml(slug)}')">Cronologia</button>
        <button class="btn ghost edit-only" onclick="confirmDelete('procedura', '${escapeHtml(slug)}')">Elimina</button>
      </div>
    </div>
    <article class="procedura-body">
      ${renderSchedaBody(proc)}
      ${bodyHtml ? `<div style="margin-top:32px;padding-top:24px;border-top:1px solid var(--rule);">${bodyHtml}</div>` : ''}
    </article>
    ${renderSchedaRelated(proc, false)}`;
}

function renderClinicaList(subFilter) {
  const items = state.index.clinica || [];
  const bySub = {};
  items.forEach(c => {
    const s = c.sottocategoria || '_senza';
    if (!bySub[s]) bySub[s] = [];
    bySub[s].push(c);
  });
  const subs = Object.keys(bySub).sort();
  const subOrder = ['prognosi', 'gestione-post-acuta', 'scale-cliniche'];
  const orderedSubs = [...subOrder.filter(s => bySub[s]), ...subs.filter(s => !subOrder.includes(s))];
  const filtered = subFilter ? (bySub[subFilter] || []) : items;

  // Auto-expand clinica node in sidebar
  navState.expanded.add('clinica');
  if (subFilter) navState.expanded.add('clinica-sub:' + subFilter);
  renderNavTree();

  const pageTitle = subFilter
    ? (SOTTO_LABELS[subFilter] || subFilter)
    : 'Clinica';
  const breadcrumb = subFilter
    ? buildBreadcrumb([{ label: 'Clinica', route: 'clinica' }])
    : buildBreadcrumb([{ label: 'Home', route: 'home' }]);
  const subtitle = subFilter
    ? `${filtered.length} schede`

  $('main-content').innerHTML = `

    </div>
    ${items.length === 0 ? '<p style="color:var(--ink-muted);">Nessuna scheda clinica ancora caricata.</p>' :
      subFilter || (orderedSubs.length === 1 && orderedSubs[0] === '_senza')
        ? `<div class="procedure-grid">${filtered.map(c => renderClinicaCard(c)).join('')}</div>`
        : orderedSubs.map(s => `
            <details class="categoria-block sottocategoria-standalone">
              <summary class="categoria-summary">
                <span class="categoria-title">${escapeHtml(SOTTO_LABELS[s] || (s === '_senza' ? 'Senza sottocategoria' : s))}</span>
                <span class="categoria-count">${bySub[s].length}</span>

    ...(subLabel ? [{ label: subLabel, route: 'clinica', params: { sub: scheda.sottocategoria } }] : [])

async function proceedToEditClinica(slug, forceOverride) {
  try {
    const scheda = (state.index.clinica || []).find(c => c.slug === slug);
    if (!scheda) throw new Error('Scheda non trovata');
    const file = await gh.getFile(scheda.path);
    if (!file) throw new Error('File non trovato');
    const { frontmatter, body } = parseMarkdown(file.content);
    state.editingContext = {
      type: 'clinica', slug, path: file.path, sha: file.sha,
      originalFrontmatter: { ...frontmatter }, originalBody: body,
      isDirty: false, hasLock: !forceOverride
    };
    renderEditorUIClinica(slug, frontmatter, body);
    window.addEventListener('beforeunload', beforeUnloadHandler);
  } catch (e) {
    renderError('Errore apertura editor', e.message);
  }
}

  const standardKeys = ['id','titolo','categoria','sottocategoria','tag','termini_equivalenti','ultima_modifica','modificato_da','cronologia_recente'];
  const advancedFrontmatter = {};
  Object.keys(frontmatter).forEach(k => {
    if (!standardKeys.includes(k)) advancedFrontmatter[k] = frontmatter[k];

    : '';

  $('main-content').innerHTML = `

              ${subOpts.map(s => `<option value="${s}" ${frontmatter.sottocategoria === s ? 'selected' : ''}>${escapeHtml(SOTTO_LABELS[s] || s)}</option>`).join('')}
            </select>

          <div class="field" style="grid-column:1/-1;">

            ${renderChipsField({

              values: frontmatter.tag || [],
              suggestions: collectAllTags(),
              placeholder: 'cerca o crea tag…',
              allowNew: true
            })}
          </div>
          <div class="field" style="grid-column:1/-1;">
            <label>Termini equivalenti</label>
            ${renderChipsField({
              id: 'meta-termini-chips',
              values: frontmatter.termini_equivalenti || [],
              suggestions: collectAllTermini(),
              placeholder: 'cerca o crea sinonimo…',
              allowNew: true
            })}

          <div class="field" style="grid-column:1/-1;">
            <label>Nota modifica (va in cronologia)</label>

        <textarea id="meta-advanced-yaml" rows="14" class="mono-input" style="font-size:12px;line-height:1.5;">${escapeHtml(advancedYaml)}</textarea>
      </div>

    hideModeSwitch: true,

async function saveSchedaClinica() {
  const ctx = state.editingContext;
  if (!ctx) return;
  const btn = $('btn-save-edit');
  btn.disabled = true;
  btn.textContent = 'Salvataggio...';
  try {
    // Parse advanced YAML
    let advancedFm = {};
    const yamlStr = $('meta-advanced-yaml').value.trim();
    if (yamlStr) {
      try { advancedFm = jsyaml.load(yamlStr) || {}; }
      catch (e) { throw new Error('YAML avanzato non valido: ' + e.message); }
    }
    const nf = {
      id: ctx.slug,
      titolo: $('meta-titolo').value.trim() || ctx.slug,
      categoria: 'clinica',
      sottocategoria: $('meta-sottocategoria').value,
      tag: chipsGet('meta-tag-chips'),
      termini_equivalenti: chipsGet('meta-termini-chips'),
      ...advancedFm,
      ultima_modifica: nowIso(),
      modificato_da: state.session.username
    };
    const nota = $('meta-note-modifica').value.trim() || 'aggiornamento';
    nf.cronologia_recente = [
      { data: nowIso(), utente: state.session.username, nota },
      ...((ctx.originalFrontmatter.cronologia_recente || []).slice(0, 4))
    ];

    const newBody = state.editorInstance.getMarkdown();
    const newContent = stringifyMarkdown(nf, newBody);
    const commitMsg = `Aggiorna clinica/${ctx.slug} — ${nota} (by ${state.session.username})`;

    await gh.putFile(ctx.path, newContent, ctx.sha, commitMsg);
    toast('Salvato', 'success');
    if (ctx.hasLock) locks.release('clinica-' + ctx.slug).catch(() => {});

    // Update local index
    const idx = state.index.clinica.findIndex(c => c.slug === ctx.slug);
    if (idx >= 0) {
      state.index.clinica[idx] = { ...state.index.clinica[idx], ...nf, body: newBody, body_preview: newBody.substring(0, 300) };
      rebuildSearchIndex();
    }
    state.editingContext = null;
    window.removeEventListener('beforeunload', beforeUnloadHandler);
    if (state.editorInstance) { try { state.editorInstance.destroy(); } catch {} state.editorInstance = null; }
    navigate('clinica-scheda', { slug: ctx.slug });
  } catch (e) {
    toast('Errore: ' + e.message, 'error', 6000);
    btn.disabled = false;
    btn.textContent = 'Salva';
  }
}

function nuovaSchedaClinica(preset = {}) {
  const existingSlugs = new Set((state.index.clinica || []).map(c => c.slug));
  const subOpts = ['prognosi', 'gestione-post-acuta', 'scale-cliniche'];

  showModal({
    title: 'Nuova scheda clinica',
    subtitle: 'Prognosi, gestione post-acuta, o scala clinica.',
    body: `
      <div class="field"><label>Titolo</label><input type="text" id="nc-titolo" placeholder="es. ICH Score"></div>
      <div class="field">
        <label>Slug (nome file)</label>
        <input type="text" id="nc-slug" class="mono-input" placeholder="es. ich-score">
      </div>
      <div class="field">
        <label>Sottocategoria</label>
        <select id="nc-sottocategoria">
          ${subOpts.map(s => `<option value="${s}" ${preset.sottocategoria === s ? 'selected' : ''}>${escapeHtml(SOTTO_LABELS[s] || s)}</option>`).join('')}
        </select>
      </div>
      <div id="nc-error" style="color:var(--danger);font-size:13px;display:none;margin-top:8px;"></div>`,
    actions: [
      { label: 'Annulla', variant: 'ghost', onClick: closeModal },
      { label: 'Crea e apri editor', onClick: async () => {
        const titolo = $('nc-titolo').value.trim();
        let slug = $('nc-slug').value.trim().toLowerCase();
        const sottocat = $('nc-sottocategoria').value;
        const err = $('nc-error');
        const show = m => { err.textContent = m; err.style.display = 'block'; };
        if (!titolo) return show('Titolo obbligatorio.');
        if (!slug) slug = titolo.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
        if (!/^[a-z0-9-]+$/.test(slug)) return show('Slug non valido.');
        if (existingSlugs.has(slug)) return show('Slug già esistente.');

        const nf = {
          id: slug, titolo,
          categoria: 'clinica',
          sottocategoria: sottocat,
          tag: [],
          ultima_modifica: nowIso(),
          modificato_da: state.session.username,
          cronologia_recente: [{ data: nowIso(), utente: state.session.username, nota: 'creazione' }]
        };
        const content = stringifyMarkdown(nf, '');
        const path = `content/clinica/${sottocat}/${slug}.md`;
        try {
          const res = await gh.putFile(path, content, null, `Nuova scheda clinica: ${slug} (by ${state.session.username})`);
          closeModal();
          toast(`Scheda "${slug}" creata`, 'success');
          state.index.clinica.push({ slug, path, sha: res.content.sha, ...nf, body: '', body_preview: '' });
          rebuildSearchIndex();
          updateNavCounts();
          navigate('clinica-edit', { slug });
        } catch (e) { show('Errore: ' + e.message); }
      }}
    ]
  });
  setTimeout(() => {
    const t = $('nc-titolo'), s = $('nc-slug');
    let edited = false;
    s.addEventListener('input', () => { edited = true; });
    t.addEventListener('input', () => {
      if (edited) return;
      s.value = t.value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
    });
    t.focus();
  }, 50);
}

async function proceedToEdit(slug, forceOverride) {
  try {
    const proc = state.index.procedure.find(p => p.slug === slug);
    if (!proc) throw new Error('Procedura non in indice. Prova a fare refresh.');
    const file = await gh.getFile(proc.path);
    if (!file) throw new Error(`File non trovato (${proc.path})`);
    const { frontmatter, body } = parseMarkdown(file.content);
    state.editingContext = {
      type: 'procedura', slug, path: file.path, sha: file.sha,
      originalFrontmatter: { ...frontmatter },
      originalBody: body,
      isDirty: false,
      hasLock: !forceOverride
    };
    renderEditorUI(slug, frontmatter, body);
    window.addEventListener('beforeunload', beforeUnloadHandler);
  } catch (e) {
    renderError('Errore apertura editor', e.message);
  }
}

function beforeUnloadHandler(e) {
  if (state.editingContext && state.editingContext.isDirty) {
    e.preventDefault();
    e.returnValue = '';
    return '';
  }
}

// Best-effort flush of pending pin saves when tab closes.
// Uses synchronous-style approach by firing a non-awaited persist().
window.addEventListener('beforeunload', () => {
  if (state.userPrefs && state.userPrefs._pending) {
    if (state.userPrefs._saveTimer) clearTimeout(state.userPrefs._saveTimer);
    userPrefs.persist().catch(() => {});
  }
});

async function saveProcedura() {
  const ctx = state.editingContext;
  if (!ctx) return;
  const btn = $('btn-save-edit');
  btn.disabled = true;
  btn.textContent = 'Salvataggio...';

  try {
    const nf = { ...ctx.originalFrontmatter };
    nf.titolo = $('meta-titolo').value.trim() || ctx.slug;
    nf.categoria = $('meta-categoria').value;
    // Sottocategoria (chips single-value)
    const subChips = typeof chipsGet === 'function' ? chipsGet('meta-sottocategoria-chips') : [];
    if (subChips.length > 0) nf.sottocategoria = subChips[0]; else delete nf.sottocategoria;
    // Capitolo + ordine (only present in DOM if scheda already belongs to a chapter)
    const capEl = $('meta-capitolo');
    if (capEl) {
      const capSel = capEl.value;
      if (capSel) nf.capitolo = capSel; else delete nf.capitolo;
      const ordEl = $('meta-ordine-cap');
      const ordCap = ordEl ? ordEl.value.trim() : '';
      if (ordCap) { const n = parseInt(ordCap, 10); nf.ordine_nel_capitolo = isNaN(n) ? ordCap : n; }
      else delete nf.ordine_nel_capitolo;
    }
    // Tag / termini / relazioni from chips
    nf.tag = typeof chipsGet === 'function' ? chipsGet('meta-tag-chips') : [];
    // Remove deprecated tempo_esecuzione_min
    delete nf.tempo_esecuzione_min;
    nf.termini_equivalenti = chipsGet('meta-termini-chips');
    nf.moduli_correlati = chipsGet('meta-moduli-chips');
    nf.tabelle_correlate = chipsGet('meta-tabelle-chips');
    nf.procedure_correlate = chipsGet('meta-procedure-chips');
    nf.numeri_correlati = chipsGet('meta-numeri-chips');
    nf.ultima_modifica = nowIso();
    nf.modificato_da = state.session.username;

    const nota = $('meta-note-modifica').value.trim() || 'aggiornamento';
    nf.cronologia_recente = [
      { data: nowIso(), utente: state.session.username, nota },
      ...((ctx.originalFrontmatter.cronologia_recente || []).slice(0, 4))
    ];

    const newBody = state.editorInstance.getMarkdown();
    const newContent = stringifyMarkdown(nf, newBody);
    const commitMsg = `Aggiorna ${ctx.slug} — ${nota} (by ${state.session.username})`;

    try { await gh.putFile(ctx.path, newContent, ctx.sha, commitMsg); }
    catch (e) {
      if (e.code === 'CONFLICT') return handleConflict(ctx, newContent, commitMsg);
      throw e;
    }

    toast('Modifiche salvate', 'success');
    if (ctx.hasLock) locks.release(ctx.slug).catch(() => {});

    const idx = state.index.procedure.findIndex(p => p.slug === ctx.slug);
    if (idx >= 0) {
      state.index.procedure[idx] = {
        ...state.index.procedure[idx], ...nf,
        body: newBody, body_preview: newBody.substring(0, 300)
      };
      rebuildSearchIndex();
    }

    state.editingContext = null;
    window.removeEventListener('beforeunload', beforeUnloadHandler);
    if (state.editorInstance) { try { state.editorInstance.destroy(); } catch {} state.editorInstance = null; }
    navigate('procedura', { slug: ctx.slug });
  } catch (e) {
    toast('Errore salvataggio: ' + e.message, 'error', 6000);
    btn.disabled = false;
    btn.textContent = 'Salva';
  }
}

async function handleConflict(ctx, ourNewContent, commitMsg) {
  const btn = $('btn-save-edit');
  const fresh = await gh.getFile(ctx.path);
  const { frontmatter: theirFm } = parseMarkdown(fresh.content);
  showModal({
    title: 'Conflitto di modifiche',
    subtitle: `Il file è stato aggiornato da <strong style="font-family:var(--mono);">${escapeHtml(theirFm.modificato_da || 'qualcun altro')}</strong> ${timeAgo(theirFm.ultima_modifica)}.`,
    body: `
      <p style="font-size:14px;color:var(--ink-soft);margin-bottom:16px;">
        La risoluzione a livello di sezione arriverà in v1.1. Per ora due strade:
      </p>
      <div style="display:grid;gap:10px;">
        <div style="padding:14px;background:var(--bg-sink);border-left:3px solid var(--accent);border-radius:2px;">
          <strong style="font-size:13px;">Ricarica e riapplica</strong><br>
          <span style="font-size:13px;color:var(--ink-soft);">Perdi le tue modifiche, riparti dalla versione fresca.</span>
        </div>
        <div style="padding:14px;background:var(--bg-sink);border-left:3px solid var(--danger);border-radius:2px;">
          <strong style="font-size:13px;">Sovrascrivi</strong><br>
          <span style="font-size:13px;color:var(--ink-soft);">Salvi la tua versione. Le loro modifiche restano in Git history ma non nel file attuale.</span>
        </div>
      </div>`,
    actions: [
      { label: 'Ricarica e riapplica', onClick: async () => {
        closeModal();
        const slugLocal = ctx.slug;
        state.editingContext = null;
        window.removeEventListener('beforeunload', beforeUnloadHandler);
        if (state.editorInstance) { try { state.editorInstance.destroy(); } catch {} state.editorInstance = null; }
        await buildIndex();
        navigate('procedura-edit', { slug: slugLocal });
      }},
      { label: 'Sovrascrivi', variant: 'danger', onClick: async () => {
        closeModal();
        try {
          await gh.putFile(ctx.path, ourNewContent, fresh.sha, commitMsg + ' [OVERRIDE]');
          toast('Salvato (sovrascritto)', 'warning');
          if (ctx.hasLock) locks.release(ctx.slug).catch(() => {});
          const slugLocal = ctx.slug;
          state.editingContext = null;
          window.removeEventListener('beforeunload', beforeUnloadHandler);
          if (state.editorInstance) { try { state.editorInstance.destroy(); } catch {} state.editorInstance = null; }
          await buildIndex();
          navigate('procedura', { slug: slugLocal });
        } catch (e) {
          toast('Override fallito: ' + e.message, 'error');
          btn.disabled = false; btn.textContent = 'Salva';
        }
      }},
      { label: 'Annulla', variant: 'ghost', onClick: () => { closeModal(); btn.disabled = false; btn.textContent = 'Salva'; } }
    ]
  });
}

let rubricaSearchDebounce = null;
function onRubricaSearchInput(value) {
  // Se la query è cambiata, resetta i gruppi espansi manualmente
  if ((state.rubricaSearch || '') !== value) {
    if (state.rubricaExpandedGroups) state.rubricaExpandedGroups.clear();

    const selStart = input ? input.selectionStart : null;
    const selEnd = input ? input.selectionEnd : null;
    const params = state.currentParams || {};
    renderNumeri(params.filter);

}

function filterRubricaByInitial(letter) {

function showAllFromGroup(groupId) {
  // Espande inline il gruppo (mostra tutti i contatti anche se la ricerca è attiva)
  if (!state.rubricaExpandedGroups) state.rubricaExpandedGroups = new Set();
  state.rubricaExpandedGroups.add(groupId);
  const params = state.currentParams || {};
  const savedScroll = window.scrollY;
  renderNumeri(params.filter);
  // Dopo il re-render scrolla al gruppo
  requestAnimationFrame(() => {
    window.scrollTo({ top: savedScroll, behavior: 'instant' });
    setTimeout(() => {
      const groups = document.querySelectorAll('.numeri-group');
      for (const el of groups) {

          el.style.transition = 'background-color 0.3s';
          el.style.backgroundColor = 'rgba(43,74,111,0.06)';
          setTimeout(() => { el.style.backgroundColor = ''; }, 1200);

        }
      }
    }, 30);

}

function collapseGroup(groupId) {
  if (state.rubricaExpandedGroups) state.rubricaExpandedGroups.delete(groupId);
  const params = state.currentParams || {};
  const savedScroll = window.scrollY;

  requestAnimationFrame(() => window.scrollTo({ top: savedScroll, behavior: 'instant' }));

function renderNumeri(filter) {
  const data = state.index.numeri;
  if (!data) return renderError('Rubrica non disponibile', 'Il file content/numeri.yml non è stato caricato.');

  const codiciGen = data.codici_generali || [];
  // Pull groups from AOPD + any extended sources toggled on
  const allGroups = getVisibleNumeriGroups();
  const showExt = state.showExtendedNumeri || { osa: false, iov: false };
  const ext = state.numeriExtendedAvailable || {};

  // Primo accesso alla rubrica senza filter/query: preattiva il filtro "preferiti"
  // (se l'utente ha almeno un gruppo/contatto pinnato). Se disattiva manualmente → null.
  if (state.rubricaInitialFilter === undefined && !filter && !state.rubricaSearch) {
    const hasAnyPin = allGroups.some(g =>
      isPinned('gruppo', g.id) ||
      (g.contatti || []).some(c => isPinned('contatto', c.id))
    );
    state.rubricaInitialFilter = hasAnyPin ? 'pinned' : null;
  }

  let filteredGruppi = allGroups;
  let filterLabel = null;
  if (filter === 'guardia') {
    filteredGruppi = allGroups.map(g => ({ ...g, contatti: (g.contatti || []).filter(c => (c.tag || []).includes('guardia')) })).filter(g => g.contatti.length);
    filterLabel = 'Medici di Guardia';
  } else if (filter) {
    // Prima prova: filter è un gruppoId → mostra solo quella UOC
    const gruppoMatch = allGroups.find(g => g.id === filter);
    if (gruppoMatch) {
      filteredGruppi = [gruppoMatch];
      filterLabel = `UOC: ${gruppoMatch.nome}`;
    } else {
      // Fallback: filter è un contatto slug
      const c = findContattoBySlug(filter);
      if (c) {
        filteredGruppi = allGroups.map(g => {
          const matches = (g.contatti || []).filter(x => x.id === filter);
          return matches.length ? { ...g, contatti: matches } : null;
        }).filter(Boolean);
        filterLabel = `Contatto: ${c.etichetta}`;
      }
    }
  }

  const rubricaQuery = (state.rubricaSearch || '').trim().toLowerCase();
  if (rubricaQuery) {
    // Dizionario sinonimi: una parola cercata matcha anche i suoi sinonimi
    // Il valore è la lista di ALTERNATIVE che si considerano equivalenti per la ricerca
    const synonyms = {
      'reparto': ['reparto', 'reparti', 'degenza', 'degenze', 'ricovero'],
      'reparti': ['reparto', 'reparti', 'degenza', 'degenze'],
      'degenza': ['reparto', 'reparti', 'degenza', 'degenze'],
      'degenze': ['reparto', 'reparti', 'degenza', 'degenze'],
      'segreteria': ['segreteria', 'segr'],
      'ambulatorio': ['ambulatorio', 'ambulatori', 'amb'],
      'ambulatori': ['ambulatorio', 'ambulatori', 'amb'],
      'sala operatoria': ['sala operatoria', 'sale operatorie', 's.o.', 'so ', 'operatoria'],
      'operatoria': ['sala operatoria', 'sale operatorie', 'operatoria', 'so '],
      'day hospital': ['day hospital', 'dh ', 'day-hospital'],
      'dh': ['day hospital', 'dh ', 'day-hospital'],
      'mdg': ['mdg', 'medico di guardia', 'medico guardia'],
      'guardia': ['guardia', 'mdg', 'medico di guardia'],
      'ucic': ['ucic', 'unità coronarica', 'unita coronarica', 'terapia intensiva cardiologica'],
      'utic': ['utic', 'unità terapia intensiva'],
      'emodinamica': ['emodinamica', 'cardiologia interventistica'],
      'elettrofisiologia': ['elettrofisiologia'],
      'rianimazione': ['rianimazione', 'terapia intensiva'],
      'intramoenia': ['intramoenia', 'libera professione'],
    };
    // Divido la query in termini (parole). Ogni termine deve matchare almeno un campo (contatto o gruppo).
    const tokens = rubricaQuery.split(/\s+/).filter(Boolean);
    
    const tokenMatchesText = (token, text) => {
      if (text.includes(token)) return true;
      // Prova sinonimi: se il token ha sinonimi, provane uno che matcha
      const alts = synonyms[token];
      if (alts) {
        for (const alt of alts) {
          if (text.includes(alt)) return true;
        }
      }
      return false;
    };
    
    // Per ogni gruppo precomputo la mappa contatto→tipo_sede usando groupContattiBySede
    const groupSedeTipoMap = new Map();
    filteredGruppi.forEach(g => {
      try {
        const buckets = groupContattiBySede(g.contatti || [], g.sedi_operative, g.sede_operativa);
        const m = new Map();
        buckets.forEach(b => {
          const t = b.sede && b.sede.tipo ? b.sede.tipo : '';
          if (t) (b.contatti || []).forEach(c => m.set(c.id, t));
        });
        groupSedeTipoMap.set(g.id, m);
      } catch { groupSedeTipoMap.set(g.id, new Map()); }
    });
    
    const contactText = (c, gId) => {
      const sedeTipo = (groupSedeTipoMap.get(gId) || new Map()).get(c.id) || '';
      return [
        c.etichetta, c.sezione, c.luogo, c.cellulare, c.breve,
        sedeTipo,
        ...(c.numeri || []).map(String),
        ...(c.tag || [])
      ].filter(Boolean).join(' ').toLowerCase();
    };
    
    // Testo del gruppo (per matchGroupOnly): solo nome/email/alias.
    // Le sedi_operative NON sono incluse qui perché riguardano i singoli contatti:
    // cercare "ucic" deve tornare i contatti UCIC, non tutti quelli della UOC che ha UCIC.
    const groupText = (g) => {
      return [g.nome, (g.alias || []).join(' ')].filter(Boolean).join(' ').toLowerCase();
    };
    // Invece per matchContactWithGroup il contesto gruppo include ANCHE le sedi:
    // così cercando "ucic cardiologia" funziona — "cardiologia" matcha nel gruppo,
    // "ucic" matcha nel contatto (sezione).
    const groupContext = (g) => {
      const base = groupText(g);
      const sedi = (g.sedi_operative || []).map(s =>
        `${s.tipo || ''} ${s.edificio || ''} ${s.piano || ''} ${s.area || ''}`
      ).join(' ');
      return base + ' ' + sedi.toLowerCase();
    };
    
    // Un contatto (o il suo gruppo) matcha se OGNI token della query è trovato
    // almeno in uno dei campi del contatto OPPURE nel contesto del gruppo (incluse sedi)
    const matchContactWithGroup = (c, gCtx, gId) => {
      const cTxt = contactText(c, gId);
      return tokens.every(tok => tokenMatchesText(tok, cTxt) || tokenMatchesText(tok, gCtx));
    };
    const matchGroupOnly = (gTxt) => tokens.every(tok => tokenMatchesText(tok, gTxt));
    
    const expandedSet = state.rubricaExpandedGroups || new Set();
    // Se stiamo filtrando per una UOC specifica, la ricerca deve filtrare sui contatti
    const isInsideSpecificUoc = filter && allGroups.find(g => g.id === filter);
    filteredGruppi = filteredGruppi.map(g => {
      const gTxt = groupText(g);       // senza sedi (per matchGroupOnly)
      const gCtx = groupContext(g);    // con sedi (per match contatto+contesto)
      // Se il gruppo è espanso manualmente o il gruppo stesso matcha completamente, mostra tutti i contatti
      // Eccetto quando siamo dentro una UOC specifica: lì dobbiamo sempre filtrare sui contatti
      if (!isInsideSpecificUoc && (expandedSet.has(g.id) || matchGroupOnly(gTxt))) return g;
      // Altrimenti filtra i singoli contatti (tenendo conto del contesto gruppo per completare i token)
      const contatti = (g.contatti || []).filter(c => matchContactWithGroup(c, gCtx, g.id));
      return contatti.length ? { ...g, contatti } : null;
    }).filter(Boolean);
  }

  // Group by ospedale source for visual sectioning
  const bySource = { aopd: [], osa: [], iov: [] };
  filteredGruppi.forEach(g => {
    const src = g._source || 'aopd';

  const totalContattiVisibili = filteredGruppi.reduce((s, g) => s + (g.contatti || []).length, 0);

      <div class="numeri-filters" style="margin-top:20px;">
        <button class="filter-chip ${!filter ? 'active' : ''}" onclick="navigate('numeri')">Tutti</button>
        <button class="filter-chip ${filter === 'guardia' ? 'active' : ''}" onclick="navigate('numeri', {filter:'guardia'})">MdG</button>
      </div>

    <div class="rubrica-search" style="margin-bottom:8px;display:flex;align-items:center;gap:10px;">
      <div style="position:relative;flex:1;display:flex;align-items:center;">
        <input type="text" id="rubrica-search-input" placeholder="${filter && allGroups.find(g => g.id === filter) ? `Cerca in ${escapeHtml(stripPrefixNome(allGroups.find(g => g.id === filter).nome))}…` : 'Cerca in rubrica: nome, interno, reparto…'}"
          value="${escapeHtml(state.rubricaSearch || '')}"
          oninput="onRubricaSearchInput(this.value)"
          style="flex:1;font-family:var(--sans);font-size:14px;padding:10px 36px 10px 14px;background:var(--bg-raised);border:1px solid var(--rule);border-radius:2px;color:var(--ink);width:100%;box-sizing:border-box;">
        ${rubricaQuery ? `<button type="button" onclick="clearRubricaSearch()" aria-label="Cancella" title="Cancella" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);width:22px;height:22px;border:none;background:var(--bg-paper);color:var(--ink-muted);border-radius:50%;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;">✕</button>` : ''}
      </div>
      ${rubricaQuery ? `<span style="font-size:12px;color:var(--ink-muted);font-family:var(--mono);white-space:nowrap;">${filteredGruppi.length} UOC · ${totalContattiVisibili} contatti</span>` : ''}
    </div>
    ${(function(){

      return `<div style="margin-bottom:24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">

    ${!filter && !rubricaQuery && codiciGen.length ? `

      const compactMode = !rubricaQuery && !filter;
      if (compactMode) {

        list.forEach(g => {
          const name = stripPrefix(g.nome);

          if (ch >= 'A' && ch <= 'Z') initialsAvailable.add(ch);

        const allLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

        // Ordino per nome senza prefisso

        // Alfabeto cliccabile

              return `<div class="uoc-compact-item">
