function openGruppoEditor({ mode, gruppo, source }) {
  const isNew = mode === 'new';
  const g = gruppo || {};
  const ub = g.ubicazione || {};
  const sourceOptions = ['aopd', 'osa', 'iov'].map(s => `<option value="${s}" ${(source || 'aopd') === s ? 'selected' : ''}>${s.toUpperCase()}</option>`).join('');
  const body = `
    <form id="gruppo-form" onsubmit="return false;" style="display:flex;flex-direction:column;gap:12px;">
      <div class="field">
        <label>Nome gruppo <span style="color:var(--danger);">*</span></label>
        <input type="text" id="ge-nome" value="${escapeHtml(g.nome || '')}" placeholder="es. U.O.S.D. Stroke Unit" required>
      </div>
      <div class="field">
        <label>Nome ridotto <span style="color:var(--ink-muted);font-weight:400;text-transform:none;letter-spacing:0;">(versione compatta usata nelle barre contesto su mobile)</span></label>
        <input type="text" id="ge-nome-ridotto" value="${escapeHtml(g.nome_ridotto || '')}" placeholder="es. Cardiologia, ORL, Mal. Infettive">
      </div>
      <div class="field">
        <label>Ospedale</label>
        <select id="ge-source" ${isNew ? '' : 'disabled'}>${sourceOptions}</select>
        ${!isNew ? '<div style="font-size:11px;color:var(--ink-muted);margin-top:3px;">Spostamento tra ospedali non supportato — eliminare e ricreare se necessario</div>' : ''}
      </div>
      <div class="field">
        <label>Direttore / Responsabile</label>
        <input type="text" id="ge-direttore" value="${escapeHtml(g.direttore || '')}" placeholder="es. Dr. Baracchini Claudio">
      </div>
      <div class="field">
        <label>Email del gruppo</label>
        <input type="text" id="ge-email" value="${escapeHtml(g.email || '')}" class="mono-input" placeholder="es. neurologia@aopd.veneto.it">
      </div>
      <fieldset style="border:1px solid var(--rule);border-radius:4px;padding:10px;">
        <legend style="font-size:12px;color:var(--ink-muted);padding:0 6px;">Ubicazione</legend>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div class="field"><label>Struttura/Edificio</label><input type="text" id="ge-struttura" value="${escapeHtml(ub.struttura || '')}" placeholder="es. Edificio Neurologia"></div>
          <div class="field"><label>Piano</label><input type="text" id="ge-piano" value="${escapeHtml(ub.piano || '')}" placeholder="es. terra, 1°, 2°"></div>
          <div class="field" style="grid-column:1/-1;"><label>Indirizzo</label><input type="text" id="ge-indirizzo" value="${escapeHtml(ub.indirizzo || '')}" placeholder="es. Via Giustiniani, 2"></div>
          <div class="field" style="grid-column:1/-1;"><label>Sede ospedale (per AOPD: Sant'Antonio se applicabile)</label><input type="text" id="ge-sede" value="${escapeHtml(ub.ospedale_sede || '')}" placeholder="opzionale"></div>
        </div>
      </fieldset>
    </form>`;
  showModal({
    title: isNew ? 'Nuovo gruppo di numeri' : 'Modifica gruppo',
    subtitle: isNew ? '' : `ID: ${escapeHtml(g.id)}`,
    body,
    actions: [
      { label: 'Annulla', variant: 'ghost', onClick: () => closeModal() },
      { label: isNew ? 'Crea' : 'Salva', onClick: async () => {
        const nome = $('ge-nome').value.trim();
        if (!nome) return toast('Nome obbligatorio', 'warning');
        const sourceSelected = isNew ? $('ge-source').value : source;
        const data = { ...getNumeriDataForSource(sourceSelected) };
        const gruppi = data.gruppi || [];
        const id = g.id || slugifyLocal(nome).slice(0, 60);
        if (isNew && gruppi.find(x => x.id === id)) return toast('Esiste già un gruppo con questo id', 'error');
        const updatedGroup = { id, nome };
        const nomeRidotto = $('ge-nome-ridotto').value.trim();
        if (nomeRidotto) updatedGroup.nome_ridotto = nomeRidotto;
        const direttore = $('ge-direttore').value.trim();
        const email = $('ge-email').value.trim();
        const struttura = $('ge-struttura').value.trim();
        const piano = $('ge-piano').value.trim();
        const indirizzo = $('ge-indirizzo').value.trim();
        const sede = $('ge-sede').value.trim();
        if (direttore) updatedGroup.direttore = direttore;
        if (email) updatedGroup.email = email;
        const ubicazione = {};
        if (struttura) ubicazione.struttura = struttura;
        if (piano) ubicazione.piano = piano;
        if (indirizzo) ubicazione.indirizzo = indirizzo;
        if (sede) ubicazione.ospedale_sede = sede;
        if (Object.keys(ubicazione).length) updatedGroup.ubicazione = ubicazione;
        // Preserve existing contatti and any other group-level fields (alias, sezioni, tag, etc.)
        // che non vengono toccati dal form. Senza questo passaggio le UOC perderebbero le
        // sezioni custom o altri campi al primo "Salva" da editor.
        if (!isNew) {
          const knownEditedFields = new Set(['id','nome','nome_ridotto','direttore','email','ubicazione','contatti']);
          for (const key of Object.keys(g)) {
            if (!knownEditedFields.has(key)) {
              updatedGroup[key] = g[key];
            }
          }
        }
        updatedGroup.contatti = isNew ? [] : (g.contatti || []);
        const newGruppi = isNew ? [...gruppi, updatedGroup] : gruppi.map(x => x.id === id ? updatedGroup : x);
        try {
          const desc = isNew ? `nuovo gruppo: ${nome}` : `modifica gruppo: ${nome}`;
          await saveNumeriForSource(sourceSelected, { ...data, gruppi: newGruppi }, desc);
          toast(isNew ? 'Gruppo creato' : 'Gruppo aggiornato', 'success');
          closeModal();
          await buildIndex();
          if (state.showExtendedNumeri?.osa) await loadExtendedNumeri('osa');
          if (state.showExtendedNumeri?.iov) await loadExtendedNumeri('iov');
          renderNavTree();
          if (state.currentView === 'numeri') navigate('numeri', state.currentParams || {});
        } catch (e) { toast('Errore: ' + e.message, 'error'); }
      } }
    ]
  });
}

async function deleteGruppoNumeri(id) {
  if (!isAdmin()) return toast("Solo l'admin può eliminare gruppi", 'warning');
  let g = null, src = null;
  for (const s of ['aopd','osa','iov']) {
    const found = (getNumeriDataForSource(s).gruppi || []).find(x => x.id === id);
    if (found) { g = found; src = s; break; }
  }
  if (!g) return;
  const n = (g.contatti || []).length;
  if (n > 0 && !confirm(`Il gruppo "${g.nome}" contiene ${n} contatti. Eliminare TUTTO?`)) return;
  if (n === 0 && !confirm(`Eliminare gruppo "${g.nome}"?`)) return;
  const data = { ...getNumeriDataForSource(src) };
  const newGruppi = (data.gruppi || []).filter(x => x.id !== id);
  try {
    await saveNumeriForSource(src, { ...data, gruppi: newGruppi }, `elimina gruppo: ${g.nome}${n > 0 ? ` (con ${n} contatt${n === 1 ? 'o' : 'i'})` : ''}`);
    toast('Gruppo eliminato', 'success');
    await buildIndex();
    if (state.showExtendedNumeri?.osa) await loadExtendedNumeri('osa');
    if (state.showExtendedNumeri?.iov) await loadExtendedNumeri('iov');
    renderNavTree();
    if (state.currentView === 'numeri') navigate('numeri', state.currentParams || {});
  } catch (e) { toast('Errore: ' + e.message, 'error'); }
}

function openSearchOverlay(query) {
  const overlay = document.getElementById('search-overlay');
  if (!overlay) return;
  overlay.classList.remove('hidden');
  // Blocca scroll del body sottostante con overflow:hidden su html + body.
  // NON uso position:fixed perché rompe la topbar sticky e su mobile crea
  // l'effetto "barra duplicata" (la sticky perde il punto di riferimento).
  document.documentElement.classList.add('search-overlay-open');
  document.body.classList.add('search-overlay-open');
  // Reset scroll dell'overlay all'apertura
  overlay.scrollTop = 0;
  renderSearchResults(query, 'search-overlay-content');
  // Intercetta click sui link/risultati per chiudere l'overlay prima di navigare
  if (!overlay._searchClickBound) {
    overlay._searchClickBound = true;
    overlay.addEventListener('click', (e) => {
      const link = e.target.closest('a, [onclick*="navigate"], [onclick*="openUocWithSede"], [data-search-result]');
      if (link) {
        setTimeout(() => { closeSearchOverlay(); }, 0);
      }
    });
  }
}
function closeSearchOverlay() {
  const overlay = document.getElementById('search-overlay');
  if (!overlay) return;
  overlay.classList.add('hidden');
  document.documentElement.classList.remove('search-overlay-open');
  document.body.classList.remove('search-overlay-open');
}

function renderSearchResults(query, targetId) {
  const target = document.getElementById(targetId || 'main-content');
  if (!target) return;
  if (!state.fuse || !query || query.length < 2) {
    target.innerHTML = `
      <div class="page-head">
        <div class="page-eyebrow">Ricerca</div>
        <h1 class="page-title">Cerca nel manuale</h1>
      </div>
      <p style="color:var(--ink-muted);">Digita almeno 2 caratteri nella barra in alto.</p>`;
    return;
  }

  // Keyword "numero"/"numeri"/"tel"/"telefono" = filtra solo risultati rubrica, rimossa dalla query
  const numeroKeywordRegex = /\b(numer[oi]|tel|telefon[oi])\b/gi;
  const onlyNumeri = numeroKeywordRegex.test(query);
  const effectiveQuery = onlyNumeri ? query.replace(numeroKeywordRegex, ' ').replace(/\s+/g, ' ').trim() : query;
  if (onlyNumeri && effectiveQuery.length < 2) {
    target.innerHTML = `
      <div class="page-head">
        <div class="page-eyebrow">Ricerca</div>
        <h1 class="page-title">Cerca nella rubrica</h1>
      </div>
      <p style="color:var(--ink-muted);">Aggiungi almeno una parola dopo "numero" (es. "numero cardiologia", "numero amb ecg").</p>`;
    return;
  }

  const terms = effectiveQuery.trim().split(/\s+/).filter(t => t.length >= 1);
  // Numeric-only query: ricerca esatta sui numeri di contatto (no fuzzy, no partial)
  const isNumericQuery = /^\d+$/.test(effectiveQuery.trim());
  let rawResults;
  if (isNumericQuery) {
    // Match esatto: il contatto deve contenere esattamente quel numero come token intero
    const target = effectiveQuery.trim();
    rawResults = [];
    getVisibleNumeriGroups().forEach(g => {
      (g.contatti || []).forEach(c => {
        const cellsPers = Array.isArray(c.cellulare_personale) ? c.cellulare_personale.map(String) : (c.cellulare_personale ? [String(c.cellulare_personale)] : []);
        const cellsPub = Array.isArray(c.cellulare_aziendale) ? c.cellulare_aziendale.map(String) : (c.cellulare_aziendale ? [String(c.cellulare_aziendale)] : []);
        const nums = [...(c.numeri || []).map(String), ...cellsPers, ...cellsPub, String(c.breve || '')].filter(Boolean);
        const exactMatch = nums.some(n => n === target);
        if (exactMatch) {
          const item = {
            type: 'numero', slug: c.id,
            titolo: c.etichetta, gruppo: g.nome, gruppoId: g.id,
            direttore: g.direttore || '',
            sede: '',
            numeri: nums.join(' '),
            ospedale: g._source || 'aopd',
            sezione: c.sezione || '',
            tag: (c.tag || []).join(' ')
          };
          rawResults.push({ item, score: 0, matches: [] });
        }
      });
    });
  } else if (terms.length > 1) {
    const extendedQuery = terms
      .filter(t => t.length >= 1)
      .map(t => t.length <= 2 ? `^${t}` : `'${t}`)
      .join(' ');
    rawResults = state.fuse.search(extendedQuery);
    if (rawResults.length < 3) {
      const allInclude = terms.filter(t => t.length >= 2).map(t => `'${t}`).join(' ');
      if (allInclude) {
        const fallback = state.fuse.search(allInclude);
        if (fallback.length > rawResults.length) rawResults = fallback;
      }
    }
    if (rawResults.length < 3) rawResults = state.fuse.search(effectiveQuery);
  } else {
    rawResults = state.fuse.search(effectiveQuery);
  }

  const nonNumeri = onlyNumeri ? [] : rawResults.filter(r => r.item.type !== 'numero').slice(0, 20);
  const numeriRaw = rawResults.filter(r => r.item.type === 'numero');

  const lowerQuery = effectiveQuery.toLowerCase();
  const queryTerms = terms.map(t => t.toLowerCase());
  const wantsGuardia = /\b(guardia|mdg|reperibile)\b/i.test(effectiveQuery);

  // Sinonimi multi-token (allineati alla ricerca rubrica)
  const synonyms = {
    'reparto': ['reparto', 'reparti', 'degenza', 'degenze', 'ricovero'],
    'reparti': ['reparto', 'reparti', 'degenza', 'degenze'],
    'degenza': ['reparto', 'reparti', 'degenza', 'degenze'],
    'degenze': ['reparto', 'reparti', 'degenza', 'degenze'],
    'segreteria': ['segreteria', 'segr'],
    'ambulatorio': ['ambulatorio', 'ambulatori', 'amb'],
    'ambulatori': ['ambulatorio', 'ambulatori', 'amb'],
    'sala operatoria': ['sala operatoria', 'sale operatorie', 's.o.', 'operatoria'],
    'operatoria': ['sala operatoria', 'sale operatorie', 'operatoria'],
    'day hospital': ['day hospital', 'dh', 'day-hospital'],
    'dh': ['day hospital', 'dh', 'day-hospital'],
    'mdg': ['mdg', 'medico di guardia', 'medico guardia'],
    'guardia': ['guardia', 'mdg', 'medico di guardia'],
    'ucic': ['ucic', 'unità coronarica', 'unita coronarica', 'terapia intensiva cardiologica'],
    'utic': ['utic', 'unità terapia intensiva'],
    'emodinamica': ['emodinamica', 'cardiologia interventistica'],
    'elettrofisiologia': ['elettrofisiologia'],
    'rianimazione': ['rianimazione', 'terapia intensiva'],
    'intramoenia': ['intramoenia', 'libera professione'],
  };
  const tokenMatches = (token, text) => {
    if (text.includes(token)) return true;
    const alts = synonyms[token];
    if (alts) {
      for (const alt of alts) if (text.includes(alt)) return true;
    }
    return false;
  };

  // Espandi i risultati numeri: se il gruppo (nome) matcha TUTTI i token della query,
  // includi tutti i contatti del gruppo (anche quelli che non matchano direttamente).
  // Questo replica il comportamento della ricerca Rubrica.
  //
  // FILTRO STRICT: Fuse produce molti falsi positivi con fuzzy matching. Per query multi-token,
  // tengo solo i contatti dove OGNI token della query matcha (direttamente o via sinonimi)
  // nel testo del contatto OPPURE nel testo del gruppo.
  const contactText = (item) => [
    item.titolo, item.gruppo, item.direttore, item.sede, item.numeri, item.tag, item.termini
  ].filter(Boolean).join(' ').toLowerCase();
  const allTokensMatch = (text, groupText) => {
    return queryTerms.every(t => tokenMatches(t, text) || tokenMatches(t, groupText));
  };

  const matchedGroupIds = new Set();
  const byGruppo = new Map();
  numeriRaw.forEach(r => {
    const gid = r.item.gruppoId;
    // Filtro stretto: ogni token della query deve matchare nel contatto o nel gruppo
    // MA almeno un token deve matchare direttamente nel testo del contatto (evita di
    // includere tutti i contatti di un gruppo solo perché il nome gruppo matcha qualche token).
    if (queryTerms.length >= 1 && !isNumericQuery) {
      const ctxt = contactText(r.item);
      const gtxt = (r.item.gruppo + ' ' + (r.item.alias || '')).toLowerCase();
      if (!allTokensMatch(ctxt, gtxt)) return;
      // Almeno un token deve essere presente nel contatto stesso (non solo nel gruppo)
      const anyTokenInContact = queryTerms.some(t => tokenMatches(t, ctxt));
      if (!anyTokenInContact) return;
    }
    if (!byGruppo.has(gid)) {
      byGruppo.set(gid, {
        gruppoId: gid,
        gruppo: r.item.gruppo,
        ospedale: r.item.ospedale,
        direttore: r.item.direttore,
        sede: r.item.sede,
        contatti: [],
        bestScore: 1
      });
    }
    const g = byGruppo.get(gid);
    g.contatti.push(r);
    if (r.score < g.bestScore) g.bestScore = r.score;
  });

  // Aggiungo gruppi il cui NOME/direttore/alias matcha interamente la query (no sezioni tipo,
  // che è troppo specifico: "ucic" non deve espandere tutta la Cardiologia)
  const allGroupsForSearch = getVisibleNumeriGroups().filter(g => (g._source || 'aopd') === 'aopd');
  allGroupsForSearch.forEach(g => {
    const nameAlias = [g.nome, (g.alias || []).join(' ')].filter(Boolean).join(' ').toLowerCase();
    const groupMatches = queryTerms.every(t => tokenMatches(t, nameAlias));
    // Match parziale: almeno un token matcha il nome E gli altri matchano almeno un contatto
    // Esempio: "degenze cardiol" → "cardiol" matcha il nome, "degenze" matcha alcuni contatti
    const tokensInName = queryTerms.filter(t => tokenMatches(t, nameAlias));
    const tokensNotInName = queryTerms.filter(t => !tokenMatches(t, nameAlias));
    let partialGroupMatch = false;
    if (!groupMatches && tokensInName.length > 0 && tokensNotInName.length > 0) {
      // Controllo: esiste almeno un contatto che matcha TUTTI i token rimanenti?
      partialGroupMatch = (g.contatti || []).some(c => {
        const tagsStr = Array.isArray(c.tag) ? c.tag.join(' ') : (c.tag || '');
        const aliasStr = Array.isArray(c.alias) ? c.alias.join(' ') : (c.alias || '');
        const ctxt = [c.etichetta, c.sezione, c.sottosezione, c.edificio, c.piano, c.luogo, tagsStr, aliasStr].filter(Boolean).join(' ').toLowerCase();
        return tokensNotInName.every(t => tokenMatches(t, ctxt));
      });
    }
    if (groupMatches || partialGroupMatch) {
      matchedGroupIds.add(g.id);
      if (!byGruppo.has(g.id)) {
        byGruppo.set(g.id, {
          gruppoId: g.id,
          gruppo: g.nome,
          ospedale: g._source || 'aopd',
          direttore: g.direttore || '',
          sede: '',
          contatti: [],
          bestScore: 0.1
        });
      } else {
        const existing = byGruppo.get(g.id);
        if (existing.bestScore > 0.1) existing.bestScore = 0.1;
      }
    }
  });

  const getFullGroup = (gid) => {
    for (const g of allGroupsForSearch) {
      if (g.id === gid) return g;
    }
    return null;
  };

  const uocResults = Array.from(byGruppo.values()).map(u => {
    const full = getFullGroup(u.gruppoId);
    const allContatti = full ? (full.contatti || []) : u.contatti.map(r => r.item);
    const matchedIds = new Set(u.contatti.map(r => r.item.slug));
    const groupFullyMatched = matchedGroupIds.has(u.gruppoId);

    // Riuso la classifyContatto globale per coerenza con la rubrica
    const classifyContact = (c) => {
      const cls = classifyContatto(c);
      return { group: cls.group, isGuardia: cls.kind === 'guardia' };
    };

    const contatti = allContatti.map(c => {
      const label = (c.etichetta || '').toLowerCase();
      const tags = (c.tag || []).join(' ').toLowerCase();
      const cls = classifyContact(c);
      const matched = matchedIds.has(c.id);
      // Sub-priorità dentro "reparto" (allineata alla rubrica)
      let repSub = 4;
      if (cls.group === 2) {
        const tagsArr = (c.tag || []).map(t => t.toLowerCase());
        if (/stud(io|i) medic|medici di reparto|specializz|\bdr\.|\bprof\.|dott\.|\bdottor/i.test(label)) repSub = 1;
        else if (/caposala|coordinat/i.test(label)) repSub = 2;
        else if (/guardiola|bancone/i.test(label)) repSub = 3;
        else if (c.kind === 'utile') repSub = 5;
      }
      let relevance = 0;
      if (matched) relevance += 10;
      if (cls.isGuardia && wantsGuardia) relevance += 20;
      if (cls.isGuardia) relevance += 3;
      queryTerms.forEach(t => {
        if (label.includes(t)) relevance += 5;
        if (tags.includes(t)) relevance += 3;
      });
      return { ...c, _isGuardia: cls.isGuardia, _group: cls.group, _repSub: repSub, _matched: matched, _relevance: relevance };
    });

    // Ordinamento:
    // - Se il gruppo matcha pienamente la query (es. "cardio" → Cardiologia): uso l'ordine rubrica
    //   (group -> sub-priorità reparto -> ordine YAML originale), identico a quello mostrato aprendo la UOC
    // - Altrimenti: ordine per rilevanza (contatti che matchano meglio la query in cima)
    // Tag boost: contatti con kind esplicito (guardia/reparto/utile) più in alto a parità di match
    const tagBoost = (c) => {
      if (c.kind === 'guardia' || c._isGuardia) return 3;
      if (c.kind === 'reparto') return 2;
      if (c.kind === 'utile') return 1;
      return 0;
    };
    if (groupFullyMatched) {
      const origIdx = new Map(allContatti.map((c, i) => [c.id, i]));
      contatti.sort((a, b) => {
        if (a._group !== b._group) return a._group - b._group;
        if (a._group === 2 && a._repSub !== b._repSub) return a._repSub - b._repSub;
        return (origIdx.get(a.id) ?? 0) - (origIdx.get(b.id) ?? 0);
      });
    } else {
      contatti.sort((a, b) => {
        // Contatti con tag esplicito vengono sempre prima
        const tb = tagBoost(b) - tagBoost(a);
        if (tb !== 0) return tb;
        if (a._group !== b._group) return a._group - b._group;
        if (a._group === 2 && a._repSub !== b._repSub) return a._repSub - b._repSub;
        return b._relevance - a._relevance;
      });
    }
    const hasMatchedGuardia = contatti.some(c => c._isGuardia && c._matched);
    const hasTaggedMatched = contatti.some(c => c._matched && (c.kind === 'utile' || c.kind === 'reparto' || c.kind === 'guardia'));
    const scoreAdjusted = u.bestScore - (hasMatchedGuardia ? 0.2 : 0) - (wantsGuardia && hasMatchedGuardia ? 0.15 : 0) - (hasTaggedMatched ? 0.25 : 0);

    return {
      ...u,
      contatti,
      scoreAdjusted,
      hasMatchedGuardia,
      totalContatti: allContatti.length,
      matchedCount: matchedIds.size,
      fullGroup: full
    };
  });

  uocResults.sort((a, b) => {
    if (wantsGuardia) {
      if (a.hasMatchedGuardia !== b.hasMatchedGuardia) return a.hasMatchedGuardia ? -1 : 1;
    }
    return a.scoreAdjusted - b.scoreAdjusted;
  });

  const osp = { aopd: 'AOPD', osa: 'OSA', iov: 'IOV' };

  // Chip inline per modificare il TAG direttamente dai risultati ricerca.
  // Attivi solo in modalità modifica. Le modifiche vanno in pendingTagEdits e
  // si applicano con "Salva modifiche" / "Annulla modifiche".
  const renderInlineTagChips = (c) => {
    if (!c.id) return '';
    const pending = state.pendingTagEdits && state.pendingTagEdits.has(c.id);
    const k = pending ? state.pendingTagEdits.get(c.id) : (c.kind || '');
    const mk = (value, label, bg, color) =>
      `<button class="kind-chip ${k === value ? 'active' : ''}" onclick="event.stopPropagation(); setContactKind('${escapeJs(c.id)}','${value}')" title="${label}" style="--chip-color:${color};--chip-bg:${bg};">${label}</button>`;
    return `<div class="edit-only kind-selector" style="margin-top:4px;display:inline-flex;gap:4px;flex-wrap:wrap;align-items:center;" onclick="event.stopPropagation();">
      <span style="font-size:10px;color:var(--ink-muted);font-family:var(--mono);letter-spacing:.04em;">TAG:</span>
      ${mk('guardia', '● Guardia', '#fef0ef', 'var(--danger)')}
      ${mk('reparto', '● Reparto', 'var(--accent-soft)', 'var(--accent)')}
      ${mk('utile',   '● Utili',   '#e8f5e9', '#2e7d32')}
      ${k ? `<button class="kind-chip-reset" onclick="event.stopPropagation(); setContactKind('${escapeJs(c.id)}',null)" title="Auto">✕ auto</button>` : ''}
      ${pending ? `<span style="font-size:10px;color:var(--warning);font-style:italic;">(modificato)</span>` : ''}
    </div>`;
  };

  const renderContatto = (c, opts = {}) => {
    const parts = [];
    if (c.numeri) c.numeri.forEach(n => { if (n) parts.push(String(n)); });
    if (c.breve) parts.push(`${c.breve}`);
    if (c.cellulare_personale) {
      const cells = Array.isArray(c.cellulare_personale) ? c.cellulare_personale : [c.cellulare_personale];
      cells.forEach(cell => parts.push(`${cell}`));
    }
    if (c.cellulare_aziendale) {
      const cells = Array.isArray(c.cellulare_aziendale) ? c.cellulare_aziendale : [c.cellulare_aziendale];
      cells.forEach(cell => parts.push(`${cell}`));
    }
    const tagsLower = (c.tag || []).map(t => t.toLowerCase());
    const isGuardia = c._isGuardia;
    const isReparto = c._group === 2 && !isGuardia && c.kind !== 'utile';
    const isUtile = c.kind === 'utile';
    const luogoStr = getLuogoContatto(c);
    const luogoHtml = (luogoStr && !opts.hideLuogo) ? `<div class="sr-contact-luogo">📍 ${escapeHtml(luogoStr)}</div>` : '';
    const sezioneHtml = (c.sezione && !opts.hideSedeMeta) ? `<span class="sr-contact-sezione">· ${escapeHtml(c.sezione)}</span>` : '';
    const tagChips = renderInlineTagChips(c);
    const labelHtml = `${escapeHtml(c.etichetta)}${sezioneHtml}`;
    const numChipClass = isGuardia ? 'sr-num-chip-guardia' : isReparto ? 'sr-num-chip-reparto' : isUtile ? 'sr-num-chip-utile' : 'sr-num-chip';
    const numChipsHtml = parts.length
      ? parts.map(p => `<span class="sr-num-chip ${numChipClass}">${escapeHtml(p)}</span>`).join('')
      : `<span class="sr-num-chip ${numChipClass}">—</span>`;

    if (isGuardia) {
      return `<div class="sr-contact sr-contact-guardia" onclick="navigate('numeri', {filter:'${escapeJs(c.id)}'})">
        <div class="sr-contact-left">
          <div class="sr-contact-label">${labelHtml}</div>
          <div class="sr-contact-meta">${c.tag && c.tag.length ? escapeHtml(c.tag.join(' · ')) : 'guardia'}</div>
          ${luogoHtml}
          ${tagChips}
        </div>
        <div class="sr-contact-nums">${numChipsHtml}</div>
      </div>`;
    }
    if (isUtile) {
      return `<div class="sr-contact sr-contact-utile" onclick="navigate('numeri', {filter:'${escapeJs(c.id)}'})">
        <div class="sr-contact-left">
          <div class="sr-contact-label">${labelHtml}</div>
          <div class="sr-contact-meta">utili</div>
          ${luogoHtml}
          ${tagChips}
        </div>
        <div class="sr-contact-nums">${numChipsHtml}</div>
      </div>`;
    }
    if (isReparto) {
      return `<div class="sr-contact sr-contact-reparto" onclick="navigate('numeri', {filter:'${escapeJs(c.id)}'})">
        <div class="sr-contact-left">
          <div class="sr-contact-label">${labelHtml}</div>
          <div class="sr-contact-meta">reparto</div>
          ${luogoHtml}
          ${tagChips}
        </div>
        <div class="sr-contact-nums">${numChipsHtml}</div>
      </div>`;
    }
    return `<div class="sr-contact" onclick="navigate('numeri', {filter:'${escapeJs(c.id)}'})">
      <div class="sr-contact-left">
        <div class="sr-contact-label">${labelHtml}</div>
        ${luogoHtml}
        ${tagChips}
      </div>
      <div class="sr-contact-nums">${numChipsHtml}</div>
    </div>`;
  };

  // Mostro i badge ospedale solo se almeno OSA o IOV sono abilitati (altrimenti è sempre AOPD)
  const anyExtendedOn = !!(state.showExtendedNumeri && (state.showExtendedNumeri.osa || state.showExtendedNumeri.iov));

  const renderUoc = (u) => {
    const groupFullyMatched = matchedGroupIds.has(u.gruppoId);
    // Se il gruppo matcha il nome (es. "cardiologia"), ma ci sono altri token
    // (es. "reparto"), mostro solo i contatti che matchano anche quei token.
    // Questo evita che lo slice(0,12) riempia un solo bucket (es. Emodinamica).
    // Helper: contatto ha tag salvato (kind: guardia/reparto/utile)?
    const hasExplicitTag = (c) => {
      const k = c && c.kind;
      return k === 'guardia' || k === 'reparto' || k === 'utile';
    };
    // Helper: ordine "priority" interno alla sezione (group 1=guardia, 2=reparto, 4=altri, 5=utili).
    // Per i contatti senza tag, usa ordine YAML (_origIdx implicito = posizione in u.contatti).
    let topContatti;
    if (groupFullyMatched) {
      // Token che NON sono già nel nome del gruppo (es. "cardiologia reparto" → token extra "reparto")
      const gName = (u.gruppo || '').toLowerCase();
      const extraTokens = queryTerms.filter(t => !tokenMatches(t, gName));
      if (extraTokens.length > 0) {
        // Filtra contatti che matchano i token extra in qualunque campo
        const filtered = u.contatti.filter(c => {
          const tagsStr = Array.isArray(c.tag) ? c.tag.join(' ') : (c.tag || '');
          const aliasStr = Array.isArray(c.alias) ? c.alias.join(' ') : (c.alias || '');
          const ctxt = [c.etichetta, c.sezione, c.sottosezione, c.edificio, c.piano, c.luogo, tagsStr, aliasStr].filter(Boolean).join(' ').toLowerCase();
          return extraTokens.every(t => tokenMatches(t, ctxt));
        });
        topContatti = filtered.length > 0 ? filtered.slice(0, 30) : u.contatti.filter(hasExplicitTag);
      } else {
        // Match solo per nome UOC (es. "cardiologia"): mostro SOLO i contatti con tag
        // (manuale o auto-detect) di tutte le sezioni.
        const tagged = u.contatti.filter(hasExplicitTag);
        topContatti = tagged.length > 0 ? tagged : u.contatti.slice(0, 12);
      }
    } else {
      // Non-full-match: cerco se la query matcha il NOME di una sezione/sottosezione.
      const matchedSectionNames = new Set();
      const sezioni = (u.fullGroup && u.fullGroup.sezioni) || [];
      sezioni.forEach(s => {
        if (!s || !s.nome) return;
        const sName = s.nome.toLowerCase();
        if (queryTerms.every(t => sName.includes(t) || tokenMatches(t, sName))) matchedSectionNames.add(s.nome);
        (s.sottosezioni || []).forEach(ss => {
          if (!ss || !ss.nome) return;
          const ssName = ss.nome.toLowerCase();
          if (queryTerms.every(t => ssName.includes(t) || tokenMatches(t, ssName))) matchedSectionNames.add(ss.nome);
        });
      });
      if (matchedSectionNames.size > 0) {
        // Match per nome sezione (es. "stroke" → sezione "Stroke Unit"):
        // mostro contatti con tag della sezione + altri 5 in ordine YAML/priority.
        const sectionContatti = u.contatti.filter(c => matchedSectionNames.has(c.sezione) || matchedSectionNames.has(c.sottosezione));
        const sectionTagged = sectionContatti.filter(hasExplicitTag);
        const sectionUntagged = sectionContatti.filter(c => !hasExplicitTag(c));
        // Unisci: tutti i taggati + 5 non-taggati nell'ordine in cui appaiono in YAML
        topContatti = [...sectionTagged, ...sectionUntagged.slice(0, 5)];
      } else {
        // Match solo per contatti individuali: mostra i contatti matched (max 6)
        topContatti = u.contatti.filter(c => c._matched).slice(0, 6);
      }
    }
    const restCount = u.totalContatti - topContatti.length;
    const showOspBadge = anyExtendedOn || u.ospedale !== 'aopd';
    const ospBadge = showOspBadge
      ? `<span class="sr-uoc-badge sr-uoc-badge-${u.ospedale}">${osp[u.ospedale] || u.ospedale.toUpperCase()}</span>`
      : '';
    // L'elenco delle sedi di tutte le sezioni nell'header gruppo è ridondante quando ogni
    // bucket sezione sotto già mostra la propria sede. Rimosso.
    const sedeHtml = '';
    // Layout collassato: quando il match è per contatto/sezione (non per nome UOC),
    // niente header UOC + bucket header tipo "UOC ridotta · Sezione" non espandibile.
    const isCollapsed = !groupFullyMatched;
    // Raggruppo topContatti per sede operativa usando groupContattiBySede.
    // Ogni bucket ha un header con il nome della sede + luogo.
    let contattiHtml = '';
    if (u.fullGroup && typeof groupContattiBySede === 'function') {
      const buckets = groupContattiBySede(topContatti, u.fullGroup.sezioni);
      contattiHtml = buckets.map(b => {
        const sedeLoc = b.sede
          ? [b.sede.edificio, b.sede.piano].filter(Boolean).join(' ')
          : '';
        const sedeLocLower = sedeLoc.toLowerCase().trim();
        // Appiattisci contatti diretti + quelli delle sottosezioni (subBuckets).
        // Necessario perché bucket come "Emodinamica" hanno sottosezioni (Sala, Studi Medici,
        // Segreteria) e i contatti finiscono nei subBuckets, non in b.contatti diretto.
        const allBucketContatti = [
          ...b.contatti,
          ...((b.subBuckets || []).flatMap(sb => sb.contatti || []))
        ];
        const contattiItems = allBucketContatti.map(c => {
          const cLuogo = getLuogoContatto(c).toLowerCase().trim();
          const hide = sedeLocLower && cLuogo && (cLuogo === sedeLocLower || cLuogo.includes(sedeLocLower) || sedeLocLower.includes(cLuogo));
          return renderContatto(c, { hideLuogo: hide, hideSedeMeta: !!b.sede });
        }).join('');
        if (isCollapsed) {
          // Layout collassato: header bucket = "UOC ridotta · Sezione" con UOC e Sezione cliccabili separatamente
          const uocShort = shortenUocName(u.fullGroup);
          const sezioneLabel = bucketSezioneLabel(b);
          return `<div class="sr-sede-bucket">
            <div class="sr-sede-bucket-header sr-sede-bucket-static">
              <span class="sede-bucket-tipo">
                <span class="ctx-uoc" onclick="event.stopPropagation();navigate('numeri',{filter:'${escapeJs(u.gruppoId)}'})" title="Apri ${escapeHtml(u.gruppo)}">${escapeHtml(uocShort)}</span><span class="sede-bucket-sep"> · </span><span class="ctx-sezione" onclick="event.stopPropagation();openUocWithSede('${escapeJs(u.gruppoId)}','${escapeJs(b.sedeKey)}')" title="Apri ${escapeHtml(u.gruppo)} con ${escapeHtml(sezioneLabel)} espansa">${escapeHtml(sezioneLabel)}</span>
              </span>
            </div>
            <div class="sr-sede-bucket-contatti">${contattiItems}</div>
          </div>`;
        }
        if (b.sede) {
          const headerInner = renderSedeBucketHeader(b.sede, null, u.fullGroup);
          return `<div class="sr-sede-bucket">
            <button class="sr-sede-bucket-header" onclick="openUocWithSede('${escapeJs(u.gruppoId)}','${escapeJs(b.sedeKey)}')" title="Apri ${escapeHtml(u.gruppo)} con questa sezione espansa">${headerInner}</button>
            <div class="sr-sede-bucket-contatti">${contattiItems}</div>
          </div>`;
        }
        // Bucket dinamico (da sezione) o "Altro": wrapper neutro con header
        const label = b.customLabel || 'Altro';
        return `<div class="sr-sede-bucket">
          <div class="sr-sede-bucket-header" style="cursor:default;">
            <span class="sede-bucket-tipo">${escapeHtml(label)}</span>
          </div>
          <div class="sr-sede-bucket-contatti">${contattiItems}</div>
        </div>`;
      }).join('');
    } else {
      contattiHtml = topContatti.map(c => renderContatto(c)).join('');
    }
    // In modalità collassata: niente header UOC, niente sede grande, niente "+N altri".
    // Solo la lista dei rettangoli "UOC · Sezione" con i contatti sotto.
    if (isCollapsed) {
      return `<div class="sr-uoc sr-uoc-collapsed">
        <div class="sr-uoc-contatti">
          ${contattiHtml}
        </div>
      </div>`;
    }
    return `<div class="sr-uoc" onclick="event.target.closest('.sr-contact, .sr-sede-bucket-header, .sr-sede-bucket-contatti') ? null : navigate('numeri', {filter:'${escapeJs(u.gruppoId)}'})">
      <div class="sr-uoc-head">
        ${ospBadge}
      </div>
      <div class="sr-uoc-title">${escapeHtml(shortenUocName(u.fullGroup) || u.gruppo)}</div>
      ${sedeHtml}
      <div class="sr-uoc-contatti">
        ${contattiHtml}
        ${restCount > 0 ? `<div class="sr-uoc-more">+ ${restCount} altri numeri nella UOC →</div>` : ''}
      </div>
    </div>`;
  };

  const renderOther = (r) => {
    const item = r.item;
    let click = '';
    if (item.type === 'procedura') click = `navigate('procedura', {slug:'${escapeJs(item.slug)}'})`;
    else if (item.type === 'clinica') click = `navigate('clinica-scheda', {slug:'${escapeJs(item.slug)}'})`;
    else if (item.type === 'modulo') click = `navigate('modulo', {slug:'${escapeJs(item.slug)}'})`;
    else if (item.type === 'tabella') click = `navigate('tabella', {slug:'${escapeJs(item.slug)}'})`;
    const typeLabel = item.type === 'procedura' ? 'Procedura'
      : item.type === 'clinica' ? 'Scheda clinica'
      : item.type === 'modulo' ? 'Modulo'
      : item.type === 'tabella' ? 'Tabella' : item.type;
    const snippet = (item.body || '').substring(0, 140) + ((item.body || '').length > 140 ? '…' : '');
    return `<div class="search-result-item" onclick="${click}">
      <div class="search-result-type">${typeLabel}</div>
      <div class="search-result-title">${escapeHtml(item.titolo)}</div>
      ${snippet ? `<div class="search-result-snippet">${escapeHtml(snippet)}</div>` : ''}
    </div>`;
  };

  const totalContatti = uocResults.reduce((s, u) => s + u.matchedCount, 0);
  const totalResults = uocResults.length + nonNumeri.length;

  // Conteggio per categoria (per filter chips)
  const countByType = {
    numeri: numeriRaw.length,
    procedura: 0, clinica: 0, modulo: 0, tabella: 0
  };
  rawResults.forEach(r => {
    if (r.item.type !== 'numero' && countByType[r.item.type] !== undefined) countByType[r.item.type]++;
  });
  // Set-based filter: multi-select con toggle
  const activeFilters = state.searchFilter instanceof Set ? state.searchFilter : new Set();
  state.searchFilter = activeFilters;
  const isFiltering = activeFilters.size > 0;
  const showNumeri = !isFiltering || activeFilters.has('numeri');
  const showProc = !isFiltering || activeFilters.has('procedura');
  const showClin = !isFiltering || activeFilters.has('clinica');
  const showMod = !isFiltering || activeFilters.has('modulo');
  const showTab = !isFiltering || activeFilters.has('tabella');

  const chipTypes = [
    { key: 'numeri',    label: 'Rubrica',        count: countByType.numeri },
    { key: 'procedura', label: 'Procedure',      count: countByType.procedura },
    { key: 'clinica',   label: 'Schede cliniche', count: countByType.clinica },
    { key: 'modulo',    label: 'Moduli',         count: countByType.modulo },
    { key: 'tabella',   label: 'Tabelle',        count: countByType.tabella }
  ].filter(c => c.count > 0);

  const chipsHtml = chipTypes.length > 1 || isFiltering
    ? `<div class="search-filter-chips">
        ${isFiltering ? `<button class="search-filter-chip" onclick="clearSearchFilter()">✕ Tutti</button>` : ''}
        ${chipTypes.map(c =>
          `<button class="search-filter-chip ${activeFilters.has(c.key) ? 'active' : ''}" onclick="toggleSearchFilter('${c.key}')">${c.label} · ${c.count}</button>`
        ).join('')}
      </div>`
    : '';

  // Filtra nonNumeri secondo i filtri attivi
  const filteredNonNumeri = isFiltering
    ? rawResults.filter(r => r.item.type !== 'numero' && activeFilters.has(r.item.type)).slice(0, 20)
    : nonNumeri;

  target.innerHTML = `
    <div class="page-head">
      <div class="page-eyebrow">Risultati</div>
      <h1 class="page-title">Ricerca: <em>${escapeHtml(query)}</em></h1>
      <div style="margin-top:8px;font-size:13px;color:var(--ink-muted);">
        ${uocResults.length > 0 ? `${uocResults.length} UOC · ${totalContatti} contatti${nonNumeri.length > 0 ? ' · ' : ''}` : ''}
        ${nonNumeri.length > 0 ? `${nonNumeri.length} documenti` : ''}
        ${totalResults === 0 ? 'nessun risultato' : ''}
      </div>
      ${chipsHtml}
    </div>
    ${showNumeri && uocResults.length > 0 ? `<div class="sr-section-title">Rubrica</div>
    <div class="sr-uoc-list">${uocResults.map(renderUoc).join('')}</div>` : ''}
    ${(showProc || showClin || showMod || showTab) && filteredNonNumeri.length > 0 ? `<div class="sr-section-title">Documenti</div>
    <div class="search-results">${filteredNonNumeri.map(renderOther).join('')}</div>` : ''}
    ${totalResults === 0 ? `<p style="color:var(--ink-muted);padding:24px 0;">Nessun risultato per "${escapeHtml(query)}".</p>` : ''}`;
}

function toggleSearchFilter(type) {
  if (!(state.searchFilter instanceof Set)) state.searchFilter = new Set();
  if (state.searchFilter.has(type)) state.searchFilter.delete(type);
  else state.searchFilter.add(type);
  const q = $('global-search').value || state.currentParams?.query || '';
  const overlayOpen = !document.getElementById('search-overlay')?.classList.contains('hidden');
  renderSearchResults(q, overlayOpen ? 'search-overlay-content' : undefined);
}
function clearSearchFilter() {
  state.searchFilter = new Set();
  const q = $('global-search').value || state.currentParams?.query || '';
  const overlayOpen = !document.getElementById('search-overlay')?.classList.contains('hidden');
  renderSearchResults(q, overlayOpen ? 'search-overlay-content' : undefined);
}

/* ============================ MODAL ============================ */
function showModal({ title, subtitle, body, actions }) {
  closeModal();
  const container = $('modal-container');
  const actionsHtml = (actions || []).map((a, i) => {
    const variant = a.variant === 'danger' ? 'danger' : a.variant === 'ghost' ? 'ghost' : '';
    return `<button class="btn ${variant}" data-action-idx="${i}">${escapeHtml(a.label)}</button>`;
  }).join('');
  container.innerHTML = `
    <div class="modal-backdrop" id="current-modal-backdrop">
      <div class="modal">
        <div class="modal-head">
          <div class="modal-title">${title}</div>
          ${subtitle ? `<div class="modal-sub">${subtitle}</div>` : ''}
        </div>
        ${body ? `<div class="modal-body">${body}</div>` : ''}
        ${actionsHtml ? `<div class="modal-actions">${actionsHtml}</div>` : ''}
      </div>
    </div>`;
  $$('[data-action-idx]').forEach(btn => {
    const idx = parseInt(btn.dataset.actionIdx, 10);
    btn.addEventListener('click', () => {
      const action = actions[idx];
      if (action && action.onClick) action.onClick(btn);
    });
  });
  const backdrop = $('current-modal-backdrop');
  if (backdrop) backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeModal(); });
}

function closeModal() {
  $('modal-container').innerHTML = '';
}

/* ============================ INIT ============================ */
function initEventListeners() {
  $('login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const u = $('login-username').value.trim();
    const p = $('login-passphrase').value;
    if (u && p) attemptLogin(u, p);
  });

  $$('.nav-item').forEach(el => {
    if (el.dataset.route) {
      el.addEventListener('click', () => navigate(el.dataset.route));
    }
  });

  $('nav-logout').addEventListener('click', () => {
    logout();
  });

  $('brand-home').addEventListener('click', () => { closeMobileMenu(); resetDrill(); navigate('home'); });

  // Mobile drawer (hamburger)
  let _scrollLockY = 0;
  function isMobileViewport(){ return window.innerWidth <= 900; }
  function openMobileMenu(){
    if (!isMobileViewport()) return;
    _scrollLockY = window.scrollY || window.pageYOffset || 0;
    $('sidebar').classList.add('mobile-open');
    $('sidebar-overlay').classList.add('show');
    $('btn-hamburger').classList.add('active');
    $('btn-hamburger').setAttribute('aria-expanded', 'true');
    // Lock body scroll (iOS-safe: position fixed mantiene la posizione)
    document.body.style.position = 'fixed';
    document.body.style.top = `-${_scrollLockY}px`;
    document.body.style.left = '0';
    document.body.style.right = '0';
    document.body.style.width = '100%';
    document.body.style.overflow = 'hidden';
  }
  function closeMobileMenu(){
    const wasOpen = $('sidebar').classList.contains('mobile-open');
    $('sidebar').classList.remove('mobile-open');
    $('sidebar-overlay').classList.remove('show');
    $('btn-hamburger').classList.remove('active');
    $('btn-hamburger').setAttribute('aria-expanded', 'false');
    // Unlock body scroll e restore posizione
    document.body.style.position = '';
    document.body.style.top = '';
    document.body.style.left = '';
    document.body.style.right = '';
    document.body.style.width = '';
    document.body.style.overflow = '';
    if (wasOpen && _scrollLockY) {
      window.scrollTo(0, _scrollLockY);
      _scrollLockY = 0;
    }
  }
  $('btn-hamburger').addEventListener('click', (e) => {
    e.stopPropagation();
    if ($('sidebar').classList.contains('mobile-open')) closeMobileMenu();
    else openMobileMenu();
  });
  // Tap su overlay → chiude
  $('sidebar-overlay').addEventListener('click', closeMobileMenu);
  $('sidebar-close').addEventListener('click', closeMobileMenu);

  // Swipe gesture: da sinistra (primo terzo dello schermo) verso destra = apre sidebar
  //                sulla sidebar aperta verso sinistra = chiude
  //                dalla cima verso il basso = focus sulla barra di ricerca
  let touchStart = null;
  const OPEN_THRESHOLD = 60;       // px di swipe orizzontale per aprire sidebar
  const VERT_TOLERANCE = 40;       // px max verticale tollerato per swipe orizz.
  const PULL_DOWN_THRESHOLD = 90;  // px di pull-down per attivare focus search
  const HORIZ_TOLERANCE = 40;      // px max orizzontale tollerato per pull-down
  document.addEventListener('touchstart', (e) => {
    if (!isMobileViewport()) return;
    const t = e.touches[0];
    if (!t) return;
    const edgeZone = window.innerWidth / 2;
    const sidebarOpen = $('sidebar').classList.contains('mobile-open');
    // Memorizzo lo startY e tutti i mode potenzialmente validi; il mode effettivo viene deciso al primo movimento
    touchStart = {
      x: t.clientX, y: t.clientY,
      sidebarOpen,
      canOpen: !sidebarOpen && t.clientX <= edgeZone,
      canClose: sidebarOpen,
      canPulldown: !sidebarOpen && (window.scrollY <= 0),
      mode: null // deciso al primo touchmove in base alla direzione
    };
  }, { passive: true });

  // Listener NON-PASSIVO per bloccare il pull-to-refresh nativo quando l'utente
  // sta facendo pull-down sull'app. overscroll-behavior-y:contain dovrebbe bastare,
  // ma questo è un fallback per browser che non lo supportano pienamente.
  document.addEventListener('touchmove', (e) => {
    if (!touchStart || !isMobileViewport()) return;
    // Se siamo in modalità 'pulldown' con scroll a 0 e il gesto è principalmente verticale-giù,
    // blocco il browser dal fare il suo pull-to-refresh nativo.
    if (touchStart.mode === 'pulldown' || touchStart.canPulldown) {
      const t = e.touches[0];
      if (!t) return;
      const dy = t.clientY - touchStart.y;
      const absDx = Math.abs(t.clientX - touchStart.x);
      // Se sto già andando giù dalla posizione in cima e il gesto è verticale
      if (dy > 0 && absDx < HORIZ_TOLERANCE && window.scrollY <= 0) {
        e.preventDefault();
      }
    }
  }, { passive: false });

  document.addEventListener('touchmove', (e) => {
    if (!touchStart) return;
    const t = e.touches[0];
    if (!t) return;
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);
    // Decido il mode al primo movimento significativo (>15px in una direzione)
    if (!touchStart.mode) {
      if (absDx < 15 && absDy < 15) return; // ancora troppo piccolo
      // Movimento prevalentemente verticale verso il basso → pulldown
      if (absDy > absDx && dy > 0 && touchStart.canPulldown) {
        touchStart.mode = 'pulldown';
      }
      // Movimento prevalentemente orizzontale → swipe sidebar
      else if (absDx > absDy) {
        if (dx > 0 && touchStart.canOpen) touchStart.mode = 'open';
        else if (dx < 0 && touchStart.canClose) touchStart.mode = 'close';
        else { touchStart = null; return; }
      }
      else {
        // Movimento verticale ma non compatibile con pulldown (es. scroll verso l'alto, o già scrollato)
        touchStart = null; return;
      }
    }
    if (touchStart.mode === 'pulldown') {
      if (window.scrollY > 0) { touchStart = null; return; }
      if (absDx > HORIZ_TOLERANCE) { touchStart = null; return; }
      if (dy > PULL_DOWN_THRESHOLD) {
        // Su iOS/Android il focus+keyboard funziona in modo affidabile SOLO se chiamato
        // durante touchend (gesto "completato"), non durante touchmove. Segno il flag
        // e il touchend handler lo esegue.
        touchStart.shouldFocusSearch = true;
      }
    } else {
      if (absDy > VERT_TOLERANCE) { touchStart = null; return; }
      if (touchStart.mode === 'open' && dx > OPEN_THRESHOLD) {
        openMobileMenu();
        touchStart = null;
      } else if (touchStart.mode === 'close' && dx < -OPEN_THRESHOLD) {
        closeMobileMenu();
        touchStart = null;
      }
    }
  }, { passive: true });
  document.addEventListener('touchend', (e) => {
    // Eseguo il focus della search in touchend per garantire l'apertura della tastiera su mobile
    if (touchStart && touchStart.shouldFocusSearch) {
      const input = document.getElementById('global-search');
      if (input) {
        // requestAnimationFrame dà al browser un tick per chiudere il gesto prima del focus
        requestAnimationFrame(() => {
          input.focus();
          // Su iOS serve un ulteriore trick: scroll nell'input per farlo visibile e attivo
          try {
            input.scrollIntoView({ block: 'center', behavior: 'instant' });
          } catch (e) {
            input.scrollIntoView(false);
          }
          input.select();
        });
      }
    }
    touchStart = null;
  }, { passive: true });
  document.addEventListener('touchcancel', () => { touchStart = null; }, { passive: true });
  // Chiudo il drawer quando l'utente naviga (click su nav-item o nav-tree-row)
  $('sidebar').addEventListener('click', (e) => {
    const navItem = e.target.closest('.nav-item, .nav-tree-row');
    if (!navItem || !isMobileViewport()) return;
    // Non chiudo se è un click sul caret di espansione (non naviga)
    if (e.target.closest('.nav-tree-caret') || e.target.closest('.nav-edit-actions')) return;
    closeMobileMenu();
  });
  // Tap sul main content (fuori dalla sidebar) → chiude
  $('main-content').addEventListener('click', () => {
    if ($('sidebar').classList.contains('mobile-open')) closeMobileMenu();
  }, true); // capture per intercettare prima di handler interni
  // Chiudo con ESC
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && $('sidebar').classList.contains('mobile-open')) closeMobileMenu();
  });
  // Resize: se passo a desktop, ripristino tutto
  // Misura l'altezza reale della topbar e la propaga come CSS var.
  // Necessario per scroll-margin-top accurato (deep-link a blocchi, sezioni).
  // Le breakpoint statiche (60/68px) non sono affidabili perché la topbar wrap
  // su mobile può crescere a 2 righe quando ci sono molti elementi.
  const measureTopbar = () => {
    const tb = document.querySelector('header.topbar');
    if (!tb) return;
    const h = Math.round(tb.getBoundingClientRect().height);
    if (h > 30 && h < 200) {
      document.documentElement.style.setProperty('--topbar-height', h + 'px');
    }
  };
  measureTopbar();
  // Re-misura quando il layout cambia: dopo render, su resize, su orientation change
  window.addEventListener('resize', measureTopbar);
  window.addEventListener('orientationchange', () => setTimeout(measureTopbar, 100));
  // Doppio rAF per essere certi che fonts/layout siano stabili
  requestAnimationFrame(() => requestAnimationFrame(measureTopbar));

  window.addEventListener('resize', () => {
    if (!isMobileViewport() && $('sidebar').classList.contains('mobile-open')) {
      closeMobileMenu();
    }
  });

  $('btn-edit-mode').addEventListener('click', () => toggleEditMode());
  $('btn-exit-edit').addEventListener('click', () => toggleEditMode(false));
  $('btn-commit-tags').addEventListener('click', () => commitTagEdits());
  $('btn-cancel-tags').addEventListener('click', () => cancelTagEdits());

  $('btn-refresh').addEventListener('click', async () => {
    if (state.editingContext && state.editingContext.isDirty) {
      if (!confirm('Hai modifiche non salvate. Ricaricare comunque (perderai le modifiche)?')) return;
    }
    $('btn-refresh').classList.add('has-badge');
    toast('Ricaricamento indice...', 'info', 2000);
    try {
      await buildIndex();
      toast('Indice aggiornato', 'success');
      $('btn-refresh').classList.remove('has-badge');
      navigate(state.currentView);
    } catch (e) {
      toast('Errore refresh: ' + e.message, 'error');
    }
  });

  const searchInput = $('global-search');
  const searchClear = $('global-search-clear');
  let searchTimeout = null;
  let lastRenderedQuery = null;
  const updateSearchClear = () => {
    if (searchClear) searchClear.classList.toggle('hidden', !searchInput.value);
  };
  updateSearchClear();
  const doSearch = (q) => {
    if (q === lastRenderedQuery) return;
    lastRenderedQuery = q;
    state.searchFilter = new Set();
    if (q.length >= 2) {
      openSearchOverlay(q);
      // Riporta lo scroll in cima all'overlay quando la query cambia, così i nuovi
      // risultati sono immediatamente visibili (senza questo, l'utente che aveva
      // scrollato nei risultati precedenti restava fermo in basso digitando una nuova query).
      const overlay = document.getElementById('search-overlay');
      if (overlay) {
        try { overlay.scrollTo({ top: 0, behavior: 'instant' }); }
        catch { overlay.scrollTop = 0; }
      }
    } else {
      closeSearchOverlay();
    }
  };
  searchInput.addEventListener('input', (e) => {
    const q = e.target.value;
    updateSearchClear();
    clearTimeout(searchTimeout);
    // Se l'utente sta cancellando (q vuoto o 1 carattere), reagisco subito
    if (q.length < 2) {
      doSearch(q);
      return;
    }
    // Debounce 350ms per ricerche: evita lag durante typing veloce.
    // Più lungo che desktop perché su mobile la digitazione è naturalmente più lenta
    // e il rendering è più costoso; partire al primo pause vero è meglio che provare
    // a stare dietro a ogni keystroke.
    searchTimeout = setTimeout(() => {
      // requestIdleCallback se disponibile (Chrome/Edge): permette al browser di
      // schedulare il render solo quando il thread principale è libero. Fallback rAF.
      const schedule = window.requestIdleCallback
        ? (cb) => window.requestIdleCallback(cb, { timeout: 200 })
        : (cb) => requestAnimationFrame(cb);
      schedule(() => doSearch(q));
    }, 350);
  });
  if (searchClear) {
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      updateSearchClear();
      closeSearchOverlay();
      searchInput.focus();
    });
  }
  // Se l'utente torna sull'input con testo già presente, riapri l'overlay con quei risultati
  searchInput.addEventListener('focus', () => {
    const q = searchInput.value;
    if (q.length >= 2) openSearchOverlay(q);
  });

  // Keyboard shortcut: Cmd/Ctrl + K focuses search
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
    }
    if (e.key === 'Escape') {
      if ($('modal-container').children.length > 0) closeModal();
      else if (!$('search-overlay').classList.contains('hidden')) {
        closeSearchOverlay();
      }
    }
  });
}

async function init() {
  initTheme();
  initEventListeners();

  // Kbd indicator: Ctrl su Windows/Linux, ⌘ su Mac
  const kbdEl = document.getElementById('search-kbd-indicator');
  if (kbdEl) {
    const isMac = /mac|iphone|ipad|ipod/i.test(navigator.userAgent || navigator.platform || '');
    kbdEl.textContent = isMac ? '⌘K' : 'Ctrl K';
  }

  // Check for existing session
  const saved = loadSession();
  if (saved && saved.username && (saved.tokenData || saved.token)) {
    // Compatibilità con sessioni legacy (campo 'token' vecchio → 'tokenData' nuovo)
    if (saved.token && !saved.tokenData) {
      saved.tokenData = saved.token;
      delete saved.token;
    }
    state.session = saved;
    // Valida il token contro il repo dati
    try {
      const testRes = await fetch(`${CONFIG.API_BASE}/repos/${CONFIG.REPO_OWNER}/${CONFIG.DATA_REPO_NAME}`, {
        headers: { 'Authorization': `token ${saved.tokenData}`, 'Accept': 'application/vnd.github+json' }
      });
      if (testRes.ok) {
        await enterApp();
        hideBootSplash();  // app pronta dopo enterApp (preferenze caricate, primo render fatto)
        return;
      }
    } catch {}
    clearSession();
  }

  // Show login
  $('login-view').classList.remove('hidden');
  $('app-view').classList.add('hidden');
  setTimeout(() => $('login-username').focus(), 100);
  hideBootSplash();  // non c'è sessione, mostra login
}

/**
 * Nasconde lo splash di boot con un fade. Coperto da CSS:
 * - aggiunge .splash-done → opacity:0
 * - dopo 250ms (durata fade) aggiunge .splash-removed → display:none
 * Idempotente: chiamarlo più volte non fa danno.
 */
function hideBootSplash() {
  if (document.documentElement.classList.contains('splash-done')) return;
  document.documentElement.classList.add('splash-done');
  setTimeout(() => {
    document.documentElement.classList.add('splash-removed');
  }, 280);
}

document.addEventListener('DOMContentLoaded', init);
// Safety net: se per qualche motivo init non chiama hideBootSplash entro 8s,
// lo nascondo comunque per evitare che l'utente resti bloccato sullo splash.
setTimeout(() => {
  if (!document.documentElement.classList.contains('splash-done')) {
    console.warn('[boot] splash safety timeout — hide forced');
    hideBootSplash();
  }
}, 8000);
</script>
