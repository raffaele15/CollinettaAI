.sede-bucket-loc{font-size:13px;color:var(--ink)}
.sede-bucket-altro{color:var(--ink-muted);font-style:italic}
.sede-bucket-contatti{padding:0 4px}
.sede-subbucket{margin:8px 0 4px;padding:0 0 0 12px;border-left:2px solid var(--rule-soft)}
.sede-subbucket-header{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;padding:6px 0 4px;margin-top:4px}
.sede-subbucket-contatti{padding:0}
.sede-fonte:hover{opacity:1;text-decoration:underline}

@media print{body{background:white;color:black}header.topbar,aside.sidebar,.page-actions,.editor-head-actions{display:none!important}main.content{padding:0;max-width:100%}.procedura-body blockquote{background:#f4f4f4}a{color:black}details.scheda-section{border:none}details.scheda-section[open] .scheda-summary::after{display:none}.scheda-summary{cursor:default}}

/* SCHEDA FLESSIBILE */
.scheda-section{margin-bottom:14px;border:1px solid var(--rule);border-radius:2px;background:var(--bg-paper);overflow:hidden;scroll-margin-top:calc(var(--topbar-height) + 12px)}
.scheda-section[open]{border-color:var(--rule-strong)}
.scheda-summary{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;padding:14px 20px;cursor:pointer;background:var(--bg-sink);list-style:none;display:flex;align-items:center;gap:8px;transition:background .12s,color .12s}
.scheda-summary::-webkit-details-marker{display:none}
.scheda-summary::before{content:'▸';font-size:10px;color:var(--ink-faint);transition:transform .15s}
.scheda-section[open] .scheda-summary::before{transform:rotate(90deg)}
.scheda-summary:hover{background:var(--rule-soft);color:var(--ink)}
.scheda-section[open] .scheda-summary{color:var(--ink)}
.scheda-content{padding:18px 20px;font-size:15px;line-height:1.6}
.scheda-subtitle{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:6px;font-weight:500}
.scheda-subtitle-warn{color:var(--danger)}
.scheda-two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:600px){.scheda-two-col{grid-template-columns:1fr;gap:16px}}
.scheda-list{margin:0 0 0 20px;padding:0}
.scheda-list li{margin-bottom:6px;line-height:1.5}
.scheda-checklist{list-style:none;margin-left:0}
.scheda-checklist li{padding-left:24px;position:relative}
.scheda-checklist li::before{content:'';position:absolute;left:0;top:7px;width:12px;height:12px;border:1.5px solid var(--rule-strong);border-radius:2px}
.scheda-kv-table{width:100%;border-collapse:collapse;font-size:14px}
.scheda-kv-table th{text-align:left;padding:8px 14px 8px 0;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;vertical-align:top;width:32%;border-bottom:1px solid var(--rule-soft)}
.scheda-kv-table td{padding:8px 0;color:var(--ink-soft);border-bottom:1px solid var(--rule-soft);vertical-align:top;line-height:1.5}
.scheda-kv-table tr:last-child th,.scheda-kv-table tr:last-child td{border-bottom:none}

/* ============================ BLOCCHI TIPIZZATI ============================ */
.scheda-blocchi{display:flex;flex-direction:column;gap:18px;padding:4px 0}
.bl{position:relative;scroll-margin-top:calc(var(--topbar-height) + var(--edit-banner-height, 0px) + 12px);transition:box-shadow .3s,background-color .3s}
.bl-flash{animation:bl-flash-pulse 2s ease-out}

/* Bottone condividi blocco — overlay top-right, appare al hover */
.bl-share-btn{position:absolute;top:6px;right:6px;width:26px;height:26px;display:inline-flex;align-items:center;justify-content:center;background:var(--bg-paper);color:var(--ink-muted);border:1px solid var(--rule);border-radius:3px;cursor:pointer;opacity:0;transition:opacity .15s,color .12s,border-color .12s;padding:0;z-index:2}
.bl:hover .bl-share-btn,.bl-share-btn:focus-visible{opacity:1}
.bl-share-btn:hover{color:var(--accent);border-color:var(--accent)}
/* Su mobile (touch device) il hover non funziona bene — mostra sempre con bassa opacità */
@media (hover:none){
  .bl-share-btn{opacity:.4}
  .bl-share-btn:active{opacity:1}
}
@keyframes bl-flash-pulse{
  0%{box-shadow:0 0 0 3px var(--accent);background-color:var(--accent-soft)}
  50%{box-shadow:0 0 0 2px var(--accent)}
  100%{box-shadow:0 0 0 0 transparent;background-color:transparent}
}
[data-theme="dark"] .bl-flash{animation-name:bl-flash-pulse-dark}
@keyframes bl-flash-pulse-dark{
  0%{box-shadow:0 0 0 3px var(--accent);background-color:rgba(43,74,111,.25)}
  50%{box-shadow:0 0 0 2px var(--accent)}
  100%{box-shadow:0 0 0 0 transparent;background-color:transparent}
}
.bl-title{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:8px;font-weight:500}
.bl-title-warn{color:var(--danger)}

/* text */
.bl-text-body{font-size:15px;line-height:1.65;color:var(--ink-soft)}
.bl-text-body p{margin-bottom:10px}
.bl-text-body p:last-child{margin-bottom:0}
.bl-text-body strong{color:var(--ink);font-weight:600}
.bl-text-body em{font-family:var(--serif);font-style:italic}
.bl-text-body code{font-family:var(--mono);font-size:13px;background:var(--bg-sink);padding:1px 6px;border-radius:2px;color:var(--ink)}

/* list */
.bl-list ul{list-style:disc;margin:0 0 0 22px;padding:0}
.bl-list li{margin-bottom:5px;line-height:1.55;color:var(--ink-soft);font-size:15px}
.bl-list-warn{padding:12px 14px;border-left:3px solid var(--danger);background:var(--danger-soft);border-radius:0 2px 2px 0}
[data-theme="dark"] .bl-list-warn{background:rgba(143,46,42,.15)}

/* checklist */
.bl-checklist ul{list-style:none;margin:0;padding:0}
.bl-checklist-item{padding:4px 0;line-height:1.5}
.bl-checklist-item label{display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:15px;color:var(--ink-soft)}
.bl-checklist-cb{margin-top:4px;flex-shrink:0;width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.bl-checklist-cb:checked + .bl-checklist-text{text-decoration:line-through;color:var(--ink-muted)}
.bl-checklist-text{transition:color .15s}
.bl-checklist-actions{margin-top:10px;display:flex;justify-content:flex-end}
.bl-mini-btn{background:none;border:1px solid var(--rule);color:var(--ink-muted);font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;padding:4px 10px;border-radius:2px;cursor:pointer;transition:all .15s}
.bl-mini-btn:hover{background:var(--bg-sink);color:var(--ink)}

/* callout */
.bl-callout{border-left:3px solid var(--rule-strong);padding:12px 16px;background:var(--bg-sink);border-radius:0 3px 3px 0}
.bl-callout-title{font-weight:600;color:var(--ink);margin-bottom:4px;font-size:14px}
.bl-callout-body{font-size:14px;line-height:1.55;color:var(--ink-soft)}
.bl-callout-warning{border-color:var(--warning);background:var(--warning-soft)}
.bl-callout-warning .bl-callout-title{color:var(--warning)}
.bl-callout-info{border-color:var(--accent);background:var(--accent-soft)}
.bl-callout-info .bl-callout-title{color:var(--accent)}
.bl-callout-tip{border-color:var(--success);background:var(--success-soft)}
.bl-callout-tip .bl-callout-title{color:var(--success)}
.bl-callout-danger{border-color:var(--danger);background:var(--danger-soft)}
.bl-callout-danger .bl-callout-title{color:var(--danger)}
[data-theme="dark"] .bl-callout-warning{background:rgba(138,90,31,.18)}
[data-theme="dark"] .bl-callout-info{background:rgba(43,74,111,.18)}
[data-theme="dark"] .bl-callout-tip{background:rgba(47,95,61,.18)}
[data-theme="dark"] .bl-callout-danger{background:rgba(143,46,42,.18)}

/* table */
.bl-table-wrap{overflow-x:auto;border:1px solid var(--rule);border-radius:2px}
.bl-table table{width:100%;border-collapse:collapse;font-size:14px}
.bl-table th{text-align:left;padding:10px 14px;background:var(--bg-sink);font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;border-bottom:1px solid var(--rule)}
.bl-table td{padding:10px 14px;color:var(--ink-soft);border-bottom:1px solid var(--rule-soft);vertical-align:top;line-height:1.5}
.bl-table tr:last-child td{border-bottom:none}
.bl-table tr:hover td{background:var(--bg-sink)}

/* image */
.bl-image{margin:0}
.bl-image-img{display:block;max-width:100%;height:auto;border-radius:2px;border:1px solid var(--rule);cursor:zoom-in}
.bl-image-caption{margin-top:8px;font-size:12px;color:var(--ink-muted);font-style:italic;text-align:center;font-family:var(--serif)}

/* system_code */
.bl-sc{border:1px solid var(--rule);background:var(--bg-paper);border-radius:3px;padding:14px;border-left:3px solid var(--warning)}
.bl-sc-head{display:flex;align-items:baseline;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.bl-sc-sistema{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--warning);background:var(--warning-soft);padding:2px 8px;border-radius:2px;font-weight:600}
[data-theme="dark"] .bl-sc-sistema{background:rgba(138,90,31,.22)}
.bl-sc-titolo{font-weight:600;color:var(--ink);font-size:14px}
.bl-sc-percorso{font-family:var(--mono);font-size:12px;color:var(--ink-soft);background:var(--bg-sink);padding:6px 10px;border-radius:2px;margin-bottom:10px;word-break:break-word;line-height:1.5}
.bl-sc-codici{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.bl-sc-codice{background:var(--bg-sink);border:1px solid var(--rule);padding:6px 12px;border-radius:2px;cursor:pointer;display:inline-flex;align-items:baseline;gap:8px;transition:all .15s;font-family:var(--mono);font-size:12px;color:var(--ink-soft)}
.bl-sc-codice:hover{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
.bl-sc-codice-val{font-weight:700;color:var(--ink);letter-spacing:.03em}
.bl-sc-desc{font-family:var(--sans);font-weight:400;color:var(--ink-muted);font-size:11px}
.bl-sc-codice:hover .bl-sc-codice-val{color:var(--accent)}
.bl-sc-note{font-size:13px;color:var(--ink-muted);font-style:italic;line-height:1.5}

/* link esterno */
.bl-link{display:block;border:1px solid var(--rule);background:var(--bg-paper);border-radius:3px;padding:12px 14px;text-decoration:none;color:inherit;transition:all .15s}
.bl-link:hover{border-color:var(--accent);background:var(--bg-raised)}
.bl-link-head{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.bl-link-icon{font-size:13px;color:var(--accent);flex-shrink:0}
.bl-link-titolo{font-weight:500;color:var(--ink);font-size:14px;line-height:1.4}
.bl-link-fonte{font-size:12px;color:var(--ink-muted);font-family:var(--mono);margin-left:21px}
.bl-link:hover .bl-link-titolo{color:var(--accent)}

/* form_ref */
.bl-form-ref{display:flex;align-items:center;gap:10px;border:1px solid var(--rule);background:var(--bg-paper);border-radius:3px;padding:12px 14px;text-decoration:none;color:inherit;transition:all .15s;border-left:3px solid var(--accent)}
.bl-form-ref:hover{background:var(--accent-soft);border-color:var(--accent)}
.bl-icon-doc{font-size:16px;flex-shrink:0}
.bl-form-ref-label{flex:1;font-weight:500;color:var(--ink);font-size:14px}
.bl-arrow{color:var(--ink-muted);font-size:14px;flex-shrink:0}
.bl-form-ref:hover .bl-form-ref-label{color:var(--accent)}

/* internal_ref */
.bl-internal-ref{display:flex;align-items:center;gap:10px;border:1px solid var(--rule);background:var(--bg-paper);border-radius:3px;padding:10px 14px;text-decoration:none;color:inherit;transition:all .15s}
.bl-internal-ref:hover{border-color:var(--accent);background:var(--bg-raised)}
.bl-internal-tipo{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-muted);background:var(--bg-sink);padding:2px 8px;border-radius:2px;flex-shrink:0;font-weight:500}
.bl-internal-label{flex:1;color:var(--ink);font-size:14px;line-height:1.4}
.bl-internal-ref:hover .bl-internal-label{color:var(--accent)}

/* clinical_note */
.bl-clinical-note{border:1px solid var(--rule);background:var(--bg-paper);border-radius:3px;border-left:3px solid var(--success)}
.bl-cn-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--rule-soft);background:var(--bg-sink)}
.bl-cn-title{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--success);font-weight:600}
.bl-cn-body{padding:14px;font-family:var(--serif);font-size:14px;line-height:1.6;color:var(--ink-soft);white-space:pre-wrap;font-style:italic}

/* unknown (fallback) */
.bl-unknown{padding:10px 14px;border:1px dashed var(--danger);background:var(--danger-soft);color:var(--danger);font-size:13px;border-radius:2px}

/* ============================ EDITOR A BLOCCHI (Fase 2) ============================
   Stile gentile, ispirato Notion. No gergo tecnico visibile, bottoni solo al hover. */
.bk-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.bk-empty{padding:24px;text-align:center;color:var(--ink-muted);font-style:italic;background:var(--bg-sink);border-radius:4px;border:1px dashed var(--rule)}

/* Blocco singolo */
.bk-item{background:var(--bg-paper);border:1px solid var(--rule);border-radius:4px;transition:border-color .15s,box-shadow .15s}
.bk-item:hover{border-color:var(--rule-strong)}
.bk-item:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

.bk-item-head{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--rule-soft);background:var(--bg-sink);border-radius:4px 4px 0 0}
.bk-item-icon{display:inline-flex;color:var(--ink-muted);flex-shrink:0}
.bk-item-type{font-size:12px;color:var(--ink-soft);font-weight:500;flex:1}
.bk-item-actions{display:flex;gap:2px;opacity:0;transition:opacity .15s}
.bk-item:hover .bk-item-actions,.bk-item:focus-within .bk-item-actions{opacity:1}

.bk-mini-btn{background:none;border:1px solid transparent;color:var(--ink-muted);font-size:13px;padding:3px 8px;border-radius:2px;cursor:pointer;transition:all .12s;font-family:var(--sans)}
.bk-mini-btn:hover{background:var(--bg-raised);color:var(--ink);border-color:var(--rule)}
.bk-mini-btn-danger:hover{background:var(--danger-soft);color:var(--danger);border-color:var(--danger)}

.bk-item-body{padding:12px 14px;display:flex;flex-direction:column;gap:10px}

/* Campi */
.bk-field{display:flex;flex-direction:column;gap:4px}
.bk-field-label{font-size:11px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;color:var(--ink-muted);font-weight:500}
.bk-field-hint{font-size:11px;color:var(--ink-muted);font-style:italic;margin-top:2px}
.bk-input,.bk-textarea,.bk-select{font-family:inherit;font-size:14px;padding:7px 10px;border:1px solid var(--rule);border-radius:2px;background:var(--bg-raised);color:var(--ink);width:100%;transition:border-color .12s,box-shadow .12s}
.bk-input:focus,.bk-textarea:focus,.bk-select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.bk-textarea{resize:vertical;line-height:1.5;min-height:40px;font-family:var(--serif)}
.bk-string-list{font-family:var(--sans);font-size:13px}

/* Table editor inline */
.bk-table-editor .bk-table-wrap{overflow-x:auto;border:1px solid var(--rule);border-radius:2px;background:var(--bg-raised)}
.bk-table-editor table{width:100%;border-collapse:collapse;font-size:13px}
.bk-table-editor th,.bk-table-editor td{padding:2px;border:1px solid var(--rule-soft);vertical-align:top}
.bk-table-editor th{background:var(--bg-sink)}
.bk-table-editor .bk-input{border:none;background:transparent;padding:6px 8px;font-size:13px;min-width:80px}
.bk-table-editor .bk-input:focus{background:var(--bg-raised);box-shadow:inset 0 0 0 2px var(--accent)}
.bk-table-editor .bk-th{font-weight:500;color:var(--ink)}
.bk-table-editor .bk-row-actions{background:var(--bg-sink);width:40px;text-align:center}
.bk-table-editor .bk-col-actions-head{width:40px;background:var(--bg-sink)}
.bk-table-actions{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}

/* Codici editor */
.bk-codici-editor .bk-codici-list{display:flex;flex-direction:column;gap:4px;margin-bottom:6px}
.bk-codice-row{display:grid;grid-template-columns:120px 1fr auto;gap:6px;align-items:center}
.bk-codice-val{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.03em}

/* Menu "aggiungi blocco" */
.bk-add-menu{background:var(--bg-sink);border:1px solid var(--rule);border-radius:4px;overflow:hidden}
.bk-add-summary{padding:12px 14px;cursor:pointer;color:var(--accent);font-weight:500;font-size:14px;list-style:none;user-select:none;transition:background .12s}
.bk-add-summary:hover{background:var(--bg-raised)}
.bk-add-summary::-webkit-details-marker{display:none}
.bk-add-menu[open] .bk-add-summary{border-bottom:1px solid var(--rule-soft)}
.bk-add-options{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px;padding:10px}
.bk-add-option{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-paper);border:1px solid var(--rule);border-radius:3px;cursor:pointer;text-align:left;font-family:inherit;color:inherit;transition:all .12s}
.bk-add-option:hover{border-color:var(--accent);background:var(--bg-raised)}
.bk-add-icon{color:var(--accent);flex-shrink:0;display:inline-flex}
.bk-add-label{display:flex;flex-direction:column;gap:2px;line-height:1.3;min-width:0}
.bk-add-label strong{font-size:13px;font-weight:500;color:var(--ink)}
.bk-add-desc{font-size:11px;color:var(--ink-muted);line-height:1.4}

/* Mobile adjustments */
@media (max-width:640px){
  .bk-add-options{grid-template-columns:1fr}
  .bk-codice-row{grid-template-columns:1fr 1fr auto}
  .bk-codice-val{grid-column:1;grid-row:1}
}

.bk-item-unknown{border-color:var(--danger);background:var(--danger-soft)}

.nav-sub{margin-left:12px;padding-left:12px;border-left:1px solid var(--rule-soft)}
.nav-sub .nav-item{font-size:13px;padding:5px 10px}
.nav-group-expandable{cursor:pointer}
.nav-caret{font-size:10px;color:var(--ink-faint);transition:transform .15s;margin-left:auto}
.nav-group-expandable.expanded .nav-caret{transform:rotate(90deg)}

/* Sidebar subnav (contextual) */
.sidebar-subnav{padding-top:4px;border-top:1px dashed var(--rule-soft);margin-top:4px}
.nav-item-sub{font-size:13px;padding-left:16px;position:relative}
.nav-item-sub::before{content:'';position:absolute;left:6px;top:50%;width:4px;height:4px;background:var(--rule-strong);border-radius:50%;transform:translateY(-50%)}
.nav-item-sub.active{background:var(--accent-soft);color:var(--accent);font-weight:500}
.nav-item-sub.active::before{background:var(--accent)}

/* Categoria collapsible blocks in main panel */
.categoria-block{margin-bottom:14px;border:1px solid var(--rule);border-radius:2px;background:var(--bg-paper);overflow:hidden;transition:border-color .15s}
.categoria-block[open]{border-color:var(--rule-strong);background:var(--bg-raised)}
.categoria-block:hover{border-color:var(--rule-strong)}
.categoria-summary{font-family:var(--serif);font-size:20px;font-weight:500;letter-spacing:-.01em;color:var(--ink);padding:18px 24px;cursor:pointer;list-style:none;display:flex;align-items:center;gap:16px;transition:background .12s;background:linear-gradient(to bottom,var(--bg-paper),var(--bg-sink))}
.categoria-summary::-webkit-details-marker{display:none}
.categoria-summary::before{content:'+';font-family:var(--mono);font-size:20px;font-weight:400;color:var(--ink-muted);width:16px;text-align:center;transition:transform .18s ease;flex-shrink:0}
.categoria-block[open] .categoria-summary::before{content:'−';color:var(--ink)}
.categoria-summary:hover{background:linear-gradient(to bottom,var(--bg-raised),var(--bg-sink))}
.categoria-title{flex:1}
.categoria-count{font-family:var(--mono);font-size:12px;font-weight:400;color:var(--ink-muted);padding:4px 10px;background:var(--bg-sink);border-radius:2px;letter-spacing:.04em}
.categoria-block[open] .categoria-count{background:var(--bg-paper);border:1px solid var(--rule)}
.categoria-content{padding:20px 24px 24px;border-top:1px solid var(--rule-soft)}

/* Sottocategoria block inside a categoria */
.sottocategoria-block{margin-bottom:28px}
.sottocategoria-block:last-child{margin-bottom:0}
.sottocategoria-title{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--rule-soft);cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:color .12s}
.sottocategoria-title:hover{color:var(--ink)}
.sottocategoria-count{font-size:10px;color:var(--ink-faint)}

/* Standalone sottocategoria (when viewing a single category page) */
.sottocategoria-standalone{margin-bottom:10px}
.sottocategoria-standalone .categoria-summary{font-size:17px;padding:14px 20px}
.sottocategoria-standalone .categoria-content{padding:16px 20px 20px}
</style>

<script>
/* ============================ CONFIG ============================ */
const CONFIG = {
  REPO_OWNER: 'raffaele15',
  REPO_NAME: 'CollinettaAI',            // codice (non scrivibile da app)
  DATA_REPO_NAME: 'CollinettaAI-data',  // contenuti cliniche / preferenze / cestino
  AUTH_REPO_NAME: 'CollinettaAI-auth',  // data/encrypted-tokens.json
  BRANCH: 'main',
  LOCK_DURATION_MS: 30 * 60 * 1000,
  LOCK_RENEW_MS: 25 * 60 * 1000,
  API_BASE: 'https://api.github.com'
};

/* ============================ BOOTSTRAP PAT (PAT-1) ============================
   Read-only PAT frammentato per accedere al repo privato CollinettaAI-auth.
   Rigenera e sostituisci i frammenti se ruoti il token. */
const _b1 = 'github_pat_1';
const _b2 = '1AKSFWIQ0rA';
const _b3 = 'zzEWQT2eBw_gd';
const _b4 = 'fmyokfIGfG';
const _b5 = 'MRsppaoDEE';
const _b6 = 'z86UUxo6Xc';
const _b7 = 'qbFwoeEEQ6cY';
const _b8 = 'VBLW26SUkBHLrgG';
const BOOTSTRAP_PAT = _b1 + _b2 + _b3 + _b4 + _b5 + _b6 + _b7 + _b8;

/* ============================ UTILITIES ============================ */
const $ = (id) => document.getElementById(id);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function timeAgo(iso) {
  if (!iso) return '—';
  const d = new Date(iso); const now = new Date(); const diff = (now - d) / 1000;
  if (diff < 60) return 'pochi secondi fa';
  if (diff < 3600) return `${Math.floor(diff/60)} minuti fa`;
  if (diff < 86400) return `${Math.floor(diff/3600)} ore fa`;
  if (diff < 604800) return `${Math.floor(diff/86400)} giorni fa`;
  return d.toLocaleDateString('it-IT', { day: 'numeric', month: 'short', year: 'numeric' });
}

function nowIso() { return new Date().toISOString(); }

// Navigazione: usa la history del browser come unica fonte di verità.
// Tracciamo solo la posizione corrente per sapere se i pulsanti back/forward devono
// essere abilitati. Compatibile con PWA installata (history.back/forward funzionano
// anche in standalone mode su iOS/Android).
let _historyPos = 0;       // posizione corrente nella history del browser
let _historyMax = 0;       // entry massima raggiunta (per sapere se "forward" è disponibile)

// === GUARDIA BACK (anti-uscita accidentale) ===
// Quando l'utente è in un editor file o sulla home in PWA standalone, intercettiamo
// il primo "back" inserendo un'entry "guardia" nella history. Il secondo back entro
// 2 secondi lascia procedere; oltre, riarmiamo la guardia.
const BACK_GUARD_TIMEOUT_MS = 2000;
let _backGuardArmed = false;     // c'è una guardia attiva nella history corrente?
let _backGuardLastBack = 0;      // timestamp dell'ultima pressione back consumata
let _backGuardSilent = false;    // se true, niente toast (caso home PWA)

function isPwaStandalone() {
  // Detection: app installata e aperta in modalità standalone (icona home)
  return window.matchMedia && window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true; // iOS Safari
}

function shouldGuardBack() {
  // Cattura editor file aperto (qualsiasi tipo): protezione dall'uscita accidentale
  if (state.editingContext) return { active: true, silent: false };
  // Cattura home in PWA: doppio tasto back per uscire dall'app
  const onHome = (state.currentView === 'home' || !state.currentView);
  if (onHome && isPwaStandalone()) return { active: true, silent: true };
  return { active: false, silent: false };
}

function armBackGuard(silent) {
  if (_backGuardArmed) return;
  // Aggiungo entry "guardia" con stesso URL corrente: l'utente non vede flicker
  try {
    window.history.pushState({ guard: true, pos: _historyPos }, '', window.location.href);
    _backGuardArmed = true;
    _backGuardSilent = !!silent;
  } catch {}
}

function disarmBackGuard() {
  _backGuardArmed = false;
  _backGuardSilent = false;
}

function _handleGuardConsumed() {
  // popstate ha consumato la guardia. Decidi se: (a) lasciar passare, (b) riarmare.
  const now = Date.now();
  // "within" è true SOLO se c'è stata una pressione precedente recente.
  // Se _backGuardLastBack è 0 (mai consumata prima) trattiamo questo come prima pressione.
  const within = _backGuardLastBack > 0 && (now - _backGuardLastBack) < BACK_GUARD_TIMEOUT_MS;
  _backGuardLastBack = now;
  const ctx = shouldGuardBack();

  if (within) {
    // Secondo back entro 2s: lascia che il browser processi normalmente.
    // Reset del timestamp così la prossima sessione di guardia riparte pulita.
    _backGuardLastBack = 0;
    disarmBackGuard();
    return false; // false = non intercetta, lascia procedere il routing normale
  }

  // Prima pressione back (o oltre 2s): riarmiamo la guardia e mostriamo toast (se non silent).
  if (ctx.active) {
    if (!ctx.silent && !_backGuardSilent && state.editingContext) {
      toast('Premi di nuovo "indietro" per uscire dall\'editor', 'info', BACK_GUARD_TIMEOUT_MS);
    }
    armBackGuard(ctx.silent);
    return true; // true = intercettato, popstate non deve navigare
  }
  // Non più in zona protetta: lascia procedere
  _backGuardLastBack = 0;
  disarmBackGuard();
  return false;
}

function _onHistoryPush() {
  // Chiamato dopo ogni pushState fatto da urlRouter (nuova navigazione)
  _historyPos++;
  _historyMax = _historyPos;
  // Una nuova navigazione invalida la guardia (l'utente è tornato attivo)
  disarmBackGuard();
  updateNavHistoryButtons();
  // Se atterriamo in zona protetta, arma subito la guardia
  // (es. apri un editor → la prima pressione back deve già essere intercettata)
  const ctx = shouldGuardBack();
  if (ctx.active) armBackGuard(ctx.silent);
}
function _onHistoryPop(state) {
  // Chiamato da popstate. Lo state contiene { pos } messo in pushState.
  if (state && typeof state.pos === 'number') {
    _historyPos = state.pos;
  }
  updateNavHistoryButtons();
}
function goBack() {
  if (_historyPos <= 0) return;
  // Usa la history del browser. popstate aggiornerà _historyPos e routerà la pagina.
  window.history.back();
}
function goForward() {
  if (_historyPos >= _historyMax) return;
  window.history.forward();
}
function updateNavHistoryButtons() {
  const back = document.getElementById('btn-nav-back');
  const fwd = document.getElementById('btn-nav-forward');
  if (back) back.disabled = _historyPos <= 0;
  if (fwd) fwd.disabled = _historyPos >= _historyMax;
}

// Standardized breadcrumb: ← Level1 › Level2 › Level3
// segments: [{label, route, params?}]
function buildBreadcrumb(segments) {
  if (!segments || segments.length === 0) return '';
  // Rimuovo il segmento "Home" iniziale: il logo in topbar già torna a home,
  // quindi il breadcrumb "Home › X" è ridondante. Mostro solo i segmenti intermedi.
  const filtered = segments.filter((s, i) => !(i === 0 && s.label === 'Home' && s.route === 'home'));
  if (filtered.length === 0) return '';
  const parts = filtered.map((s) => {
    const params = s.params ? JSON.stringify(s.params).replace(/"/g, '&quot;') : '{}';
    return `<span class="bc-segment" onclick="navigate('${escapeJs(s.route)}', ${params})">${escapeHtml(s.label)}</span>`;
  });
  return parts.join(' <span class="bc-sep">›</span> ');
}

/* ============================ CHIPS MULTI-SELECT ============================ */
// Component: type to filter existing values, click to add as chip, type new + Enter to create.
// State stored on the container element via dataset.values (JSON array)

function renderChipsField(opts) {
  // opts: { id, values:[], suggestions:[{id,label}], placeholder, allowNew:true }
  const valuesAttr = JSON.stringify(opts.values || []).replace(/"/g, '&quot;');
  const initialChips = (opts.values || []).map(v => {
    const sugg = (opts.suggestions || []).find(s => s.id === v);
    const label = sugg ? sugg.label : v;
    return `<span class="chip" data-value="${escapeHtml(v)}">
      <span class="chip-label">${escapeHtml(label)}</span>
      <button type="button" class="chip-remove" onclick="event.stopPropagation();chipsRemove('${escapeJs(opts.id)}','${escapeJs(v)}')" aria-label="Rimuovi">×</button>
    </span>`;
  }).join('');

  return `
    <div class="chips-wrap" id="${opts.id}" data-values="${valuesAttr}" data-allow-new="${opts.allowNew !== false ? '1' : '0'}">
      <div class="chips-list">${initialChips}<input type="text" class="chips-input" id="${opts.id}-input" placeholder="${escapeHtml(opts.placeholder || 'aggiungi…')}" autocomplete="off"></div>
      <div class="chips-suggest" id="${opts.id}-suggest"></div>
    </div>`;
}

function chipsInit(id, suggestions) {
  const container = document.getElementById(id);
  if (!container) return;
  const input = document.getElementById(id + '-input');
  const suggestBox = document.getElementById(id + '-suggest');
  // Store suggestions on the container for later
  container._suggestions = suggestions || [];

  function getValues() { return JSON.parse(container.dataset.values || '[]'); }
  function setValues(arr) {
    container.dataset.values = JSON.stringify(arr);
    if (state.editingContext) state.editingContext.isDirty = true;
  }

  function showSuggestions() {
    const q = input.value.trim().toLowerCase();
    const taken = new Set(getValues());
    const allowNew = container.dataset.allowNew === '1';
    const matches = container._suggestions
      .filter(s => !taken.has(s.id))
      .filter(s => !q || s.label.toLowerCase().includes(q) || s.id.toLowerCase().includes(q))
      .slice(0, 8);
    if (matches.length === 0 && (!q || !allowNew)) {
      suggestBox.innerHTML = q && !allowNew ? '<div class="chip-suggest-empty">Nessuna corrispondenza</div>' : '';
      suggestBox.classList.remove('open');
      return;
    }
    let html = matches.map(m => `<div class="chip-suggest-item" onmousedown="event.preventDefault();chipsAdd('${escapeJs(id)}','${escapeJs(m.id)}','${escapeJs(m.label)}')">
      <span>${escapeHtml(m.label)}</span>
      <span class="chip-suggest-id">${escapeHtml(m.id)}</span>
    </div>`).join('');
    if (q && allowNew && !container._suggestions.find(s => s.id === q || s.label.toLowerCase() === q.toLowerCase())) {
      // Allow creating a new value (sanitized to slug)
      const newId = q.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9-]+/g,'-').replace(/^-+|-+$/g,'');
      if (newId) {
        html += `<div class="chip-suggest-item chip-suggest-new" onmousedown="event.preventDefault();chipsAdd('${escapeJs(id)}','${escapeJs(newId)}','${escapeJs(q)}')">
          <span>+ Crea "${escapeHtml(q)}"</span>
          <span class="chip-suggest-id">${escapeHtml(newId)}</span>
        </div>`;
      }
    }
    suggestBox.innerHTML = html;
    suggestBox.classList.add('open');
  }

  function hideSuggestions() {
    setTimeout(() => suggestBox.classList.remove('open'), 150);
  }

  input.addEventListener('focus', showSuggestions);
  input.addEventListener('input', showSuggestions);
  input.addEventListener('blur', hideSuggestions);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const q = input.value.trim();
      if (!q) return;
      // Try exact match first, otherwise create new (if allowed)
      const exact = container._suggestions.find(s => s.label.toLowerCase() === q.toLowerCase() || s.id.toLowerCase() === q.toLowerCase());
      if (exact) chipsAdd(id, exact.id, exact.label);
      else if (container.dataset.allowNew === '1') {
        const newId = q.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9-]+/g,'-').replace(/^-+|-+$/g,'');
        if (newId) chipsAdd(id, newId, q);
      }
    } else if (e.key === 'Backspace' && input.value === '') {
      // Remove last chip
      const values = getValues();
      if (values.length > 0) chipsRemove(id, values[values.length - 1]);
    } else if (e.key === 'Escape') {
      input.value = '';
      hideSuggestions();
    }
  });
}

function chipsAdd(id, value, label) {
  const container = document.getElementById(id);
  if (!container) return;
  const values = JSON.parse(container.dataset.values || '[]');
  if (values.includes(value)) return;
  values.push(value);
  container.dataset.values = JSON.stringify(values);
  // Re-render chips
  const list = container.querySelector('.chips-list');
  const input = document.getElementById(id + '-input');
  const chip = document.createElement('span');
  chip.className = 'chip';
  chip.dataset.value = value;
  chip.innerHTML = `<span class="chip-label">${escapeHtml(label || value)}</span>
    <button type="button" class="chip-remove" onclick="event.stopPropagation();chipsRemove('${escapeJs(id)}','${escapeJs(value)}')" aria-label="Rimuovi">×</button>`;
  list.insertBefore(chip, input);
  input.value = '';
  input.focus();
  document.getElementById(id + '-suggest').innerHTML = '';
  document.getElementById(id + '-suggest').classList.remove('open');
  if (state.editingContext) state.editingContext.isDirty = true;
}

function chipsRemove(id, value) {
  const container = document.getElementById(id);
  if (!container) return;
  const values = JSON.parse(container.dataset.values || '[]').filter(v => v !== value);
  container.dataset.values = JSON.stringify(values);
  const chip = container.querySelector(`.chip[data-value="${CSS.escape(value)}"]`);
  if (chip) chip.remove();
  if (state.editingContext) state.editingContext.isDirty = true;
}

function chipsGet(id) {
  const container = document.getElementById(id);
  if (!container) return [];
  return JSON.parse(container.dataset.values || '[]');
}

// Helper: build suggestions for an existing free-form sub-categoria input
function buildSottocategorieForCategoria(cat) {
  const subs = new Set();
  state.index.procedure.forEach(p => {
    if (p.categoria === cat && p.sottocategoria) subs.add(p.sottocategoria);
  });
  return [...subs].sort().map(s => ({ id: s, label: SOTTO_LABELS[s] || s }));
}

// Helper: collect all unique tags across procedure + clinica
function collectAllTags() {
  const tags = new Set();
  state.index.procedure.forEach(p => (p.tag || []).forEach(t => tags.add(t)));
  (state.index.clinica || []).forEach(c => (c.tag || []).forEach(t => tags.add(t)));
  return [...tags].sort().map(t => ({ id: t, label: t }));
}

function collectAllTermini() {
  const terms = new Set();
  state.index.procedure.forEach(p => (p.termini_equivalenti || []).forEach(t => terms.add(t)));
  (state.index.clinica || []).forEach(c => (c.termini_equivalenti || []).forEach(t => terms.add(t)));
  return [...terms].sort().map(t => ({ id: t, label: t }));
}

function collectAllContattiSuggestions() {
  const out = [];
  getVisibleNumeriGroups().forEach(g => {
    (g.contatti || []).forEach(c => {
      if (c.id) out.push({ id: c.id, label: `${c.etichetta} · ${g.nome}` });
    });
  });
  return out.sort((a, b) => a.label.localeCompare(b.label));
}

/* ============================ USER PREFERENCES ============================ */
// Per-user home pins stored in content/user-prefs/{username}.yml
// pins: array of {type, ...keys}
//   {type:'procedura', slug}
//   {type:'clinica', slug}
//   {type:'modulo', slug}
//   {type:'tabella', slug}
//   {type:'capitolo', id}
//   {type:'sottocategoria', cat, sub}     // procedure subcategory
//   {type:'clinica-sub', sub}             // clinica subcategory
//   {type:'categoria', cat}               // procedure macro category
//   {type:'contatto', id}
//   {type:'gruppo', id}

const userPrefs = {
  async load() {
    if (!state.session || !state.session.username) return;
    const path = `content/user-prefs/${state.session.username}.yml`;
    state.userPrefsPath = path;
    try {
      const file = await gh.getFile(path);
      if (!file) {
        state.userPrefs = { pins: [], home_numeri: [], pin_order: {}, device_prefs: {}, calendar_filters: {}, _sha: null };
        return;
      }
      const parsed = jsyaml.load(file.content) || {};
      // Migrazione one-shot: vecchio schema aveva tema/font_size al top level.
      // Se trovo i vecchi campi e device_prefs è assente, sposto i valori nella categoria corrente.
      const cat = getDeviceCategory();
      const devicePrefs = (parsed.device_prefs && typeof parsed.device_prefs === 'object') ? parsed.device_prefs : {};
      if ((parsed.tema || parsed.font_size) && !parsed.device_prefs) {
        devicePrefs[cat] = {
          tema: parsed.tema || null,
          font_size: parsed.font_size || null
        };
      }
      state.userPrefs = {
        pins: Array.isArray(parsed.pins) ? parsed.pins : [],
        home_numeri: Array.isArray(parsed.home_numeri) ? parsed.home_numeri : [],
        pin_order: (parsed.pin_order && typeof parsed.pin_order === 'object') ? parsed.pin_order : {},
        device_prefs: devicePrefs,
        calendar_filters: (parsed.calendar_filters && typeof parsed.calendar_filters === 'object') ? parsed.calendar_filters : {},
        _sha: file.sha
      };
      // Migrazione: i contatti pinnati nel vecchio sistema `pins` (type='contatto')
      // vanno spostati a home_numeri (sistema dedicato con drag&drop in home).
      // Solo migrazione in-memory: il salvataggio remoto avverrà alla prossima modifica.
      try {
        const pins = Array.isArray(state.userPrefs.pins) ? state.userPrefs.pins : [];
        const homeN = Array.isArray(state.userPrefs.home_numeri) ? state.userPrefs.home_numeri : [];
        const oldContactPins = pins.filter(p => p && p.type === 'contatto');
        if (oldContactPins.length) {
          const existing = new Set(homeN);
          for (const p of oldContactPins) {
            if (p && p.id && !existing.has(p.id)) homeN.push(p.id);
          }
          state.userPrefs.home_numeri = homeN;
          state.userPrefs.pins = pins.filter(p => !p || p.type !== 'contatto');
        }
      } catch (e) { console.warn('[userPrefs] migration skipped:', e); }
      // Applica subito tema e font dalla categoria di dispositivo corrente
      const myPrefs = state.userPrefs.device_prefs[cat] || {};
      if (myPrefs.tema) applyTheme(myPrefs.tema);
      if (myPrefs.font_size) applyFontSize(myPrefs.font_size);
    } catch (e) {
      console.warn('[userPrefs] load failed:', e);
      state.userPrefs = { pins: [], home_numeri: [], pin_order: {}, device_prefs: {}, calendar_filters: {}, _sha: null };
    }
  },

  // Debounced save: collects multiple toggles in 2 seconds
  scheduleSave() {
    if (!state.userPrefs) return;
    if (state.userPrefs._saveTimer) clearTimeout(state.userPrefs._saveTimer);
    state.userPrefs._pending = true;
    state.userPrefs._saveTimer = setTimeout(() => {
      userPrefs.persist().catch(e => console.error('[userPrefs] save failed', e));
    }, 2000);
  },

  async persist() {
    if (!state.userPrefs || !state.session) return;
    state.userPrefs._pending = false;
    const path = state.userPrefsPath;
    const data = {
      pins: state.userPrefs.pins,
      home_numeri: state.userPrefs.home_numeri || [],
      pin_order: state.userPrefs.pin_order || {},
      device_prefs: state.userPrefs.device_prefs || {},
      calendar_filters: state.userPrefs.calendar_filters || {},
      ultima_modifica: nowIso(),
      modificato_da: state.session.username
    };
    const content = `# Preferenze home personali per ${state.session.username}\n# Gestite dall'app, non modificare a mano\n\n` +
      jsyaml.dump(data, { lineWidth: 120, noRefs: true, sortKeys: false });
    try {
      const res = await gh.putFile(path, content, state.userPrefs._sha, `chore: preferenze home di ${state.session.username}`);
      state.userPrefs._sha = res.content.sha;
    } catch (e) {
      if (e.code === 'CONFLICT') {
        // Reload and retry once
        await userPrefs.load();
        const res2 = await gh.putFile(path, content, state.userPrefs._sha, `chore: preferenze home di ${state.session.username} (retry)`);
        state.userPrefs._sha = res2.content.sha;
      } else {
        throw e;
      }
    }
  },

  // Check if a pin exists
  has(pin) {
    if (!state.userPrefs) return false;
    return state.userPrefs.pins.some(p => userPrefs.pinEquals(p, pin));
  },

  pinEquals(a, b) {
    if (!a || !b || a.type !== b.type) return false;
    switch (a.type) {
      case 'procedura':
      case 'clinica':
      case 'modulo':
      case 'tabella':
        return a.slug === b.slug;
      case 'capitolo':
      case 'contatto':
      case 'gruppo':
        return a.id === b.id;
      case 'sottocategoria':
        return a.cat === b.cat && a.sub === b.sub;
      case 'clinica-sub':
        return a.sub === b.sub;
      case 'categoria':
        return a.cat === b.cat;
    }
    return false;
  },

  // Toggle: add if not present, remove if present. Returns new state (true=pinned).
  toggle(pin) {
    if (!state.userPrefs) return false;
    const idx = state.userPrefs.pins.findIndex(p => userPrefs.pinEquals(p, pin));
    let nowPinned;
    if (idx >= 0) {
      state.userPrefs.pins.splice(idx, 1);
      nowPinned = false;
    } else {
      state.userPrefs.pins.push(pin);
      nowPinned = true;
    }
    userPrefs.scheduleSave();
    // Visual feedback
    if (typeof toast === 'function') {
      toast(nowPinned ? 'Aggiunto in home' : 'Rimosso dalla home', 'info', 1500);
    }
    return nowPinned;
  },

  // --- Home numeri (lista indipendente di contatti pinnati per la home) ---
  hasHomeNumero(cid) {
    if (!state.userPrefs) return false;
    return (state.userPrefs.home_numeri || []).includes(cid);
  },
  toggleHomeNumero(cid) {
    if (!state.userPrefs) return false;
    if (!state.userPrefs.home_numeri) state.userPrefs.home_numeri = [];
    const idx = state.userPrefs.home_numeri.indexOf(cid);
    let added;
    if (idx >= 0) { state.userPrefs.home_numeri.splice(idx, 1); added = false; }
    else { state.userPrefs.home_numeri.push(cid); added = true; }
    userPrefs.scheduleSave();
    return added;
  },
  reorderHomeNumeri(newOrder) {
    if (!state.userPrefs) return;
    state.userPrefs.home_numeri = newOrder;
    userPrefs.scheduleSave();
  },

  // --- Rubrica preferiti: ordinamento per UOC + contatti dentro UOC ---
  // Struttura: pin_order = { _uoc: ['gid1','gid2',...], 'gid1': ['cid1','cid2',...] }
  getUocOrder() {
    return (state.userPrefs && state.userPrefs.pin_order && state.userPrefs.pin_order._uoc) || [];
  },
  getContactOrder(gid) {
    return (state.userPrefs && state.userPrefs.pin_order && state.userPrefs.pin_order[gid]) || [];
  },
  setUocOrder(order) {
    if (!state.userPrefs) return;
    if (!state.userPrefs.pin_order) state.userPrefs.pin_order = {};
    state.userPrefs.pin_order._uoc = order;
    userPrefs.scheduleSave();
  },
  setContactOrder(gid, order) {
    if (!state.userPrefs) return;
    if (!state.userPrefs.pin_order) state.userPrefs.pin_order = {};
    state.userPrefs.pin_order[gid] = order;
    userPrefs.scheduleSave();
  }
};

// Convenience global for HTML onclick handlers
function togglePin(type, ...args) {
  // I contatti usano il sistema home_numeri dedicato (lista ordinabile in home),
  // non il sistema pins generico. La stella ☆ sui contatti aggiunge/rimuove
  // dalla sezione "Contatti fissati" della home.
  if (type === 'contatto') {
    const cid = args[0];
    userPrefs.toggleHomeNumero(cid);
    if (state.currentView === 'home') renderHome();
    else {
      const isPinned = userPrefs.hasHomeNumero(cid);
      document.querySelectorAll(`[data-pin-key="contatto:${cid}"]`).forEach(btn => {
        btn.classList.toggle('pinned', isPinned);
        btn.innerHTML = isPinned ? '★' : '☆';
        btn.setAttribute('title', isPinned ? 'Rimuovi dalla home' : 'Aggiungi alla home');
      });
    }
    return;
  }
  let pin;
  switch (type) {
    case 'procedura':
    case 'clinica':
    case 'modulo':
    case 'tabella':
      pin = { type, slug: args[0] }; break;
    case 'capitolo':
    case 'gruppo':
      pin = { type, id: args[0] }; break;
    case 'sottocategoria':
      pin = { type, cat: args[0], sub: args[1] }; break;
    case 'clinica-sub':
      pin = { type, sub: args[0] }; break;
    case 'categoria':
      pin = { type, cat: args[0] }; break;
    default: return;
  }
  userPrefs.toggle(pin);
  // Re-render current view for updated star state, and home-tree if on home
  if (state.currentView === 'home') renderHome();
  else {
    // Re-render just the star buttons on the current view
    document.querySelectorAll(`[data-pin-key]`).forEach(btn => {
      const key = btn.dataset.pinKey;
      if (key === pinKey(pin)) {
        const isPinned = userPrefs.has(pin);
        btn.classList.toggle('pinned', isPinned);
        btn.innerHTML = isPinned ? '★' : '☆';
        btn.setAttribute('title', isPinned ? 'Rimuovi dalla home' : 'Aggiungi alla home');
      }
    });
  }
}

// Rimuove prefisso tipo "U.O.C." / "U.O.S.D." / "U.O.S." dal nome UOC
function stripPrefixNome(name) {
  return String(name || '').replace(/^(U\.?O\.?C\.?|U\.?O\.?S\.?D\.?|U\.?O\.?S\.?|S\.?S\.?D\.?|S\.?S\.?|U\.?O\.?)\s+/i, '').trim();
}

/** Ritorna la stringa luogo del contatto come 'Edificio Piano' (es. "Centro Gallucci 2° piano").
 *  Costruita dai due campi separati c.edificio + c.piano. Fallback a c.luogo per retrocompat
 *  con eventuali contatti non ancora migrati allo schema separato. */
function getLuogoContatto(c) {
  if (!c) return '';
  const e = (c.edificio || '').toString().trim();
  const p = (c.piano || '').toString().trim();
  if (e || p) return [e, p].filter(Boolean).join(' ');
  return (c.luogo || '').toString().trim();
}

/** Ritorna il nome ridotto della UOC, da usare nelle barre contesto compatte su mobile.
 *  Il valore è salvato nello YAML come campo `nome_ridotto` di ogni gruppo.
 *  Per UOC nuove o non ancora processate, fallback al nome senza prefisso (U.O.C., ecc.). */
function shortenUocName(group) {
  if (!group) return '';
  const custom = group.nome_ridotto && String(group.nome_ridotto).trim();
  if (custom) return custom;
  // Fallback minimale per UOC senza nome_ridotto: rimuovi solo il prefisso
  return stripPrefixNome(group.nome || '');
}

/** Etichetta leggibile di una sezione (bucket) — utilizzata nei layout collassati di ricerca. */
function bucketSezioneLabel(b) {

    return b.sede.nome || SEZIONE_TIPO_LABELS[b.sede.tipo] || (b.sede.tipo || '—').replace(/_/g, ' ');

function isPinned(type, id) {
  if (!userPrefs) return false;
  // I contatti usano il sistema home_numeri dedicato
  if (type === 'contatto') return userPrefs.hasHomeNumero(id);
  const pin = (type === 'gruppo' || type === 'capitolo')
    ? { type, id }
    : { type, slug: id };
  return userPrefs.has(pin);
}

function pinKey(pin) {
  switch (pin.type) {
    case 'procedura': case 'clinica': case 'modulo': case 'tabella':
      return `${pin.type}:${pin.slug}`;
    case 'capitolo': case 'contatto': case 'gruppo':
      return `${pin.type}:${pin.id}`;
    case 'sottocategoria': return `sottocategoria:${pin.cat}:${pin.sub}`;
    case 'clinica-sub': return `clinica-sub:${pin.sub}`;
    case 'categoria': return `categoria:${pin.cat}`;
  }
  return pin.type;
}

function renderPinButton(type, ...args) {
  // I contatti usano il sistema home_numeri dedicato (vedi togglePin)
  if (type === 'contatto') {
    const cid = args[0];
    const pinned = userPrefs.hasHomeNumero(cid);
    return `<button class="pin-star ${pinned ? 'pinned' : ''}" data-pin-key="contatto:${escapeHtml(cid)}" onclick="event.stopPropagation();togglePin('contatto','${escapeJs(cid)}')" title="${pinned ? 'Rimuovi dalla home' : 'Aggiungi alla home'}" aria-label="Fissa in home">${pinned ? '★' : '☆'}</button>`;
  }
  let pin;
  switch (type) {
    case 'procedura': case 'clinica': case 'modulo': case 'tabella':
      pin = { type, slug: args[0] }; break;
    case 'capitolo': case 'gruppo':
      pin = { type, id: args[0] }; break;
    case 'sottocategoria':
      pin = { type, cat: args[0], sub: args[1] }; break;
    case 'clinica-sub':
      pin = { type, sub: args[0] }; break;
    case 'categoria':
      pin = { type, cat: args[0] }; break;
    default: return '';
  }
  const pinned = userPrefs.has(pin);
  const argStrs = args.map(a => `'${escapeJs(a)}'`).join(',');
  return `<button class="pin-star ${pinned ? 'pinned' : ''}" data-pin-key="${escapeHtml(pinKey(pin))}" onclick="event.stopPropagation();togglePin('${type}',${argStrs})" title="${pinned ? 'Rimuovi dalla home' : 'Aggiungi alla home'}" aria-label="Fissa in home">${pinned ? '★' : '☆'}</button>`;
}

/* ============================ IMAGE HELPERS ============================ */

// Transform relative img/* paths in Markdown to absolute raw GitHub URLs
function transformMarkdownImages(md, filePath) {
  if (!md || !filePath) return md;
  // filePath like "content/procedure/bedside/rachicentesi.md"
  // Get parent dir: "content/procedure/bedside"
  const parentDir = filePath.replace(/\/[^/]+$/, '');
  const baseUrl = `https://raw.githubusercontent.com/${CONFIG.REPO_OWNER}/${CONFIG.DATA_REPO_NAME}/${CONFIG.BRANCH}/${parentDir}/`;
  // Match Markdown images: ![alt](path) where path doesn't start with http, /, or data:
  return md.replace(/(!\[[^\]]*\]\()(?!https?:|\/|data:)([^)]+)(\))/g, (match, prefix, path, suffix) => {
    return prefix + baseUrl + path + suffix;
  });
}

// Render Markdown with image path transformation, sanitize, and add lightbox-ready data attributes
function renderMarkdownWithImages(md, filePath) {
  if (!md) return '';
  const transformed = transformMarkdownImages(md, filePath);
  const html = DOMPurify.sanitize(marked.parse(transformed), { ADD_ATTR: ['onclick', 'data-src', 'data-alt'] });
  // Wrap each <img> tag with click handler attribute (post-sanitize for security)
  // Use a temporary container to manipulate HTML
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  tmp.querySelectorAll('img').forEach(img => {
    const src = img.getAttribute('src');
    const alt = img.getAttribute('alt') || '';
    img.setAttribute('data-src', src);
    img.setAttribute('data-alt', alt);
    img.setAttribute('loading', 'lazy');
    img.setAttribute('onclick', `openLightbox('${escapeJs(src)}', '${escapeJs(alt)}')`);
  });
  return tmp.innerHTML;
}

// Lightbox
function openLightbox(src, alt) {
  closeLightbox(); // ensure no duplicates
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.id = 'lightbox-overlay';
  lb.innerHTML = `
    <button class="lightbox-close" aria-label="Chiudi" onclick="event.stopPropagation();closeLightbox()">✕</button>
    <img class="lightbox-img" src="${escapeHtml(src)}" alt="${escapeHtml(alt || '')}">
    ${alt ? `<div class="lightbox-caption">${escapeHtml(alt)}</div>` : ''}
  `;
  lb.addEventListener('click', closeLightbox);
  lb.querySelector('img').addEventListener('click', e => e.stopPropagation());
  document.body.appendChild(lb);
  document.body.style.overflow = 'hidden';
  document.addEventListener('keydown', lightboxKeyHandler);
}

function closeLightbox() {
  const lb = document.getElementById('lightbox-overlay');
  if (lb) lb.remove();
  document.body.style.overflow = '';
  document.removeEventListener('keydown', lightboxKeyHandler);
}

function lightboxKeyHandler(e) {
  if (e.key === 'Escape') closeLightbox();
}

// Compress and upload an image to GitHub, return relative path for Markdown insert
async function compressAndUploadImage(file, currentFilePath) {
  if (!file.type.startsWith('image/')) throw new Error('Non è un\'immagine');

  const options = {
    maxSizeMB: 1.5,
    maxWidthOrHeight: 1920,
    useWebWorker: true,
    fileType: 'image/webp',
    initialQuality: 0.80
  };

  const compressed = await imageCompression(file, options);

  // Sanitize filename: lowercase, no spaces, no accents
  const baseName = file.name.replace(/\.[^.]+$/, '')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9-]+/g, '-')
    .replace(/^-+|-+$/g, '')
    .substring(0, 60);

  // Build target path: same dir as the current .md, in img/ subfolder
  const parentDir = currentFilePath.replace(/\/[^/]+$/, '');
  const fileName = `${baseName || 'image'}-${Date.now().toString(36)}.webp`;
  const targetPath = `${parentDir}/img/${fileName}`;

  // Read as base64
  const base64 = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const result = reader.result;
      const b64 = result.split(',')[1]; // strip "data:image/webp;base64,"
      resolve(b64);
    };
    reader.onerror = () => reject(new Error('Lettura file fallita'));
    reader.readAsDataURL(compressed);
  });

  // Upload via PUT to GitHub contents API (repo dati)
  const url = `${CONFIG.API_BASE}/repos/${CONFIG.REPO_OWNER}/${CONFIG.DATA_REPO_NAME}/contents/${encodeURIComponent(targetPath).replace(/%2F/g, '/')}`;
  const res = await fetch(url, {
    method: 'PUT',
    headers: {
      'Authorization': `token ${state.session.tokenData}`,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json',
      'X-GitHub-Api-Version': '2022-11-28'
    },
    body: JSON.stringify({
      message: `Carica immagine ${fileName} (by ${state.session.username})`,
      content: base64,
      branch: CONFIG.BRANCH
    })
  });

  if (!res.ok) {
    const errText = await res.text();
    throw new Error(`Upload fallito (HTTP ${res.status}): ${errText.substring(0, 200)}`);
  }

  return {
    fileName,
    relativePath: `img/${fileName}`,
    sizeBefore: file.size,
    sizeAfter: compressed.size
  };
}

// Wire a file input to upload + insert into the active Toast UI editor
function attachImageUploadHandler(inputId, statusId) {
  const input = document.getElementById(inputId);
  const status = document.getElementById(statusId);
  if (!input) return;
  input.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!state.editingContext || !state.editingContext.path) {
      toast('Salva prima la scheda per poter caricare immagini', 'warning');
      input.value = '';
      return;
    }
    if (status) status.textContent = 'Compressione...';
    try {
      const result = await compressAndUploadImage(file, state.editingContext.path);
      const sizeKb = Math.round(result.sizeAfter / 1024);
      const savings = Math.round((1 - result.sizeAfter / result.sizeBefore) * 100);
      if (status) status.textContent = `${result.fileName} · ${sizeKb}KB (-${savings}%)`;

      // Ask for alt/caption text
      const alt = prompt('Didascalia / testo alternativo (opzionale):', file.name.replace(/\.[^.]+$/, ''));
      const altText = alt || '';
      const markdownSnippet = `![${altText}](${result.relativePath})`;

      // Insert into the Toast UI editor at cursor
      if (state.editorInstance) {
        try {
          state.editorInstance.insertText(markdownSnippet);
        } catch (err) {
          // Fallback: append at end
          const current = state.editorInstance.getMarkdown();
          state.editorInstance.setMarkdown(current + '\n\n' + markdownSnippet + '\n');
        }
        state.editingContext.isDirty = true;
      }
      toast(`Immagine caricata (${sizeKb}KB)`, 'success', 3000);
      setTimeout(() => { if (status) status.textContent = ''; }, 5000);
    } catch (err) {
      console.error('Image upload error', err);
      toast('Errore upload: ' + err.message, 'error', 5000);
      if (status) status.textContent = 'Errore';
    } finally {
      input.value = '';
    }
  });
}

function toast(message, level = 'info', duration = 3500) {
  const stack = $('toast-stack');
  const el = document.createElement('div');
  el.className = `toast ${level}`;
  el.textContent = message;
  stack.appendChild(el);
  setTimeout(() => { el.classList.add('leaving'); setTimeout(() => el.remove(), 220); }, duration);
}

/* ============================ CONDIVISIONE LINK ============================
   shareLink usa Web Share API quando disponibile (tipicamente su mobile),
   altrimenti copia il link in clipboard con feedback toast. Esperienza nativa
   su iOS/Android, comportamento standard "copy link" su desktop. */
async function shareLink(url, title) {
  // Web Share API: tipicamente disponibile su mobile (iOS Safari, Chrome Android)
  // e su Edge/Chrome desktop in alcune versioni. È la via canonica.
  if (navigator.share) {
    try {
      await navigator.share({ title: title || 'CollinettaAI', url });
      return;
    } catch (err) {
      // L'utente potrebbe aver chiuso il foglio di condivisione: non è un errore
      // Se invece è un fallimento reale, ricado sul clipboard
      if (err && err.name === 'AbortError') return;
    }
  }
  // Fallback: copia in clipboard (desktop)
  try {
    await navigator.clipboard.writeText(url);
    toast('Link copiato', 'success', 1800);
  } catch {
    // Fallback estremo: prompt visibile per copia manuale
    try { prompt('Copia il link:', url); } catch {}
  }
}

/* Gestisce il click su una riga contatto in vista rubrica.
   Comportamento contesto-sensibile:
   - Se siamo già nella UOC di quel contatto E nella sezione corrispondente è già visibile,
     mostra un mini-menu con azione "Condividi" (per evitare scroll inutile).
   - Altrimenti, naviga alla UOC con scroll al contatto (comportamento standard). */
function handleContattoRowClick(contattoId, evt) {
  if (evt && (evt.target.closest('button,a,input,.kind-selector,.kind-chip,.kind-chip-reset'))) return;
  // Determina lo stato corrente: siamo dentro la stessa UOC del contatto?
  const params = state.currentParams || {};
  const currentFilter = params.filter;
  // Trova il gruppo proprietario del contatto
  let ownerGroup = null;
  for (const sourceId of ['aopd','osa','iov']) {
    const data = (typeof getNumeriDataForSource === 'function') ? getNumeriDataForSource(sourceId) : null;
    if (!data) continue;
    for (const g of (data.gruppi || [])) {
      if ((g.contatti || []).some(x => x.id === contattoId)) { ownerGroup = g; break; }
    }
    if (ownerGroup) break;
  }
  if (!ownerGroup) {
    // Fallback: comportamento standard
    navigate('numeri', { filter: contattoId });
    return;
  }
  // Sono già dentro questa UOC?
  const alreadyInsideUoc = (currentFilter === ownerGroup.id) || (currentFilter === contattoId);
  if (alreadyInsideUoc && state.currentView === 'numeri') {
    // Mostro mini-menu di azioni invece di re-renderare
    showContattoActionMenu(contattoId, evt);
    return;
  }
  // Comportamento standard: naviga alla UOC con scroll/expand sezione
  navigate('numeri', { filter: contattoId });
}

/* Mini menu di azioni che appare al click su un contatto già nella sua UOC.
   Posizione: sopra la riga cliccata, allineato alla destra del nome.
   Azioni: Condividi link al contatto, Pinna alla home. */
function showContattoActionMenu(contattoId, evt) {
  // Rimuovi un menu già aperto
  document.querySelectorAll('.contatto-action-menu').forEach(m => m.remove());
  // Trova la riga del contatto (target dello stesso click o ricerca DOM)
  let row = evt && evt.currentTarget && evt.currentTarget.closest ? evt.currentTarget.closest('.numero-row') : null;
  if (!row) {
    row = document.querySelector(`.numero-row[data-contatto-id="${CSS.escape(contattoId)}"]`);
  }
  if (!row) return;
  // Costruisco il menu (passo solo l'id, il testo viene ricostruito al click per evitare quoting issues)
  const menu = document.createElement('div');
  menu.className = 'contatto-action-menu';
  menu.innerHTML = `
    <button class="contatto-action-btn" onclick="event.stopPropagation();shareContattoById('${escapeJs(contattoId)}');document.querySelectorAll('.contatto-action-menu').forEach(m=>m.remove());">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Condividi
    </button>`;
  // Posiziono il menu come overlay vicino alla riga
  row.style.position = 'relative';
  row.appendChild(menu);
  // Close on click outside
  setTimeout(() => {
    const closeFn = (e) => {
      if (!menu.contains(e.target)) {
        menu.remove();
        document.removeEventListener('click', closeFn, true);
      }
    };
    document.addEventListener('click', closeFn, true);
  }, 0);
}

/* Condivide un contatto via Web Share API (mobile) o copia negli appunti (desktop fallback).
   Costruisce il testo come "Etichetta\nint. <numero>\npers. <cell>...". */
async function shareContattoById(contattoId) {
  // Trova il contatto in tutte le fonti dati
  let contatto = null;
  for (const sourceId of ['aopd','osa','iov']) {
    const data = (typeof getNumeriDataForSource === 'function') ? getNumeriDataForSource(sourceId) : null;
    if (!data) continue;
    for (const g of (data.gruppi || [])) {
      const c = (g.contatti || []).find(x => x.id === contattoId);
      if (c) { contatto = c; break; }
    }
    if (contatto) break;
  }
  if (!contatto) {
    if (typeof toast === 'function') toast('Contatto non trovato', 'error');
    return;
  }
  const etichetta = contatto.etichetta || 'Contatto';
  // Costruisci testo: etichetta + tutti i numeri disponibili, uno per riga
  const lines = [];
  (contatto.numeri || []).forEach(n => lines.push(`int. ${n}`));
  if (contatto.breve) {
    const brevi = Array.isArray(contatto.breve) ? contatto.breve : [contatto.breve];
    brevi.forEach(b => lines.push(`breve ${b}`));
  }
  if (contatto.cellulare_aziendale) {
    const cells = Array.isArray(contatto.cellulare_aziendale) ? contatto.cellulare_aziendale : [contatto.cellulare_aziendale];
    cells.forEach(c => lines.push(c));
  }
  if (contatto.cellulare_personale) {
    const cells = Array.isArray(contatto.cellulare_personale) ? contatto.cellulare_personale : [contatto.cellulare_personale];
    cells.forEach(c => lines.push(`pers. ${c}`));
  }
  const text = lines.length ? `${etichetta}\n${lines.join('\n')}` : etichetta;
  // Web Share API se disponibile (mobile), altrimenti clipboard
  if (navigator.share) {
    try {
      await navigator.share({ text });
      return;
    } catch (e) {
      if (e && e.name === 'AbortError') return;
    }
  }
  try {
    await navigator.clipboard.writeText(text);
    if (typeof toast === 'function') toast('Copiato negli appunti', 'success');
  } catch (e) {
    if (typeof toast === 'function') toast('Errore: ' + e.message, 'error');
  }
}

/* Costruisce un URL completo a partire da route+params (per condivisione esterna).
   A differenza di urlRouter.buildHash, restituisce URL assoluto includendo origin+pathname. */
function buildShareUrl(route, params, blockId) {
  if (typeof urlRouter === 'undefined') return window.location.href;
  let hash = urlRouter.buildHash(route, params);
  if (blockId) {
    // blockId è del tipo "bl-rachicentesi-5" → estraggo il numero per il formato URL
    const m = blockId.match(/^bl-[a-z0-9-]+-(\d+)$/i);
    if (m) hash += '/bl-' + m[1];
  }
  // location.origin + location.pathname taglia eventuali ?query e #hash residui
  return window.location.origin + window.location.pathname + hash;
}

/* ============================ CRYPTO ============================ */
function base64ToBuffer(base64) {
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

async function deriveKey(passphrase, saltBuf, iterations) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: saltBuf, iterations, hash: 'SHA-256' },
    keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
  );
}

async function decryptUserData(entry, passphrase) {
  const salt = base64ToBuffer(entry.salt);
  const iv = base64ToBuffer(entry.iv);
  const ciphertext = base64ToBuffer(entry.ciphertext);
  const key = await deriveKey(passphrase, salt, entry.iterations || 250000);
  const plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
  const plainText = new TextDecoder().decode(plainBuf);
  // Payload is always a JSON object: {token, nome?, cognome?}
  return JSON.parse(plainText);
}

/* ============================ GITHUB API ============================ */
/* ============================ IN-MEMORY CACHES ============================ */
// Etag cache: path -> {etag, sha, content, type, lastChecked}
// Lives in memory only (never localStorage). Session-backed via sessionStorage for intra-session speed.
const etagCache = new Map();

function saveEtagCacheToSession() {
  try {
    const obj = {};
    etagCache.forEach((v, k) => { obj[k] = v; });
    sessionStorage.setItem('collinettaai.etags', JSON.stringify({
      _savedAt: nowIso(),
      _dataRepo: CONFIG.DATA_REPO_NAME,
      entries: obj
    }));
  } catch (e) { console.warn('etag cache persist failed', e); }
}

function loadEtagCacheFromSession() {
  try {
    const raw = sessionStorage.getItem('collinettaai.etags');
    if (!raw) return;
    const parsed = JSON.parse(raw);
    // Invalidate cache older than 30 min
    if ((new Date() - new Date(parsed._savedAt)) > 30 * 60 * 1000) {
      sessionStorage.removeItem('collinettaai.etags');
      return;
    }
    // Invalida se la cache è stata creata per un repo diverso da quello attuale
    // (necessario dopo la migrazione al repo dati CollinettaAI-data)
    if (parsed._dataRepo !== CONFIG.DATA_REPO_NAME) {
      sessionStorage.removeItem('collinettaai.etags');
      return;
    }
    Object.entries(parsed.entries || {}).forEach(([k, v]) => etagCache.set(k, v));
  } catch (e) { console.warn('etag cache load failed', e); }
}

// Rate limit monitor (visible to admin)
const rateLimit = { remaining: null, limit: null, resetAt: null, updatedAt: null };

function updateRateLimitFromHeaders(res) {
  const rem = res.headers.get('x-ratelimit-remaining');
  const lim = res.headers.get('x-ratelimit-limit');
  const reset = res.headers.get('x-ratelimit-reset');
  if (rem !== null) rateLimit.remaining = parseInt(rem, 10);
  if (lim !== null) rateLimit.limit = parseInt(lim, 10);
  if (reset !== null) rateLimit.resetAt = new Date(parseInt(reset, 10) * 1000);
  rateLimit.updatedAt = new Date();
  updateRateLimitIndicator();
}

function updateRateLimitIndicator() {
  const el = document.getElementById('rate-limit-indicator');
  if (!el) return;
  if (rateLimit.remaining === null) return;
  el.textContent = `API ${rateLimit.remaining}/${rateLimit.limit}`;
  el.classList.remove('warning', 'danger');
  if (rateLimit.remaining < 200) el.classList.add('danger');
  else if (rateLimit.remaining < 1000) el.classList.add('warning');
  if (rateLimit.resetAt) {
    const minToReset = Math.max(0, Math.ceil((rateLimit.resetAt - new Date()) / 60000));
    el.title = `GitHub API: ${rateLimit.remaining}/${rateLimit.limit} restanti. Reset tra ${minToReset} min.`;
  }
}

/*
 * Modulo `gh`: fa CRUD sul repo DATI (CollinettaAI-data) usando il PAT-data
 * presente nella sessione. Tutte le chiamate content/* / cestino/* / locks.yml
 * passano da qui.
 */
const gh = {
  _repo: () => CONFIG.DATA_REPO_NAME,
  _headers() {
    return {
      'Authorization': `token ${state.session.tokenData}`,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28'
    };
  },
  _headersWithEtag(path) {
    const h = this._headers();
    const cached = etagCache.get(path);
    if (cached && cached.etag) h['If-None-Match'] = cached.etag;
    return h;
  },
  async getFile(path) {
    const cached = etagCache.get(path);
    const url = `${CONFIG.API_BASE}/repos/${CONFIG.REPO_OWNER}/${this._repo()}/contents/${encodeURIComponent(path).replace(/%2F/g, '/')}?ref=${CONFIG.BRANCH}`;
    const res = await fetch(url, { headers: this._headersWithEtag(path), cache: 'no-store' });
    updateRateLimitFromHeaders(res);
    if (res.status === 304 && cached) {
      return { content: cached.content, sha: cached.sha, path };
    }
    if (res.status === 404) { etagCache.delete(path); return null; }
    if (!res.ok) throw new Error(`GET ${path}: ${res.status}`);
    const data = await res.json();
    if (data.type !== 'file') return data;
    const content = data.content ? new TextDecoder().decode(base64ToBuffer(data.content.replace(/\n/g, ''))) : '';
    const etag = res.headers.get('etag');
    if (etag) etagCache.set(path, { etag, sha: data.sha, content, type: 'file', lastChecked: nowIso() });
    return { content, sha: data.sha, path: data.path };
  },
  async listDir(path) {
    const url = `${CONFIG.API_BASE}/repos/${CONFIG.REPO_OWNER}/${this._repo()}/contents/${encodeURIComponent(path).replace(/%2F/g, '/')}?ref=${CONFIG.BRANCH}`;
    const cached = etagCache.get('dir:' + path);
    const headers = this._headers();
    if (cached && cached.etag) headers['If-None-Match'] = cached.etag;
    const res = await fetch(url, { headers, cache: 'no-store' });
    updateRateLimitFromHeaders(res);
    if (res.status === 304 && cached) return cached.content;
    if (res.status === 404) { etagCache.delete('dir:' + path); return []; }
    if (!res.ok) throw new Error(`LIST ${path}: ${res.status}`);
    const data = await res.json();
    const etag = res.headers.get('etag');
    if (etag) etagCache.set('dir:' + path, { etag, content: data, type: 'dir', lastChecked: nowIso() });
    return data;
  },
  async getTree() {
    const url = `${CONFIG.API_BASE}/repos/${CONFIG.REPO_OWNER}/${this._repo()}/git/trees/${CONFIG.BRANCH}?recursive=1`;
    const cached = etagCache.get('tree:' + CONFIG.BRANCH);
    const headers = this._headers();
    if (cached && cached.etag) headers['If-None-Match'] = cached.etag;
    const res = await fetch(url, { headers, cache: 'no-store' });
    updateRateLimitFromHeaders(res);
    if (res.status === 304 && cached) return cached.content;
    if (!res.ok) throw new Error(`GET TREE: ${res.status}`);
    const data = await res.json();
    const etag = res.headers.get('etag');
    if (etag) etagCache.set('tree:' + CONFIG.BRANCH, { etag, content: data, type: 'tree', lastChecked: nowIso() });
    return data;
  },
  async putFile(path, content, sha, message) {
    const url = `${CONFIG.API_BASE}/repos/${CONFIG.REPO_OWNER}/${this._repo()}/contents/${encodeURIComponent(path).replace(/%2F/g, '/')}`;
    const enc = new TextEncoder();
    const bytes = enc.encode(content);
    let binary = '';
    bytes.forEach(b => binary += String.fromCharCode(b));
    const contentB64 = btoa(binary);
    const body = { message, content: contentB64, branch: CONFIG.BRANCH };
    if (sha) body.sha = sha;
    const res = await fetch(url, {
      method: 'PUT',
      headers: { ...this._headers(), 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (res.status === 409 || res.status === 422) {
      const txt = await res.text();
      if (txt.includes('does not match') || txt.includes('conflict') || res.status === 409) {
        const err = new Error('conflict'); err.code = 'CONFLICT'; throw err;
      }
      throw new Error(`PUT ${path}: ${res.status} ${txt}`);
    }
    if (!res.ok) throw new Error(`PUT ${path}: ${res.status} ${await res.text()}`);
    return await res.json();
  },
  async deleteFile(path, sha, message) {
    const url = `${CONFIG.API_BASE}/repos/${CONFIG.REPO_OWNER}/${this._repo()}/contents/${encodeURIComponent(path).replace(/%2F/g, '/')}`;
    const body = { message, sha, branch: CONFIG.BRANCH };
    const res = await fetch(url, {
      method: 'DELETE',
      headers: { ...this._headers(), 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(`DELETE ${path}: ${res.status}`);
    return await res.json();
  }
};

/*
 * Modulo `gh_auth`: fa CRUD sul repo AUTH (CollinettaAI-auth) usando il PAT-auth
 * presente nella sessione (solo admin). Serve per la UI di gestione utenti.
 * Chi non è admin NON deve invocare questo modulo — le sue funzioni
 * falliscono se `state.session.tokenAuth` è null.
 */
const gh_auth = {
  _assertAdmin() {
    if (!state.session || !state.session.tokenAuth) {
      throw new Error('Operazione riservata agli amministratori (manca token_auth).');
    }
  },
  _headers() {
    this._assertAdmin();
    return {
      'Authorization': `token ${state.session.tokenAuth}`,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28'
    };
  },
  async getTokensFile() {
    this._assertAdmin();
    const url = `${CONFIG.API_BASE}/repos/${CONFIG.REPO_OWNER}/${CONFIG.AUTH_REPO_NAME}/contents/data/encrypted-tokens.json?ref=${CONFIG.BRANCH}&t=${Date.now()}`;
    const res = await fetch(url, { headers: this._headers(), cache: 'no-store' });
    if (res.status === 404) throw new Error('File auth non trovato.');
    if (!res.ok) throw new Error(`GET auth: ${res.status}`);
    const meta = await res.json();
    const json = new TextDecoder().decode(base64ToBuffer(meta.content.replace(/\n/g, '')));
    return { data: JSON.parse(json), sha: meta.sha };
  },
  async putTokensFile(tokensObj, sha, message) {
    this._assertAdmin();
    const content = JSON.stringify(tokensObj, null, 2) + '\n';
    const url = `${CONFIG.API_BASE}/repos/${CONFIG.REPO_OWNER}/${CONFIG.AUTH_REPO_NAME}/contents/data/encrypted-tokens.json`;
    const enc = new TextEncoder();
    const bytes = enc.encode(content);
    let binary = '';
    bytes.forEach(b => binary += String.fromCharCode(b));
    const contentB64 = btoa(binary);
    const body = { message, content: contentB64, branch: CONFIG.BRANCH };
    if (sha) body.sha = sha;
    const res = await fetch(url, {
      method: 'PUT',
      headers: { ...this._headers(), 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(`PUT auth: ${res.status} ${await res.text()}`);
    return await res.json();
  }
};

/* ============================ CONTENT PARSING ============================ */
function parseMarkdown(text) {
  const m = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
  if (m) {
    let frontmatter = {};
    try { frontmatter = jsyaml.load(m[1]) || {}; } catch (e) { console.warn('YAML parse error', e); }
    return { frontmatter, body: m[2] || '' };
  }
  return { frontmatter: {}, body: text };
}

function stringifyMarkdown(frontmatter, body) {
  const yamlStr = jsyaml.dump(frontmatter, { lineWidth: 120, noRefs: true, sortKeys: false });
  return `---\n${yamlStr}---\n\n${String(body).trimStart()}`;
}

  pendingBlockHash: null,      // id blocco (es. "bl-rachicentesi-5") da scrollare dopo il prossimo render scheda
