/* Dopo il render di una scheda, chiama questa per scrollare al blocco in attesa.
   Se l'elemento esiste, scrolla con flash; poi consuma pendingBlockHash.
   Safe da chiamare anche quando pendingBlockHash è null. */
function scrollToPendingBlock() {
  if (!state.pendingBlockHash) return;
  const targetId = state.pendingBlockHash;

  // Funzione che esegue lo scroll vero e proprio. Riutilizzata per il primo scroll
  // e per il re-scroll dopo il caricamento delle immagini (vedi sotto).
  const doScroll = (consumeHash) => {
    const el = document.getElementById(targetId);
    if (!el) return;
    // Misura altezza topbar e banner edit-mode reali (cambia in PWA standalone con notch)
    const tb = document.querySelector('header.topbar');
    let tbH = 60;
    if (tb) {
      const h = Math.round(tb.getBoundingClientRect().height);
      if (h > 30 && h < 200) {
        document.documentElement.style.setProperty('--topbar-height', h + 'px');
        tbH = h;
      }
    }
    const banner = document.getElementById('edit-mode-banner');
    let bannerH = 0;
    if (banner && !banner.classList.contains('hidden')) {
      bannerH = Math.round(banner.getBoundingClientRect().height);
    }
    // Calcolo manuale dell'offset (più affidabile di scrollIntoView su mobile/PWA)
    const rect = el.getBoundingClientRect();
    const targetTop = window.scrollY + rect.top - tbH - bannerH - 12;
    try {
      window.scrollTo({ top: Math.max(0, targetTop), behavior: 'smooth' });
    } catch {
      window.scrollTo(0, Math.max(0, targetTop));
    }
    if (consumeHash) {
      el.classList.add('bl-flash');
      setTimeout(() => el.classList.remove('bl-flash'), 2000);
    }
  };

  // Primo scroll dopo render iniziale: doppio rAF + 50ms per attendere fonts/layout iniziali
  requestAnimationFrame(() => requestAnimationFrame(() => setTimeout(() => {
    const el = document.getElementById(targetId);
    if (!el) {
      state.pendingBlockHash = null;
      return;
    }
    doScroll(true);

    // Re-scroll dopo caricamento immagini: in PWA o con connessione lenta, le immagini
    // del contenuto possono caricarsi dopo lo scroll iniziale, spostando il blocco target.
    // Listener 'load' su ogni img non ancora caricata; quando completate, re-aggiusto.
    const imgs = document.querySelectorAll('main.content img');
    let pendingImgs = 0;
    let rescheduled = false;
    imgs.forEach(img => {
      if (!img.complete) {
        pendingImgs++;
        const onDone = () => {
          pendingImgs--;
          if (pendingImgs <= 0 && !rescheduled) {
            rescheduled = true;
            // Aspetto un frame per stabilizzare il layout post-image, poi re-scrollo
            requestAnimationFrame(() => doScroll(false));
          }
        };
        img.addEventListener('load', onDone, { once: true });
        img.addEventListener('error', onDone, { once: true });
      }
    });

    state.pendingBlockHash = null;
  }, 50)));
}

const SESSION_KEY = 'collinettaai.session';
// Usa localStorage solo se l'app è installata come PWA (mobile "Aggiungi a home")
// Negli altri casi usa sessionStorage (si cancella a fine sessione).
function isStandalonePWA() {
  return (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches)
    || window.navigator.standalone === true;
}
function sessionStore() {
  return isStandalonePWA() ? localStorage : sessionStorage;
}
function saveSession() {
  if (state.session) sessionStore().setItem(SESSION_KEY, JSON.stringify(state.session));
}
function loadSession() {
  // Cerca sia in localStorage (PWA) sia in sessionStorage (web)
  const raw = localStorage.getItem(SESSION_KEY) || sessionStorage.getItem(SESSION_KEY);
  if (!raw) return null;
  try { return JSON.parse(raw); } catch { return null; }
}
function clearSession() {
  localStorage.removeItem(SESSION_KEY);
  sessionStorage.removeItem(SESSION_KEY);
  // Pulisco la cache tema/font: al prossimo login, l'utente vedrà i suoi
  // device_prefs caricati da userPrefs.load(), non quelli del precedente utente.
  try {
    sessionStorage.removeItem('collinettaai.theme-cache');
    sessionStorage.removeItem('collinettaai.font-cache');
  } catch {}
  state.session = null;
}


/* ============================ INDEX BUILD ============================ */
async function buildIndex() {
  const startTime = Date.now();
  loadEtagCacheFromSession();
  const index = { procedure: [], clinica: [], moduli: [], tabelle: [], cestino: [], numeri: null, capitoli: [], lastIndexed: nowIso() };

  // Single tree call to discover all files
  let tree;
  try {
    tree = await gh.getTree();
  } catch (e) {
    console.warn('Tree API failed, falling back to recursive walk', e);
    return await buildIndexFallback();
  }

  // Filter file paths by section
  const procPaths = [], clinicaPaths = [], moduliPaths = [], tabellePaths = [], cestinoPaths = [];
  const specialFiles = { numeri: null, capitoli: null, numeriOsa: null, numeriIov: null, calendar: null };
  (tree.tree || []).forEach(item => {
    if (item.type !== 'blob') return;
    const p = item.path;
    if (p === 'content/numeri.yml') specialFiles.numeri = p;
    else if (p === 'content/numeri-osa.yml') specialFiles.numeriOsa = p;
    else if (p === 'content/numeri-iov.yml') specialFiles.numeriIov = p;
    else if (p === 'content/capitoli.yml') specialFiles.capitoli = p;
    else if (p === 'content/calendar.yml') specialFiles.calendar = p;
    else if (p.startsWith('content/procedure/') && p.endsWith('.md')) procPaths.push(p);
    else if (p.startsWith('content/clinica/') && p.endsWith('.md')) clinicaPaths.push(p);
    else if (p.startsWith('content/moduli/') && p.endsWith('.md')) moduliPaths.push(p);
    else if (p.startsWith('content/tabelle/') && p.endsWith('.md')) tabellePaths.push(p);
    else if (p.startsWith('cestino/') && p.endsWith('.md')) cestinoPaths.push(p);
  });
  // Track which extended directories exist (for lazy-load toggles)
  state.numeriExtendedAvailable = {
    osa: !!specialFiles.numeriOsa,
    iov: !!specialFiles.numeriIov
  };

  // Parallel fetch all md files in batches of 10 to avoid overwhelming API
  async function fetchBatch(paths) {
    const results = [];
    const batchSize = 10;
    for (let i = 0; i < paths.length; i += batchSize) {
      const batch = paths.slice(i, i + batchSize);
      const batchResults = await Promise.all(batch.map(p =>
        gh.getFile(p).catch(e => { console.warn('fetch error', p, e); return null; })
      ));
      results.push(...batchResults);
    }
    return results;
  }

  // Fetch everything in parallel
  const [procFiles, clinicaFiles, moduliFiles, tabelleFiles, cestinoFiles, numeriFile, capitoliFile, calendarFile] = await Promise.all([
    fetchBatch(procPaths),
    fetchBatch(clinicaPaths),
    fetchBatch(moduliPaths),
    fetchBatch(tabellePaths),
    fetchBatch(cestinoPaths),
    specialFiles.numeri ? gh.getFile(specialFiles.numeri).catch(() => null) : Promise.resolve(null),
    specialFiles.capitoli ? gh.getFile(specialFiles.capitoli).catch(() => null) : Promise.resolve(null),
    specialFiles.calendar ? gh.getFile(specialFiles.calendar).catch(() => null) : Promise.resolve(null)
  ]);

  // Process procedure files
  procFiles.forEach((file, i) => {
    if (!file) return;
    const path = procPaths[i];
    const slug = path.split('/').pop().replace(/\.md$/, '');
    const { frontmatter, body } = parseMarkdown(file.content);
    const relPath = path.replace(/^content\/procedure\//, '');
    const parts = relPath.split('/');
    const autoCategoria = parts.length >= 2 ? parts[0] : (frontmatter.categoria || 'altre');
    const autoSottocategoria = parts.length >= 3 ? parts[1] : null;
    const autoSottoSotto = parts.length >= 4 ? parts[2] : null;
    index.procedure.push({
      slug, path, sha: file.sha,
      categoria: frontmatter.categoria || autoCategoria,
      sottocategoria: frontmatter.sottocategoria || autoSottocategoria || autoSottoSotto,
      ...frontmatter,
      body_preview: body.substring(0, 300),
      body
    });
  });

  // Process clinica files
  clinicaFiles.forEach((file, i) => {
    if (!file) return;
    const path = clinicaPaths[i];
    const slug = path.split('/').pop().replace(/\.md$/, '');
    const { frontmatter, body } = parseMarkdown(file.content);
    const relPath = path.replace(/^content\/clinica\//, '');
    const parts = relPath.split('/');
    // parts = [sottocategoria, ...(optional nested), filename.md]
    const autoSottocategoria = parts.length >= 2 ? parts[0] : null;
    const autoSottoSotto = parts.length >= 3 ? parts[1] : null;
    index.clinica.push({
      slug, path, sha: file.sha,
      categoria: 'clinica',
      sottocategoria: frontmatter.sottocategoria || autoSottocategoria,
      sotto_sottocategoria: frontmatter.sotto_sottocategoria || autoSottoSotto,
      ...frontmatter,
      body_preview: body.substring(0, 300),
      body
    });
  });

  // Process moduli
  moduliFiles.forEach((file, i) => {
    if (!file) return;
    const path = moduliPaths[i];
    const slug = path.split('/').pop().replace(/\.md$/, '');
    const { frontmatter, body } = parseMarkdown(file.content);
    index.moduli.push({ slug, path, sha: file.sha, ...frontmatter, body });
  });

  // Process tabelle
  tabelleFiles.forEach((file, i) => {
    if (!file) return;
    const path = tabellePaths[i];
    const slug = path.split('/').pop().replace(/\.md$/, '');
    const { frontmatter, body } = parseMarkdown(file.content);
    index.tabelle.push({ slug, path, sha: file.sha, ...frontmatter, body });
  });

  // Process cestino
  cestinoFiles.forEach((file, i) => {
    if (!file) return;
    const path = cestinoPaths[i];
    const filename = path.split('/').pop();
    const { frontmatter } = parseMarkdown(file.content);
    index.cestino.push({ filename, path, sha: file.sha, ...frontmatter });
  });

  // Numeri.yml (AOPD — sempre caricato)
  if (numeriFile) {
    try {
      const parsed = jsyaml.load(numeriFile.content) || {};
      // Tag every group with its source ospedale (default 'aopd')
      const ospedaleId = (parsed.ospedale && parsed.ospedale.id) || 'aopd';
      (parsed.gruppi || []).forEach(g => { g._source = ospedaleId; });
      index.numeri = { ...parsed, _sha: numeriFile.sha, _path: numeriFile.path };
    } catch (e) { console.warn('numeri parse error', e); }
  }
  // Initialize extended numeri stash (filled on demand by loadExtendedNumeri)
  index.numeriExtended = { osa: null, iov: null };

  // Capitoli.yml
  if (capitoliFile) {
    try {
      const parsed = jsyaml.load(capitoliFile.content) || {};
      index.capitoli = (parsed.capitoli || []).sort((a, b) => (a.ordine || 99) - (b.ordine || 99));
    } catch (e) { console.warn('capitoli parse error', e); }
  }

  // Calendar.yml (eventi condivisi)
  index.calendar = { eventi: [], _sha: null, _path: 'content/calendar.yml' };
  if (calendarFile) {
    try {
      const parsed = jsyaml.load(calendarFile.content) || {};
      const eventi = Array.isArray(parsed.eventi) ? parsed.eventi : [];
      // Migrazione in-memory: vecchia categoria 'didattica' → 'seminari'
      eventi.forEach(e => { if (e && e.categoria === 'didattica') e.categoria = 'seminari'; });
      index.calendar = {
        eventi,
        _sha: calendarFile.sha,
        _path: calendarFile.path
      };
    } catch (e) { console.warn('calendar parse error', e); }
  }

  state.index = index;
  // Restore extended-numeri toggles from session (load in background)
  try {
    const saved = JSON.parse(sessionStorage.getItem('numeri_show_ext') || '{}');
    state.showExtendedNumeri = { osa: !!saved.osa, iov: !!saved.iov };
    // Load on-demand quando l'utente preme i chip OSA/IOV
    if (state.showExtendedNumeri.osa && state.numeriExtendedAvailable.osa) {
      loadExtendedNumeri('osa').catch(e => console.warn('OSA load failed', e));
    }
    if (state.showExtendedNumeri.iov && state.numeriExtendedAvailable.iov) {
      loadExtendedNumeri('iov').catch(e => console.warn('IOV load failed', e));
    }
  } catch (e) {
    state.showExtendedNumeri = { osa: false, iov: false };
  }
  rebuildSearchIndex();
  updateNavCounts();
  saveEtagCacheToSession();
  updateRateLimitIndicator();

  const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
  console.log(`[buildIndex] ${elapsed}s — ${index.procedure.length}p ${index.clinica.length}c ${index.moduli.length}m ${index.tabelle.length}t · rate ${rateLimit.remaining}/${rateLimit.limit}`);
  return index;
}

// ---- Extended numeri (OSA / IOV) lazy loading ----------------------------

// Entry-point per i chip OSA/IOV nella rubrica: carica on-demand + naviga
async function openExtendedSource(source) {
  if (source !== 'osa' && source !== 'iov') return;
  if (!state.numeriExtendedAvailable || !state.numeriExtendedAvailable[source]) {
    toast(`File numeri-${source}.yml non disponibile nel repo`, 'error');
    return;
  }
  // Flag di visualizzazione persistente (usato anche dalla search)
  if (!state.showExtendedNumeri) state.showExtendedNumeri = { osa: false, iov: false };
  state.showExtendedNumeri[source] = true;
  try { sessionStorage.setItem('numeri_show_ext', JSON.stringify(state.showExtendedNumeri)); } catch {}
  // Se non caricato, caricalo ora (blocking con piccolo feedback)
  if (!state.index?.numeriExtended?.[source]) {
    try {
      await loadExtendedNumeri(source);
    } catch (e) {
      toast(`Errore nel caricamento ${source.toUpperCase()}: ${e.message}`, 'error');
      return;
    }
  }
  navigate('numeri', { filter: source });
}

async function loadExtendedNumeri(source) {
  // source = 'osa' | 'iov'
  if (!state.index) return null;
  if (!state.index.numeriExtended) state.index.numeriExtended = { osa: null, iov: null };
  if (state.index.numeriExtended[source]) return state.index.numeriExtended[source]; // already loaded
  const path = `content/numeri-${source}.yml`;
  try {
    const file = await gh.getFile(path);
    if (!file) return null;
    const parsed = jsyaml.load(file.content) || {};
    const ospedaleId = (parsed.ospedale && parsed.ospedale.id) || source;
    (parsed.gruppi || []).forEach(g => { g._source = ospedaleId; });
    state.index.numeriExtended[source] = parsed;
    rebuildSearchIndex();
    return parsed;
  } catch (e) {
    console.warn(`Errore caricamento numeri-${source}.yml`, e);
    toast(`Impossibile caricare la rubrica ${source.toUpperCase()}`, 'error');
    return null;
  }
}

function getVisibleNumeriGroups() {
  // Returns all groups: AOPD + OSA + IOV (se disponibili)
  // Il filtro per source avviene in renderNumeri quando filter='osa' o 'iov'.
  const groups = [];
  if (state.index?.numeri?.gruppi) groups.push(...state.index.numeri.gruppi);
  const ext = state.index?.numeriExtended || {};
  if (ext.osa?.gruppi) groups.push(...ext.osa.gruppi);
  if (ext.iov?.gruppi) groups.push(...ext.iov.gruppi);
  return groups;
}

async function toggleExtendedNumeri(source, on) {
  if (!state.showExtendedNumeri) state.showExtendedNumeri = { osa: false, iov: false };
  state.showExtendedNumeri[source] = !!on;
  try { sessionStorage.setItem('numeri_show_ext', JSON.stringify(state.showExtendedNumeri)); } catch (e) {}
  if (on && state.numeriExtendedAvailable?.[source] && !state.index.numeriExtended?.[source]) {
    toast(`Caricamento rubrica ${source.toUpperCase()}...`, 'info', 1500);
    await loadExtendedNumeri(source);
  }
  rebuildSearchIndex();
  renderNavTree();
  if (state.currentView === 'numeri') navigate('numeri', state.currentParams || {});
}

// Legacy fallback in case the tree API fails
async function buildIndexFallback() {
  console.warn('Using legacy recursive index walk (slower)');
  const index = { procedure: [], clinica: [], moduli: [], tabelle: [], cestino: [], numeri: null, capitoli: [], lastIndexed: nowIso() };
  async function walk(dir, target) {
    try {
      const items = await gh.listDir(dir);
      for (const it of items) {
        if (it.type === 'dir') await walk(it.path, target);
        else if (it.type === 'file' && it.name.endsWith('.md')) {
          const file = await gh.getFile(it.path);
          if (!file) continue;
          const { frontmatter, body } = parseMarkdown(file.content);
          target.push({ slug: it.name.replace(/\.md$/, ''), path: it.path, sha: file.sha, ...frontmatter, body, body_preview: body.substring(0,300) });
        }
      }
    } catch (e) {}
  }
  await walk('content/procedure', index.procedure);
  await walk('content/clinica', index.clinica);
  await walk('content/moduli', index.moduli);
  await walk('content/tabelle', index.tabelle);
  state.index = index;
  rebuildSearchIndex();
  updateNavCounts();
  return index;
}

function rebuildSearchIndex() {
  const docs = [];
  state.index.procedure.forEach(p => docs.push({
    type: 'procedura', slug: p.slug,
    titolo: p.titolo || p.slug,
    tag: (p.tag || []).join(' '),
    termini: (p.termini_equivalenti || []).join(' '),
    body: p.body_preview || ''
  }));
  (state.index.clinica || []).forEach(c => docs.push({
    type: 'clinica', slug: c.slug,
    titolo: c.titolo || c.slug,
    tag: (c.tag || []).join(' '),
    termini: (c.termini_equivalenti || []).join(' '),
    body: c.body_preview || ''
  }));
  state.index.moduli.forEach(m => docs.push({
    type: 'modulo', slug: m.slug,
    titolo: m.titolo || m.slug,
    tag: (m.tag || []).join(' ')
  }));
  state.index.tabelle.forEach(t => docs.push({
    type: 'tabella', slug: t.slug,
    titolo: t.titolo || t.slug
  }));
  getVisibleNumeriGroups().filter(g => (g._source || 'aopd') === 'aopd').forEach(g => {
    const groupAliases = (g.alias || []).join(' ');
    // Precomputo il bucketing contatto→tipo_sede una volta per gruppo
    let sedeBuckets = [];
    try {
      if (typeof groupContattiBySede === 'function') {
        sedeBuckets = groupContattiBySede(g.contatti || [], g.sezioni);
      }
    } catch {}
    const contactToSedeTipo = new Map();
    sedeBuckets.forEach(b => {
      const tipo = b.sede && b.sede.tipo ? b.sede.tipo : '';
      if (tipo) (b.contatti || []).forEach(c => contactToSedeTipo.set(c.id, tipo));
    });
    // Sinonimi per tipi di sede, così cercare "ucic" matcha anche "unità coronarica"
    const sedeTipoAliases = {
      terapia_intensiva: 'terapia intensiva rianimazione ucic utic unità coronarica unità terapia intensiva cardiologica tipo tin terapia intensiva post-operatoria terapia intensiva neonatale',
      semi_intensiva: 'semi intensiva subintensiva',
      diagnostica: 'diagnostica esami strumentali tc tac rm risonanza magnetica rx radiografia mammografia ecografia angiografia endoscopia neurofisiologia eeg emg densitometria piastra endoscopica',
      day_hospital: 'day hospital dh',
      sala_operatoria: 'sala operatoria so emodinamica cardiologia interventistica elettrofisiologia',
      reparto: 'reparto degenze degenza',
      studi_medici: 'studi medici studio medico',
      ambulatori: 'ambulatori ambulatorio amb riabilitazione',
      laboratorio: 'laboratorio',
      segreteria_direzione: 'segreteria direzione segr portineria'
    };
    (g.contatti || []).forEach(c => {
      const cellFlat = Array.isArray(c.cellulare_personale) ? c.cellulare_personale.join(' ') : (c.cellulare_personale || '');
      const cellPubFlat = Array.isArray(c.cellulare_aziendale) ? c.cellulare_aziendale.join(' ') : (c.cellulare_aziendale || '');
      const numeriStr = [...(c.numeri || []), cellFlat, cellPubFlat, c.breve].filter(Boolean).join(' ');
      const sedi = g.sezioni || [];
      const sedeStr = sedi.map(s => [s.edificio, s.piano].filter(Boolean).join(' ')).join(' ');
      const kind = (typeof classifyContatto === 'function') ? classifyContatto(c).kind : '';
      const kindAliases = {
        guardia: 'guardia mdg reperibile',
        reparto: 'reparto degenza degenze infermieri guardiola caposala coordinatore bancone',
        ambulatorio: 'ambulatorio amb',
        direzione: 'direttore direzione segreteria'
      };
      const sedeTipo = contactToSedeTipo.get(c.id) || '';
      const sedeTipoStr = sedeTipoAliases[sedeTipo] || sedeTipo;
      const termini = [
        c.sezione || '',
        kind,
        kindAliases[kind] || '',
        sedeTipoStr,
        (c.alias || []).join(' '),
        groupAliases
      ].filter(Boolean).join(' ');
      docs.push({
        type: 'numero', slug: c.id,
        titolo: c.etichetta,
        gruppo: g.nome,
        gruppoId: g.id,
        direttore: g.direttore || '',
        numeri: numeriStr,
        ospedale: g._source || 'aopd',
        sezione: c.sezione || '',
        tag: (c.tag || []).join(' '),
        alias: [...(c.alias || []), ...(g.alias || [])].join(' '),
        termini: termini,
        _dedupKey: `numero:${c.id || c.etichetta}`
      });
    });
  });
  // Dedup per _dedupKey: tengo il primo (es. contatti con stesso id duplicati in più sezioni della stessa UOC)
  const seenKeys = new Set();
  const dedupedDocs = docs.filter(d => {
    if (!d._dedupKey) return true;
    if (seenKeys.has(d._dedupKey)) return false;
    seenKeys.add(d._dedupKey);
    return true;
  });
  state.fuse = new Fuse(dedupedDocs, {
    keys: [
      { name: 'gruppo', weight: 4 },
      { name: 'titolo', weight: 3 },
      { name: 'alias', weight: 3 },
      { name: 'termini', weight: 2 },
      { name: 'tag', weight: 2 },
      { name: 'numeri', weight: 1 },
      { name: 'sezione', weight: 1 },
      { name: 'body', weight: 0.5 }
    ],
    threshold: 0.35, includeMatches: true, includeScore: true, minMatchCharLength: 1,
    ignoreLocation: true,
    useExtendedSearch: true
  });
}

/* ============================ LOCKS ============================ */
const locks = {
  _renewTimer: null,
  async load() {
    const file = await gh.getFile('locks.yml');
    if (!file) return { locks: {}, _sha: null };
    const data = jsyaml.load(file.content) || {};
    return { locks: data.locks || {}, _sha: file.sha };
  },
  async write(locksObj, sha, action) {
    const header = "# Lock advisory per edit simultanei\n# Gestito dall'app, non modificare a mano\n\n";
    const locksYaml = Object.keys(locksObj).length === 0
      ? 'locks: {}\n'
      : 'locks:\n' + jsyaml.dump(locksObj, { indent: 2, lineWidth: 120 }).replace(/^/gm, '  ');
    const content = header + locksYaml;
    return gh.putFile('locks.yml', content, sha, `chore(locks): ${action}`);
  },
  isExpired(lock) {
    if (!lock || !lock.scade) return true;
    return new Date(lock.scade) < new Date();
  },
  /* Pulisce i lock scaduti dall'oggetto. Ritorna true se qualcosa è stato rimosso. */
  _pruneExpired(locksObj) {
    let removed = 0;
    const myUser = state.session && state.session.username;
    for (const slug of Object.keys(locksObj)) {
      const lock = locksObj[slug];
      if (this.isExpired(lock)) {
        delete locksObj[slug];
        removed++;
      }
    }
    return removed;
  },
  async acquire(slug) {
    try {
      const { locks: all, _sha } = await this.load();
      // Rimuovi prima tutti i lock scaduti (pulizia opportunistica)
      const pruned = this._pruneExpired(all);
      const existing = all[slug];
      if (existing && !this.isExpired(existing) && existing.utente !== state.session.username) {
        // Se c'era pulizia da fare ma non possiamo acquisire, scriviamo comunque per ripulire
        if (pruned > 0) {
          try { await this.write(all, _sha, `cleanup ${pruned} expired lock(s)`); } catch(e) {}
        }
        return { acquired: false, heldBy: existing.utente, since: existing.iniziato, expires: existing.scade };
      }
      const now = new Date();
      all[slug] = {
        utente: state.session.username,
        iniziato: now.toISOString(),
        scade: new Date(now.getTime() + CONFIG.LOCK_DURATION_MS).toISOString()
      };
      const action = pruned > 0
        ? `acquire ${slug} by ${state.session.username} (+ cleanup ${pruned} expired)`
        : `acquire ${slug} by ${state.session.username}`;
      await this.write(all, _sha, action);
      this._startRenew(slug);
      return { acquired: true };
    } catch (e) {
      console.warn('lock acquire failed', e);
      return { acquired: true, warning: 'Lock non registrato' };
    }
  },
  async release(slug) {
    this._stopRenew();
    try {
      const { locks: all, _sha } = await this.load();
      // Opportunità di pulizia durante il release
      const pruned = this._pruneExpired(all);
      let mineReleased = false;
      if (all[slug] && all[slug].utente === state.session.username) {
        delete all[slug];
        mineReleased = true;
      }
      if (mineReleased || pruned > 0) {
        const parts = [];
        if (mineReleased) parts.push(`release ${slug} by ${state.session.username}`);
        if (pruned > 0) parts.push(`cleanup ${pruned} expired`);
        await this.write(all, _sha, parts.join(' + '));
      }
    } catch (e) { console.warn('lock release failed', e); }
  },
  _startRenew(slug) {
    this._stopRenew();
    this._renewTimer = setTimeout(async () => {
      try {
        const { locks: all, _sha } = await this.load();
        if (all[slug] && all[slug].utente === state.session.username) {
          all[slug].scade = new Date(Date.now() + CONFIG.LOCK_DURATION_MS).toISOString();
          await this.write(all, _sha, `renew ${slug}`);
          this._startRenew(slug);
        }
      } catch (e) { console.warn('lock renew failed', e); }
    }, CONFIG.LOCK_RENEW_MS);
  },
  _stopRenew() { if (this._renewTimer) { clearTimeout(this._renewTimer); this._renewTimer = null; } }
};

/* ============================ LOGIN ============================ */
async function loadTokensFile() {
  try {
    const url = `${CONFIG.API_BASE}/repos/${CONFIG.REPO_OWNER}/${CONFIG.AUTH_REPO_NAME}/contents/data/encrypted-tokens.json?ref=${CONFIG.BRANCH}&t=${Date.now()}`;
    const res = await fetch(url, {
      headers: {
        'Authorization': `token ${BOOTSTRAP_PAT}`,
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28'
      },
      cache: 'no-store'
    });
    if (res.status === 404) throw new Error('File data/encrypted-tokens.json non trovato nel repo auth');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const meta = await res.json();
    if (!meta.content) throw new Error('File auth vuoto');
    const json = new TextDecoder().decode(base64ToBuffer(meta.content.replace(/\n/g, '')));
    return JSON.parse(json);
  } catch (e) {
    throw new Error(`Impossibile caricare credenziali dal repo auth. Verifica PAT-1 e nome repo. (${e.message})`);
  }
}

async function attemptLogin(username, passphrase) {
  const loginError = $('login-error');
  const btn = $('login-submit');
  const btnText = $('login-submit-text');
  loginError.classList.remove('visible');
  btn.classList.add('is-loading');
  btn.setAttribute('aria-busy', 'true');
  btn.style.pointerEvents = 'none';
  btnText.innerHTML = '<span class="btn-spinner"></span>';

  try {
    if (!state.tokensFile) state.tokensFile = await loadTokensFile();
    const entry = (state.tokensFile.utenti || {})[username];
    if (!entry) throw new Error('Username non riconosciuto.');
    let payload;
    try { payload = await decryptUserData(entry, passphrase); }
    catch { throw new Error('Passphrase errata.'); }

    // Schema 3.1: token_data è il PAT principale per i contenuti.
    // Compatibilità legacy: accetta 'token' se token_data manca (schema 1.x/2.x).
    const tokenData = payload.token_data || payload.token;
    if (!tokenData) throw new Error('Payload cifrato non valido (manca token_data).');

    // Validazione del token contro il repo data
    const testRes = await fetch(`${CONFIG.API_BASE}/repos/${CONFIG.REPO_OWNER}/${CONFIG.DATA_REPO_NAME}`, {
      headers: { 'Authorization': `token ${tokenData}`, 'Accept': 'application/vnd.github+json' }
    });
    if (!testRes.ok) throw new Error(`Token dati non valido (HTTP ${testRes.status}).`);

    // is_admin è in chiaro nell'entry (fuori dal ciphertext)
    const isAdmin = !!entry.is_admin;
    const tokenAuth = payload.token_auth || null;
    // Check di coerenza: admin deve avere token_auth
    if (isAdmin && !tokenAuth) {
      console.warn('Utente marcato is_admin=true ma senza token_auth nel payload. UI admin disabilitata.');
    }

    state.session = {
      username,
      tokenData: tokenData,
      tokenAuth: tokenAuth,          // null per utenti normali
      isAdmin: isAdmin && !!tokenAuth,  // solo se token_auth presente davvero
      ruolo: payload.ruolo || entry.ruolo || null,
      nome: payload.nome || null,
      cognome: payload.cognome || null
    };
    saveSession();
    await enterApp();
  } catch (e) {
    loginError.textContent = e.message;
    loginError.classList.add('visible');
  } finally {
    btn.classList.remove('is-loading');
    btn.removeAttribute('aria-busy');
    btn.style.pointerEvents = '';
    btnText.textContent = 'Accedi';
  }
}

async function enterApp() {
  // Carica le preferenze utente PRIMA di mostrare l'app: applyTheme/applyFontSize
  // vengono chiamate dentro userPrefs.load(), così quando rivelo app-view il tema
  // è già quello corretto (zero flash, anche al primo login della sessione).
  // Lo spinner sul bottone "Accedi" del login resta visibile fino a qui.
  try {
    await userPrefs.load();
  } catch (e) {
    console.warn('[enterApp] userPrefs.load failed, proseguo con default:', e);
  }
  $('login-view').classList.add('hidden');
  $('app-view').classList.remove('hidden');
  const displayName = (state.session.nome && state.session.cognome)
    ? `${state.session.nome} ${state.session.cognome}`
    : state.session.username;
  $('user-name-display').textContent = displayName;
  const avatarSource = (state.session.nome && state.session.cognome)
    ? state.session.nome[0] + state.session.cognome[0]
    : state.session.username.substring(0, 2);
  $('user-avatar').textContent = avatarSource.toUpperCase();
  const isAdminNow = !!state.session.isAdmin;
  $('nav-utenti').classList.toggle('hidden', !isAdminNow);
  const umUtenti = document.getElementById('user-menu-utenti');
  if (umUtenti) umUtenti.classList.toggle('hidden', !isAdminNow);
  if (isAdminNow) {
    document.getElementById('rate-limit-indicator').classList.remove('hidden');
  }
  // Applica body class per personalizzazione UI in base al ruolo
  if (state.session.ruolo) {
    document.body.dataset.ruolo = state.session.ruolo;
  }
  renderLoading('Caricamento…');
  try {
    await buildIndex();
    // Inizializza il router URL (listeners) e leggi lo stato iniziale dall'URL.
    // Se l'URL contiene una rotta valida (es. l'utente è arrivato su #/procedura/rachicentesi
    // tramite bookmark/refresh/link da NotebookLM), atterra direttamente lì.
    urlRouter.init();
    const initial = urlRouter.readUrl();
    if (initial.blockHash) state.pendingBlockHash = initial.blockHash;
    navigate(initial.route, initial.params);
    // Se atterriamo sulla home in PWA standalone, arma la guardia anti-uscita
    // (silenziosa, senza toast). Necessario qui perché updateUrl non riapplica
    // pushState se l'URL è già quello atteso.
    if (!_backGuardArmed) {
      const ctx = shouldGuardBack();
      if (ctx.active) armBackGuard(ctx.silent);
    }
  } catch (e) {
    renderError('Errore caricamento indice', e.message);
  }
}

// === DEVICE CATEGORY ===
// 3 categorie per le preferenze tema/font: mobile (<=700px), tablet (701-1024px), desktop (>=1025px).
// La categoria viene "congelata" al primo accesso della sessione per evitare che ridimensionando
// la finestra del browser le preferenze cambino al volo (sarebbe disorientante).
function _detectDeviceCategoryNow() {
  const w = window.innerWidth;
  if (w <= 700) return 'mobile';
  if (w <= 1024) return 'tablet';
  return 'desktop';
}
function getDeviceCategory() {
  // Memorizzato in sessionStorage solo per stabilità nella sessione corrente,
  // non come preferenza persistente. Sparisce a chiusura tab.
  try {
    const cached = sessionStorage.getItem('collinettaai.device-category');
    if (cached === 'mobile' || cached === 'tablet' || cached === 'desktop') return cached;
  } catch {}
  const cat = _detectDeviceCategoryNow();
  try { sessionStorage.setItem('collinettaai.device-category', cat); } catch {}
  return cat;
}

// === TEMA E FONT ===
// Le preferenze sono salvate nel repo dati come parte di userPrefs.yml, separate per categoria
// di dispositivo (mobile/tablet/desktop). Niente più localStorage: l'utente ritrova tema/font
// su qualsiasi dispositivo dello stesso tipo dove fa login con la stessa identità, ma può
// avere preferenze diverse tra mobile e desktop (es. dark sul telefono, light sul Mac).
// Pre-login si usano i default: tema 'auto' e font 'md'.
function setTheme(theme) {
  applyTheme(theme);
  document.querySelectorAll('.theme-opt').forEach(b => b.classList.toggle('active', b.dataset.theme === theme));
  // Salva nelle preferenze utente per la categoria di dispositivo corrente (solo se loggato)
  if (state.userPrefs) {
    const cat = getDeviceCategory();
    if (!state.userPrefs.device_prefs) state.userPrefs.device_prefs = {};
    if (!state.userPrefs.device_prefs[cat]) state.userPrefs.device_prefs[cat] = {};
    state.userPrefs.device_prefs[cat].tema = theme;
    if (typeof userPrefs !== 'undefined' && userPrefs.scheduleSave) userPrefs.scheduleSave();
  }
}
const FONT_SIZES = ['sm', 'md', 'lg', 'xl'];
const FONT_LABELS = { sm: 'Piccolo', md: 'Medio', lg: 'Grande', xl: 'Extra grande' };
function setFontSize(size) {
  if (!FONT_SIZES.includes(size)) size = 'md';
  applyFontSize(size);
  if (state.userPrefs) {
    const cat = getDeviceCategory();
    if (!state.userPrefs.device_prefs) state.userPrefs.device_prefs = {};
    if (!state.userPrefs.device_prefs[cat]) state.userPrefs.device_prefs[cat] = {};
    state.userPrefs.device_prefs[cat].font_size = size;
    if (typeof userPrefs !== 'undefined' && userPrefs.scheduleSave) userPrefs.scheduleSave();
  }
}
function changeFontSize(delta) {
  // Legge il valore corrente dall'attributo DOM (sempre aggiornato)
  const current = document.documentElement.getAttribute('data-font-size') || 'md';
  const idx = FONT_SIZES.indexOf(current);
  const next = Math.max(0, Math.min(FONT_SIZES.length - 1, idx + delta));
  setFontSize(FONT_SIZES[next]);
}

// applyTheme/applyFontSize: applicano solo a livello DOM, senza toccare le preferenze.
// Usate sia in init (default auto/md) sia in load() di userPrefs (con preferenze caricate).
// Scrivono anche in sessionStorage per essere lette dallo script inline al prossimo refresh
// (evita il FOUC: flash of unstyled content tra default scuro/chiaro e preferenza utente).
function applyTheme(theme) {
  let effective = theme;
  if (theme === 'auto' || !theme) {
    effective = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  document.documentElement.setAttribute('data-theme', effective);
  // Memorizzo la scelta utente (auto/light/dark) per il listener prefers-color-scheme
  document.documentElement.setAttribute('data-theme-pref', theme || 'auto');
  // Cache in sessionStorage: il prossimo refresh nella stessa sessione applica subito
  // il tema giusto, senza aspettare la fetch di userPrefs da GitHub.
  try { sessionStorage.setItem('collinettaai.theme-cache', theme || 'auto'); } catch {}
  // Aggiorno UI dei pulsanti scelta tema
  document.querySelectorAll('.theme-opt').forEach(b => b.classList.toggle('active', b.dataset.theme === (theme || 'auto')));
}
function applyFontSize(size) {
  if (!FONT_SIZES.includes(size)) size = 'md';
  document.documentElement.setAttribute('data-font-size', size);
  // Cache anche il font_size per evitare layout shift al refresh
  try { sessionStorage.setItem('collinettaai.font-cache', size); } catch {}
  const label = document.getElementById('font-size-label');
  if (label) label.textContent = FONT_LABELS[size];
  const btns = document.querySelectorAll('.font-step-btn');
  if (btns.length === 2) {
    const idx = FONT_SIZES.indexOf(size);
    btns[0].disabled = idx === 0;
    btns[1].disabled = idx === FONT_SIZES.length - 1;
  }
}
function initTheme() {
  // Cleanup: rimuovi le vecchie chiavi localStorage usate prima del refactor.
  // Le preferenze tema/font ora vivono nel repo dati (userPrefs).
  try { localStorage.removeItem('collinetta-theme'); } catch {}
  try { localStorage.removeItem('collinetta-font-size'); } catch {}
  // Pre-login: usa default. Le preferenze utente verranno applicate da userPrefs.load() al login.
  applyTheme('auto');
  applyFontSize('md');
  if (window.matchMedia) {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      // Se la preferenza utente è "auto", aggiorno il tema effettivo quando il sistema cambia
      const pref = document.documentElement.getAttribute('data-theme-pref') || 'auto';
      if (pref === 'auto') applyTheme('auto');
    });
  }
}
// Close dropdown on outside click
document.addEventListener('click', (e) => {

/* ============================ ROUTER ============================ */
/* ============================ URL ROUTER ============================
   Sincronizza stato app ↔ URL hash. Formato path-based stile A:
     #/home
     #/numeri
     #/numeri/lab-neurologia                (con filter contatto)
     #/procedura/rachicentesi
     #/procedura/rachicentesi/bl-5          (deep-link a blocco)
     #/clinica/alzheimer
     #/modulo/consenso-rachicentesi/bl-3
   Permette: bookmark, refresh F5, bottone indietro browser, condivisione link,
   deep-link da NotebookLM. Non aggiunge chiamate di rete.
*/
const urlRouter = (function() {
  let _suppress = false; // evita loop navigate→hashchange→navigate

  // Mappa interna route+params → segmenti URL
  function _routeToSegments(route, params) {
    const p = params || {};
    switch (route) {
      case 'home':            return ['home'];
      case 'manuale':         return ['manuale'];
      case 'capitolo':        return ['capitolo', p.id];
      case 'procedure':       return ['procedure'];
      case 'procedure-cat':   return ['procedure', p.cat, p.sub].filter(Boolean);
      case 'procedura':       return ['procedura', p.slug];
      case 'procedura-edit':  return ['procedura', p.slug, 'edit'];
      case 'clinica':         return p.sub ? ['clinica', p.sub] : ['clinica'];
      case 'clinica-scheda':  return ['clinica-scheda', p.slug];
      case 'clinica-edit':    return ['clinica-scheda', p.slug, 'edit'];
      case 'numeri':          return p.filter ? ['numeri', p.filter] : ['numeri'];
      case 'moduli':          return ['moduli'];
      case 'modulo':          return ['modulo', p.slug];
      case 'modulo-edit':     return ['modulo', p.slug, 'edit'];
      case 'tabelle':         return ['tabelle'];
      case 'tabella':         return ['tabella', p.slug];
      case 'tabella-edit':    return ['tabella', p.slug, 'edit'];
      case 'calendario':      return ['calendario'];
      case 'cestino':         return ['cestino'];
      case 'cestino-utenti':  return ['cestino-utenti'];
      case 'utenti':          return ['utenti'];
      case 'attivita':        return ['attivita'];
      case 'search':          return p.query ? ['search', encodeURIComponent(p.query)] : ['search'];
      case 'tag':             return ['tag', p.tag];
      default:                return ['home'];
    }
  }

  // Mappa inversa: segmenti URL → {route, params}
  // I segmenti arrivano già senza il leading "#/". Ultimo segmento può essere "bl-N" che
  // viene estratto come blockHash separato (per scrollare al blocco dopo il render).
  function _segmentsToRoute(segments) {
    let blockHash = null;
    // Se l'ultimo segmento è "bl-<numero>", lo separo
    if (segments.length > 0 && /^bl-\d+$/i.test(segments[segments.length - 1])) {
      const blNum = segments.pop().toLowerCase();
      // Ricostruisco "bl-<slug>-<n>" usando il segmento precedente come slug
      // (di solito segments[len-1] è lo slug della scheda)
      const slug = segments[segments.length - 1] || '';
      blockHash = `bl-${slug}-${blNum.replace(/^bl-/, '')}`;
    }
    if (segments.length === 0) return { route: 'home', params: {}, blockHash };
    const head = segments[0];
    const second = segments[1];
    const third = segments[2];
    switch (head) {
      case 'home': return { route: 'home', params: {}, blockHash };
      case 'manuale': return { route: 'manuale', params: {}, blockHash };
      case 'capitolo': return { route: 'capitolo', params: { id: second }, blockHash };
      case 'procedure':
        if (!second) return { route: 'procedure', params: {}, blockHash };
        return { route: 'procedure-cat', params: { cat: second, sub: third }, blockHash };
      case 'procedura':
        if (third === 'edit') return { route: 'procedura-edit', params: { slug: second }, blockHash };
        return { route: 'procedura', params: { slug: second }, blockHash };
      case 'clinica':
        return { route: 'clinica', params: { sub: second }, blockHash };
      case 'clinica-scheda':
        if (third === 'edit') return { route: 'clinica-edit', params: { slug: second }, blockHash };
        return { route: 'clinica-scheda', params: { slug: second }, blockHash };
      case 'numeri':
        return { route: 'numeri', params: second ? { filter: second } : {}, blockHash };
      case 'moduli': return { route: 'moduli', params: {}, blockHash };
      case 'modulo':
        if (third === 'edit') return { route: 'modulo-edit', params: { slug: second }, blockHash };
        return { route: 'modulo', params: { slug: second }, blockHash };
      case 'tabelle': return { route: 'tabelle', params: {}, blockHash };
      case 'tabella':
        if (third === 'edit') return { route: 'tabella-edit', params: { slug: second }, blockHash };
        return { route: 'tabella', params: { slug: second }, blockHash };
      case 'calendario': return { route: 'calendario', params: {}, blockHash };
      case 'cestino': return { route: 'cestino', params: {}, blockHash };
      case 'cestino-utenti': return { route: 'cestino-utenti', params: {}, blockHash };
      case 'utenti': return { route: 'utenti', params: {}, blockHash };
      case 'attivita': return { route: 'attivita', params: {}, blockHash };
      case 'search': return { route: 'search', params: { query: second ? decodeURIComponent(second) : '' }, blockHash };
      case 'tag': return { route: 'tag', params: { tag: second }, blockHash };
      default: return { route: 'home', params: {}, blockHash };
    }
  }

  // Costruisce stringa hash a partire da route+params (senza # iniziale)
  function buildHash(route, params) {
    const segs = _routeToSegments(route, params).filter(s => s != null && s !== '');
    return '#/' + segs.join('/');
  }

  // Aggiorna URL senza scatenare il listener (uso replaceState/hash silente)
  function updateUrl(route, params) {
    const newHash = buildHash(route, params);
    if (newHash === window.location.hash) return;
    _suppress = true;
    try {
      // Uso pushState così il browser registra l'entry per il bottone indietro.
      // Salvo nello state la posizione (pos) per sapere se siamo andati avanti/indietro
      // a seguito di popstate (necessario per abilitare/disabilitare pulsanti freccia).
      const newPos = (_historyPos || 0) + 1;
      window.history.pushState({ route, params, pos: newPos }, '', newHash);
      _onHistoryPush();
    } catch {
      window.location.hash = newHash;
    }
    setTimeout(() => { _suppress = false; }, 0);
  }

  // Legge hash corrente e ritorna {route, params, blockHash}
  function readUrl() {
    let hash = (window.location.hash || '').replace(/^#\/?/, '');
    if (!hash) return { route: 'home', params: {}, blockHash: null };
    const segments = hash.split('/').filter(Boolean);
    return _segmentsToRoute(segments);
  }

  // Listener hashchange: viene attivato sia da pushState (in alcuni browser) sia
  // dal bottone indietro/avanti del browser. Se _suppress è true (cambio fatto da noi),
  // ignora. Altrimenti rileggi l'URL e naviga di conseguenza.
  function _onHashChange() {
    if (_suppress) return;
    const { route, params, blockHash } = readUrl();
    if (blockHash) state.pendingBlockHash = blockHash;
    navigate(route, params);
  }

  // Listener popstate: per pushState/replaceState. Stesso comportamento di hashchange
  // ma necessario perché in alcuni browser pushState non scatena hashchange.
  // Cattura back/forward del browser, gesto swipe iOS/Android, tasto back hardware su PWA.
  function _onPopState(e) {
    if (_suppress) return;
    // Se c'era una guardia armata, popstate l'ha appena consumata.
    // Decido se intercettare (riarmare guardia + toast) o lasciar passare.
    if (_backGuardArmed) {
      const intercepted = _handleGuardConsumed();
      if (intercepted) return; // Guardia riarmata, non navigare
      // Guardia ha lasciato passare (secondo back rapido). Se siamo nell'editor con
      // modifiche dirty, chiedo conferma prima di procedere — altrimenti l'utente perderebbe
      // tutto silenziosamente. Se annulla, riportiamo l'URL all'editor (forward + riarmo).
      if (state.editingContext && state.editingContext.isDirty) {
        if (!confirm("Hai modifiche non salvate. Sicuro di uscire dall'editor?")) {
          // Riporto avanti nella history per restare sull'URL dell'editor
          _suppress = true;
          window.history.forward();
          setTimeout(() => {
            _suppress = false;
            armBackGuard(false); // riarma guardia perché siamo di nuovo nell'editor
          }, 0);
          return;
        }
      }
    }
    // Aggiorna il tracker di posizione history (per abilitare/disabilitare frecce interne)
    _onHistoryPop(e.state);
    const { route, params, blockHash } = readUrl();
    if (blockHash) state.pendingBlockHash = blockHash;
    navigate(route, params);
  }

  function init() {
    window.addEventListener('hashchange', _onHashChange);
    window.addEventListener('popstate', _onPopState);
  }

  return { buildHash, updateUrl, readUrl, init };
})();

function navigate(route, params = {}) {
  if (state.editingContext && state.editingContext.isDirty) {
    if (!confirm("Hai modifiche non salvate. Sicuro di uscire dall'editor?")) return;
  }
  if (state.editorInstance) { try { state.editorInstance.destroy(); } catch {} state.editorInstance = null; }
  if (state.editingContext && state.editingContext.hasLock) {
    locks.release(state.editingContext.slug).catch(() => {});
  }
  state.editingContext = null;
  // Se l'overlay di ricerca è aperto e stiamo navigando altrove (non per chiuderlo), chiudilo
  // MA lascia il testo nell'input: l'utente lo cancella solo manualmente (input vuoto o ✕).
  // Importante: usare closeSearchOverlay() che rimuove anche `body.search-overlay-open`
  // (position:fixed) altrimenti lo scroll della pagina sotto resta bloccato.
  const searchOverlay = document.getElementById('search-overlay');
  if (searchOverlay && !searchOverlay.classList.contains('hidden') && route !== 'search') {
    if (typeof closeSearchOverlay === 'function') closeSearchOverlay();
    else searchOverlay.classList.add('hidden');
  }
  state.currentView = route;
  window.removeEventListener('beforeunload', beforeUnloadHandler);

  // Highlight active nav-tree row by route
  $$('.nav-tree-row').forEach(el => {
    el.classList.remove('active');
  });
  $$('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.route === route || (route.startsWith(el.dataset.route + '-') && el.dataset.route));
  });
  // Save current view+params for re-render after edit toggle
  state.currentView = route;
  state.currentParams = params;
  // Sincronizza l'URL del browser per supportare bookmark, refresh, bottone indietro,
  // condivisione link, deep-link da NotebookLM/altre app. Aggiorna anche il contatore
  // di posizione history per i pulsanti freccia interni.
  if (typeof urlRouter !== 'undefined') urlRouter.updateUrl(route, params);
  if (route !== 'search') $('global-search').value = '';

  switch (route) {
    case 'home': renderHome(); break;
    case 'manuale': renderManuale(); break;
    case 'capitolo': renderCapitolo(params.id); break;
    case 'procedure': renderProcedureList(); break;
    case 'procedure-cat': renderProcedureByCategoria(params.cat, params.sub); break;
    case 'clinica': renderClinicaList(params.sub); break;
    case 'clinica-scheda': renderSchedaClinica(params.slug); break;
    case 'clinica-edit': renderSchedaClinicaEditor(params.slug); break;
    case 'procedura': renderProcedura(params.slug); break;
    case 'procedura-edit': renderProceduraEditor(params.slug); break;
    case 'numeri': renderNumeri(params.filter); break;
    case 'moduli': renderModuliList(); break;
    case 'modulo': renderModulo(params.slug); break;
    case 'tabelle': renderTabelleList(); break;
    case 'tabella': renderTabella(params.slug); break;
    case 'calendario': renderCalendario(params); break;
    case 'cestino': renderCestino(); break;
    case 'cestino-utenti': renderCestinoUtenti(); break;
    case 'utenti': renderGestioneUtenti(); break;
    case 'attivita': renderAttivita(); break;
    case 'search': renderSearchResults(params.query); break;
    case 'tag': renderTagPage(params.tag); break;
    default: renderHome();
  }
  window.scrollTo({ top: 0, behavior: 'instant' });
}

}

function renderPinnedSchedaCard(pin) {
  if (pin.type === 'procedura') {
    const p = state.index.procedure.find(x => x.slug === pin.slug);
    return p ? renderProcedureCard(p) : null;
  }
  if (pin.type === 'clinica') {
    const c = (state.index.clinica || []).find(x => x.slug === pin.slug);
    return c ? renderClinicaCard(c) : null;
  }
  if (pin.type === 'modulo') {
    const m = state.index.moduli.find(x => x.slug === pin.slug);
    if (!m) return null;
    return `<div class="procedure-card" onclick="navigate('modulo', {slug:'${escapeJs(m.slug)}'})">
      <div class="procedure-card-title">${escapeHtml(m.titolo || m.slug)}</div>
      <div class="procedure-card-meta"><span>Modulo</span></div>
    </div>`;
  }
  if (pin.type === 'tabella') {
    const t = state.index.tabelle.find(x => x.slug === pin.slug);
    if (!t) return null;
    return `<div class="procedure-card" onclick="navigate('tabella', {slug:'${escapeJs(t.slug)}'})">
      <div class="procedure-card-title">${escapeHtml(t.titolo || t.slug)}</div>
      <div class="procedure-card-meta"><span>Tabella</span></div>
    </div>`;
  }
  return null;
}

    return `<div class="pinned-folder" onclick="navigate('procedure-cat', {cat:'${escapeJs(pin.cat)}'})">

    return `<div class="pinned-folder" onclick="navigate('procedure-cat', {cat:'${escapeJs(pin.cat)}', sub:'${escapeJs(pin.sub)}'})">

        <div class="pinned-folder-sub">Clinica · ${count} sched${count === 1 ? 'a' : 'e'}</div>
      </div>
