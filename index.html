                </button>
                ${renderPinButton('gruppo', g.id)}
              </div>`;
            }).join('')}
          </div>`}`;
      }
      return `
        ${showHeader ? `<h3 class="numeri-source-header" style="margin:28px 0 12px;font-family:var(--serif);font-size:15px;color:var(--ink-muted);font-weight:500;border-bottom:1px solid var(--rule-soft);padding-bottom:6px;">${escapeHtml(sourceLabels[src])}</h3>` : ''}
        ${list.map(g => {
          const isManuallyExpanded = rubricaQuery && (state.rubricaExpandedGroups || new Set()).has(g.id);
          const isGuardiaFilter = filter === 'guardia';
          const displayName = isGuardiaFilter ? stripPrefixNome(g.nome) : g.nome;
          return `
          <div class="numeri-group">
            <h2 class="numeri-group-title">
              ${rubricaQuery
                ? `<a href="#" onclick="event.preventDefault(); showAllFromGroup('${escapeJs(g.id)}')" style="color:inherit;text-decoration:none;border-bottom:1px dotted var(--rule-strong);cursor:pointer;" title="Mostra tutti i numeri di questa UOC">${escapeHtml(displayName)}</a>`
                : (filter && filter !== g.id)
                  ? `<a href="#" onclick="event.preventDefault(); navigate('numeri', {filter:'${escapeJs(g.id)}'})" style="color:inherit;text-decoration:none;border-bottom:1px dotted var(--rule-strong);cursor:pointer;" title="Apri tutta la UOC">${escapeHtml(displayName)}</a>`
                  : escapeHtml(displayName)
              }${isGuardiaFilter ? '' : renderUbicazioneBadge(g.ubicazione)} ${renderPinButton('gruppo', g.id)}
              <span style="margin-left:auto;display:inline-flex;gap:6px;align-items:center;">
                ${isManuallyExpanded ? `<button class="btn-icon-mini" onclick="collapseGroup('${escapeJs(g.id)}')" title="Nascondi tutti i numeri di questa UOC" style="font-size:11px;color:var(--ink-muted);">↕ nascondi</button>` : ''}
                <span class="edit-only" style="display:inline-flex;gap:6px;">
                  <button class="btn-icon-mini" onclick="renameGruppoNumeri('${escapeJs(g.id)}')" title="Modifica gruppo">✎</button>
                  <button class="btn-icon-mini" onclick="deleteGruppoNumeri('${escapeJs(g.id)}')" title="Elimina gruppo">🗑</button>
                </span>
              </span>
            </h2>
            ${g.direttore ? `<div style="font-size:12px;color:var(--ink-muted);font-style:italic;margin-bottom:8px;">Direttore: ${escapeHtml(g.direttore)}</div>` : ''}
            ${g.email ? `<div style="font-size:12px;color:var(--accent);margin-bottom:8px;font-family:var(--mono);">${escapeHtml(g.email)}</div>` : ''}
            ${(function(){
              const sorted = sortContattiForDisplay(g.contatti || []);
              const buckets = groupContattiBySede(sorted, g.sedi_operative, g.sede_operativa);
              // Se c'è una sola bucket senza sede (UOC senza sedi strutturate), render flat senza header
              if (buckets.length === 1 && buckets[0].sedeKey === '_all') {
                return buckets[0].contatti.map(c => renderNumeroRow(c, g.id, c._classify)).join('');
              }
              // Se sto cercando o ho filtro contatto/guardia: tutto espanso
              const autoExpandAll = !!(rubricaQuery || (filter && filter !== g.id) || filter === 'guardia');
              if (!state.expandedSedi) state.expandedSedi = {};
              const expanded = state.expandedSedi[g.id] || new Set();
              return buckets.map(b => {
                // Calcolo la "location string" del bucket per confrontarla col luogo del singolo contatto
                const sedeLoc = b.sede
                  ? [b.sede.edificio, b.sede.piano, b.sede.area].filter(Boolean).join(' ')
                  : '';
                const sedeLocLower = sedeLoc.toLowerCase().trim();
                // Normalizza: rimuove separatori per confronto più tollerante
                const normalize = (s) => s.toLowerCase().replace(/[·|\-,]/g, ' ').replace(/\s+/g, ' ').trim();
                const sedeLocN = normalize(sedeLoc);
                const isOpen = autoExpandAll || expanded.has(b.sedeKey);
                const headerInner = b.sede
                  ? renderSedeBucketHeader(b.sede)
                  : `<span class="sede-bucket-tipo">Altro</span>`;
                return `<div class="sede-bucket" data-bucket="${escapeHtml(b.sedeKey)}">
                  <button class="sede-bucket-toggle ${isOpen ? 'open' : ''}" onclick="toggleSedeBucket('${escapeJs(g.id)}','${escapeJs(b.sedeKey)}')">
                    <span class="sede-bucket-caret">${isOpen ? '▾' : '▸'}</span>
                    ${headerInner}
                  </button>
                  ${isOpen ? `<div class="sede-bucket-contatti">${b.contatti.map(c => {
                    // Nascondi il luogo del contatto se sostanzialmente uguale al luogo del bucket sede
                    const cLuogoN = normalize(c.luogo || '');
                    let hide = false;
                    if (sedeLocN && cLuogoN) {
                      hide = cLuogoN === sedeLocN
                        || cLuogoN.includes(sedeLocN)
                        || sedeLocN.includes(cLuogoN);
                      // Confronto token: tutti i token del luogo contatto sono nel sedeLoc?
                      if (!hide) {
                        const cToks = cLuogoN.split(' ').filter(Boolean);
                        const sToks = new Set(sedeLocN.split(' ').filter(Boolean));
                        hide = cToks.length > 0 && cToks.every(t => sToks.has(t));
                      }
                    }
                    return renderNumeroRow(c, g.id, c._classify, { hideLuogo: hide });
                  }).join('')}</div>` : ''}
                </div>`;
              }).join('');
            })()}
            ${rubricaQuery && !isManuallyExpanded && (function(){
              // Se sto filtrando e questa UOC ha più contatti di quelli visibili, mostra un hint
              const fullGroup = allGroups.find(x => x.id === g.id);
              const totalContacts = fullGroup ? (fullGroup.contatti || []).length : 0;
              const visibleContacts = (g.contatti || []).length;
              const hidden = totalContacts - visibleContacts;
              if (hidden > 0) {
                return `<div style="margin-top:8px;padding:8px 10px;background:var(--bg-sink);border-radius:2px;font-size:12px;">
                  <a href="#" onclick="event.preventDefault(); showAllFromGroup('${escapeJs(g.id)}')" style="color:var(--accent);text-decoration:none;">+ ${hidden} altri numeri in questa UOC →</a>
                </div>`;
              }
              return '';
            })()}
            <div class="edit-only" style="margin-top:8px;">
              <button class="btn ghost" onclick="nuovoContatto('${escapeJs(g.id)}')" style="font-size:12px;">+ Aggiungi contatto</button>
            </div>
          </div>`;
        }).join('')}
      `;
    }).join('')}`;
}

function renderHomeNumeriSection() {
  const cids = (state.userPrefs && state.userPrefs.home_numeri) || [];
  const editMode = navState.editMode;
  // Risolvi contatti da cid
  const items = [];
  cids.forEach(cid => {
    for (const g of (state.index.numeri || [])) {
      const c = (g.contatti || []).find(x => x.id === cid);
      if (c) { items.push({ c, g }); break; }
    }
  });

  const searchBox = editMode ? `
    <div style="margin-bottom:12px;">
      <input type="text" id="home-numeri-search" placeholder="Cerca tra i preferiti della rubrica…"
        oninput="renderHomeNumeriSearchResults(this.value)"
        style="width:100%;padding:8px 12px;border:1px solid var(--rule);border-radius:3px;font-size:14px;font-family:var(--serif);background:var(--bg-paper);">
      <div id="home-numeri-search-results" style="margin-top:6px;"></div>
    </div>` : '';

  if (editMode) setTimeout(() => renderHomeNumeriSearchResults(''), 0);

  const itemsHtml = items.map(({ c, g }) => {
    const nums = (c.numeri || []).join(' · ');
    const extra = [c.breve ? `br. ${c.breve}` : '', c.cellulare || ''].filter(Boolean).join(' · ');
    const dispNum = [nums, extra].filter(Boolean).join(' · ');
    return `<div class="home-numero-row" data-cid="${escapeHtml(c.id)}">
      ${editMode ? '<span class="drag-handle" title="Trascina">⋮⋮</span>' : ''}
      <div class="home-numero-text" onclick="navigate('numeri', {filter:'${escapeJs(c.id)}'})">
        <div class="home-numero-label">${escapeHtml(c.etichetta)}</div>
        <div class="home-numero-uoc">${escapeHtml(stripPrefixNome(g.nome))}</div>
      </div>
      <div class="home-numero-num">${escapeHtml(dispNum || '—')}</div>
      ${editMode ? `<button class="btn-icon-mini" onclick="removeHomeNumero('${escapeJs(c.id)}')" title="Rimuovi">✕</button>` : ''}
    </div>`;
  }).join('');

  const empty = !items.length && !editMode
    ? `<div class="empty-pins" style="padding:16px;font-size:13px;">Nessun numero in home. Clicca <em>Modifica</em> per aggiungerli.</div>`
    : '';

  setTimeout(() => initHomeNumeriSortable(), 0);

  return `<div class="home-section home-pins-group">
    <div class="home-section-title"><span>Numeri</span></div>
    ${searchBox}
    <div id="home-numeri-list">${itemsHtml}</div>
    ${empty}
  </div>`;
}

function initHomeNumeriSortable() {
  if (typeof Sortable === 'undefined' || !navState.editMode) return;
  const el = document.getElementById('home-numeri-list');
  if (el && !el._sortable) {
    el._sortable = Sortable.create(el, {
      handle: '.drag-handle',
      animation: 150,
      onEnd: () => {
        const order = Array.from(el.children).map(x => x.dataset.cid).filter(Boolean);
        userPrefs.reorderHomeNumeri(order);
      }
    });
  }
}

function renderHomeNumeriSearchResults(query) {
  const box = document.getElementById('home-numeri-search-results');
  if (!box) return;
  const q = (query || '').trim().toLowerCase();
  // Raccolgo solo contatti pinnati nella rubrica
  const pinnedContatti = [];
  (state.index.numeri || []).forEach(g => {
    (g.contatti || []).forEach(c => {
      if (c.id && isPinned('contatto', c.id)) {
        pinnedContatti.push({ c, g });
      }
    });
  });
  if (!pinnedContatti.length) {
    box.innerHTML = '<div style="font-size:12px;color:var(--ink-muted);padding:8px;font-style:italic;">Nessun numero preferito nella rubrica. Vai in <em>Rubrica</em> e clicca ☆ accanto ai numeri che vuoi rendere disponibili qui.</div>';
    return;
  }
  // Filtro per substring match su etichetta, gruppo, numeri (se query non vuota)
  const filtered = q
    ? pinnedContatti.filter(({ c, g }) => {
        const hay = (c.etichetta + ' ' + g.nome + ' ' + (c.numeri || []).join(' ') + ' ' + (c.cellulare || '') + ' ' + (c.breve || '')).toLowerCase();
        return hay.includes(q);
      })
    : pinnedContatti.slice(0, 12); // mostra primi 12 senza filtro
  const already = new Set((state.userPrefs && state.userPrefs.home_numeri) || []);
  if (!filtered.length) {
    box.innerHTML = '<div style="font-size:12px;color:var(--ink-muted);padding:6px;">Nessun risultato tra i preferiti</div>';
    return;
  }
  box.innerHTML = filtered.slice(0, 12).map(({ c, g }) => {
    const isIn = already.has(c.id);
    const numStr = (c.numeri || []).join(' · ');
    return `<div class="home-numeri-search-item">
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;color:var(--ink);">${escapeHtml(c.etichetta)}</div>
        <div style="font-size:11px;color:var(--ink-muted);">${escapeHtml(stripPrefixNome(g.nome))}${numStr ? ' · ' + escapeHtml(numStr) : ''}</div>
      </div>
      <button class="btn-icon-mini" onclick="addHomeNumero('${escapeJs(c.id)}')" ${isIn ? 'disabled title="Già in home"' : 'title="Aggiungi"'}>${isIn ? '✓' : '+'}</button>
    </div>`;
  }).join('');
}

function addHomeNumero(cid) {
  if (!userPrefs.hasHomeNumero(cid)) {
    userPrefs.toggleHomeNumero(cid);
    renderHome();
  }
}
function removeHomeNumero(cid) {
  if (userPrefs.hasHomeNumero(cid)) {
    userPrefs.toggleHomeNumero(cid);
    renderHome();
  }
}

function renderPinnedContattiSection(allGroups) {
  // Raccoglie tutti i contatti pinnati con il loro gruppo
  const pinnedGroups = []; // [{ gid, nome, contatti: [c1, c2...] }]
  allGroups.forEach(g => {
    const pinnedContatti = (g.contatti || []).filter(c => c.id && isPinned('contatto', c.id));
    if (pinnedContatti.length) pinnedGroups.push({ gid: g.id, nome: g.nome, contatti: pinnedContatti });
  });

  if (!pinnedGroups.length) {
    return `<div style="padding:24px 20px;background:var(--bg-sink);border:1px dashed var(--rule);border-radius:3px;text-align:center;">
      <div style="font-size:28px;color:var(--ink-faint);margin-bottom:8px;">☆</div>
      <div style="font-size:14px;color:var(--ink);margin-bottom:6px;font-weight:500;">Nessun numero preferito</div>
      <div style="font-size:12px;color:var(--ink-muted);line-height:1.5;">Apri una UOC e clicca ☆ accanto a un numero per aggiungerlo ai preferiti.</div>
    </div>`;
  }

  // Ordina UOC secondo pin_order._uoc
  const uocOrder = userPrefs.getUocOrder();
  pinnedGroups.sort((a, b) => {
    const ia = uocOrder.indexOf(a.gid);
    const ib = uocOrder.indexOf(b.gid);
    if (ia === -1 && ib === -1) return stripPrefixNome(a.nome).localeCompare(stripPrefixNome(b.nome), 'it');
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });

  // Ordina contatti dentro ogni UOC
  pinnedGroups.forEach(pg => {
    const order = userPrefs.getContactOrder(pg.gid);
    pg.contatti.sort((a, b) => {
      const ia = order.indexOf(a.id);
      const ib = order.indexOf(b.id);
      if (ia === -1 && ib === -1) return 0;
      if (ia === -1) return 1;
      if (ib === -1) return -1;
      return ia - ib;
    });
  });

  const editMode = navState.editMode;
  const editHint = editMode
    ? `<div style="font-size:11px;color:var(--ink-muted);font-style:italic;margin-bottom:10px;">✋ Trascina per riordinare UOC o numeri dentro una UOC</div>`
    : '';

  const groupsHtml = pinnedGroups.map(pg => {
    const contattiHtml = pg.contatti.map(c => {
      const nums = (c.numeri || []).join(' · ');
      const extra = [c.breve ? `br. ${c.breve}` : '', c.cellulare || ''].filter(Boolean).join(' · ');
      const dispNum = [nums, extra].filter(Boolean).join(' · ');
      return `<div class="pinned-contatto-row" data-cid="${escapeHtml(c.id)}">
        ${editMode ? '<span class="drag-handle" title="Trascina">⋮⋮</span>' : ''}
        <span class="pinned-contatto-label" onclick="navigate('numeri', {filter:'${escapeJs(c.id)}'})">${escapeHtml(c.etichetta)}</span>
        <span class="pinned-contatto-num">${escapeHtml(dispNum || '—')}</span>
        ${renderPinButton('contatto', c.id)}
      </div>`;
    }).join('');

    return `<div class="pinned-uoc-block" data-gid="${escapeHtml(pg.gid)}">
      <div class="pinned-uoc-header">
        ${editMode ? '<span class="drag-handle drag-handle-uoc" title="Trascina UOC">⋮⋮</span>' : ''}
        <a href="#" onclick="event.preventDefault(); navigate('numeri', {filter:'${escapeJs(pg.gid)}'})" class="pinned-uoc-name">${escapeHtml(stripPrefixNome(pg.nome))}</a>
        <span style="font-size:11px;color:var(--ink-muted);font-family:var(--mono);">${pg.contatti.length}</span>
      </div>
      <div class="pinned-uoc-contatti" data-gid="${escapeHtml(pg.gid)}">${contattiHtml}</div>
    </div>`;
  }).join('');

  // Init Sortable after render (setTimeout per garantire DOM ready)
  setTimeout(() => initPinnedSortables(), 0);

  return `${editHint}<div id="pinned-uoc-list">${groupsHtml}</div>`;
}

function initPinnedSortables() {
  if (typeof Sortable === 'undefined') return;
  if (!navState.editMode) return;
  const uocList = document.getElementById('pinned-uoc-list');
  if (uocList && !uocList._sortable) {
    uocList._sortable = Sortable.create(uocList, {
      handle: '.drag-handle-uoc',
      animation: 150,
      onEnd: () => {
        const order = Array.from(uocList.children).map(el => el.dataset.gid).filter(Boolean);
        userPrefs.setUocOrder(order);
      }
    });
  }
  document.querySelectorAll('.pinned-uoc-contatti').forEach(el => {
    if (el._sortable) return;
    el._sortable = Sortable.create(el, {
      handle: '.drag-handle:not(.drag-handle-uoc)',
      animation: 150,
      onEnd: () => {
        const gid = el.dataset.gid;
        const order = Array.from(el.children).map(c => c.dataset.cid).filter(Boolean);
        userPrefs.setContactOrder(gid, order);
      }
    });
  });
}

function classifyContatto(c) {
  // Pending edits: se l'utente ha cambiato il tag in edit mode ma non ancora salvato,
  // usa il valore pending per la classificazione
  const pendingKind = (c.id && state.pendingTagEdits && state.pendingTagEdits.has(c.id))
    ? state.pendingTagEdits.get(c.id)
    : undefined;
  const effectiveKind = pendingKind !== undefined ? pendingKind : c.kind;
  if (effectiveKind) {
    const kindToGroup = { guardia: 1, reparto: 2, utile: 2, ambulatorio: 3, direzione: 4, segreteria: 4 };
    const g = kindToGroup[effectiveKind];
    if (g) {
      const kind = (effectiveKind === 'segreteria') ? 'segreteria' : effectiveKind;
      return { group: g, kind };
    }
  }
  const label = (c.etichetta || '').toLowerCase();
  const tags = (c.tag || []).map(t => t.toLowerCase());
  const isGuardia = tags.includes('guardia') || /\b(guardia|mdg|medico di guardia|reperibile)\b/i.test(c.etichetta || '');
  // Reparto / aree cliniche operative. Uso prefix match per degenz/infermier (no \b finale).
  const isReparto = /\b(reparto|guardiola|caposala|coordinat|sala medici|sala operatoria|medici di reparto|degenz|infermier|\bdeg\b|front office|u\.?c\.?i\.?c|u\.?t\.?i\.?c|unità coronarica|terapia intensiva|subintensiva|sub-intensiva|emodinamica|elettrofisiologia|bancone|area infermieri|stud(io|i) medici)/i.test(c.etichetta || '');
  // Solo segreteria (non direttori/studi), che merita tag "Segr."
  const isSegreteria = /\b(segreteria|segr\.)\b/i.test(c.etichetta || '');
  // Direzione pura (direttore, studi professori, scuola, didattica) — NON taggata di default
  const isDirezione = /\b(direttore|studio (medico|prof|dr|dott)|scuola|didattic|universitari[oa])\b/i.test(c.etichetta || '');
  const isAmb = /\b(ambulator|amb\.|polisonno|\beco\b|rmn|\btac\b|endoscop)\b/i.test(c.etichetta || '');
  if (isGuardia) return { group: 1, kind: 'guardia' };
  if (isReparto) return { group: 2, kind: 'reparto' };
  if (isAmb) return { group: 3, kind: 'ambulatorio' };
  if (isSegreteria) return { group: 4, kind: 'segreteria' };
  if (isDirezione) return { group: 5, kind: 'altro' };  // direzione senza tag, in fondo
  return { group: 3, kind: 'altro' };
}

function sortContattiForDisplay(contatti) {
  // Sub-priorità dentro "reparto": 
  //   1 = studi medici / medici di reparto / specializzandi (vengono PRIMA)
  //   2 = caposala / coordinatore (figure di organizzazione clinica)
  //   3 = guardiola / area infermieri (numeri del bancone infermieristico — DOPO)
  //   4 = altro (sale operatorie, piastre, box, ecc.)
  const repartoSubPriority = (c) => {
    const label = (c.etichetta || '').toLowerCase();
    const tags = (c.tag || []).map(t => t.toLowerCase());
    // 1 — studi medici, specializzandi, medici di reparto
    if (/stud(io|i) medic|medici di reparto|specializz|\bdr\.|\bprof\.|dott\.|\bdottor/i.test(label)) return 1;
    // 2 — caposala e coordinatori
    if (/caposala|coordinat/i.test(label)) return 2;
    // 3 — guardiola (sempre per ultima tra reparto "classico")
    if (tags.includes('guardiola') || /guardiola|bancone/i.test(label)) return 3;
    // 4 — altro (sale operatorie, piastre, box, ecc.)
    // 5 — numeri marcati "utili": dopo il gruppo reparto, prima degli ambulatori
    if (c.kind === 'utile') return 5;
    return 4;
  };
  const withClass = contatti.map((c, idx) => ({ ...c, _classify: classifyContatto(c), _origIdx: idx }));
  withClass.sort((a, b) => {
    if (a._classify.group !== b._classify.group) return a._classify.group - b._classify.group;
    // Dentro gruppo "reparto" (2) applico sub-priorità
    if (a._classify.group === 2) {
      const subA = repartoSubPriority(a);
      const subB = repartoSubPriority(b);
      if (subA !== subB) return subA - subB;
    }
    return a._origIdx - b._origIdx;
  });
  return withClass;
}

// Raggruppa i contatti per sede operativa. Mappa ogni contatto a una sede_operativa
// del gruppo usando la sezione del contatto. I contatti senza mapping vanno in "Altro".
// Ritorna array di buckets: [{ sede, sedeKey, label, contatti }]
function groupContattiBySede(contatti, sedi_operative, sede_operativa) {
  const sedi = (sedi_operative && sedi_operative.length)
    ? sedi_operative
    : (sede_operativa ? [sede_operativa] : []);
  if (!sedi.length) {
    // Nessuna sede operativa strutturata: unico bucket "Tutti"
    return [{ sede: null, sedeKey: '_all', label: null, contatti }];
  }
  // Mapping tipo sede → regex su sezione contatto
  const sedeMatchers = [
    { tipo: 'ucic',             re: /ucic|unit[àa] coronarica|terapia intensiva cardiolog/i },
    { tipo: 'utic',             re: /utic/i },
    { tipo: 'emodinamica',      re: /emodinamica|cardiologia intervent/i },
    { tipo: 'elettrofisiologia', re: /elettrofisiolog/i },
    { tipo: 'riabilitazione',   re: /riabilit/i },
    { tipo: 'terapia_intensiva', re: /terapia intensiva|rianimaz/i },
    { tipo: 'sub_intensiva',    re: /sub.?intensiva/i },
    { tipo: 'day_hospital',     re: /day hospital|\bdh\b/i },
    { tipo: 'sala_operatoria',  re: /sala operator|sale operator|\bso\b/i },
    { tipo: 'degenze',          re: /degenz|reparto|front office|bancone|area infermier/i },
    { tipo: 'studi_medici',     re: /stud(io|i) medic/i },
    { tipo: 'ambulatori',       re: /ambulator|\bamb\./i },
    { tipo: 'laboratorio',      re: /laborator/i },
    { tipo: 'segreteria',       re: /segreteria|segr\./i },
    { tipo: 'portineria',       re: /portineria/i },
    { tipo: 'libera_professione', re: /libera profession/i },
  ];
  // Crea bucket per ogni sede operativa (nello stesso ordine delle sedi)
  const buckets = sedi.map((s, idx) => ({
    sede: s, sedeKey: `sede_${idx}`, tipo: s.tipo,
    contatti: []
  }));
  const altro = { sede: null, sedeKey: '_altro', tipo: null, contatti: [] };
  // Assegna ogni contatto al bucket migliore
  contatti.forEach(c => {
    const sez = (c.sezione || '').toLowerCase();
    const et  = (c.etichetta || '').toLowerCase();
    const text = sez + ' ' + et;
    // Trova il tipo più specifico che matcha
    let matchedTipo = null;
    for (const m of sedeMatchers) {
      if (m.re.test(text)) { matchedTipo = m.tipo; break; }
    }
    // Cerca un bucket con quel tipo
    const bucket = matchedTipo ? buckets.find(b => b.tipo === matchedTipo) : null;
    if (bucket) bucket.contatti.push(c);
    else altro.contatti.push(c);
  });
  // Ritorno solo bucket non vuoti, ordinati per priorità clinica
  // (sedi cliniche/operative prima, poi supporto, poi amministrativo)
  const tipoPriority = {
    // Sedi cliniche / sale operatorie (priorità alta)
    ucic: 1, utic: 2, terapia_intensiva: 3, sub_intensiva: 4,
    emodinamica: 5, elettrofisiologia: 6,
    sala_operatoria: 7, diagnostica: 8,
    degenze: 10, day_hospital: 11, riabilitazione: 12,
    studi_medici: 13,
    // Ambulatori (priorità media)
    ambulatori: 20,
    laboratorio: 25,
    // Amministrativo / servizi (priorità bassa)
    segreteria: 40, libera_professione: 41, portineria: 42,
  };
  const result = buckets
    .filter(b => b.contatti.length)
    .sort((a, b) => (tipoPriority[a.tipo] || 30) - (tipoPriority[b.tipo] || 30));
  if (altro.contatti.length) result.push(altro);
  return result;
}

function toggleSedeBucket(gid, sedeKey) {
  if (!state.expandedSedi) state.expandedSedi = {};
  if (!state.expandedSedi[gid]) state.expandedSedi[gid] = new Set();
  const set = state.expandedSedi[gid];
  if (set.has(sedeKey)) set.delete(sedeKey);
  else set.add(sedeKey);
  // Re-render only this bucket area: simplest is full re-render of numeri view
  const params = state.currentParams || {};
  renderNumeri(params.filter);
}

// Apre la UOC filtrata con solo questo bucket espanso, scroll al bucket
function openUocWithSede(gid, sedeKey) {
  if (!state.expandedSedi) state.expandedSedi = {};
  // Collasso tutte le altre sedi di questa UOC, espando solo quella scelta
  state.expandedSedi[gid] = new Set([sedeKey]);
  // Pulisco la search globale (l'overlay ricerca si chiude da solo via click handler)
  state.rubricaSearch = '';
  navigate('numeri', { filter: gid });
  // Scroll al bucket dopo il render
  requestAnimationFrame(() => {
    setTimeout(() => {
      const el = document.querySelector(`.sede-bucket[data-bucket="${sedeKey}"]`);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        // Flash evidenziazione
        el.style.transition = 'background-color 0.3s';
        el.style.backgroundColor = 'rgba(43,74,111,0.08)';
        setTimeout(() => { el.style.backgroundColor = ''; }, 1200);
      }
    }, 80);
  });
}

function renderNumeroRow(c, gruppoId, classify, opts) {
  const hideLuogo = opts && opts.hideLuogo;
  const tags = c.tag || [];
  const cls = classify || (c._classify || classifyContatto(c));
  const rowClass = cls.kind === 'guardia' ? 'numero-row numero-row-guardia'
    : cls.kind === 'reparto' ? 'numero-row numero-row-reparto'
    : cls.kind === 'utile' ? 'numero-row numero-row-utile'
    : 'numero-row';
  const guardiaBadge = tags.includes('guardia') ? `<span class="badge">Guardia</span>` : '';
  const guardiolaBadge = tags.includes('guardiola') ? `<span class="badge" style="background:var(--accent-soft);color:var(--accent);">🏥 Guardiola</span>` : '';
  const repartoBadge = cls.kind === 'reparto' && !tags.includes('guardiola') ? `<span class="badge" style="background:var(--accent-soft);color:var(--accent);">Reparto</span>` : '';
  const utileBadge = cls.kind === 'utile' ? `<span class="badge" style="background:#e8f5e9;color:#2e7d32;">● Utili</span>` : '';
  const orari = c.orari ? ` · ore ${escapeHtml(c.orari)}` : '';
  const note = c.note ? `<div class="numero-note">${escapeHtml(c.note)}</div>` : '';
  const sezione = c.sezione ? `<div style="font-size:11px;color:var(--ink-muted);margin-top:1px;">${escapeHtml(c.sezione)}</div>` : '';
  const luogo = (c.luogo && !hideLuogo) ? `<div style="font-size:10px;color:var(--ink-muted);margin-top:1px;opacity:.75;">📍 ${escapeHtml(c.luogo)}</div>` : '';
  const email = c.email ? `<div style="font-size:11px;color:var(--accent);font-family:var(--mono);margin-top:2px;">${escapeHtml(c.email)}</div>` : '';
  // Numbers: internal extensions, then mobile, then breve
  const numBtns = [];
  (c.numeri || []).forEach(n => {
    numBtns.push(`<button class="numero-btn" onclick="copyNumber('${escapeHtml(String(n))}')" title="Copia interno">${escapeHtml(String(n))}</button>`);
  });
  if (c.cellulare) {
    const cells = Array.isArray(c.cellulare) ? c.cellulare : [c.cellulare];
    cells.forEach(cell => {
      numBtns.push(`<button class="numero-btn" onclick="copyNumber('${escapeHtml(String(cell))}')" title="Cellulare" style="background:var(--accent-soft);">📱 ${escapeHtml(String(cell))}</button>`);
    });
  }
  if (c.breve) {
    numBtns.push(`<button class="numero-btn" onclick="copyNumber('${escapeHtml(String(c.breve))}')" title="Numero breve" style="background:var(--rule-soft);">br ${escapeHtml(String(c.breve))}</button>`);
  }
  const editControls = c.id ? `<span class="edit-only" style="display:inline-flex;gap:4px;margin-left:6px;">
    <button class="btn-icon-mini" onclick="editContatto('${escapeJs(c.id)}')" title="Modifica">✎</button>
    <button class="btn-icon-mini" onclick="deleteContatto('${escapeJs(c.id)}')" title="Elimina">🗑</button>
  </span>` : '';
  // Kind selector: chip inline per cambiare classificazione senza aprire editor
  // In edit mode le modifiche sono pending (salva con "Salva modifiche")
  const pendingKind = state.pendingTagEdits && state.pendingTagEdits.has(c.id)
    ? state.pendingTagEdits.get(c.id)
    : undefined;
  const hasPending = pendingKind !== undefined;
  const effectiveKind = hasPending ? pendingKind : c.kind;
  const currentKind = effectiveKind || cls.kind;
  const isAuto = !effectiveKind;
  const kindSelector = c.id ? `<div class="edit-only kind-selector" style="margin-top:4px;display:inline-flex;gap:4px;flex-wrap:wrap;align-items:center;">
    <span style="font-size:10px;color:var(--ink-muted);font-family:var(--mono);letter-spacing:.04em;">TAG:</span>
    <button class="kind-chip ${currentKind === 'guardia' ? 'active' : ''}" onclick="setContactKind('${escapeJs(c.id)}','guardia')" title="Guardia / MdG / Reperibile" style="--chip-color:var(--danger);--chip-bg:#fef0ef;">🔴 Guardia</button>
    <button class="kind-chip ${currentKind === 'reparto' ? 'active' : ''}" onclick="setContactKind('${escapeJs(c.id)}','reparto')" title="Reparto / Degenze / Infermieri" style="--chip-color:var(--accent);--chip-bg:var(--accent-soft);">🔵 Reparto</button>
    <button class="kind-chip ${currentKind === 'utile' ? 'active' : ''}" onclick="setContactKind('${escapeJs(c.id)}','utile')" title="Numero utile da evidenziare" style="--chip-color:#2e7d32;--chip-bg:#e8f5e9;">🟢 Utili</button>
    ${effectiveKind ? `<button class="kind-chip-reset" onclick="setContactKind('${escapeJs(c.id)}',null)" title="Torna a rilevamento automatico">✕ auto</button>` : `<span style="font-size:10px;color:var(--ink-muted);font-style:italic;">auto</span>`}
    ${hasPending ? `<span style="font-size:10px;color:var(--warning);font-style:italic;">(modificato)</span>` : ''}
  </div>` : '';
  return `
    <div class="${rowClass}">
      <div>
        <div class="numero-label">${guardiaBadge}${guardiolaBadge}${repartoBadge}${utileBadge}${escapeHtml(c.etichetta)}${c.id ? ' ' + renderPinButton('contatto', c.id) : ''}${orari}${editControls}</div>
        ${sezione}
        ${luogo}
        ${email}
        ${note}
        ${kindSelector}
      </div>
      <div class="numero-nums">${numBtns.join('') || '<span style="font-size:12px;color:var(--ink-muted);">—</span>'}</div>
    </div>`;
}

async function copyNumber(n) {
  try {
    await navigator.clipboard.writeText(n);
    toast(`${n} copiato`, 'success', 1500);
  } catch {
    toast('Copia non supportata', 'warning');
  }
}

/* ============================ CESTINO OPERATIONS ============================ */
function nuovaProcedura(preset = {}) {
  const existingSlugs = new Set(state.index.procedure.map(p => p.slug));
  const catOptions = Object.entries(CATEGORIA_LABELS).slice(0, 6).map(([k, v]) =>
    `<option value="${escapeHtml(k)}" ${preset.categoria === k ? 'selected' : ''}>${escapeHtml(v)}</option>`
  ).join('');

  // Collect existing sottocategorie per categoria for autocomplete
  const subsByCat = {};
  state.index.procedure.forEach(p => {
    if (!p.categoria || !p.sottocategoria) return;
    if (!subsByCat[p.categoria]) subsByCat[p.categoria] = new Set();
    subsByCat[p.categoria].add(p.sottocategoria);
  });

  // If creating from a chapter context, show readonly chapter info instead of selector
  const capInfo = preset.capitolo ? (state.index.capitoli || []).find(c => c.id === preset.capitolo) : null;

  showModal({
    title: capInfo ? `Nuovo pezzo del capitolo "${capInfo.titolo}"` : 'Nuova procedura',
    subtitle: capInfo ? 'Verrà aggiunto al capitolo del manuale.' : 'Crea un file vuoto e apre l\'editor.',
    body: `
      <div class="field">
        <label>Titolo</label>
        <input type="text" id="np-titolo" placeholder="es. Richiesta RX torace">
      </div>
      <div class="field">
        <label>Slug (nome file)</label>
        <input type="text" id="np-slug" class="mono-input" placeholder="es. richiesta-rx-torace">
        <div style="font-size:11px;color:var(--ink-muted);margin-top:4px;">Solo minuscole, cifre, trattini. Deve essere unico.</div>
      </div>
      <div class="field">
        <label>Categoria</label>
        <select id="np-categoria">${catOptions}</select>
      </div>
      <div class="field">
        <label>Sottocategoria (opzionale)</label>
        <input type="text" id="np-sottocategoria" class="mono-input" list="np-subs-list" placeholder="es. cardiologia" value="${escapeHtml(preset.sottocategoria || '')}">
        <datalist id="np-subs-list"></datalist>
        <div style="font-size:11px;color:var(--ink-muted);margin-top:4px;">Solo minuscole, cifre, trattini. Suggerimenti in base alla categoria scelta.</div>
      </div>
      ${capInfo ? `<div class="field">
        <label>Capitolo</label>
        <div style="font-family:var(--mono);font-size:13px;color:var(--ink-soft);padding:8px 12px;background:var(--bg-sink);border-radius:2px;">${escapeHtml(capInfo.ordine + '. ' + capInfo.titolo)}</div>
      </div>
      <div class="field">
        <label>Ordine nel capitolo</label>
        <input type="text" id="np-ordine-cap" class="mono-input" placeholder="1, 2, 3...">
      </div>` : ''}
      <div id="np-error" style="color:var(--danger);font-size:13px;display:none;margin-top:8px;"></div>`,
    actions: [
      { label: 'Annulla', variant: 'ghost', onClick: closeModal },
      { label: 'Crea e apri editor', onClick: async () => {
        const titolo = $('np-titolo').value.trim();
        let slug = $('np-slug').value.trim().toLowerCase();
        const categoria = $('np-categoria').value;
        const sottocat = $('np-sottocategoria').value.trim().toLowerCase();
        const err = $('np-error');
        err.style.display = 'none';
        const show = m => { err.textContent = m; err.style.display = 'block'; };
        if (!titolo) return show('Titolo obbligatorio.');
        if (!slug) slug = titolo.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
        if (!/^[a-z0-9-]+$/.test(slug)) return show('Slug non valido.');
        if (existingSlugs.has(slug)) return show('Slug già esistente.');
        if (sottocat && !/^[a-z0-9-]+$/.test(sottocat)) return show('Sottocategoria: solo minuscole, cifre, trattini.');

        const nf = {
          id: slug, titolo,
          categoria,
          tag: [],
          ultima_modifica: nowIso(),
          modificato_da: state.session.username,
          cronologia_recente: [{ data: nowIso(), utente: state.session.username, nota: 'creazione' }]
        };
        if (sottocat) nf.sottocategoria = sottocat;
        if (preset.capitolo) {
          nf.capitolo = preset.capitolo;
          const ordEl = $('np-ordine-cap');
          if (ordEl && ordEl.value.trim()) {
            const n = parseInt(ordEl.value.trim(), 10);
            nf.ordine_nel_capitolo = isNaN(n) ? ordEl.value.trim() : n;
          }
        }

        const body = '';
        const content = stringifyMarkdown(nf, body);
        let path = `content/procedure/${categoria}/`;
        if (sottocat) path += `${sottocat}/`;
        path += `${slug}.md`;

        try {
          const res = await gh.putFile(path, content, null, `Nuova procedura: ${slug} (by ${state.session.username})`);
          closeModal();
          toast(`Procedura "${slug}" creata`, 'success');
          state.index.procedure.push({ slug, path, sha: res.content.sha, ...nf, body_preview: '', body });
          rebuildSearchIndex();
          updateNavCounts();
          navigate('procedura-edit', { slug });
        } catch (e) {
          show('Errore creazione: ' + e.message);
        }
      }}
    ]
  });

  setTimeout(() => {
    const tIn = $('np-titolo'), sIn = $('np-slug'), catIn = $('np-categoria'), subsList = $('np-subs-list');
    let userEditedSlug = false;
    sIn.addEventListener('input', () => { userEditedSlug = true; });
    tIn.addEventListener('input', () => {
      if (userEditedSlug) return;
      sIn.value = tIn.value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
    });
    function updateSubs() {
      const cat = catIn.value;
      const subs = subsByCat[cat] ? [...subsByCat[cat]] : [];
      subsList.innerHTML = subs.map(s => `<option value="${escapeHtml(s)}">`).join('');
    }
    catIn.addEventListener('change', updateSubs);
    updateSubs();
    tIn.focus();
  }, 50);
}

function confirmDelete(type, slug) {
  const entity = state.index[type === 'procedura' ? 'procedure' : type].find(x => x.slug === slug);
  if (!entity) return;
  showModal({
    title: 'Spostare nel cestino?',
    subtitle: `<strong>${escapeHtml(entity.titolo || slug)}</strong> sarà spostato in <code>cestino/</code>. Potrai ripristinarlo o eliminarlo definitivamente dopo.`,
    body: '<p style="font-size:13px;color:var(--ink-muted);">Questa operazione è reversibile dal cestino.</p>',
    actions: [
      { label: 'Annulla', variant: 'ghost', onClick: closeModal },
      { label: 'Sposta nel cestino', variant: 'danger', onClick: () => { closeModal(); softDelete(type, slug); } }
    ]
  });
}

async function softDelete(type, slug) {
  toast('Eliminazione in corso...', 'info', 2000);
  try {
    const typeDir = type === 'procedura' ? 'procedure' : type;
    const srcPath = `content/${typeDir}/${slug}.md`;
    const file = await gh.getFile(srcPath);
    if (!file) throw new Error('File non trovato');

    const { frontmatter, body } = parseMarkdown(file.content);
    frontmatter.eliminato_data = nowIso();
    frontmatter.eliminato_da = state.session.username;
    const archivedContent = stringifyMarkdown(frontmatter, body);

    const ts = nowIso().replace(/[:.]/g, '-').replace(/\..*/, '');
    const newFilename = `${slug}__${ts}__${state.session.username}.md`;
    const newPath = `cestino/${typeDir}/${newFilename}`;

    await gh.putFile(newPath, archivedContent, null, `Sposta nel cestino: ${slug} (by ${state.session.username})`);
    await gh.deleteFile(srcPath, file.sha, `Rimuovi ${slug} (spostato in cestino by ${state.session.username})`);

    toast('Spostato nel cestino', 'success');
    await buildIndex();
    navigate('home');
  } catch (e) {
    toast('Errore: ' + e.message, 'error', 6000);
  }
}

async function restoreFromCestino(path, filename) {
  const m = filename.match(/^(.+?)__\d{4}-\d{2}-\d{2}T/);
  if (!m) return toast('Formato filename non riconosciuto', 'error');
  const targetSlug = m[1];
  const typeDir = path.split('/')[1];
  const targetPath = `content/${typeDir}/${targetSlug}.md`;

  const existing = await gh.getFile(targetPath);
  if (existing) {
    showModal({
      title: 'Conflitto sul nome',
      subtitle: `Esiste già un file attivo <code>${escapeHtml(targetPath)}</code>.`,
      body: `<p style="font-size:14px;color:var(--ink-soft);">Cosa vuoi fare?</p>`,
      actions: [
        { label: 'Annulla', variant: 'ghost', onClick: closeModal },
        { label: 'Sostituisci', variant: 'danger', onClick: () => { closeModal(); doRestore(path, filename, targetSlug, typeDir, true); } },
        { label: 'Ripristina con nome diverso', onClick: () => {
          closeModal();
          const proposed = prompt('Nuovo slug per il file ripristinato:', `${targetSlug}-ripristinato`);
          if (proposed && proposed.trim()) doRestore(path, filename, proposed.trim(), typeDir, false);
        }}
      ]
    });
  } else {
    doRestore(path, filename, targetSlug, typeDir, false);
  }
}

async function doRestore(cestinoPath, cestinoFilename, targetSlug, typeDir, replaceExisting) {
  try {
    const cestinoFile = await gh.getFile(cestinoPath);
    if (!cestinoFile) throw new Error('File nel cestino non trovato');
    const { frontmatter, body } = parseMarkdown(cestinoFile.content);
    delete frontmatter.eliminato_data;
    delete frontmatter.eliminato_da;
    frontmatter.ultima_modifica = nowIso();
    frontmatter.modificato_da = state.session.username;
    const restoredContent = stringifyMarkdown(frontmatter, body);
    const targetPath = `content/${typeDir}/${targetSlug}.md`;

    if (replaceExisting) {
      const existing = await gh.getFile(targetPath);
      const ts = nowIso().replace(/[:.]/g, '-').replace(/\..*/, '');
      const archiveName = `${existing.path.split('/').pop().replace(/\.md$/,'')}__${ts}__${state.session.username}.md`;
      const archivePath = `cestino/${typeDir}/${archiveName}`;
      await gh.putFile(archivePath, existing.content, null, `Archivio pre-restore: ${targetSlug}`);
      await gh.putFile(targetPath, restoredContent, existing.sha, `Ripristina ${targetSlug} (replace) by ${state.session.username}`);
    } else {
      await gh.putFile(targetPath, restoredContent, null, `Ripristina ${targetSlug} by ${state.session.username}`);
    }

    await gh.deleteFile(cestinoPath, cestinoFile.sha, `Svuota cestino: ${cestinoFilename}`);
    toast('Ripristinato', 'success');
    await buildIndex();
    navigate('procedura', { slug: targetSlug });
  } catch (e) {
    toast('Errore ripristino: ' + e.message, 'error', 6000);
  }
}

function purgeFromCestino(path, filename, sha) {
  showModal({
    title: 'Eliminare definitivamente?',
    subtitle: `<strong>${escapeHtml(filename)}</strong> sarà rimosso dal repository. La Git history conserverà comunque la traccia.`,
    body: '<p style="font-size:13px;color:var(--ink-muted);">Operazione non reversibile dal cestino. Solo via Git revert.</p>',
    actions: [
      { label: 'Annulla', variant: 'ghost', onClick: closeModal },
      { label: 'Elimina definitivamente', variant: 'danger', onClick: async () => {
        closeModal();
        try {
          await gh.deleteFile(path, sha, `Elimina definitivamente ${filename} by ${state.session.username}`);
          toast('Eliminato', 'success');
          await buildIndex();
          navigate('cestino');
        } catch (e) {
          toast('Errore: ' + e.message, 'error');
        }
      }}
    ]
  });
}


/* ============================ GESTIONE UTENTI (admin only) ============================ */
async function encryptUserData(payload, passphrase) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:250000, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['encrypt']
  );
  const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(JSON.stringify(payload)));
  const b64 = b => btoa(String.fromCharCode(...new Uint8Array(b)));
  return {
    salt: b64(salt), iv: b64(iv), ciphertext: b64(ct),
    iterations: 250000, algorithm: 'AES-GCM-256', kdf: 'PBKDF2-SHA256',
    updated_at: new Date().toISOString()
  };
}

async function fetchAuthFile() {
  const url = `${CONFIG.API_BASE}/repos/${CONFIG.REPO_OWNER}/${CONFIG.AUTH_REPO_NAME}/contents/data/encrypted-tokens.json?ref=${CONFIG.BRANCH}&t=${Date.now()}`;
  const res = await fetch(url, {
    headers: {
      'Authorization': `token ${BOOTSTRAP_PAT}`,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28'
    },
    cache: 'no-store'
  });
  if (!res.ok) throw new Error(`GET auth file: ${res.status}`);
  const meta = await res.json();
  const content = new TextDecoder().decode(base64ToBuffer(meta.content.replace(/\n/g, '')));
  return { data: JSON.parse(content), sha: meta.sha };
}

async function writeAuthFile(fileObj, sha, message) {
  const url = `${CONFIG.API_BASE}/repos/${CONFIG.REPO_OWNER}/${CONFIG.AUTH_REPO_NAME}/contents/data/encrypted-tokens.json`;
  const enc = new TextEncoder();
  const bytes = enc.encode(JSON.stringify(fileObj, null, 2));
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  const contentB64 = btoa(binary);
  const res = await fetch(url, {
    method: 'PUT',
    headers: {
      'Authorization': `token ${BOOTSTRAP_PAT}`,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json',
      'X-GitHub-Api-Version': '2022-11-28'
    },
    body: JSON.stringify({ message, content: contentB64, sha, branch: CONFIG.BRANCH })
  });
  if (!res.ok) throw new Error(`PUT auth file: ${res.status} ${await res.text()}`);
  return await res.json();
}

              <div style="font-family:var(--mono);font-size:14px;font-weight:500;color:var(--ink);">${escapeHtml(uname)}${uname === 'admin' ? ' <span class="tag" style="margin-left:8px;">admin</span>' : ''}</div>
              <div style="font-size:12px;color:var(--ink-muted);margin-top:2px;">Aggiornato ${timeAgo(entry.updated_at)}</div>
            </div>
            <div style="display:flex;gap:6px;">
              <button class="btn ghost sm" onclick="rigeneraUtente('${escapeHtml(uname)}')">Rigenera passphrase</button>
              ${uname !== state.session.username ? `<button class="btn ghost sm" onclick="rimuoviUtente('${escapeHtml(uname)}')">Rimuovi</button>` : ''}
            </div>
          </div>
        `).join('')
      }`;
    $('btn-add-user').onclick = () => mostraFormUtente(null);
  } catch (e) {
    renderError('Errore caricamento', e.message);
  }
}

function mostraFormUtente(existingUsername) {
  const isRegen = !!existingUsername;
  showModal({
    title: isRegen ? `Rigenera ${existingUsername}` : 'Nuovo utente',
    subtitle: isRegen
      ? 'Imposta una nuova passphrase. Nome e cognome restano invariati.'
      : 'Il PAT-2 verrà preso dalla tua sessione. Nome e cognome appariranno nei commit e nella precompilazione moduli.',
    body: `
      <div class="field">
        <label>Username</label>
        <input type="text" id="nu-username" class="mono-input" value="${escapeHtml(existingUsername || '')}" ${isRegen ? 'readonly style="background:var(--bg-sink);"' : ''} placeholder="es. dr.rossi">
      </div>
      ${!isRegen ? `
        <div class="field"><label>Nome</label><input type="text" id="nu-nome"></div>
        <div class="field"><label>Cognome</label><input type="text" id="nu-cognome"></div>
      ` : ''}
      <div class="field">
        <label>Passphrase</label>
        <input type="password" id="nu-pass1">
      </div>
      <div class="field">
        <label>Conferma passphrase</label>
        <input type="password" id="nu-pass2">
      </div>
      <div id="nu-error" style="color:var(--danger);font-size:13px;display:none;margin-top:8px;"></div>`,
    actions: [
      { label: 'Annulla', variant: 'ghost', onClick: closeModal },
      { label: isRegen ? 'Rigenera' : 'Crea utente', onClick: async () => {
        const uname = $('nu-username').value.trim();
        const nome = isRegen ? null : $('nu-nome').value.trim();
        const cognome = isRegen ? null : $('nu-cognome').value.trim();
        const p1 = $('nu-pass1').value;
        const p2 = $('nu-pass2').value;
        const err = $('nu-error');
        err.style.display = 'none';
        function show(msg) { err.textContent = msg; err.style.display = 'block'; }
        if (!uname) return show('Username obbligatorio.');
        if (!/^[a-z0-9._-]+$/i.test(uname)) return show('Username: solo lettere, cifre, punto, trattino, underscore.');
        if (!isRegen && (!nome || !cognome)) return show('Nome e cognome obbligatori.');
        if (!p1) return show('Passphrase obbligatoria.');
        if (p1 !== p2) return show('Le passphrase non coincidono.');
        try {
          const { data, sha } = await fetchAuthFile();
          data.utenti = data.utenti || {};
          if (isRegen) {
            const existing = data.utenti[uname];
            if (!existing) return show('Utente non trovato.');
            // Need original nome/cognome — decrypt with... we can't without old passphrase
            // So for regen: ask admin to re-enter nome/cognome too, or just reset them blank.
            // Simplification: store nome/cognome next to the encrypted entry (unencrypted) for admin view.
            // For now, regen ONLY changes the passphrase, keeping token/nome/cognome (which admin doesn't know).
            // Simpler: regen just rewrites with a fresh token (admin's current PAT-2) and re-entered nome/cognome.
            return show('Rigenera solo passphrase non ancora supportato — usa Rimuovi + Crea.');
          }
          const payload = { token: state.session.token, nome, cognome };
          data.utenti[uname] = await encryptUserData(payload, p1);
          await writeAuthFile(data, sha, `Aggiungi utente ${uname} (by ${state.session.username})`);
          closeModal();
          toast(`Utente ${uname} creato`, 'success');
          renderGestioneUtenti();
        } catch (e) {
          show('Errore: ' + e.message);
        }
      }}
    ]
  });
}

function rigeneraUtente(username) {
  showModal({
    title: `Rigenera ${username}`,
    subtitle: 'Per cambiare la passphrase devi ricreare il blob — servono nuovamente nome, cognome e nuova passphrase. Il PAT-2 verrà preso dalla tua sessione.',
    body: `
      <div class="field"><label>Nome</label><input type="text" id="rg-nome"></div>
      <div class="field"><label>Cognome</label><input type="text" id="rg-cognome"></div>
      <div class="field"><label>Nuova passphrase</label><input type="password" id="rg-pass1"></div>
      <div class="field"><label>Conferma</label><input type="password" id="rg-pass2"></div>
      <div id="rg-error" style="color:var(--danger);font-size:13px;display:none;margin-top:8px;"></div>`,
    actions: [
      { label: 'Annulla', variant: 'ghost', onClick: closeModal },
      { label: 'Rigenera', onClick: async () => {
        const nome = $('rg-nome').value.trim();
        const cognome = $('rg-cognome').value.trim();
        const p1 = $('rg-pass1').value;
        const p2 = $('rg-pass2').value;
        const err = $('rg-error');
        err.style.display = 'none';
        function show(m) { err.textContent = m; err.style.display = 'block'; }
        if (!nome || !cognome) return show('Nome e cognome obbligatori.');
        if (!p1) return show('Passphrase obbligatoria.');
        if (p1 !== p2) return show('Non coincidono.');
        try {
          const { data, sha } = await fetchAuthFile();
          const payload = { token: state.session.token, nome, cognome };
          data.utenti[username] = await encryptUserData(payload, p1);
          await writeAuthFile(data, sha, `Rigenera ${username} (by ${state.session.username})`);
          closeModal();
          toast(`${username} rigenerato`, 'success');
          renderGestioneUtenti();
        } catch (e) { show('Errore: ' + e.message); }
      }}

}

function rimuoviUtente(username) {
  if (username === state.session.username) return toast('Non puoi rimuovere te stesso', 'warning');
  showModal({
    title: `Rimuovere ${username}?`,
    subtitle: `L'utente non potrà più accedere. Operazione reversibile solo ricreando il blob.`,
    body: '<p style="font-size:13px;color:var(--ink-muted);">La Git history di CollinettaAI-auth conserverà comunque il blob precedente.</p>',
    actions: [
      { label: 'Annulla', variant: 'ghost', onClick: closeModal },
      { label: 'Rimuovi', variant: 'danger', onClick: async () => {
        closeModal();
        try {
          const { data, sha } = await fetchAuthFile();
          if (data.utenti) delete data.utenti[username];
          await writeAuthFile(data, sha, `Rimuovi ${username} (by ${state.session.username})`);
          toast(`${username} rimosso`, 'success');
          renderGestioneUtenti();
        } catch (e) {
          toast('Errore: ' + e.message, 'error');
        }
      }}
    ]
  });
}


/* ============================ NAV TREE & EDIT MODE ============================ */

const navState = {
  expanded: new Set(),       // ids of currently-expanded nodes
  editMode: false,
  openMenu: null
};

function toggleEditMode(force) {
  const wasEdit = navState.editMode;
  const willEdit = (force !== undefined) ? force : !navState.editMode;
  // Se stiamo uscendo da edit mode con modifiche pending, chiedi conferma
  if (wasEdit && !willEdit && state.pendingTagEdits && state.pendingTagEdits.size > 0) {
    if (!confirm(`Hai ${state.pendingTagEdits.size} modifica/modifiche ai tag non salvate. Uscire comunque e perderle?`)) {
      return;
    }
    state.pendingTagEdits.clear();
  }
  navState.editMode = willEdit;
  document.body.classList.toggle('edit-mode', navState.editMode);
  document.getElementById('edit-mode-banner').classList.toggle('hidden', !navState.editMode);
  document.getElementById('btn-edit-mode').classList.toggle('active', navState.editMode);
  updateEditBanner();
  renderNavTree();
  if (state.currentView) {
    const savedScroll = window.scrollY;
    navigate(state.currentView, state.currentParams || {});
    requestAnimationFrame(() => window.scrollTo({ top: savedScroll, behavior: 'instant' }));
  }
}

function renderNavTree() {
  const tree = document.getElementById('nav-tree');
  if (!tree) return;
  const nodes = [
    { id: 'procedure', label: 'Procedure', count: state.index.procedure.length, kind: 'top', slug: 'procedure', children: () => buildProcedureChildren() },
    { id: 'clinica', label: 'Clinica', count: (state.index.clinica || []).length, kind: 'top', slug: 'clinica', children: () => buildClinicaChildren() },
    { id: 'numeri', label: 'Rubrica', count: countNumeri(), kind: 'top', slug: 'numeri', navTarget: { route: 'numeri', params: {} } },
    { id: 'moduli', label: 'Moduli', count: state.index.moduli.length, kind: 'top', slug: 'moduli', children: () => buildModuliChildren() },
    { id: 'tabelle', label: 'Tabelle', count: state.index.tabelle.length, kind: 'top', slug: 'tabelle', children: () => buildTabelleChildren() },
    { id: 'manuale', label: 'Manuale', count: (state.index.capitoli || []).length, kind: 'top', slug: 'manuale', children: () => buildManualeChildren() },
  ];
  tree.innerHTML = nodes.map(n => renderNavTreeNode(n, 0)).join('');
}

function buildProcedureChildren() {
  const byCat = {};
  state.index.procedure.forEach(p => {
    const c = p.categoria || 'altre';
    if (!byCat[c]) byCat[c] = [];
    byCat[c].push(p);
  });
  const order = ['bedside','richieste','farmacologiche','emergenze','gestione'];
  const cats = [...order.filter(c => byCat[c]), ...Object.keys(byCat).filter(c => !order.includes(c))];
  return cats.map(cat => {
    const subs = {};
    byCat[cat].forEach(p => {
      const s = p.sottocategoria || '_senza';
      if (!subs[s]) subs[s] = [];
      subs[s].push(p);
    });
    const subKeys = Object.keys(subs).sort();
    // If only "_senza" sub: list procedures directly under macro
    if (subKeys.length === 1 && subKeys[0] === '_senza') {
      return {
        id: 'macro:' + cat,
        label: CATEGORIA_LABELS[cat] || cat,
        count: byCat[cat].length,
        action: 'navigate',
        navTarget: { route: 'procedure-cat', params: { cat } },
        kind: 'macro',
        slug: cat,
        children: () => byCat[cat].map(p => ({
          id: 'procedura:' + p.slug,
          label: p.titolo || p.slug,
          count: null,
          action: 'navigate',
          navTarget: { route: 'procedura', params: { slug: p.slug } },
          kind: 'procedure',
          slug: p.slug,
          children: null
        }))
      };
    }
    return {
      id: 'macro:' + cat,
      label: CATEGORIA_LABELS[cat] || cat,
      count: byCat[cat].length,
      action: 'navigate',
      navTarget: { route: 'procedure-cat', params: { cat } },
      kind: 'macro',
      slug: cat,
      children: () => subKeys.map(s => ({
        id: 'sub:' + cat + ':' + s,
        label: SOTTO_LABELS[s] || (s === '_senza' ? '(senza)' : s),
        count: subs[s].length,
        action: 'navigate',
        navTarget: { route: 'procedure-cat', params: { cat, sub: s } },
        kind: 'sub',
        slug: cat + '/' + s,
        children: () => subs[s].map(p => ({
          id: 'procedura:' + p.slug,
          label: p.titolo || p.slug,
          count: null,
          action: 'navigate',
          navTarget: { route: 'procedura', params: { slug: p.slug } },
          kind: 'procedure',
          slug: p.slug,
          children: null
        }))
      }))
    };
  });
}

function buildClinicaChildren() {
  const subs = {};
  (state.index.clinica || []).forEach(c => {
    const s = c.sottocategoria || '_senza';
    if (!subs[s]) subs[s] = [];
    subs[s].push(c);
  });
  const order = ['scale-cliniche','emergenze','consulenze','prognosi','gestione-post-acuta'];
  const keys = [...order.filter(s => subs[s]), ...Object.keys(subs).filter(s => !order.includes(s))];
  return keys.map(s => {
    // Check if this sub has nested sub-subcategories
    const nested = {};
    const direct = [];
    subs[s].forEach(c => {
      if (c.sotto_sottocategoria) {
        const ss = c.sotto_sottocategoria;
        if (!nested[ss]) nested[ss] = [];
        nested[ss].push(c);
      } else {
        direct.push(c);
      }
    });
    const nestedKeys = Object.keys(nested).sort();
    const childrenFn = nestedKeys.length > 0
      ? () => [
          // Nested sub-subcategories first
          ...nestedKeys.map(ss => ({
            id: 'clinica-subsub:' + s + ':' + ss,
            label: SOTTO_LABELS[ss] || ss,
            count: nested[ss].length,
            action: 'navigate',
            navTarget: { route: 'clinica', params: { sub: s, subsub: ss } },
            kind: 'clinica-subsub',
            slug: s + '/' + ss,
            children: () => nested[ss].map(c => ({
              id: 'clinica-scheda:' + c.slug,
              label: c.titolo || c.slug,
              count: null,
              action: 'navigate',
              navTarget: { route: 'clinica-scheda', params: { slug: c.slug } },
              kind: 'clinica',
              slug: c.slug,
              children: null
            }))
          })),
          // Direct children (without sub-sub) after
          ...direct.map(c => ({
            id: 'clinica-scheda:' + c.slug,
            label: c.titolo || c.slug,
            count: null,
            action: 'navigate',
            navTarget: { route: 'clinica-scheda', params: { slug: c.slug } },
            kind: 'clinica',
            slug: c.slug,
            children: null
          }))
        ]
      : () => subs[s].map(c => ({
          id: 'clinica-scheda:' + c.slug,
          label: c.titolo || c.slug,
          count: null,
          action: 'navigate',
          navTarget: { route: 'clinica-scheda', params: { slug: c.slug } },
          kind: 'clinica',
          slug: c.slug,
          children: null
        }));
    return {
      id: 'clinica-sub:' + s,
      label: SOTTO_LABELS[s] || (s === '_senza' ? '(senza)' : s),
      count: subs[s].length,
      action: 'navigate',
      navTarget: { route: 'clinica', params: { sub: s } },
      kind: 'clinica-sub',
      slug: s,
      children: childrenFn
    };
  });
}

function buildNumeriChildren() {
  return getVisibleNumeriGroups().map(g => ({
    id: 'gruppo:' + g.id,
    label: g.nome + ((g._source && g._source !== 'aopd') ? ` · ${g._source.toUpperCase()}` : ''),
    count: (g.contatti || []).length,
    action: 'navigate',
    navTarget: { route: 'numeri', params: { filter: g.id } },
    kind: 'gruppo',
    slug: g.id,
    children: null  // contacts shown in main panel, not in sidebar
  }));
}

function buildModuliChildren() {
  return state.index.moduli.map(m => ({
    id: 'modulo:' + m.slug,
    label: m.titolo || m.slug,
    count: null,
    action: 'navigate',
    navTarget: { route: 'modulo', params: { slug: m.slug } },
    kind: 'modulo',
    slug: m.slug,
    children: null
  }));
}

function buildTabelleChildren() {
  return state.index.tabelle.map(t => ({
    id: 'tabella:' + t.slug,
    label: t.titolo || t.slug,
    count: null,
    action: 'navigate',
    navTarget: { route: 'tabella', params: { slug: t.slug } },
    kind: 'tabella',
    slug: t.slug,
    children: null
  }));
}

function buildManualeChildren() {
  return (state.index.capitoli || []).map(c => {
    const pezzi = state.index.procedure.filter(p => p.capitolo === c.id);
    return {
      id: 'capitolo:' + c.id,
      label: `${c.ordine || '·'}. ${c.titolo}`,
      count: pezzi.length,
      action: 'navigate',
      navTarget: { route: 'capitolo', params: { id: c.id } },
      kind: 'capitolo',
      slug: c.id,
      children: pezzi.length > 0 ? () => pezzi
        .sort((a,b) => (a.ordine_nel_capitolo||99) - (b.ordine_nel_capitolo||99))
        .map(p => ({
          id: 'capitolo-pezzo:' + p.slug,
          label: p.titolo || p.slug,
          count: null,
          action: 'navigate',
          navTarget: { route: 'procedura', params: { slug: p.slug } },
          kind: 'procedure',
          slug: p.slug,
          children: null
        })) : null
    };
  });
}

function countNumeri() {
  return getVisibleNumeriGroups().reduce((acc, g) => acc + (g.contatti || []).length, 0);
}

function renderNavTreeNode(node, depth) {
  const expanded = navState.expanded.has(node.id);
  const hasChildren = !!node.children;
  const childrenList = expanded && hasChildren ? node.children() : [];

  // Whole row click handler:
  // - if has children: toggles expansion AND navigates
  // - if leaf: only navigates
  let rowClickAction;
  if (hasChildren) {
    rowClickAction = `handleNavRowClick('${escapeJs(node.id)}', ${node.navTarget ? `'${escapeJs(node.navTarget.route)}'` : 'null'}, ${node.navTarget && node.navTarget.params ? JSON.stringify(node.navTarget.params).replace(/"/g, '&quot;') : 'null'})`;
  } else if (node.navTarget) {
    rowClickAction = `navigate('${escapeJs(node.navTarget.route)}', ${JSON.stringify(node.navTarget.params || {}).replace(/"/g, '&quot;')})`;
  } else {
    rowClickAction = '';
  }

  // Folder-kind menu only for admin; leaf-kind menu for everyone
  const folderKinds = new Set(['macro','sub','clinica-sub','capitolo','gruppo','top']);
  const nodeKind = node.kind || 'top';
  const showMenuBtn = navState.editMode && (!folderKinds.has(nodeKind) || isAdmin());
  const editBtn = showMenuBtn
    ? `<span class="nav-edit-actions"><button class="btn-icon-mini" onclick="event.stopPropagation();showNavContextMenu(this, '${nodeKind}', '${escapeJs(node.slug || node.id)}')" title="Azioni">⋯</button></span>`
    : '';

  return `
    <div class="nav-tree-node ${expanded ? 'open' : ''}" data-id="${escapeHtml(node.id)}">
      <div class="nav-tree-row ${expanded ? 'expanded' : ''}" data-slug="${escapeHtml(node.slug || '')}" data-kind="${node.kind || 'top'}" onclick="${rowClickAction}">
        <span class="nav-tree-caret">${hasChildren ? (expanded ? '▾' : '▸') : '·'}</span>
        <span class="nav-tree-label">${escapeHtml(node.label)}</span>
        ${node.count !== null && node.count !== undefined ? `<span class="nav-tree-count">${node.count}</span>` : ''}
        ${editBtn}
      </div>
      ${hasChildren ? `<div class="nav-tree-children">${childrenList.map(c => renderNavTreeNode(c, depth + 1)).join('')}</div>` : ''}
    </div>`;
}

function handleNavRowClick(nodeId, route, params) {
  const wasExpanded = navState.expanded.has(nodeId);
  if (wasExpanded) {
    // Collapse: just remove from expanded set, do NOT navigate
    // (otherwise the navigate handler re-adds the node to expanded)
    navState.expanded.delete(nodeId);
    renderNavTree();
  } else {
    // Expand AND navigate
    navState.expanded.add(nodeId);
    renderNavTree();
    if (route) navigate(route, params || {});
  }
}

function toggleNavNode(id) {
  if (navState.expanded.has(id)) navState.expanded.delete(id);
  else navState.expanded.add(id);
  renderNavTree();
}


/* ----- Context menu (⋯) ----- */
function isAdmin() {
  return state.session && state.session.username === 'admin';
}

function showNavContextMenu(triggerBtn, kind, slug) {
  // Folder/structure operations are admin-only
  const folderKinds = new Set(['macro','sub','clinica-sub','capitolo','gruppo','top']);
  if (folderKinds.has(kind) && !isAdmin()) {
    return; // silently no-op for non-admin
  }
  closeContextMenu();
  const menu = document.createElement('div');
  menu.className = 'context-menu';
  let items = [];

  if (kind === 'macro') {
    items = [
      { label: '+ Nuova sottocategoria', action: () => createSottocategoria(slug) },
      { label: 'Rinomina categoria', action: () => renameMacroCategoria(slug) },
      { label: 'Elimina (se vuota)', danger: true, action: () => deleteMacroCategoria(slug) },
    ];
  } else if (kind === 'sub') {
    const [cat, sub] = slug.split('/');
    items = [
      { label: '+ Nuova procedura qui', action: () => nuovaProcedura({categoria: cat, sottocategoria: sub}) },
      { label: 'Rinomina sottocategoria', action: () => renameSottocategoria(cat, sub) },
      { label: 'Sposta in altra categoria...', action: () => moveSottocategoria(cat, sub) },
      { label: 'Elimina (se vuota)', danger: true, action: () => deleteSottocategoria(cat, sub) },
    ];
  } else if (kind === 'clinica-sub') {
    items = [
      { label: '+ Nuova scheda qui', action: () => nuovaSchedaClinica({sottocategoria: slug}) },
      { label: 'Rinomina', action: () => renameClinicaSub(slug) },
    ];
  } else if (kind === 'capitolo') {
    items = [
      { label: '+ Aggiungi pezzo al capitolo', action: () => nuovoPezzoCapitolo(slug) },
      { label: 'Modifica capitolo', action: () => editCapitolo(slug) },
      { label: 'Elimina capitolo (se vuoto)', danger: true, action: () => deleteCapitolo(slug) },
    ];
  } else if (kind === 'gruppo') {
    items = [
      { label: '+ Nuovo contatto qui', action: () => nuovoContatto(slug) },
      { label: 'Rinomina gruppo', action: () => renameGruppoNumeri(slug) },
    ];
  } else if (kind === 'top') {
    if (slug === 'procedure') items = [{ label: '+ Nuova categoria di procedure', action: () => nuovaMacroCategoria() }];
    else if (slug === 'clinica') items = [{ label: '+ Nuova sottocategoria clinica', action: () => createClinicaSub() }];
    else if (slug === 'numeri') items = [{ label: '+ Nuovo gruppo di numeri', action: () => nuovoGruppoNumeri() }];
    else if (slug === 'moduli') items = [{ label: '+ Nuovo modulo', action: () => nuovoModulo && nuovoModulo() }];
    else if (slug === 'tabelle') items = [{ label: '+ Nuova tabella', action: () => nuovaTabella && nuovaTabella() }];
    else if (slug === 'manuale') items = [{ label: '+ Nuovo capitolo', action: () => nuovoCapitolo() }];
  } else if (kind === 'procedure') {
    items = [
      { label: 'Apri', action: () => navigate('procedura', {slug}) },
      { label: 'Modifica contenuto', action: () => navigate('procedura-edit', {slug}) },
      { label: 'Rinomina', action: () => renameProcedura(slug) },
      { label: 'Sposta in...', action: () => moveProcedura(slug) },
      { label: 'Elimina', danger: true, action: () => confirmDelete('procedura', slug) },
    ];
  } else if (kind === 'clinica') {
    items = [
      { label: 'Apri', action: () => navigate('clinica-scheda', {slug}) },
      { label: 'Modifica contenuto', action: () => navigate('clinica-edit', {slug}) },
      { label: 'Rinomina', action: () => renameClinica(slug) },
    ];
  } else if (kind === 'modulo') {
    items = [

  menu.querySelectorAll('.context-menu-item').forEach((el, idx) => {

      items[idx].action();

  setTimeout(() => document.addEventListener('click', closeContextMenu, { once: true }), 0);
