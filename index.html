function closeContextMenu() {
  if (navState.openMenu && navState.openMenu.parentNode) {
    navState.openMenu.parentNode.removeChild(navState.openMenu);
  }
  navState.openMenu = null;
}

function escapeJs(s) { return String(s).replace(/'/g, "\\'").replace(/"/g, '\\"'); }

/* ----- Folder operations (multi-commit) ----- */

async function multiCommitOperation(label, operations) {
  // Each operation is { type: 'put'|'delete', path, content?, sha?, message }
  // Returns total + executed counts
  const total = operations.length;
  let done = 0;
  const failures = [];
  for (const op of operations) {
    try {
      if (op.type === 'put') await gh.putFile(op.path, op.content, op.sha || null, op.message);
      else if (op.type === 'delete') await gh.deleteFile(op.path, op.sha, op.message);
      done++;
    } catch (e) {
      failures.push({ op, error: e.message });
    }
  }
  return { total, done, failures };
}

// High-level operation with progress modal and rate-limit safety.
// `ops` array of { putPath, putContent, deletePath, deleteSha, commitMsg, schedaSlug, schedaTitolo }
async function executeMultiCommitOperation(label, ops) {
  const total = ops.length * 2;
  let done = 0;
  const failures = [];

  // Show progress modal
  const modal = showProgressModal(label, total);
  try {
    for (const op of ops) {
      // Check rate limit mid-operation; bail out if too low
      if (rateLimit.remaining !== null && rateLimit.remaining < 100) {
        failures.push({ op, error: 'Rate limit GitHub quasi esaurito. Operazione interrotta per sicurezza.' });
        break;
      }
      modal.setStatus(`${op.schedaTitolo}: caricamento nuovo path...`);
      try {
        await gh.putFile(op.putPath, op.putContent, null, op.commitMsg);
        done++;
        modal.update(done, total, `${op.schedaTitolo}: caricato (${done}/${total})`);
      } catch (e) {
        failures.push({ op, phase: 'put', error: e.message });
        modal.update(done, total, `Errore PUT: ${e.message}`);
        continue; // skip delete if put failed (avoid data loss)
      }
      modal.setStatus(`${op.schedaTitolo}: eliminazione vecchio path...`);
      try {
        await gh.deleteFile(op.deletePath, op.deleteSha, `Elimina ${op.schedaSlug} da vecchio path`);
        done++;
        modal.update(done, total, `${op.schedaTitolo}: spostato (${done}/${total})`);
      } catch (e) {
        failures.push({ op, phase: 'delete', error: e.message });
        modal.update(done, total, `⚠ File duplicato (delete fallito): ${e.message}`);
      }
    }
  } finally {
    // Keep modal for 1s to show final state, then close
    await new Promise(r => setTimeout(r, 800));
    modal.close();
  }
  return { ok: failures.length === 0, total, done, failures };
}

async function checkRateLimitFor(neededCalls) {
  if (rateLimit.remaining === null) return true; // unknown: allow
  if (rateLimit.remaining < neededCalls) {
    const resetMin = rateLimit.resetAt ? Math.ceil((new Date(rateLimit.resetAt) - new Date()) / 60000) : '?';
    alert(`Rate limit GitHub insufficiente per l'operazione.\n\nChiamate necessarie: ${neededCalls}\nDisponibili: ${rateLimit.remaining}\nReset tra: ${resetMin} min\n\nRiprova dopo il reset.`);
    return false;
  }
  return true;
}

function showProgressModal(title, total) {
  // Create overlay + modal
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(20,18,14,.6);z-index:9998;display:flex;align-items:center;justify-content:center;';
  overlay.innerHTML = `
    <div style="background:var(--bg-paper);border:1px solid var(--rule);border-radius:4px;padding:28px 32px;width:min(440px,90vw);box-shadow:0 8px 32px rgba(0,0,0,.2);">
      <div style="font-family:var(--serif);font-size:18px;font-weight:500;color:var(--ink);margin-bottom:12px;">${escapeHtml(title)}</div>
      <div style="height:6px;background:var(--rule-soft);border-radius:3px;overflow:hidden;margin:16px 0;">
        <div id="prog-bar" style="height:100%;background:var(--accent);width:0%;transition:width .3s;"></div>
      </div>
      <div id="prog-counter" style="font-family:var(--mono);font-size:12px;color:var(--ink-muted);margin-bottom:8px;">0 / ${total}</div>
      <div id="prog-status" style="font-size:13px;color:var(--ink-soft);min-height:20px;">Preparazione...</div>
    </div>`;
  document.body.appendChild(overlay);
  return {
    update(done, tot, status) {
      const pct = Math.round(done / tot * 100);
      const bar = overlay.querySelector('#prog-bar');
      const counter = overlay.querySelector('#prog-counter');
      const st = overlay.querySelector('#prog-status');
      if (bar) bar.style.width = pct + '%';
      if (counter) counter.textContent = `${done} / ${tot} (${pct}%)`;
      if (st && status) st.textContent = status;
    },
    setStatus(status) {
      const st = overlay.querySelector('#prog-status');
      if (st) st.textContent = status;
    },
    close() {
      if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
    }
  };
}

async function renameSottocategoria(macro, oldSub) {
  if (!isAdmin()) return toast('Solo l\'admin può rinominare sottocategorie', 'warning');
  const newSub = prompt(`Rinomina sottocategoria "${oldSub}" in "${CATEGORIA_LABELS[macro] || macro}"\n\nNuovo slug (minuscole, cifre, trattini):`, oldSub);
  if (!newSub || newSub === oldSub) return;
  if (!/^[a-z0-9-]+$/.test(newSub)) return toast('Slug non valido', 'error');

  const affected = state.index.procedure.filter(p => p.categoria === macro && p.sottocategoria === oldSub);
  if (affected.length === 0) {
    toast('Sottocategoria vuota: nulla da spostare', 'info');
    return;
  }

  // Collision check
  const conflicts = state.index.procedure.filter(p => p.categoria === macro && p.sottocategoria === newSub);
  if (conflicts.length > 0) {
    if (!confirm(`"${newSub}" contiene già ${conflicts.length} schede. Le schede saranno unite.\nProcedere?`)) return;
  }

  const neededCommits = affected.length * 2;
  if (!await checkRateLimitFor(neededCommits + 20)) return;

  const ops = affected.map(p => {
    const newPath = p.path.replace(`/${oldSub}/`, `/${newSub}/`);
    const newFm = { ...p, sottocategoria: newSub };
    delete newFm.body; delete newFm.body_preview; delete newFm.path; delete newFm.sha;
    const newContent = stringifyMarkdown(newFm, p.body || '');
    return {
      schedaSlug: p.slug, schedaTitolo: p.titolo || p.slug,
      putPath: newPath, putContent: newContent,
      deletePath: p.path, deleteSha: p.sha,
      commitMsg: `Rinomina ${oldSub} → ${newSub}: ${p.slug}`
    };
  });

  if (!confirm(`Rinominare "${oldSub}" → "${newSub}"?\n\n${affected.length} schede spostate.\n${neededCommits} commit GitHub.`)) return;

  const result = await executeMultiCommitOperation(`Rinomina ${oldSub} → ${newSub}`, ops);
  if (result.ok) toast(`Rinominata: ${result.done}/${result.total}`, 'success');
  else toast(`Rinomina parziale: ${result.done}/${result.total}`, 'warning');
  await buildIndex();
  renderNavTree();
}

async function moveSottocategoria(currentMacro, sub) {
  if (!isAdmin()) return toast('Solo l\'admin può spostare sottocategorie', 'warning');
  const macroOrder = ['bedside','richieste','farmacologiche','emergenze','gestione'];
  const destMacros = macroOrder.filter(m => m !== currentMacro);
  const dest = prompt(`Sposta sottocategoria "${sub}" da "${CATEGORIA_LABELS[currentMacro] || currentMacro}"\n\nDestinazione (una di: ${destMacros.join(', ')}):`, destMacros[0]);
  if (!dest || dest === currentMacro) return;
  if (!macroOrder.includes(dest)) return toast('Destinazione non valida', 'error');

  const affected = state.index.procedure.filter(p => p.categoria === currentMacro && p.sottocategoria === sub);
  if (affected.length === 0) {
    toast('Sottocategoria vuota: nulla da spostare', 'info');
    return;
  }

  const conflicts = state.index.procedure.filter(p => p.categoria === dest && p.sottocategoria === sub);
  if (conflicts.length > 0) {
    if (!confirm(`In "${dest}" esiste già la sottocategoria "${sub}" con ${conflicts.length} schede. Le schede saranno unite.\nProcedere?`)) return;
  }

  const neededCommits = affected.length * 2;
  if (!await checkRateLimitFor(neededCommits + 20)) return;

  const ops = affected.map(p => {
    const newPath = p.path.replace(`procedure/${currentMacro}/${sub}/`, `procedure/${dest}/${sub}/`);
    const newFm = { ...p, categoria: dest };
    delete newFm.body; delete newFm.body_preview; delete newFm.path; delete newFm.sha;
    const newContent = stringifyMarkdown(newFm, p.body || '');
    return {
      schedaSlug: p.slug, schedaTitolo: p.titolo || p.slug,
      putPath: newPath, putContent: newContent,
      deletePath: p.path, deleteSha: p.sha,
      commitMsg: `Sposta ${p.slug}: ${currentMacro}/${sub} → ${dest}/${sub}`
    };
  });

  if (!confirm(`Spostare "${sub}" da "${currentMacro}" a "${dest}"?\n\n${affected.length} schede spostate.\n${neededCommits} commit GitHub.`)) return;

  const result = await executeMultiCommitOperation(`Sposta ${sub} → ${dest}`, ops);
  if (result.ok) toast(`Spostato: ${result.done}/${result.total}`, 'success');
  else toast(`Spostamento parziale: ${result.done}/${result.total}`, 'warning');
  await buildIndex();
  renderNavTree();
}

async function deleteSottocategoria(macro, sub) {
  if (!isAdmin()) return toast('Solo l\'admin può eliminare sottocategorie', 'warning');
  const procs = state.index.procedure.filter(p => p.categoria === macro && p.sottocategoria === sub);
  if (procs.length > 0) return toast(`Sottocategoria non vuota (${procs.length} schede). Sposta o elimina prima i contenuti.`, 'warning', 4000);
  toast('Sottocategoria eliminata (cartella vuota)', 'info');
  await buildIndex();
  renderNavTree();
}

async function renameProcedura(slug) {
  const proc = state.index.procedure.find(p => p.slug === slug);
  if (!proc) return;
  const newSlug = prompt(`Nuovo slug per "${proc.titolo}":\n(solo minuscole, cifre, trattini, sarà il nome del file)`, proc.slug);
  if (!newSlug || newSlug === proc.slug) return;
  if (!/^[a-z0-9-]+$/.test(newSlug)) return toast('Slug non valido', 'error');
  if (state.index.procedure.find(p => p.slug === newSlug)) return toast('Slug già esistente', 'error');

  const newFm = { ...proc, id: newSlug };
  delete newFm.body; delete newFm.body_preview; delete newFm.path; delete newFm.sha;
  const newContent = stringifyMarkdown(newFm, proc.body || '');
  const newPath = proc.path.replace(/[^/]+\.md$/, `${newSlug}.md`);

  if (!confirm(`Rinominare "${proc.slug}" → "${newSlug}"?\n2 commit (crea nuovo + elimina vecchio).`)) return;
  toast('Rinomina in corso...', 'info');
  try {
    await gh.putFile(newPath, newContent, null, `Rinomina ${proc.slug} → ${newSlug}`);
    await gh.deleteFile(proc.path, proc.sha, `Elimina vecchio ${proc.slug} (rinomina)`);
    toast('Rinominata', 'success');
    await buildIndex();
    renderNavTree();
  } catch (e) { toast('Errore: ' + e.message, 'error'); }
}

async function moveProcedura(slug) {
  const proc = state.index.procedure.find(p => p.slug === slug);
  if (!proc) return;
  const macroOrder = ['bedside','richieste','farmacologiche','emergenze','gestione'];
  const currentCat = proc.categoria;
  const currentSub = proc.sottocategoria || '';

  const destCat = prompt(
    `Sposta "${proc.titolo || slug}"\n\n` +
    `Attuale: ${CATEGORIA_LABELS[currentCat] || currentCat}${currentSub ? ' / ' + currentSub : ''}\n\n` +
    `Categoria destinazione (una di: ${macroOrder.join(', ')}):`,
    currentCat
  );
  if (!destCat) return;
  if (!macroOrder.includes(destCat)) return toast('Categoria non valida', 'error');

  // Autocomplete sottocategorie per la categoria scelta
  const subsInDest = [...new Set(state.index.procedure.filter(p => p.categoria === destCat).map(p => p.sottocategoria).filter(Boolean))].sort();
  const destSub = prompt(
    `Sottocategoria destinazione (opzionale).\n\n` +
    `Esistenti in ${destCat}: ${subsInDest.join(', ') || '(nessuna)'}\n\n` +
    `Lascia vuoto per nessuna sottocategoria:`,
    currentSub
  );
  // null = cancelled, '' = no subcategory (allowed)
  if (destSub === null) return;
  if (destSub && !/^[a-z0-9-]+$/.test(destSub)) return toast('Slug sottocategoria non valido', 'error');

  if (destCat === currentCat && destSub === currentSub) {
    return toast('Destinazione uguale alla posizione attuale', 'info');
  }

  // Build new path
  const newPath = `content/procedure/${destCat}/${destSub ? destSub + '/' : ''}${slug}.md`;
  if (newPath === proc.path) return toast('Path invariato', 'info');

  const newFm = { ...proc, categoria: destCat };
  if (destSub) newFm.sottocategoria = destSub; else delete newFm.sottocategoria;
  delete newFm.body; delete newFm.body_preview; delete newFm.path; delete newFm.sha;
  delete newFm.tempo_esecuzione_min;
  const newContent = stringifyMarkdown(newFm, proc.body || '');

  if (!confirm(`Spostare "${proc.slug}"?\n\nDa: ${proc.path}\nA: ${newPath}\n\n2 commit (crea + elimina vecchio).`)) return;
  toast('Spostamento in corso...', 'info');
  try {
    await gh.putFile(newPath, newContent, null, `Sposta ${proc.slug} → ${destCat}/${destSub || ''}`);
    await gh.deleteFile(proc.path, proc.sha, `Elimina vecchio ${proc.slug}`);
    toast('Spostata', 'success');
    await buildIndex();
    renderNavTree();
    if (state.currentView === 'procedura' && state.currentParams?.slug === slug) navigate('procedura', { slug });
  } catch (e) { toast('Errore: ' + e.message, 'error'); }
}

async function confirmDeleteModuloTabella(kind, slug) {
  const coll = kind === 'modulo' ? state.index.moduli : state.index.tabelle;
  const item = coll.find(x => x.slug === slug);
  if (!item) return;

    await gh.putFile(cestinoPath, content, null, `Sposta ${kind} ${slug} in cestino`);
    await gh.deleteFile(item.path, item.sha, `Elimina ${kind} ${slug} (spostato in cestino)`);
    toast('Spostato nel cestino', 'success');
    await buildIndex();
    renderNavTree();

}

// Helper: find which source file (aopd/osa/iov) contains a contact or group
function findNumeriSource(target /* {contattoId} | {groupId} */) {
  if (target.contattoId) {
    for (const g of (state.index.numeri?.gruppi || [])) {
      if ((g.contatti || []).find(c => c.id === target.contattoId)) return 'aopd';
    }
    for (const src of ['osa', 'iov']) {
      const ext = state.index.numeriExtended?.[src];
      if (!ext) continue;
      for (const g of (ext.gruppi || [])) {
        if ((g.contatti || []).find(c => c.id === target.contattoId)) return src;
      }
    }
  } else if (target.groupId) {
    if ((state.index.numeri?.gruppi || []).find(g => g.id === target.groupId)) return 'aopd';
    for (const src of ['osa', 'iov']) {
      if ((state.index.numeriExtended?.[src]?.gruppi || []).find(g => g.id === target.groupId)) return src;
    }
  }
  return null;
}

function getNumeriDataForSource(src) {
  if (src === 'aopd') return state.index.numeri || {};
  return state.index.numeriExtended?.[src] || {};
}

async function saveNumeriForSource(src, data) {
  const path = src === 'aopd' ? 'content/numeri.yml' : `content/numeri-${src}.yml`;
  const file = await gh.getFile(path);
  // Strip internal _-prefixed keys before serialization
  const clean = {};
  Object.keys(data).forEach(k => { if (!k.startsWith('_')) clean[k] = data[k]; });
  // Strip _source from groups
  if (clean.gruppi) {
    clean.gruppi = clean.gruppi.map(g => {
      const c = { ...g };
      delete c._source;
      return c;
    });
  }
  const content = `# Rubrica telefonica ${src.toUpperCase()}\n# Gestita dall'app — modifica con cautela\n\n` +
    jsyaml.dump(clean, { lineWidth: 120, noRefs: true, sortKeys: false });
  await gh.putFile(path, content, file ? file.sha : null, `Aggiorna numeri-${src}.yml (by ${state.session.username})`);
}

// Open the contact editor modal. mode = 'new' | 'edit'
function openContattoEditor({ mode, gruppoId, contatto }) {
  const isNew = mode === 'new';
  const c = contatto || {};
  const numeriStr = (c.numeri || []).join(', ');
  const cellulareStr = Array.isArray(c.cellulare) ? c.cellulare.join(', ') : (c.cellulare || '');

        </div>
      </div>
      <div class="field">
        <label>Cellulare</label>
        <input type="text" id="ce-cellulare" value="${escapeHtml(cellulareStr)}" class="mono-input" placeholder="es. 334.6652687">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="text" id="ce-email" value="${escapeHtml(c.email || '')}" class="mono-input" placeholder="es. neurologia@aopd.veneto.it">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">

          <label>Sezione (ruolo)</label>
          <input type="text" id="ce-sezione" value="${escapeHtml(c.sezione || '')}" placeholder="es. Studi Medici">
        </div>
        <div class="field">
          <label>Luogo (ubicazione)</label>
          <input type="text" id="ce-luogo" value="${escapeHtml(c.luogo || '')}" placeholder="es. Monoblocco 2° piano">

      </div>
      <div class="field">
        <label>Orari</label>
        <input type="text" id="ce-orari" value="${escapeHtml(c.orari || '')}" placeholder="es. L/V 8-14">
      </div>
      <div class="field">
        <label>Tag (separati da virgola)</label>
        <input type="text" id="ce-tag" value="${escapeHtml(tagStr)}" placeholder="es. guardia, guardiola">
        <div style="font-size:11px;color:var(--ink-muted);margin-top:3px;">Tag speciali: <code>guardia</code>, <code>guardiola</code> (mostrano badge)</div>
      </div>
      <div class="field">
        <label>Note</label>
        <textarea id="ce-note" rows="2" style="width:100%;resize:vertical;font-family:var(--sans);font-size:13px;padding:8px;">${escapeHtml(c.note || '')}</textarea>
      </div>

  showModal({
    title: isNew ? 'Nuovo contatto' : 'Modifica contatto',
    subtitle: `Gruppo: ${escapeHtml(gruppoId)}`,

    actions: [
      { label: 'Annulla', variant: 'ghost', onClick: () => closeModal() },
      { label: isNew ? 'Crea' : 'Salva', onClick: async () => {
        const etichetta = $('ce-etichetta').value.trim();
        if (!etichetta) return toast('Etichetta obbligatoria', 'warning');
        const numeri = $('ce-numeri').value.split(',').map(s => s.trim()).filter(Boolean).map(n => /^\d+$/.test(n) ? parseInt(n, 10) : n);
        const breveStr = $('ce-breve').value.trim();

function slugifyLocal(s) {
  return String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
}

async function editContatto(contattoId) {
  // Search across all visible groups to find the contact
  for (const g of getVisibleNumeriGroups()) {
    const c = (g.contatti || []).find(x => x.id === contattoId);
    if (c) {
      openContattoEditor({ mode: 'edit', gruppoId: g.id, contatto: c });
      return;
    }
  }
  toast('Contatto non trovato', 'error');
}

async function deleteContatto(contattoId) {
  if (!isAdmin()) return toast("Solo l'admin può eliminare contatti", 'warning');
  // Find source and group
  let foundGroup = null, foundContact = null, src = null;
  for (const sourceId of ['aopd','osa','iov']) {
    const data = getNumeriDataForSource(sourceId);
    for (const g of (data.gruppi || [])) {
      const c = (g.contatti || []).find(x => x.id === contattoId);
      if (c) { foundGroup = g; foundContact = c; src = sourceId; break; }
    }
    if (foundContact) break;
  }
  if (!foundContact) return;
  if (!confirm(`Eliminare contatto "${foundContact.etichetta}"?`)) return;
  const data = { ...getNumeriDataForSource(src) };
  const newGruppi = (data.gruppi || []).map(g => g.id !== foundGroup.id ? g : { ...g, contatti: g.contatti.filter(c => c.id !== contattoId) });
  try {
    await saveNumeriForSource(src, { ...data, gruppi: newGruppi });
    toast('Contatto eliminato', 'success');
    await buildIndex();
    if (state.showExtendedNumeri?.osa) await loadExtendedNumeri('osa');
    if (state.showExtendedNumeri?.iov) await loadExtendedNumeri('iov');
    renderNavTree();
    if (state.currentView === 'numeri') navigate('numeri', state.currentParams || {});
  } catch (e) { toast('Errore: ' + e.message, 'error'); }
}

// Imposta o rimuove il tag (kind) di un contatto: guardia/reparto/ambulatorio/direzione, oppure null per autodetect
async function setContactKind(contattoId, newKind) {
  // Se siamo in edit mode, mettiamo la modifica in pending (da salvare con "Salva modifiche")
  if (navState && navState.editMode) {
    return stageTagEdit(contattoId, newKind);
  }
  // Fuori edit mode: salva subito (retrocompatibilità)
  return _commitSingleTagEdit(contattoId, newKind);
}

function stageTagEdit(contattoId, newKind) {
  if (!state.pendingTagEdits) state.pendingTagEdits = new Map();
  // Trova valore originale
  let origKind = null;
  for (const sourceId of ['aopd','osa','iov']) {
    const data = getNumeriDataForSource(sourceId);
    if (!data) continue;
    for (const g of (data.gruppi || [])) {
      const c = (g.contatti || []).find(x => x.id === contattoId);
      if (c) { origKind = c.kind || null; break; }
    }
    if (origKind !== undefined) break;
  }
  // Toggle off se stesso valore
  if (newKind === origKind) newKind = null;
  // Se il nuovo valore è uguale al valore originale, rimuovi dal pending
  if (newKind === origKind || (newKind === null && !origKind)) {
    state.pendingTagEdits.delete(contattoId);
  } else {
    // Se il chip cliccato è già in pending con lo stesso valore → toggle off (torna a orig)
    if (state.pendingTagEdits.get(contattoId) === newKind) {
      state.pendingTagEdits.delete(contattoId);
    } else {
      state.pendingTagEdits.set(contattoId, newKind);
    }
  }
  updateEditBanner();
  // Re-render della view corrente per riflettere il pending
  const savedScroll = window.scrollY;
  if (state.currentView === 'search' || state.currentView === 'numeri') {
    navigate(state.currentView, state.currentParams || {});
    requestAnimationFrame(() => window.scrollTo({ top: savedScroll, behavior: 'instant' }));
  }
}

function updateEditBanner() {
  const pendingCount = state.pendingTagEdits ? state.pendingTagEdits.size : 0;
  const countEl = document.getElementById('edit-pending-count');
  const commitBtn = document.getElementById('btn-commit-tags');
  const cancelBtn = document.getElementById('btn-cancel-tags');
  if (countEl) countEl.textContent = pendingCount > 0 ? `· ${pendingCount} modific${pendingCount === 1 ? 'a' : 'he'} non salvat${pendingCount === 1 ? 'a' : 'e'}` : '';
  if (commitBtn) commitBtn.style.display = pendingCount > 0 ? '' : 'none';
  if (cancelBtn) cancelBtn.style.display = pendingCount > 0 ? '' : 'none';
}

async function commitTagEdits() {
  if (!state.pendingTagEdits || state.pendingTagEdits.size === 0) return;
  const edits = Array.from(state.pendingTagEdits.entries());
  // Raggruppo per source
  const bySource = { aopd: new Map(), osa: new Map(), iov: new Map() };
  for (const [cid, kind] of edits) {
    for (const sourceId of ['aopd','osa','iov']) {
      const data = getNumeriDataForSource(sourceId);
      if (!data) continue;
      const found = (data.gruppi || []).some(g => (g.contatti || []).some(c => c.id === cid));
      if (found) { bySource[sourceId].set(cid, kind); break; }
    }
  }
  let totalSaved = 0;
  for (const sourceId of ['aopd','osa','iov']) {
    const pending = bySource[sourceId];
    if (pending.size === 0) continue;
    const data = { ...getNumeriDataForSource(sourceId) };
    const newGruppi = (data.gruppi || []).map(g => ({
      ...g,
      contatti: (g.contatti || []).map(c => {
        if (!pending.has(c.id)) return c;
        const newKind = pending.get(c.id);
        const { kind, ...rest } = c;
        return newKind ? { ...rest, kind: newKind } : rest;
      })
    }));
    try {
      await saveNumeriForSource(sourceId, { ...data, gruppi: newGruppi });
      totalSaved += pending.size;
    } catch (e) {
      toast(`Errore salvataggio ${sourceId.toUpperCase()}: ${e.message}`, 'error');
      return;
    }
  }
  state.pendingTagEdits.clear();
  updateEditBanner();
  toast(`${totalSaved} tag salvat${totalSaved === 1 ? 'o' : 'i'}`, 'success');
  const savedScroll = window.scrollY;
  await buildIndex();
  if (state.showExtendedNumeri?.osa) await loadExtendedNumeri('osa');
  if (state.showExtendedNumeri?.iov) await loadExtendedNumeri('iov');
  renderNavTree();
  if (state.currentView) {
    navigate(state.currentView, state.currentParams || {});
    requestAnimationFrame(() => window.scrollTo({ top: savedScroll, behavior: 'instant' }));
  }
}

function cancelTagEdits() {
  if (!state.pendingTagEdits || state.pendingTagEdits.size === 0) return;
  if (!confirm(`Annullare ${state.pendingTagEdits.size} modifica/modifiche ai tag?`)) return;
  state.pendingTagEdits.clear();
  updateEditBanner();
  const savedScroll = window.scrollY;
  navigate(state.currentView, state.currentParams || {});
  requestAnimationFrame(() => window.scrollTo({ top: savedScroll, behavior: 'instant' }));
}

async function _commitSingleTagEdit(contattoId, newKind) {
  // Trova il contatto e il source
  let foundGroup = null, foundContact = null, src = null;
  for (const sourceId of ['aopd','osa','iov']) {
    const data = getNumeriDataForSource(sourceId);
    if (!data) continue;
    for (const g of (data.gruppi || [])) {
      const c = (g.contatti || []).find(x => x.id === contattoId);
      if (c) { foundGroup = g; foundContact = c; src = sourceId; break; }
    }
    if (foundContact) break;
  }
  if (!foundContact) return toast('Contatto non trovato', 'error');

  // Se il kind è già quello richiesto, rimuovilo (toggle off)
  if (foundContact.kind === newKind) newKind = null;

  const data = { ...getNumeriDataForSource(src) };
  const newGruppi = (data.gruppi || []).map(g => {
    if (g.id !== foundGroup.id) return g;
    return {
      ...g,
      contatti: (g.contatti || []).map(c => {
        if (c.id !== contattoId) return c;
        const { kind, ...rest } = c;
        return newKind ? { ...rest, kind: newKind } : rest;
      })
    };
  });

  // Preserva scroll prima del re-render
  const savedScroll = window.scrollY;
  try {
    await saveNumeriForSource(src, { ...data, gruppi: newGruppi });
    const label = newKind ? newKind : 'automatico';
    toast(`Tag aggiornato: ${label}`, 'success', 1200);
    await buildIndex();
    if (state.showExtendedNumeri?.osa) await loadExtendedNumeri('osa');
    if (state.showExtendedNumeri?.iov) await loadExtendedNumeri('iov');
    renderNavTree();
    if (state.currentView === 'numeri') {
      navigate('numeri', state.currentParams || {});
      requestAnimationFrame(() => window.scrollTo({ top: savedScroll, behavior: 'instant' }));
    }
  } catch (e) { toast('Errore: ' + e.message, 'error'); }
}

async function renameMacroCategoria(macro) {
  if (!isAdmin()) return toast('Solo l\'admin può rinominare macro categorie', 'warning');
  const label = CATEGORIA_LABELS[macro] || macro;

  // Offer both rename and cross-section move options
  const choice = prompt(
    `Operazione su macro "${label}" (${macro}):\n\n` +
    `1 = Rinomina (cambia slug, resta in Procedure)\n` +
    `2 = Sposta a Clinica (diventa sottocategoria di Clinica)\n` +
    `3 = Annulla\n\n` +
    `Scelta:`, '1'
  );
  if (!choice || choice === '3') return;
  if (choice === '2') return moveMacroToClinica(macro);
  if (choice !== '1') return toast('Scelta non valida', 'error');

  // Rename
  const newName = prompt(`Nuovo slug per "${macro}" (minuscole, cifre, trattini):`, macro);
  if (!newName || newName === macro) return;
  if (!/^[a-z0-9-]+$/.test(newName)) return toast('Slug non valido', 'error');

  const affected = state.index.procedure.filter(p => p.categoria === macro);
  if (affected.length === 0) {
    toast('Categoria vuota: rinomina locale soltanto', 'info');
    return;
  }

  const conflicts = state.index.procedure.filter(p => p.categoria === newName);
  if (conflicts.length > 0) {
    if (!confirm(`La categoria "${newName}" contiene già ${conflicts.length} schede.\nLe schede spostate saranno unite.\nProcedere?`)) return;
  }

  const neededCommits = affected.length * 2;
  if (!await checkRateLimitFor(neededCommits + 20)) return;

  const ops = affected.map(p => {
    const newPath = p.path.replace(`/procedure/${macro}/`, `/procedure/${newName}/`);
    const newFm = { ...p, categoria: newName };
    delete newFm.body; delete newFm.body_preview; delete newFm.path; delete newFm.sha;
    const newContent = stringifyMarkdown(newFm, p.body || '');
    return {
      schedaSlug: p.slug, schedaTitolo: p.titolo || p.slug,
      putPath: newPath, putContent: newContent,
      deletePath: p.path, deleteSha: p.sha,
      commitMsg: `Rinomina ${macro} → ${newName}: ${p.slug}`
    };
  });

  if (!confirm(`Rinominare macro "${macro}" → "${newName}"?\n\n${affected.length} schede spostate.\n${neededCommits} commit GitHub.`)) return;

  const result = await executeMultiCommitOperation(`Rinomina ${macro} → ${newName}`, ops);
  if (result.ok) toast(`Rinomina completata: ${result.done}/${result.total}`, 'success');
  else toast(`Rinomina parziale: ${result.done}/${result.total}`, 'warning');
  await buildIndex();
  renderNavTree();
  if (state.currentView === 'procedure-cat') navigate('procedure', {});
}

// Move a procedure macro (e.g., emergenze) to become a clinica subcategory
async function moveMacroToClinica(macro) {
  if (!isAdmin()) return toast('Solo l\'admin può spostare macro', 'warning');

  const affected = state.index.procedure.filter(p => p.categoria === macro);
  if (affected.length === 0) {
    toast('Macro vuota: nulla da spostare', 'info');
    return;
  }

  // Target sottocategoria in clinica defaults to the macro's slug (emergenze -> clinica/emergenze/)
  const targetSub = prompt(
    `Spostare tutte le schede di "${macro}" dentro Clinica come sottocategoria.\n\n` +
    `Nome della sottocategoria in Clinica:`, macro
  );
  if (!targetSub) return;
  if (!/^[a-z0-9-]+$/.test(targetSub)) return toast('Slug non valido', 'error');

  // Check collision in clinica
  const existingClinica = (state.index.clinica || []).filter(c => c.sottocategoria === targetSub);
  if (existingClinica.length > 0) {
    if (!confirm(`In Clinica esiste già "${targetSub}" con ${existingClinica.length} schede. Le schede saranno unite.\nProcedere?`)) return;
  }

  const neededCommits = affected.length * 2;
  if (!await checkRateLimitFor(neededCommits + 20)) return;

  const ops = affected.map(p => {
    const newPath = `content/clinica/${targetSub}/${p.slug}.md`;
    const newFm = { ...p, categoria: 'clinica', sottocategoria: targetSub };
    // Preserve capitolo if present (scheda still referenced in manuale)
    delete newFm.body; delete newFm.body_preview; delete newFm.path; delete newFm.sha;
    // Clean obsolete fields
    delete newFm.tempo_esecuzione_min;
    const newContent = stringifyMarkdown(newFm, p.body || '');
    return {
      schedaSlug: p.slug, schedaTitolo: p.titolo || p.slug,
      putPath: newPath, putContent: newContent,
      deletePath: p.path, deleteSha: p.sha,
      commitMsg: `Sposta ${p.slug}: procedure/${macro} → clinica/${targetSub}`
    };
  });

  const warnText = `Spostare ${affected.length} schede da "procedure/${macro}/" a "clinica/${targetSub}/"?\n\n` +
    `• Le schede saranno riclassificate come "schede cliniche"\n` +
    `• Useranno l'editor clinica (schema YAML avanzato per campi strutturati)\n` +
    `• I riferimenti via slug continuano a funzionare\n` +
    `• ${neededCommits} commit GitHub\n\n` +
    `Proseguire?`;
  if (!confirm(warnText)) return;

  const result = await executeMultiCommitOperation(`Sposta ${macro} → clinica/${targetSub}`, ops);
  if (result.ok) toast(`Spostamento completato: ${result.done}/${result.total}`, 'success');
  else toast(`Spostamento parziale: ${result.done}/${result.total}. Vedi console.`, 'warning', 6000);
  await buildIndex();
  renderNavTree();
  navigate('clinica', { sub: targetSub });
}

async function deleteMacroCategoria(macro) {
  if (!isAdmin()) return toast('Solo l\'admin può eliminare macro categorie', 'warning');
  const procs = state.index.procedure.filter(p => p.categoria === macro);
  if (procs.length > 0) return toast(`Categoria non vuota (${procs.length} schede). Sposta o elimina prima le schede.`, 'warning');
  toast('Categoria vuota: nessun commit necessario. Non comparirà più nella sidebar al prossimo refresh.', 'info');
  await buildIndex();
  renderNavTree();
}

async function nuovaMacroCategoria() {
  if (!isAdmin()) return toast('Solo l\'admin può creare nuove macro categorie', 'warning');
  const name = prompt('Nome nuova macro categoria (minuscole, cifre, trattini):\n(es. "protocolli" o "linee-guida")', '');
  if (!name || !/^[a-z0-9-]+$/.test(name)) return toast('Nome non valido', 'error');
  if (CATEGORIA_LABELS[name]) return toast('Categoria già esistente', 'warning');
  // Categories are implicit: they exist when a file is in them.
  // Create a placeholder by asking to add a scheda.
  if (confirm(`La macro "${name}" sarà creata aggiungendo una nuova procedura al suo interno.\nProcedere?`)) {
    nuovaProcedura({ categoria: name });
  }
}

async function createSottocategoria(macro) {
  const name = prompt(`Nuova sottocategoria in "${CATEGORIA_LABELS[macro] || macro}" (minuscole, cifre, trattini):`, '');
  if (!name || !/^[a-z0-9-]+$/.test(name)) return toast('Nome non valido', 'error');
  // Tutti possono creare sottocategorie (solo tramite creazione scheda)
  nuovaProcedura({ categoria: macro, sottocategoria: name });
}
async function renameClinica(slug) {
  const scheda = (state.index.clinica || []).find(c => c.slug === slug);
  if (!scheda) return toast('Scheda clinica non trovata', 'error');
  const newSlug = prompt(`Rinomina scheda clinica "${scheda.titolo || slug}"\n\nNuovo slug (minuscole, cifre, trattini):`, slug);
  if (!newSlug || newSlug === slug) return;
  if (!/^[a-z0-9-]+$/.test(newSlug)) return toast('Slug non valido', 'error');
  if ((state.index.clinica || []).find(c => c.slug === newSlug)) return toast('Slug già esistente', 'error');

  const newFm = { ...scheda, id: newSlug };
  delete newFm.body; delete newFm.body_preview; delete newFm.path; delete newFm.sha;
  const newContent = stringifyMarkdown(newFm, scheda.body || '');
  const newPath = scheda.path.replace(/[^/]+\.md$/, `${newSlug}.md`);

  if (!confirm(`Rinominare "${slug}" → "${newSlug}"?\n2 commit (crea + elimina vecchio).`)) return;
  toast('Rinomina in corso...', 'info');
  try {
    await gh.putFile(newPath, newContent, null, `Rinomina scheda clinica ${slug} → ${newSlug}`);
    await gh.deleteFile(scheda.path, scheda.sha, `Elimina vecchio ${slug}`);
    toast('Rinominata', 'success');
    await buildIndex();
    renderNavTree();
    if (state.currentView === 'clinica-scheda' && state.currentParams?.slug === slug) {
      navigate('clinica-scheda', { slug: newSlug });
    }
  } catch (e) { toast('Errore: ' + e.message, 'error'); }
}

async function renameClinicaSub(sub) {
  if (!isAdmin()) return toast('Solo l\'admin può rinominare sottocategorie cliniche', 'warning');
  const newSub = prompt(`Rinomina sottocategoria clinica "${sub}"\n\nNuovo slug (minuscole, cifre, trattini):`, sub);
  if (!newSub || newSub === sub) return;
  if (!/^[a-z0-9-]+$/.test(newSub)) return toast('Slug non valido', 'error');

  const affected = (state.index.clinica || []).filter(c => c.sottocategoria === sub);
  if (affected.length === 0) {
    toast('Sottocategoria vuota: nulla da spostare', 'info');
    return;
  }

  const conflicts = (state.index.clinica || []).filter(c => c.sottocategoria === newSub);
  if (conflicts.length > 0) {
    if (!confirm(`"${newSub}" contiene già ${conflicts.length} schede. Le schede saranno unite.\nProcedere?`)) return;
  }

  const neededCommits = affected.length * 2;
  if (!await checkRateLimitFor(neededCommits + 20)) return;

  const ops = affected.map(c => {
    const newPath = c.path.replace(`/clinica/${sub}/`, `/clinica/${newSub}/`);
    const newFm = { ...c, sottocategoria: newSub };
    delete newFm.body; delete newFm.body_preview; delete newFm.path; delete newFm.sha;
    const newContent = stringifyMarkdown(newFm, c.body || '');
    return {
      schedaSlug: c.slug, schedaTitolo: c.titolo || c.slug,
      putPath: newPath, putContent: newContent,
      deletePath: c.path, deleteSha: c.sha,
      commitMsg: `Rinomina clinica/${sub} → clinica/${newSub}: ${c.slug}`
    };
  });

  if (!confirm(`Rinominare sottocategoria "${sub}" → "${newSub}"?\n\n${affected.length} schede spostate.\n${neededCommits} commit GitHub.`)) return;

  const result = await executeMultiCommitOperation(`Rinomina ${sub} → ${newSub}`, ops);
  if (result.ok) toast(`Rinomina completata: ${result.done}/${result.total}`, 'success');
  else toast(`Rinomina parziale: ${result.done}/${result.total}`, 'warning');
  await buildIndex();
  renderNavTree();
}

function renderSearchResults(query, targetId) {
  const target = document.getElementById(targetId || 'main-content');
  if (!target) return;
  if (!state.fuse || !query || query.length < 2) {
    target.innerHTML = `
      <div class="page-head">
        <div class="page-eyebrow">Ricerca</div>
        <h1 class="page-title">Cerca nel manuale</h1>
      </div>
      <p style="color:var(--ink-muted);">Digita almeno 2 caratteri nella barra in alto.</p>`;
    return;
  }

  // Keyword "numero"/"numeri"/"tel"/"telefono" = filtra solo risultati rubrica, rimossa dalla query
  const numeroKeywordRegex = /\b(numer[oi]|tel|telefon[oi])\b/gi;
  const onlyNumeri = numeroKeywordRegex.test(query);
  const effectiveQuery = onlyNumeri ? query.replace(numeroKeywordRegex, ' ').replace(/\s+/g, ' ').trim() : query;
  if (onlyNumeri && effectiveQuery.length < 2) {
    target.innerHTML = `
      <div class="page-head">
        <div class="page-eyebrow">Ricerca</div>
        <h1 class="page-title">Cerca nella rubrica</h1>
      </div>
      <p style="color:var(--ink-muted);">Aggiungi almeno una parola dopo "numero" (es. "numero cardiologia", "numero amb ecg").</p>`;
    return;
  }

  const terms = effectiveQuery.trim().split(/\s+/).filter(t => t.length >= 1);
  // Numeric-only query: ricerca esatta sui numeri di contatto (no fuzzy, no partial)
  const isNumericQuery = /^\d+$/.test(effectiveQuery.trim());
  let rawResults;
  if (isNumericQuery) {
    // Match esatto: il contatto deve contenere esattamente quel numero come token intero
    const target = effectiveQuery.trim();
    rawResults = [];
    getVisibleNumeriGroups().forEach(g => {
      (g.contatti || []).forEach(c => {
        const nums = [...(c.numeri || []).map(String), String(c.cellulare || ''), String(c.breve || '')].filter(Boolean);
        const exactMatch = nums.some(n => n === target);
        if (exactMatch) {
          const item = {
            type: 'numero', slug: c.id,
            titolo: c.etichetta, gruppo: g.nome, gruppoId: g.id,
            direttore: g.direttore || '',
            sede: '',
            numeri: nums.join(' '),
            ospedale: g._source || 'aopd',
            sezione: c.sezione || '',
            tag: (c.tag || []).join(' ')
          };
          rawResults.push({ item, score: 0, matches: [] });
        }
      });
    });
  } else if (terms.length > 1) {
    const extendedQuery = terms
      .filter(t => t.length >= 1)
      .map(t => t.length <= 2 ? `^${t}` : `'${t}`)
      .join(' ');
    rawResults = state.fuse.search(extendedQuery);
    if (rawResults.length < 3) {
      const allInclude = terms.filter(t => t.length >= 2).map(t => `'${t}`).join(' ');
      if (allInclude) {
        const fallback = state.fuse.search(allInclude);
        if (fallback.length > rawResults.length) rawResults = fallback;
      }
    }
    if (rawResults.length < 3) rawResults = state.fuse.search(effectiveQuery);
  } else {
    rawResults = state.fuse.search(effectiveQuery);
  }

  const nonNumeri = onlyNumeri ? [] : rawResults.filter(r => r.item.type !== 'numero').slice(0, 20);
  const numeriRaw = rawResults.filter(r => r.item.type === 'numero');

  const lowerQuery = effectiveQuery.toLowerCase();
  const queryTerms = terms.map(t => t.toLowerCase());
  const wantsGuardia = /\b(guardia|mdg|reperibile)\b/i.test(effectiveQuery);

  // Sinonimi multi-token (allineati alla ricerca rubrica)
  const synonyms = {
    'reparto': ['reparto', 'reparti', 'degenza', 'degenze', 'ricovero'],
    'reparti': ['reparto', 'reparti', 'degenza', 'degenze'],
    'degenza': ['reparto', 'reparti', 'degenza', 'degenze'],
    'degenze': ['reparto', 'reparti', 'degenza', 'degenze'],
    'segreteria': ['segreteria', 'segr'],
    'ambulatorio': ['ambulatorio', 'ambulatori', 'amb'],
    'ambulatori': ['ambulatorio', 'ambulatori', 'amb'],
    'sala operatoria': ['sala operatoria', 'sale operatorie', 's.o.', 'operatoria'],
    'operatoria': ['sala operatoria', 'sale operatorie', 'operatoria'],
    'day hospital': ['day hospital', 'dh', 'day-hospital'],
    'dh': ['day hospital', 'dh', 'day-hospital'],
    'mdg': ['mdg', 'medico di guardia', 'medico guardia'],
    'guardia': ['guardia', 'mdg', 'medico di guardia'],
    'ucic': ['ucic', 'unità coronarica', 'unita coronarica', 'terapia intensiva cardiologica'],
    'utic': ['utic', 'unità terapia intensiva'],
    'emodinamica': ['emodinamica', 'cardiologia interventistica'],
    'elettrofisiologia': ['elettrofisiologia'],
    'rianimazione': ['rianimazione', 'terapia intensiva'],
    'intramoenia': ['intramoenia', 'libera professione'],
  };
  const tokenMatches = (token, text) => {
    if (text.includes(token)) return true;
    const alts = synonyms[token];
    if (alts) {
      for (const alt of alts) if (text.includes(alt)) return true;
    }
    return false;
  };

  // Espandi i risultati numeri: se il gruppo (nome) matcha TUTTI i token della query,
  // includi tutti i contatti del gruppo (anche quelli che non matchano direttamente).
  // Questo replica il comportamento della ricerca Rubrica.
  //
  // FILTRO STRICT: Fuse produce molti falsi positivi con fuzzy matching. Per query multi-token,
  // tengo solo i contatti dove OGNI token della query matcha (direttamente o via sinonimi)
  // nel testo del contatto OPPURE nel testo del gruppo.
  const contactText = (item) => [
    item.titolo, item.gruppo, item.direttore, item.sede, item.numeri, item.tag, item.termini
  ].filter(Boolean).join(' ').toLowerCase();
  const allTokensMatch = (text, groupText) => {
    return queryTerms.every(t => tokenMatches(t, text) || tokenMatches(t, groupText));
  };

  const matchedGroupIds = new Set();
  const byGruppo = new Map();
  numeriRaw.forEach(r => {
    const gid = r.item.gruppoId;
    // Filtro stretto: ogni token della query deve matchare nel contatto o nel gruppo
    // MA almeno un token deve matchare direttamente nel testo del contatto (evita di
    // includere tutti i contatti di un gruppo solo perché il nome gruppo matcha qualche token).
    if (queryTerms.length >= 1 && !isNumericQuery) {
      const ctxt = contactText(r.item);
      const gtxt = (r.item.gruppo + ' ' + (r.item.alias || '')).toLowerCase();
      if (!allTokensMatch(ctxt, gtxt)) return;
      // Almeno un token deve essere presente nel contatto stesso (non solo nel gruppo)
      const anyTokenInContact = queryTerms.some(t => tokenMatches(t, ctxt));
      if (!anyTokenInContact) return;
    }
    if (!byGruppo.has(gid)) {
      byGruppo.set(gid, {
        gruppoId: gid,
        gruppo: r.item.gruppo,
        ospedale: r.item.ospedale,
        direttore: r.item.direttore,
        sede: r.item.sede,
        contatti: [],
        bestScore: 1
      });
    }
    const g = byGruppo.get(gid);
    g.contatti.push(r);
    if (r.score < g.bestScore) g.bestScore = r.score;
  });

  // Aggiungo gruppi il cui NOME/direttore/alias matcha interamente la query (no sedi_operative tipo,
  // che è troppo specifico: "ucic" non deve espandere tutta la Cardiologia)
  const allGroupsForSearch = getVisibleNumeriGroups();
  allGroupsForSearch.forEach(g => {
    const nameAlias = [g.nome, (g.alias || []).join(' ')].filter(Boolean).join(' ').toLowerCase();
    const groupMatches = queryTerms.every(t => tokenMatches(t, nameAlias));
    // Match parziale: almeno un token matcha il nome E gli altri matchano almeno un contatto
    // Esempio: "degenze cardiol" → "cardiol" matcha il nome, "degenze" matcha alcuni contatti
    const tokensInName = queryTerms.filter(t => tokenMatches(t, nameAlias));
    const tokensNotInName = queryTerms.filter(t => !tokenMatches(t, nameAlias));
    let partialGroupMatch = false;
    if (!groupMatches && tokensInName.length > 0 && tokensNotInName.length > 0) {
      // Controllo: esiste almeno un contatto che matcha TUTTI i token rimanenti?
      partialGroupMatch = (g.contatti || []).some(c => {
        const tagsStr = Array.isArray(c.tag) ? c.tag.join(' ') : (c.tag || '');
        const aliasStr = Array.isArray(c.alias) ? c.alias.join(' ') : (c.alias || '');
        const ctxt = [c.etichetta, c.sezione, c.luogo, tagsStr, aliasStr].filter(Boolean).join(' ').toLowerCase();
        return tokensNotInName.every(t => tokenMatches(t, ctxt));
      });
    }
    if (groupMatches || partialGroupMatch) {
      matchedGroupIds.add(g.id);
      if (!byGruppo.has(g.id)) {
        byGruppo.set(g.id, {
          gruppoId: g.id,
          gruppo: g.nome,
          ospedale: g._source || 'aopd',
          direttore: g.direttore || '',
          sede: '',
          contatti: [],
          bestScore: 0.1
        });
      } else {
        const existing = byGruppo.get(g.id);
        if (existing.bestScore > 0.1) existing.bestScore = 0.1;
      }
    }
  });

  const getFullGroup = (gid) => {
    for (const g of allGroupsForSearch) {
      if (g.id === gid) return g;
    }
    return null;
  };

  const uocResults = Array.from(byGruppo.values()).map(u => {
    const full = getFullGroup(u.gruppoId);
    const allContatti = full ? (full.contatti || []) : u.contatti.map(r => r.item);
    const matchedIds = new Set(u.contatti.map(r => r.item.slug));
    const groupFullyMatched = matchedGroupIds.has(u.gruppoId);

    // Riuso la classifyContatto globale per coerenza con la rubrica
    const classifyContact = (c) => {
      const cls = classifyContatto(c);
      return { group: cls.group, isGuardia: cls.kind === 'guardia' };
    };

    const contatti = allContatti.map(c => {
      const label = (c.etichetta || '').toLowerCase();
      const tags = (c.tag || []).join(' ').toLowerCase();
      const cls = classifyContact(c);
      const matched = matchedIds.has(c.id);
      // Sub-priorità dentro "reparto" (allineata alla rubrica)
      let repSub = 4;
      if (cls.group === 2) {
        const tagsArr = (c.tag || []).map(t => t.toLowerCase());
        if (/stud(io|i) medic|medici di reparto|specializz|\bdr\.|\bprof\.|dott\.|\bdottor/i.test(label)) repSub = 1;
        else if (/caposala|coordinat/i.test(label)) repSub = 2;
        else if (tagsArr.includes('guardiola') || /guardiola|bancone/i.test(label)) repSub = 3;
        else if (c.kind === 'utile') repSub = 5;
      }
      let relevance = 0;
      if (matched) relevance += 10;
      if (cls.isGuardia && wantsGuardia) relevance += 20;
      if (cls.isGuardia) relevance += 3;
      queryTerms.forEach(t => {
        if (label.includes(t)) relevance += 5;
        if (tags.includes(t)) relevance += 3;
      });
      return { ...c, _isGuardia: cls.isGuardia, _group: cls.group, _repSub: repSub, _matched: matched, _relevance: relevance };
    });

    // Ordinamento:
    // - Se il gruppo matcha pienamente la query (es. "cardio" → Cardiologia): uso l'ordine rubrica
    //   (group -> sub-priorità reparto -> ordine YAML originale), identico a quello mostrato aprendo la UOC
    // - Altrimenti: ordine per rilevanza (contatti che matchano meglio la query in cima)
    // Tag boost: contatti con kind esplicito (guardia/reparto/utile) più in alto a parità di match
    const tagBoost = (c) => {
      if (c.kind === 'guardia' || c._isGuardia) return 3;
      if (c.kind === 'reparto') return 2;
      if (c.kind === 'utile') return 1;
      return 0;
    };
    if (groupFullyMatched) {
      const origIdx = new Map(allContatti.map((c, i) => [c.id, i]));
      contatti.sort((a, b) => {
        if (a._group !== b._group) return a._group - b._group;
        if (a._group === 2 && a._repSub !== b._repSub) return a._repSub - b._repSub;
        return (origIdx.get(a.id) ?? 0) - (origIdx.get(b.id) ?? 0);
      });
    } else {
      contatti.sort((a, b) => {
        // Contatti con tag esplicito vengono sempre prima
        const tb = tagBoost(b) - tagBoost(a);
        if (tb !== 0) return tb;
        if (a._group !== b._group) return a._group - b._group;
        if (a._group === 2 && a._repSub !== b._repSub) return a._repSub - b._repSub;
        return b._relevance - a._relevance;
      });
    }
    const hasMatchedGuardia = contatti.some(c => c._isGuardia && c._matched);
    const hasTaggedMatched = contatti.some(c => c._matched && (c.kind === 'utile' || c.kind === 'reparto' || c.kind === 'guardia'));
    const scoreAdjusted = u.bestScore - (hasMatchedGuardia ? 0.2 : 0) - (wantsGuardia && hasMatchedGuardia ? 0.15 : 0) - (hasTaggedMatched ? 0.25 : 0);

    return {
      ...u,
      contatti,
      scoreAdjusted,
      hasMatchedGuardia,
      totalContatti: allContatti.length,
      matchedCount: matchedIds.size,
      fullGroup: full
    };
  });

  uocResults.sort((a, b) => {
    if (wantsGuardia) {
      if (a.hasMatchedGuardia !== b.hasMatchedGuardia) return a.hasMatchedGuardia ? -1 : 1;
    }
    return a.scoreAdjusted - b.scoreAdjusted;
  });

  const osp = { aopd: 'AOPD', osa: 'OSA', iov: 'IOV' };

  // Chip inline per modificare il TAG direttamente dai risultati ricerca.
  // Attivi solo in modalità modifica. Le modifiche vanno in pendingTagEdits e
  // si applicano con "Salva modifiche" / "Annulla modifiche".
  const renderInlineTagChips = (c) => {
    if (!c.id) return '';
    const pending = state.pendingTagEdits && state.pendingTagEdits.has(c.id);
    const k = pending ? state.pendingTagEdits.get(c.id) : (c.kind || '');
    const mk = (value, label, bg, color) =>
      `<button class="kind-chip ${k === value ? 'active' : ''}" onclick="event.stopPropagation(); setContactKind('${escapeJs(c.id)}','${value}')" title="${label}" style="--chip-color:${color};--chip-bg:${bg};">${label}</button>`;
    return `<div class="edit-only kind-selector" style="margin-top:4px;display:inline-flex;gap:4px;flex-wrap:wrap;align-items:center;" onclick="event.stopPropagation();">
      <span style="font-size:10px;color:var(--ink-muted);font-family:var(--mono);letter-spacing:.04em;">TAG:</span>
      ${mk('guardia', '🔴 Guardia', '#fef0ef', 'var(--danger)')}
      ${mk('reparto', '🔵 Reparto', 'var(--accent-soft)', 'var(--accent)')}
      ${mk('utile',   '🟢 Utili',   '#e8f5e9', '#2e7d32')}
      ${k ? `<button class="kind-chip-reset" onclick="event.stopPropagation(); setContactKind('${escapeJs(c.id)}',null)" title="Auto">✕ auto</button>` : ''}
      ${pending ? `<span style="font-size:10px;color:var(--warning);font-style:italic;">(modificato)</span>` : ''}
    </div>`;
  };

  const renderContatto = (c, opts = {}) => {
    const nums = [];
    if (c.numeri) nums.push(...c.numeri);
    const numsStr = nums.join(' · ');
    const breveStr = c.breve ? `br. ${c.breve}` : '';
    const cellStr = c.cellulare || '';
    const displayNum = [numsStr, breveStr, cellStr].filter(Boolean).join(' · ');
    const tagsLower = (c.tag || []).map(t => t.toLowerCase());
    const isGuardia = c._isGuardia;
    const isReparto = c._group === 2 && !isGuardia && c.kind !== 'utile';
    const isUtile = c.kind === 'utile';
    const isGuardiola = tagsLower.includes('guardiola');
    const luogoHtml = (c.luogo && !opts.hideLuogo) ? `<div class="sr-contact-luogo">📍 ${escapeHtml(c.luogo)}</div>` : '';
    const sezioneHtml = (c.sezione && !opts.hideSedeMeta) ? `<span class="sr-contact-sezione">· ${escapeHtml(c.sezione)}</span>` : '';
    const tagChips = renderInlineTagChips(c);
    const labelHtml = `${escapeHtml(c.etichetta)}${sezioneHtml}`;

    if (isGuardia) {
      return `<div class="sr-contact sr-contact-guardia" onclick="navigate('numeri', {filter:'${escapeJs(c.id)}'})">
        <div class="sr-contact-left">
          <div class="sr-contact-label">${labelHtml}</div>
          <div class="sr-contact-meta">${c.tag && c.tag.length ? escapeHtml(c.tag.join(' · ')) : 'guardia'}</div>
          ${luogoHtml}
          ${tagChips}
        </div>
        <div class="sr-contact-num sr-contact-num-guardia">${escapeHtml(displayNum || '—')}</div>
      </div>`;
    }
    if (isUtile) {
      return `<div class="sr-contact sr-contact-utile" onclick="navigate('numeri', {filter:'${escapeJs(c.id)}'})">
        <div class="sr-contact-left">
          <div class="sr-contact-label">${labelHtml}</div>
          <div class="sr-contact-meta">● utili</div>
          ${luogoHtml}
          ${tagChips}
        </div>
        <div class="sr-contact-num sr-contact-num-utile">${escapeHtml(displayNum || '—')}</div>
      </div>`;
    }
    if (isReparto) {
      const repartoMeta = isGuardiola ? '🏥 guardiola' : 'reparto';
      return `<div class="sr-contact sr-contact-reparto" onclick="navigate('numeri', {filter:'${escapeJs(c.id)}'})">
        <div class="sr-contact-left">
          <div class="sr-contact-label">${labelHtml}</div>
          <div class="sr-contact-meta">${escapeHtml(repartoMeta)}</div>
          ${luogoHtml}
          ${tagChips}
        </div>
        <div class="sr-contact-num sr-contact-num-reparto">${escapeHtml(displayNum || '—')}</div>
      </div>`;
    }
    return `<div class="sr-contact" onclick="navigate('numeri', {filter:'${escapeJs(c.id)}'})">
      <div class="sr-contact-left">
        <div class="sr-contact-label">${labelHtml}</div>
        ${luogoHtml}
        ${tagChips}
      </div>
      <div class="sr-contact-num">${escapeHtml(displayNum || '—')}</div>
    </div>`;
  };

  // Mostro i badge ospedale solo se almeno OSA o IOV sono abilitati (altrimenti è sempre AOPD)
  const anyExtendedOn = !!(state.showExtendedNumeri && (state.showExtendedNumeri.osa || state.showExtendedNumeri.iov));

  const renderUoc = (u) => {
    const groupFullyMatched = matchedGroupIds.has(u.gruppoId);
    // Se il gruppo matcha il nome (es. "cardiologia"), ma ci sono altri token
    // (es. "reparto"), mostro solo i contatti che matchano anche quei token.
    // Questo evita che lo slice(0,12) riempia un solo bucket (es. Emodinamica).
    let topContatti;
    if (groupFullyMatched) {
      // Token che NON sono già nel nome del gruppo
      const gName = (u.gruppo || '').toLowerCase();
      const extraTokens = queryTerms.filter(t => !tokenMatches(t, gName));
      if (extraTokens.length > 0) {
        // Filtra TUTTI i contatti del gruppo (non solo quelli che Fuse ha già trovato)
        // che matchano tutti i token extra nei loro campi.
        // NB: qui c è il contatto RAW dal yaml, quindi usa c.etichetta (non c.titolo)
        // e c.tag è un array che va joined.
        const filtered = u.contatti.filter(c => {
          const tagsStr = Array.isArray(c.tag) ? c.tag.join(' ') : (c.tag || '');
          const aliasStr = Array.isArray(c.alias) ? c.alias.join(' ') : (c.alias || '');
          const ctxt = [c.etichetta, c.sezione, c.luogo, tagsStr, aliasStr].filter(Boolean).join(' ').toLowerCase();
          return extraTokens.every(t => tokenMatches(t, ctxt));
        });
        topContatti = filtered.length > 0 ? filtered.slice(0, 30) : u.contatti.slice(0, 12);
      } else {
        topContatti = u.contatti.slice(0, 12);
      }
    } else {
      topContatti = u.contatti.filter(c => c._matched).slice(0, 6);
    }
    const restCount = u.totalContatti - topContatti.length;
    const showOspBadge = anyExtendedOn || u.ospedale !== 'aopd';
    const ospBadge = showOspBadge
      ? `<span class="sr-uoc-badge sr-uoc-badge-${u.ospedale}">${osp[u.ospedale] || u.ospedale.toUpperCase()}</span>`
      : '';
    const sedeHtml = (groupFullyMatched && u.fullGroup)
      ? renderSedeOperativa(u.fullGroup.sede_operativa, u.fullGroup.sedi_operative)
      : '';
    // Raggruppo topContatti per sede operativa usando groupContattiBySede.
    // Ogni bucket ha un header con il nome della sede + luogo.
    let contattiHtml = '';
    if (u.fullGroup && typeof groupContattiBySede === 'function') {
      const buckets = groupContattiBySede(topContatti, u.fullGroup.sedi_operative, u.fullGroup.sede_operativa);
      contattiHtml = buckets.map(b => {
        const sedeLoc = b.sede
          ? [b.sede.edificio, b.sede.piano].filter(Boolean).join(' ')
          : '';
        const sedeLocLower = sedeLoc.toLowerCase().trim();
        const contattiItems = b.contatti.map(c => {
          const cLuogo = (c.luogo || '').toLowerCase().trim();
          const hide = sedeLocLower && cLuogo && (cLuogo === sedeLocLower || cLuogo.includes(sedeLocLower) || sedeLocLower.includes(cLuogo));
          return renderContatto(c, { hideLuogo: hide, hideSedeMeta: !!b.sede });
        }).join('');
        if (b.sede) {
          const headerInner = renderSedeBucketHeader(b.sede);
          return `<div class="sr-sede-bucket">
            <button class="sr-sede-bucket-header" onclick="openUocWithSede('${escapeJs(u.gruppoId)}','${escapeJs(b.sedeKey)}')" title="Apri ${escapeHtml(u.gruppo)} con questa sezione espansa">${headerInner}</button>
            <div class="sr-sede-bucket-contatti">${contattiItems}</div>
          </div>`;
        }
        // Bucket "Altro": wrapper neutro con header semplice (non cliccabile perché non c'è sede)
        return `<div class="sr-sede-bucket">
          <div class="sr-sede-bucket-header" style="cursor:default;">
            <span class="sede-bucket-tipo">Altro</span>
          </div>
          <div class="sr-sede-bucket-contatti">${contattiItems}</div>
        </div>`;
      }).join('');
    } else {
      contattiHtml = topContatti.map(c => renderContatto(c)).join('');
    }
    return `<div class="sr-uoc" onclick="event.target.closest('.sr-contact, .sr-sede-bucket-header, .sr-sede-bucket-contatti') ? null : navigate('numeri', {filter:'${escapeJs(u.gruppoId)}'})">
      <div class="sr-uoc-head">
        ${ospBadge}
      </div>
      <div class="sr-uoc-title">${escapeHtml(u.gruppo)}</div>
      ${sedeHtml}
      <div class="sr-uoc-contatti">
        ${contattiHtml}
        ${restCount > 0 ? `<div class="sr-uoc-more">+ ${restCount} altri numeri nella UOC →</div>` : ''}
      </div>
    </div>`;
  };

  const renderOther = (r) => {
    const item = r.item;
    let click = '';
    if (item.type === 'procedura') click = `navigate('procedura', {slug:'${escapeJs(item.slug)}'})`;
    else if (item.type === 'clinica') click = `navigate('clinica-scheda', {slug:'${escapeJs(item.slug)}'})`;
    else if (item.type === 'modulo') click = `navigate('modulo', {slug:'${escapeJs(item.slug)}'})`;
    else if (item.type === 'tabella') click = `navigate('tabella', {slug:'${escapeJs(item.slug)}'})`;
    const typeLabel = item.type === 'procedura' ? 'Procedura'
      : item.type === 'clinica' ? 'Scheda clinica'
      : item.type === 'modulo' ? 'Modulo'
      : item.type === 'tabella' ? 'Tabella' : item.type;
    const snippet = (item.body || '').substring(0, 140) + ((item.body || '').length > 140 ? '…' : '');
    return `<div class="search-result-item" onclick="${click}">
      <div class="search-result-type">${typeLabel}</div>
      <div class="search-result-title">${escapeHtml(item.titolo)}</div>
      ${snippet ? `<div class="search-result-snippet">${escapeHtml(snippet)}</div>` : ''}
    </div>`;
  };

  const totalContatti = uocResults.reduce((s, u) => s + u.matchedCount, 0);
  const totalResults = uocResults.length + nonNumeri.length;

  // Conteggio per categoria (per filter chips)
  const countByType = {
    numeri: numeriRaw.length,
    procedura: 0, clinica: 0, modulo: 0, tabella: 0
  };
  rawResults.forEach(r => {
    if (r.item.type !== 'numero' && countByType[r.item.type] !== undefined) countByType[r.item.type]++;
  });
  // Set-based filter: multi-select con toggle
  const activeFilters = state.searchFilter instanceof Set ? state.searchFilter : new Set();
  state.searchFilter = activeFilters;
  const isFiltering = activeFilters.size > 0;
  const showNumeri = !isFiltering || activeFilters.has('numeri');
  const showProc = !isFiltering || activeFilters.has('procedura');
  const showClin = !isFiltering || activeFilters.has('clinica');
  const showMod = !isFiltering || activeFilters.has('modulo');
  const showTab = !isFiltering || activeFilters.has('tabella');

  const chipTypes = [
    { key: 'numeri',    label: 'Rubrica',        count: countByType.numeri },
    { key: 'procedura', label: 'Procedure',      count: countByType.procedura },
    { key: 'clinica',   label: 'Schede cliniche', count: countByType.clinica },
    { key: 'modulo',    label: 'Moduli',         count: countByType.modulo },
    { key: 'tabella',   label: 'Tabelle',        count: countByType.tabella }
  ].filter(c => c.count > 0);

  const chipsHtml = chipTypes.length > 1 || isFiltering
    ? `<div class="search-filter-chips">
        ${isFiltering ? `<button class="search-filter-chip" onclick="clearSearchFilter()">✕ Tutti</button>` : ''}
        ${chipTypes.map(c =>
          `<button class="search-filter-chip ${activeFilters.has(c.key) ? 'active' : ''}" onclick="toggleSearchFilter('${c.key}')">${c.label} · ${c.count}</button>`
        ).join('')}
      </div>`
    : '';

  // Filtra nonNumeri secondo i filtri attivi
  const filteredNonNumeri = isFiltering
    ? rawResults.filter(r => r.item.type !== 'numero' && activeFilters.has(r.item.type)).slice(0, 20)
    : nonNumeri;

  target.innerHTML = `
    <div class="page-head">
      <div class="page-eyebrow">Risultati</div>
      <h1 class="page-title">Ricerca: <em>${escapeHtml(query)}</em></h1>
      <div style="margin-top:8px;font-size:13px;color:var(--ink-muted);">
        ${uocResults.length > 0 ? `${uocResults.length} UOC · ${totalContatti} contatti${nonNumeri.length > 0 ? ' · ' : ''}` : ''}
        ${nonNumeri.length > 0 ? `${nonNumeri.length} documenti` : ''}
        ${totalResults === 0 ? 'nessun risultato' : ''}
      </div>
      ${chipsHtml}
    </div>
    ${showNumeri && uocResults.length > 0 ? `<div class="sr-section-title">Rubrica</div>
    <div class="sr-uoc-list">${uocResults.map(renderUoc).join('')}</div>` : ''}
    ${(showProc || showClin || showMod || showTab) && filteredNonNumeri.length > 0 ? `<div class="sr-section-title">Documenti</div>
    <div class="search-results">${filteredNonNumeri.map(renderOther).join('')}</div>` : ''}
    ${totalResults === 0 ? `<p style="color:var(--ink-muted);padding:24px 0;">Nessun risultato per "${escapeHtml(query)}".</p>` : ''}`;
}

function toggleSearchFilter(type) {
  if (!(state.searchFilter instanceof Set)) state.searchFilter = new Set();
  if (state.searchFilter.has(type)) state.searchFilter.delete(type);
  else state.searchFilter.add(type);
  const q = $('global-search').value || state.currentParams?.query || '';
  renderSearchResults(q);
}
function clearSearchFilter() {
  state.searchFilter = new Set();
  const q = $('global-search').value || state.currentParams?.query || '';
  renderSearchResults(q);
}

/* ============================ MODAL ============================ */
function showModal({ title, subtitle, body, actions }) {
  closeModal();
  const container = $('modal-container');
  const actionsHtml = (actions || []).map((a, i) => {
    const variant = a.variant === 'danger' ? 'danger' : a.variant === 'ghost' ? 'ghost' : '';
    return `<button class="btn ${variant}" data-action-idx="${i}">${escapeHtml(a.label)}</button>`;
  }).join('');
  container.innerHTML = `
    <div class="modal-backdrop" id="current-modal-backdrop">
      <div class="modal">
        <div class="modal-head">
          <div class="modal-title">${title}</div>
          ${subtitle ? `<div class="modal-sub">${subtitle}</div>` : ''}
        </div>
        ${body ? `<div class="modal-body">${body}</div>` : ''}
        ${actionsHtml ? `<div class="modal-actions">${actionsHtml}</div>` : ''}
      </div>
    </div>`;
  $$('[data-action-idx]').forEach(btn => {
    const idx = parseInt(btn.dataset.actionIdx, 10);
    btn.addEventListener('click', () => {
      const action = actions[idx];
      if (action && action.onClick) action.onClick();
    });
  });
  const backdrop = $('current-modal-backdrop');
  if (backdrop) backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeModal(); });
}

function closeModal() {
  $('modal-container').innerHTML = '';
}

/* ============================ INIT ============================ */
function initEventListeners() {
  $('login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const u = $('login-username').value.trim();
    const p = $('login-passphrase').value;
    if (u && p) attemptLogin(u, p);
  });

  $$('.nav-item').forEach(el => {
    if (el.dataset.route) {
      el.addEventListener('click', () => navigate(el.dataset.route));
    }
  });

  $('nav-logout').addEventListener('click', () => {
    logout();
  });

  $('brand-home').addEventListener('click', () => { closeMobileMenu(); navigate('home'); });

  // Mobile drawer (hamburger)
  let _scrollLockY = 0;
  function isMobileViewport(){ return window.innerWidth <= 900; }
  function openMobileMenu(){
    if (!isMobileViewport()) return;
    _scrollLockY = window.scrollY || window.pageYOffset || 0;
    $('sidebar').classList.add('mobile-open');
    $('sidebar-overlay').classList.add('show');
    $('btn-hamburger').classList.add('active');
    $('btn-hamburger').setAttribute('aria-expanded', 'true');
    // Lock body scroll (iOS-safe: position fixed mantiene la posizione)
    document.body.style.position = 'fixed';
    document.body.style.top = `-${_scrollLockY}px`;
    document.body.style.left = '0';
    document.body.style.right = '0';
    document.body.style.width = '100%';
    document.body.style.overflow = 'hidden';
  }
  function closeMobileMenu(){
    const wasOpen = $('sidebar').classList.contains('mobile-open');
    $('sidebar').classList.remove('mobile-open');
    $('sidebar-overlay').classList.remove('show');
    $('btn-hamburger').classList.remove('active');
    $('btn-hamburger').setAttribute('aria-expanded', 'false');
    // Unlock body scroll e restore posizione
    document.body.style.position = '';
    document.body.style.top = '';
    document.body.style.left = '';
    document.body.style.right = '';
    document.body.style.width = '';
    document.body.style.overflow = '';
    if (wasOpen && _scrollLockY) {
      window.scrollTo(0, _scrollLockY);
      _scrollLockY = 0;
    }
  }
  $('btn-hamburger').addEventListener('click', (e) => {
    e.stopPropagation();
    if ($('sidebar').classList.contains('mobile-open')) closeMobileMenu();
    else openMobileMenu();
  });
  // Tap su overlay → chiude
  $('sidebar-overlay').addEventListener('click', closeMobileMenu);
  $('sidebar-close').addEventListener('click', closeMobileMenu);

  // Swipe gesture: da sinistra (primo terzo dello schermo) verso destra = apre sidebar
  //                sulla sidebar aperta verso sinistra = chiude
  let touchStart = null;
  const OPEN_THRESHOLD = 60; // px di swipe orizzontale per aprire
  const VERT_TOLERANCE = 40; // movimento verticale max consentito
  document.addEventListener('touchstart', (e) => {
    if (!isMobileViewport()) return;
    const t = e.touches[0];
    if (!t) return;
    const edgeZone = window.innerWidth / 2;
    const sidebarOpen = $('sidebar').classList.contains('mobile-open');
    if (!sidebarOpen && t.clientX <= edgeZone) {
      touchStart = { x: t.clientX, y: t.clientY, mode: 'open' };
    } else if (sidebarOpen) {
      touchStart = { x: t.clientX, y: t.clientY, mode: 'close' };
    }
  }, { passive: true });
  document.addEventListener('touchmove', (e) => {
    if (!touchStart) return;
    const t = e.touches[0];
    if (!t) return;
    const dx = t.clientX - touchStart.x;
    const dy = Math.abs(t.clientY - touchStart.y);
    if (dy > VERT_TOLERANCE) { touchStart = null; return; } // è uno scroll verticale, annullo
    if (touchStart.mode === 'open' && dx > OPEN_THRESHOLD) {
      openMobileMenu();
      touchStart = null;
    } else if (touchStart.mode === 'close' && dx < -OPEN_THRESHOLD) {
      closeMobileMenu();
      touchStart = null;
    }
  }, { passive: true });
  document.addEventListener('touchend', () => { touchStart = null; }, { passive: true });
  document.addEventListener('touchcancel', () => { touchStart = null; }, { passive: true });
  // Chiudo il drawer quando l'utente naviga (click su nav-item)
  $('sidebar').addEventListener('click', (e) => {
    const navItem = e.target.closest('.nav-item');
    if (navItem && isMobileViewport()) closeMobileMenu();
  });
  // Tap sul main content (fuori dalla sidebar) → chiude
  $('main-content').addEventListener('click', () => {
    if ($('sidebar').classList.contains('mobile-open')) closeMobileMenu();
  }, true); // capture per intercettare prima di handler interni
  // Chiudo con ESC
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && $('sidebar').classList.contains('mobile-open')) closeMobileMenu();
  });
  // Resize: se passo a desktop, ripristino tutto
  window.addEventListener('resize', () => {
    if (!isMobileViewport() && $('sidebar').classList.contains('mobile-open')) {
      closeMobileMenu();
    }
  });

  $('btn-edit-mode').addEventListener('click', () => toggleEditMode());
  $('btn-exit-edit').addEventListener('click', () => toggleEditMode(false));
  $('btn-commit-tags').addEventListener('click', () => commitTagEdits());
  $('btn-cancel-tags').addEventListener('click', () => cancelTagEdits());

  $('btn-refresh').addEventListener('click', async () => {
    if (state.editingContext && state.editingContext.isDirty) {
      if (!confirm('Hai modifiche non salvate. Ricaricare comunque (perderai le modifiche)?')) return;
    }
    $('btn-refresh').classList.add('has-badge');
    toast('Ricaricamento indice...', 'info', 2000);
    try {
      await buildIndex();
      toast('Indice aggiornato', 'success');
      $('btn-refresh').classList.remove('has-badge');
      navigate(state.currentView);
    } catch (e) {
      toast('Errore refresh: ' + e.message, 'error');
    }
  });

  const searchInput = $('global-search');
  const searchClear = $('global-search-clear');
  let searchTimeout = null;
  const updateSearchClear = () => {
    if (searchClear) searchClear.classList.toggle('hidden', !searchInput.value);
  };
  updateSearchClear();
  searchInput.addEventListener('input', (e) => {
    const q = e.target.value;
    updateSearchClear();
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      state.searchFilter = new Set();
      if (q.length >= 2) openSearchOverlay(q);
      else closeSearchOverlay();
    }, 200);
  });
  if (searchClear) {
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      updateSearchClear();
      closeSearchOverlay();
      searchInput.focus();
    });
  }

  // Keyboard shortcut: Cmd/Ctrl + K focuses search
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      searchInput.focus();
      searchInput.select();
    }
    if (e.key === 'Escape') {
      if ($('modal-container').children.length > 0) closeModal();
      else if (!$('search-overlay').classList.contains('hidden')) {
        searchInput.value = '';
        if (searchClear) searchClear.classList.add('hidden');
        closeSearchOverlay();
      }
    }
  });
}

async function init() {
  initTheme();
  initEventListeners();

  // Check for existing session
  const saved = loadSession();
  if (saved && saved.token && saved.username) {
    state.session = saved;
    // Verify token still works
    try {
      const testRes = await fetch(`${CONFIG.API_BASE}/repos/${CONFIG.REPO_OWNER}/${CONFIG.REPO_NAME}`, {
        headers: { 'Authorization': `token ${saved.token}`, 'Accept': 'application/vnd.github+json' }
      });
      if (testRes.ok) {
        await enterApp();
        return;
      }
    } catch {}
    clearSession();
  }

  // Show login
  $('login-view').classList.remove('hidden');
  $('app-view').classList.add('hidden');
  setTimeout(() => $('login-username').focus(), 100);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
