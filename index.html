<style>
:root {
  --bg:#F6F2EA; --bg-paper:#FBF8F2; --bg-raised:#FEFDF9; --bg-sink:#EFE9DC;
  --ink:#1A1A1A; --ink-soft:#44433F; --ink-muted:#7A7772; --ink-faint:#A29E96;
  --rule:#D9D2C3; --rule-soft:#E8E3D6; --rule-strong:#BEB5A1;
  --accent:#2B4A6F; --accent-soft:#E6EBF2; --accent-dark:#1F3654;
  --warning:#8A5A1F; --warning-soft:#F4EBD9;
  --danger:#8F2E2A; --danger-soft:#F4E3E2;
  --success:#2F5F3D; --success-soft:#E6F0E9;
  --serif:'Fraunces','Iowan Old Style','Times New Roman',serif;
  --sans:'Instrument Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'JetBrains Mono','SF Mono',Consolas,monospace;
  --shadow-subtle:0 1px 0 rgba(255,255,255,0.7) inset, 0 0 0 1px rgba(0,0,0,0.02);
  --shadow-raised:0 4px 16px rgba(43,42,40,0.06), 0 1px 3px rgba(43,42,40,0.04);
  --shadow-modal:0 20px 60px rgba(43,42,40,0.18), 0 2px 8px rgba(43,42,40,0.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;overflow-x:clip;max-width:100%;-webkit-text-size-adjust:100%}
/* Font size scale: zoom applicato solo al contenuto principale, non a topbar/sidebar */
html[data-font-size="sm"] main.content{zoom:0.88}
html[data-font-size="md"] main.content{zoom:1}
html[data-font-size="lg"] main.content{zoom:1.12}
html[data-font-size="xl"] main.content{zoom:1.25}
body{font-family:var(--sans);font-size:1rem;line-height:1.55;color:var(--ink);background:var(--bg);min-height:100vh;overflow-x:clip;max-width:100%;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:-1;background:radial-gradient(ellipse 80% 60% at 20% 0%,rgba(43,74,111,0.035),transparent 70%),radial-gradient(ellipse 70% 50% at 100% 100%,rgba(138,90,31,0.03),transparent 70%)}
.hidden{display:none!important}
a{color:var(--accent);text-decoration:none;border-bottom:1px solid transparent;transition:border-color .15s}
a:hover{border-color:var(--accent)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
code{font-family:var(--mono);font-size:.92em;background:var(--bg-sink);padding:2px 5px;border-radius:2px}

/* LOGIN */
#login-view{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:48px 24px}
.login-card{max-width:440px;width:100%;background:var(--bg-paper);border:1px solid var(--rule);border-radius:2px;padding:48px 40px;box-shadow:var(--shadow-raised);position:relative}
.login-card::before{content:'';position:absolute;top:-1px;left:-1px;right:-1px;height:3px;background:var(--ink)}
.login-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:14px}
.login-title{font-family:var(--serif);font-weight:400;font-size:34px;line-height:1.05;letter-spacing:-.02em;margin-bottom:36px}
.login-title em{font-style:italic;font-weight:300}
.login-subtitle{font-family:var(--serif);font-style:italic;font-weight:300;font-size:16px;color:var(--ink-muted);margin-bottom:36px}
.field{margin-bottom:20px}
label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;margin-bottom:6px}
input[type="text"],input[type="password"],textarea,select{width:100%;font-family:var(--sans);font-size:15px;padding:12px 14px;background:var(--bg-raised);border:1px solid var(--rule);border-radius:2px;color:var(--ink);transition:border-color .15s,box-shadow .15s}
.mono-input{font-family:var(--mono);font-size:14px}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--sans);font-size:14px;font-weight:500;padding:12px 22px;border:1px solid var(--ink);background:var(--ink);color:var(--bg-paper);border-radius:2px;cursor:pointer;transition:background .15s,transform .08s;letter-spacing:.01em;white-space:nowrap}
.btn:hover{background:var(--ink-soft)}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.secondary{background:transparent;color:var(--ink)}
.btn.secondary:hover{background:var(--rule-soft)}
.btn.ghost{background:transparent;border-color:var(--rule);color:var(--ink-soft)}
.btn.ghost:hover{border-color:var(--ink);color:var(--ink);background:var(--bg-raised)}
.btn.danger{background:var(--danger);border-color:var(--danger)}
.btn.danger:hover{background:#7a2723}
.btn.full{width:100%}
.btn.sm{font-size:12px;padding:8px 14px}

.login-help{margin-top:32px;padding-top:24px;border-top:1px solid var(--rule-soft);font-size:13px;color:var(--ink-muted);line-height:1.6}
.login-error{display:none;margin-bottom:16px;padding:10px 14px;background:var(--danger-soft);border-left:3px solid var(--danger);border-radius:2px;font-size:13px;color:var(--danger)}
.login-error.visible{display:block}

/* APP SHELL */
#app-view{display:grid;grid-template-rows:auto 1fr;min-height:100vh}
header.topbar{position:sticky;top:0;z-index:50;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:20px;padding:14px 24px;background:rgba(251,248,242,.92);backdrop-filter:saturate(1.4) blur(12px);-webkit-backdrop-filter:saturate(1.4) blur(12px);border-bottom:1px solid var(--rule);box-sizing:border-box}
@media (max-width:900px){
  header.topbar{
    grid-template-columns:auto 1fr auto;
    grid-template-areas:"hamb brand actions" "search search search";
    gap:10px 12px;padding:10px 14px;
  }
  header.topbar > .btn-hamburger{grid-area:hamb}
  header.topbar > .brand{grid-area:brand;justify-self:start;min-width:0;overflow:hidden}
  header.topbar > .search-wrap-outer{grid-area:search;max-width:100%;margin:0;min-width:0;width:100%}
  .search-wrap input{font-size:16px;padding:8px 12px 8px 34px;max-width:100%;box-sizing:border-box}
  header.topbar > .topbar-actions{grid-area:actions;justify-self:end;min-width:0;flex-shrink:0}
  .brand-divider,.brand-sub{display:none}
  .brand-mark{font-size:18px}
  .search-kbd{display:none}
  /* Compact icon-btn on mobile */
  .topbar-actions .user-name{display:none}
  .topbar-actions{gap:4px}
  .icon-btn{width:32px;height:32px}
  .user-chip{padding:4px 6px 4px 4px}
}
@media (max-width:420px){
  .brand-mark{display:none}
  header.topbar{padding:10px 10px;gap:8px 8px}
  #rate-limit-indicator{display:none!important}
}
.brand{display:flex;align-items:center;gap:10px}
.brand-home-link{display:flex;align-items:center;gap:10px;cursor:pointer}
.brand-logo{width:32px;height:32px;object-fit:contain;flex-shrink:0}
.brand-logo-dark{display:none}
[data-theme="dark"] .brand-logo-light{display:none}
[data-theme="dark"] .brand-logo-dark{display:block}
[data-theme="dark"] .login-logo-light{display:none!important}
[data-theme="dark"] .login-logo-dark{display:block!important}
.brand-mark{font-family:var(--serif);font-weight:500;font-style:italic;font-size:22px;letter-spacing:-.02em;color:var(--ink)}
.brand-divider{width:1px;height:16px;background:var(--rule-strong)}
.brand-sub{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted)}
.search-wrap{position:relative;max-width:580px;margin:0 auto;width:100%}
.search-wrap input{padding:10px 14px 10px 38px;font-size:14px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-muted);pointer-events:none}
.search-wrap-outer{display:flex;align-items:center;gap:8px;width:100%;min-width:0}
.search-wrap-outer > .search-wrap{flex:1;min-width:0}
.nav-history-btns{display:flex;gap:2px;flex-shrink:0}
.nav-history-btn{width:32px;height:32px;border:1px solid var(--rule);background:var(--bg-raised);color:var(--ink-soft);border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:background .12s,color .12s,border-color .12s}
.nav-history-btn:hover:not(:disabled){background:var(--bg-sink);color:var(--ink);border-color:var(--rule-strong)}
.nav-history-btn:disabled{opacity:.3;cursor:default}
.search-clear{position:absolute;right:44px;top:50%;transform:translateY(-50%);width:22px;height:22px;border:none;background:var(--bg-raised);color:var(--ink-muted);border-radius:50%;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.search-clear:hover{background:var(--rule);color:var(--ink)}
@media (max-width:900px){.search-clear{right:10px}}
.search-wrap input{padding-right:72px}
.search-kbd{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:10px;color:var(--ink-faint);padding:2px 6px;border:1px solid var(--rule);border-radius:2px;background:var(--bg-raised)}
.topbar-actions{display:flex;align-items:center;gap:8px}
.icon-btn{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:2px;color:var(--ink-soft);transition:background .15s,color .15s;position:relative}
.icon-btn:hover{background:var(--rule-soft);color:var(--ink)}
.user-chip{display:flex;align-items:center;gap:8px;padding:6px 12px 6px 6px;border-radius:2px;border:1px solid var(--rule);cursor:pointer;transition:background .15s;user-select:none;position:relative}
.user-chip:hover{background:var(--bg-raised)}
.user-menu-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--bg-paper);border:1px solid var(--rule);border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.12);padding:8px;min-width:240px;z-index:1000}
.user-menu-dropdown.hidden{display:none}
.user-menu-section{padding:6px 4px}
.user-menu-label{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:6px;padding:0 8px}
.theme-options{display:flex;gap:4px;padding:0 4px}
.theme-opt{flex:1;padding:6px 8px;background:transparent;border:1px solid var(--rule);border-radius:4px;font-size:12px;color:var(--ink);cursor:pointer;font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;justify-content:center;gap:4px;min-width:0}
.font-stepper{display:flex;align-items:center;gap:4px;padding:0 4px}
.font-step-btn{width:32px;height:32px;border:1px solid var(--rule);background:transparent;color:var(--ink);border-radius:4px;font-size:18px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;font-family:inherit}
.font-step-btn:hover:not(:disabled){background:var(--bg-sink)}
.font-step-btn:disabled{opacity:.3;cursor:default}
.font-step-label{flex:1;text-align:center;font-size:12px;color:var(--ink-muted);font-family:var(--mono)}

/* Font size scale: definita sopra come html[data-font-size="..."] */
.theme-opt:hover{background:var(--bg-sink)}
.theme-opt.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.user-menu-divider{height:1px;background:var(--rule);margin:6px 0}
.user-menu-item{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;background:transparent;border:none;border-radius:4px;font-size:13px;color:var(--ink);cursor:pointer;text-align:left;font-family:inherit}
.user-menu-item:hover{background:var(--bg-sink)}

/* Dark theme */
html[data-theme="dark"]{
  --bg:#121212;
  --bg-paper:#1a1a1a;
  --bg-sink:#252525;
  --bg-raised:#2a2a2a;
  --ink:#e8e8e8;
  --ink-soft:#b8b8b8;
  --ink-muted:#888;
  --ink-faint:#555;
  --rule:#333;
  --rule-soft:#2a2a2a;
  --rule-strong:#444;
  --accent:#6ba4f5;
  --accent-soft:#1e3a5f;
  --danger:#f07070;
  --danger-soft:#4a1f1f;
  --warning:#f5a35f;
}
[data-theme="dark"] body{background:#121212;color:var(--ink)}
[data-theme="dark"] header.topbar{background:rgba(26,26,26,.92)}

/* Palette D in dark mode: bg neutro + bordo colorato + numero pillola + pallino davanti al nome */
[data-theme="dark"] .numero-row-guardia,
[data-theme="dark"] .numero-row-reparto,
[data-theme="dark"] .numero-row-utile,
[data-theme="dark"] .sr-contact-guardia,
[data-theme="dark"] .sr-contact-reparto,
[data-theme="dark"] .sr-contact-utile{
  background:var(--bg-paper);
}
[data-theme="dark"] .numero-row-guardia:hover,
[data-theme="dark"] .sr-contact-guardia:hover{background:#241010}
[data-theme="dark"] .numero-row-reparto:hover,
[data-theme="dark"] .sr-contact-reparto:hover{background:#101a26}
[data-theme="dark"] .numero-row-utile:hover,
[data-theme="dark"] .sr-contact-utile:hover{background:#101a10}

/* Label colorate restano colorate in dark, ma più chiare e leggibili */
[data-theme="dark"] .numero-row-guardia .numero-label,
[data-theme="dark"] .sr-contact-guardia .sr-contact-label{color:#f0a0a0}
[data-theme="dark"] .numero-row-reparto .numero-label,
[data-theme="dark"] .sr-contact-reparto .sr-contact-label{color:#9ec0ee}
[data-theme="dark"] .numero-row-utile .numero-label,
[data-theme="dark"] .sr-contact-utile .sr-contact-label{color:#a8d480}

/* Pallino davanti al nome per guardia / reparto / utili (dark mode) */
[data-theme="dark"] .numero-row-guardia .numero-label::before,
[data-theme="dark"] .sr-contact-guardia .sr-contact-label::before,
[data-theme="dark"] .numero-row-reparto .numero-label::before,
[data-theme="dark"] .sr-contact-reparto .sr-contact-label::before,
[data-theme="dark"] .numero-row-utile .numero-label::before,
[data-theme="dark"] .sr-contact-utile .sr-contact-label::before{
  content:"● ";
  margin-right:4px;
}
[data-theme="dark"] .numero-row-guardia .numero-label::before,
[data-theme="dark"] .sr-contact-guardia .sr-contact-label::before{color:#f07070}
[data-theme="dark"] .numero-row-reparto .numero-label::before,
[data-theme="dark"] .sr-contact-reparto .sr-contact-label::before{color:#6ba4f5}
[data-theme="dark"] .numero-row-utile .numero-label::before,
[data-theme="dark"] .sr-contact-utile .sr-contact-label::before{color:#8fc857}

/* Numero come PILLOLA colorata piena (palette D) */
[data-theme="dark"] .numero-row-guardia .numero-btn,
[data-theme="dark"] .sr-contact-num-guardia{
  background:#f07070!important;color:#1a0808!important;border-color:#f07070!important;font-weight:600
}
[data-theme="dark"] .numero-row-reparto .numero-btn,
[data-theme="dark"] .sr-contact-num-reparto{
  background:#6ba4f5!important;color:#081830!important;border-color:#6ba4f5!important;font-weight:600
}
[data-theme="dark"] .numero-row-utile .numero-btn,
[data-theme="dark"] .sr-contact-num-utile{
  background:#8fc857!important;color:#0a1804!important;border-color:#8fc857!important;font-weight:600
}
[data-theme="dark"] .numero-row-guardia .numero-btn:hover,
[data-theme="dark"] .numero-row-reparto .numero-btn:hover,
[data-theme="dark"] .numero-row-utile .numero-btn:hover{
  filter:brightness(1.1)
}
.user-avatar{width:24px;height:24px;border-radius:50%;background:var(--accent);color:var(--bg-paper);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.04em}
.rate-limit-pill{font-family:var(--mono);font-size:10px;letter-spacing:.04em;padding:4px 8px;border-radius:2px;background:var(--bg-sink);color:var(--ink-muted);border:1px solid var(--rule-soft);white-space:nowrap}
.rate-limit-pill.warning{background:var(--warning-soft);color:var(--warning);border-color:var(--warning)}
.rate-limit-pill.danger{background:var(--danger-soft);color:var(--danger);border-color:var(--danger)}

/* Edit mode */
.edit-banner{position:sticky;top:51px;z-index:40;display:flex;justify-content:space-between;align-items:center;padding:10px 24px;background:var(--accent-soft);border-bottom:1px solid var(--accent);color:var(--accent);font-size:13px;gap:12px}
.edit-banner-text{display:inline-flex;align-items:center;gap:8px;font-weight:500}
.icon-btn.active{background:var(--accent);color:var(--bg-paper)}
body.edit-mode .app-body{outline:2px solid var(--accent);outline-offset:-1px}
.edit-only{display:none !important}
body.edit-mode .edit-only{display:revert !important}
body.edit-mode .edit-only.btn{display:inline-flex !important}

/* Nav tree (sidebar nuova) */
.nav-tree-node{user-select:none}
.nav-tree-row{display:flex;align-items:center;gap:6px;padding:5px 10px;cursor:pointer;font-size:14px;border-radius:2px;color:var(--ink-soft);position:relative;transition:background .1s}
.nav-tree-row:hover{background:var(--rule-soft);color:var(--ink)}
.nav-tree-row.active{background:var(--accent-soft);color:var(--accent);font-weight:500}
.nav-tree-row.expanded{font-weight:500;color:var(--ink)}
.nav-tree-caret{display:inline-block;width:12px;font-size:10px;color:var(--ink-faint);text-align:center;flex-shrink:0;transition:transform .12s}
.nav-tree-row.expanded > .nav-tree-caret{transform:rotate(0)}
.nav-tree-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-tree-count{display:none}
.nav-tree-children{padding-left:14px;border-left:1px dashed var(--rule-soft);margin-left:10px;display:none}
.nav-tree-node.open > .nav-tree-children{display:block}
.nav-tree-children .nav-tree-row{font-size:13px;padding:4px 10px}

/* Focus mode in sidebar */
.nav-focus-header{padding:8px 10px 12px;border-bottom:1px solid var(--rule-soft);margin-bottom:8px}
.nav-focus-back{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-family:var(--mono);color:var(--accent);cursor:pointer;letter-spacing:.04em}
.nav-focus-back:hover{text-decoration:underline}
.nav-focus-title{font-family:var(--serif);font-size:17px;font-weight:500;margin-top:6px;color:var(--ink)}
.nav-focus-sub{font-size:11px;color:var(--ink-muted);margin-top:2px}

/* Edit menu (⋯) */
.nav-edit-actions{margin-left:auto;display:none;gap:2px;align-items:center}
body.edit-mode .nav-tree-row:hover .nav-edit-actions,
body.edit-mode .nav-edit-actions.menu-open{display:inline-flex}
.btn-icon-mini{background:transparent;border:none;cursor:pointer;padding:2px 4px;color:var(--ink-muted);border-radius:2px;font-size:13px;line-height:1;display:inline-flex;align-items:center}
.btn-icon-mini:hover{background:var(--rule-soft);color:var(--ink)}

/* Context menu (popover) */
.context-menu{position:absolute;background:var(--bg-paper);border:1px solid var(--rule-strong);border-radius:2px;box-shadow:0 2px 8px rgba(0,0,0,.06);min-width:160px;z-index:200;padding:4px 0;font-size:13px}
.context-menu-item{padding:7px 14px;cursor:pointer;color:var(--ink);transition:background .1s}
.context-menu-item:hover{background:var(--accent-soft);color:var(--accent)}
.context-menu-item.danger{color:var(--danger)}
.context-menu-item.danger:hover{background:var(--danger-soft)}
.context-menu-divider{height:1px;background:var(--rule-soft);margin:4px 0}

/* Inline images in scheda content */
.procedura-body img,.scheda-content img{max-width:100%;height:auto;display:block;margin:16px auto;border-radius:2px;cursor:zoom-in;border:1px solid var(--rule-soft);transition:opacity .15s}
.procedura-body img:hover,.scheda-content img:hover{opacity:.85}
.procedura-body figure,.scheda-content figure{margin:16px auto;text-align:center}
.procedura-body figcaption,.scheda-content figcaption{font-family:var(--serif);font-size:13px;font-style:italic;color:var(--ink-muted);margin-top:6px}

/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(20,18,14,.92);z-index:9999;display:flex;align-items:center;justify-content:center;padding:32px;cursor:zoom-out;animation:lbFadeIn .18s ease-out}
@keyframes lbFadeIn{from{opacity:0}to{opacity:1}}
.lightbox-img{max-width:100%;max-height:calc(100vh - 100px);object-fit:contain;border-radius:2px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.lightbox-caption{position:absolute;bottom:24px;left:0;right:0;text-align:center;color:rgba(251,248,242,.85);font-family:var(--serif);font-size:14px;font-style:italic;padding:0 32px;pointer-events:none}
.lightbox-close{position:absolute;top:20px;right:24px;background:rgba(20,18,14,.6);border:1px solid rgba(251,248,242,.3);color:rgba(251,248,242,.95);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;line-height:1;transition:background .12s}
.lightbox-close:hover{background:rgba(20,18,14,.85);border-color:rgba(251,248,242,.6)}

/* Image upload button in editor toolbar */
.editor-img-upload{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--bg-paper);border:1px solid var(--rule);border-radius:2px;cursor:pointer;font-size:12px;color:var(--ink-soft);transition:background .12s,border-color .12s}
.editor-img-upload:hover{background:var(--rule-soft);border-color:var(--rule-strong);color:var(--ink)}
.editor-img-upload input[type=file]{display:none}
.editor-img-upload-status{font-family:var(--mono);font-size:11px;color:var(--ink-muted);margin-left:8px}
.user-name{font-family:var(--mono);font-size:12px;color:var(--ink-soft);letter-spacing:.02em}

.app-body{display:grid;grid-template-columns:240px 1fr;min-height:0}
@media (max-width:900px){
  .app-body{grid-template-columns:1fr}
  /* Sidebar diventa drawer mobile */
  aside.sidebar{
    position:fixed;top:0;left:0;bottom:0;width:280px;max-width:85vw;
    height:100vh;z-index:200;
    background:var(--bg-paper);border-right:1px solid var(--rule);
    transform:translateX(-100%);transition:transform .25s ease;
    box-shadow:2px 0 16px rgba(0,0,0,.08);
    padding:20px 16px;display:block;
    overflow-y:auto;-webkit-overflow-scrolling:touch;
  }
  aside.sidebar.mobile-open{transform:translateX(0)}
  aside.sidebar{overscroll-behavior:contain}
  .sidebar-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;
    opacity:0;pointer-events:none;transition:opacity .25s;
  }
  .sidebar-overlay.show{opacity:1;pointer-events:auto}
  .sidebar-mobile-close{
    display:block;width:100%;text-align:left;
    background:transparent;border:none;color:var(--ink-soft);
    font-family:var(--mono);font-size:11px;letter-spacing:.1em;
    text-transform:uppercase;padding:4px 12px 16px;cursor:pointer;
  }
}
@media (min-width:901px){
  .sidebar-overlay,.sidebar-mobile-close,.btn-hamburger{display:none}
  aside.sidebar{border-right:1px solid var(--rule);padding:24px 16px;position:sticky;top:65px;align-self:start;height:calc(100vh - 65px);overflow-y:auto}
}
.sidebar-mobile-close{display:none}

/* Hamburger button */
.btn-hamburger{
  display:none;background:transparent;border:1px solid var(--rule);
  width:36px;height:36px;border-radius:2px;cursor:pointer;
  padding:0;align-items:center;justify-content:center;
  color:var(--ink-soft);transition:background .12s,border-color .12s;
}
.btn-hamburger:hover,.btn-hamburger.active{background:var(--rule-soft);border-color:var(--rule-strong);color:var(--ink)}
@media (max-width:900px){.btn-hamburger{display:inline-flex}}

.nav-group{margin-bottom:24px}
.nav-group-label{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);padding:0 12px 8px;font-weight:500}
.nav-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 12px;border-radius:2px;font-size:14px;color:var(--ink-soft);cursor:pointer;transition:background .12s,color .12s}
.nav-item:hover{background:var(--rule-soft);color:var(--ink)}
.nav-item.active{background:var(--ink);color:var(--bg-paper)}
.nav-item-count{font-family:var(--mono);font-size:11px;color:var(--ink-faint)}
.nav-item.active .nav-item-count{color:rgba(251,248,242,.6)}
main.content{padding:40px 48px 80px;width:100%;min-width:0}
@media (max-width:700px){
  main.content{padding:14px 16px 60px}
  body .home-hero{margin-bottom:20px}
  body .home-title{font-size:clamp(26px,7vw,36px);margin-bottom:6px;line-height:1.05}
  body .home-lead{font-size:14px;line-height:1.4}
  body .page-head{margin-bottom:18px;padding-bottom:14px}
  body .page-eyebrow{margin-bottom:6px}
}

/* PAGE HEADERS */
.page-head{margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--rule)}
.page-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.bc-back{background:transparent;border:1px solid var(--rule);color:var(--ink-soft);width:24px;height:24px;border-radius:2px;cursor:pointer;font-size:13px;line-height:1;padding:0;display:inline-flex;align-items:center;justify-content:center;transition:background .12s,border-color .12s,color .12s}
.bc-back:hover{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
.bc-segment{cursor:pointer;color:var(--ink-muted);transition:color .12s}
.bc-segment:hover{color:var(--accent);text-decoration:underline}
.bc-sep{color:var(--ink-faint);margin:0 2px}

/* CHIPS MULTI-SELECT */
.chips-wrap{position:relative}
.chips-list{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:8px 10px;background:var(--bg-raised);border:1px solid var(--rule);border-radius:2px;min-height:40px;cursor:text}
.chips-list:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--accent-soft);color:var(--accent);font-family:var(--mono);font-size:12px;padding:3px 4px 3px 8px;border-radius:2px;border:1px solid transparent}
.chip-label{line-height:1.4}
.chip-remove{background:transparent;border:none;cursor:pointer;color:var(--accent);font-size:14px;line-height:1;padding:0 4px;border-radius:2px;transition:background .12s}
.chip-remove:hover{background:rgba(43,74,111,.15)}
.chips-input{flex:1;min-width:80px;border:none;outline:none;background:transparent;font-family:var(--sans);font-size:13px;color:var(--ink);padding:2px 0}
.chips-suggest{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:var(--bg-paper);border:1px solid var(--rule-strong);border-radius:2px;max-height:240px;overflow-y:auto;display:none;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.chips-suggest.open{display:block}
.chip-suggest-item{padding:8px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:12px;font-size:13px;transition:background .1s}
.chip-suggest-item:hover{background:var(--accent-soft)}
.chip-suggest-id{font-family:var(--mono);font-size:10px;color:var(--ink-faint);letter-spacing:.04em}
.chip-suggest-new{border-top:1px dashed var(--rule);color:var(--accent);font-style:italic}
.chip-suggest-empty{padding:12px;font-size:13px;color:var(--ink-muted);font-style:italic}

/* Tag clickability in scheda */
.tag.clickable{cursor:pointer;transition:background .12s}
.tag.clickable:hover{background:var(--accent-soft);color:var(--accent)}

/* HOME quick access cards (emergency / guardia) */
.home-quickaccess{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:8px}
@media (max-width:640px){.home-quickaccess{grid-template-columns:1fr}}
.quickaccess-card{display:flex;align-items:center;gap:16px;padding:20px 24px;border-radius:4px;cursor:pointer;border:1px solid var(--rule);background:var(--bg-paper);transition:background .15s,border-color .15s,transform .15s}
.quickaccess-card:hover{border-color:var(--rule-strong);transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.04)}
.quickaccess-card:active{transform:translateY(0)}
.quickaccess-icon{flex-shrink:0;width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg-sink)}
.quickaccess-text{flex:1;min-width:0}
.quickaccess-title{font-family:var(--serif);font-size:19px;font-weight:500;color:var(--ink);line-height:1.2}
.quickaccess-sub{font-size:12px;color:var(--ink-muted);margin-top:4px;font-family:var(--mono);letter-spacing:.02em}
.quickaccess-emergency .quickaccess-icon{background:rgba(180,50,50,.08);color:#b43232}
.quickaccess-emergency:hover{border-color:rgba(180,50,50,.5);background:rgba(180,50,50,.02)}
.quickaccess-guardia .quickaccess-icon{background:var(--accent-soft);color:var(--accent)}
.quickaccess-guardia:hover{border-color:var(--accent);background:rgba(43,74,111,.02)}

/* Pin star button */
.pin-star{background:transparent;border:none;cursor:pointer;font-size:20px;line-height:1;padding:2px 6px;color:var(--ink-faint);transition:color .12s,transform .12s}
.pin-star:hover{color:#d4a017;transform:scale(1.1)}
.pin-star.pinned{color:#d4a017}
.pin-star.pinned:hover{color:var(--ink-muted)}
.pin-star.inline{font-size:16px;padding:0 4px;vertical-align:middle}
.page-title .pin-star{font-size:22px;vertical-align:middle;margin-left:6px}
.numeri-group-title .pin-star,.numero-label .pin-star{font-size:15px;vertical-align:middle}

/* Home sections for personal pins */
.home-pins-group{margin-bottom:24px}
.home-pins-group:empty{display:none}
.pinned-folder{display:flex;align-items:center;gap:10px;padding:12px 16px;border:1px solid var(--rule);border-radius:2px;background:var(--bg-paper);cursor:pointer;transition:background .12s,border-color .12s;margin-bottom:6px}
.pinned-folder:hover{border-color:var(--accent);background:var(--accent-soft)}
.pinned-folder-icon{font-family:var(--mono);font-size:14px;color:var(--ink-faint);flex-shrink:0}
.pinned-folder-text{flex:1;min-width:0}
.pinned-folder-label{font-family:var(--serif);font-size:16px;font-weight:500;color:var(--ink)}
.pinned-folder-sub{font-size:11px;color:var(--ink-muted);margin-top:2px;font-family:var(--mono)}
.pinned-contact{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--rule-soft);border-radius:2px;background:var(--bg-paper);margin-bottom:4px}
.pinned-contact-num{font-family:var(--mono);font-size:14px;color:var(--accent);cursor:pointer;flex:1;text-align:right}
.pinned-contact-label{font-family:var(--serif);font-size:15px;color:var(--ink);flex:1}
.empty-pins{padding:24px;text-align:center;color:var(--ink-muted);font-size:13px;font-style:italic;border:1px dashed var(--rule);border-radius:2px}
.page-title{font-family:var(--serif);font-weight:400;font-size:clamp(28px,4vw,40px);line-height:1.05;letter-spacing:-.02em;color:var(--ink)}
.page-title em{font-style:italic;font-weight:300}
.page-meta{margin-top:16px;font-size:13px;color:var(--ink-muted);display:flex;gap:20px;flex-wrap:wrap}
.page-meta-item{display:flex;align-items:center;gap:6px}
.page-actions{margin-top:24px;display:flex;gap:10px;flex-wrap:wrap}

.tag{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;background:var(--bg-sink);color:var(--ink-soft);border-radius:2px;margin-right:6px}
.tag.tag-urgenza{background:var(--danger-soft);color:var(--danger)}
.tag.tag-procedura{background:var(--accent-soft);color:var(--accent)}
.tag.tag-tabella{background:var(--warning-soft);color:var(--warning)}

.procedura-body{font-size:16px;line-height:1.7;color:var(--ink-soft)}
.procedura-body h2{font-family:var(--serif);font-weight:500;font-size:24px;line-height:1.2;letter-spacing:-.01em;color:var(--ink);margin:48px 0 16px;padding-bottom:8px;border-bottom:1px solid var(--rule-soft)}
.procedura-body h2:first-child{margin-top:0}
.procedura-body h3{font-family:var(--serif);font-weight:500;font-size:18px;color:var(--ink);margin:28px 0 12px}
.procedura-body p{margin-bottom:16px}
.procedura-body ul,.procedura-body ol{margin:0 0 16px 24px}
.procedura-body li{margin-bottom:6px}
.procedura-body strong{color:var(--ink);font-weight:600}
.procedura-body em{color:var(--ink)}
.procedura-body blockquote{margin:20px 0;padding:16px 20px;background:var(--bg-sink);border-left:3px solid var(--ink-faint);font-family:var(--serif);font-style:italic;color:var(--ink-soft);font-size:15px;line-height:1.6;border-radius:0 2px 2px 0}
.procedura-body blockquote strong{font-style:normal}
.procedura-body code{font-size:13px}
.procedura-body table{width:100%;border-collapse:collapse;margin:24px 0;font-size:14px}
.procedura-body table th,.procedura-body table td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--rule-soft);vertical-align:top}
.procedura-body table th{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;border-bottom:1px solid var(--rule);background:var(--bg-sink)}
.procedura-body table tr:last-child td{border-bottom:1px solid var(--rule)}

.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-top:32px;padding-top:32px;border-top:1px solid var(--rule)}
.related-card{padding:14px 16px;background:var(--bg-paper);border:1px solid var(--rule);border-radius:2px;cursor:pointer;transition:border-color .15s,background .15s}
.related-card:hover{border-color:var(--ink);background:var(--bg-raised)}
.related-card-label{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:4px}
.related-card-title{font-family:var(--serif);font-size:15px;font-weight:500;color:var(--ink);line-height:1.3}

/* HOME */
.home-hero{margin-bottom:48px}
.home-title{font-family:var(--serif);font-weight:300;font-size:clamp(36px,6vw,56px);line-height:1.0;letter-spacing:-.03em;margin-bottom:10px}
.home-title em{font-style:italic}
.home-lead{font-family:var(--serif);font-style:italic;font-weight:300;font-size:18px;color:var(--ink-muted);max-width:62ch;line-height:1.5}
.home-section{margin-bottom:48px}
.home-section-title{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);font-weight:500;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.home-section-title::after{content:'';flex:1;height:1px;background:var(--rule)}
.procedure-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.procedure-card{display:block;padding:20px 22px;background:var(--bg-paper);border:1px solid var(--rule);border-radius:2px;cursor:pointer;transition:border-color .15s,transform .1s,box-shadow .15s;position:relative;overflow:hidden}
.procedure-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent);transform:scaleY(0);transform-origin:top;transition:transform .2s}
.procedure-card:hover{border-color:var(--ink);box-shadow:var(--shadow-raised)}
.procedure-card:hover::before{transform:scaleY(1)}
.procedure-card-title{font-family:var(--serif);font-size:19px;font-weight:500;line-height:1.2;margin-bottom:8px;color:var(--ink);display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-edit-btn{flex-shrink:0;margin-top:2px;opacity:.6;transition:opacity .15s}
.card-edit-btn:hover{opacity:1}
.procedure-card-meta{font-size:12px;color:var(--ink-muted);display:flex;align-items:center;gap:10px;margin-top:12px}
.procedure-card-tags{margin-top:10px}

/* NUMERI */
.numeri-filters{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.filter-chip{font-family:var(--mono);font-size:11px;letter-spacing:.04em;padding:6px 12px;border:1px solid var(--rule);border-radius:2px;color:var(--ink-soft);cursor:pointer;background:transparent;transition:all .15s}
.filter-chip:hover{border-color:var(--ink);color:var(--ink)}
.filter-chip.active{background:var(--ink);color:var(--bg-paper);border-color:var(--ink)}
.numeri-group{margin-bottom:32px}
.numeri-group-title{font-family:var(--serif);font-weight:500;font-size:20px;margin-bottom:12px;color:var(--ink);letter-spacing:-.01em}
.numero-row{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;padding:12px 0;border-bottom:1px solid var(--rule-soft)}
.numero-row:last-child{border:none}
@media (max-width:600px){
  .numero-row{grid-template-columns:1fr;gap:8px;padding:14px 0}
  .numero-nums{justify-content:flex-start}
  .numero-btn{font-size:14px;padding:8px 14px;min-height:36px}
  .numero-label{font-size:15px}
}
.numero-row-guardia{background:linear-gradient(to right,#fef0ef 0%,transparent 100%);border-left:3px solid var(--danger);padding-left:10px;margin:2px 0;border-bottom:1px solid var(--rule-soft)}
.numero-row-guardia .numero-label{color:var(--danger);font-weight:500}
.numero-row-reparto{background:linear-gradient(to right,var(--accent-soft) 0%,transparent 100%);border-left:3px solid var(--accent);padding-left:10px;margin:2px 0;border-bottom:1px solid var(--rule-soft)}
.numero-row-reparto .numero-label{color:var(--accent);font-weight:500}
.numero-row-utile{background:linear-gradient(to right,#e8f5e9 0%,transparent 100%);border-left:3px solid #2e7d32;padding-left:10px;margin:2px 0;border-bottom:1px solid var(--rule-soft)}
.numero-row-utile .numero-label{color:#2e7d32;font-weight:500}
.uoc-compact-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;margin-top:4px}
.uoc-compact-item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:12px 14px;background:var(--bg-paper);border:1px solid var(--rule);border-radius:3px;transition:border-color .12s,background .12s}
.uoc-compact-item:hover{border-color:var(--rule-strong);background:var(--bg-sink)}
.uoc-compact-item .pin-star{flex-shrink:0;font-size:16px;padding:2px 4px}
.uoc-compact-name{font-family:var(--serif);font-size:15px;font-weight:500;color:var(--ink);line-height:1.25;flex:1;min-width:0}
.uoc-compact-meta{font-family:var(--mono);font-size:11px;color:var(--ink-muted);white-space:nowrap;letter-spacing:.02em}
.rubrica-alphabet-bar{display:flex;flex-wrap:wrap;gap:2px;margin:8px 0 16px;padding:8px;background:var(--bg-sink);border-radius:3px;border:1px solid var(--rule-soft)}
.rubrica-alpha-btn{min-width:28px;height:28px;padding:0 6px;border:1px solid transparent;background:transparent;font-family:var(--mono);font-size:13px;color:var(--ink-soft);cursor:pointer;border-radius:2px;transition:all .1s;display:inline-flex;align-items:center;justify-content:center;font-weight:500}
.rubrica-alpha-btn:hover:not(:disabled):not(.disabled){background:var(--bg-paper);border-color:var(--rule);color:var(--ink)}
.rubrica-alpha-btn.active{background:var(--accent-soft);color:var(--accent);border-color:var(--accent);font-weight:600}
.rubrica-alpha-btn.disabled,.rubrica-alpha-btn:disabled{color:var(--ink-faint);opacity:.4;cursor:not-allowed}
.kind-chip{font-family:var(--mono);font-size:10px;letter-spacing:.04em;padding:3px 8px;border-radius:11px;background:var(--bg-paper);color:var(--ink-soft);border:1px solid var(--rule);cursor:pointer;transition:all .12s;white-space:nowrap;line-height:1.4}
.kind-chip:hover{border-color:var(--chip-color,var(--ink-soft));color:var(--chip-color,var(--ink))}
.kind-chip.active{background:var(--chip-bg,var(--accent-soft));color:var(--chip-color,var(--accent));border-color:var(--chip-color,var(--accent));font-weight:500}
.kind-chip-reset{font-family:var(--mono);font-size:10px;padding:3px 6px;border:none;background:transparent;color:var(--ink-muted);cursor:pointer;opacity:.6;transition:opacity .12s}
.kind-chip-reset:hover{opacity:1;color:var(--danger)}
.numero-label{font-size:14px;color:var(--ink-soft);line-height:1.4}

/* SCHEDA FLESSIBILE */
.scheda-section{margin-bottom:14px;border:1px solid var(--rule);border-radius:2px;background:var(--bg-paper);overflow:hidden}

.scheda-content{padding:18px 20px;font-size:15px;line-height:1.6}

/* Categoria collapsible blocks in main panel */
.categoria-block{margin-bottom:14px;border:1px solid var(--rule);border-radius:2px;background:var(--bg-paper);overflow:hidden;transition:border-color .15s}
.categoria-block[open]{border-color:var(--rule-strong);background:var(--bg-raised)}
.categoria-block:hover{border-color:var(--rule-strong)}
.categoria-summary{font-family:var(--serif);font-size:20px;font-weight:500;letter-spacing:-.01em;color:var(--ink);padding:18px 24px;cursor:pointer;list-style:none;display:flex;align-items:center;gap:16px;transition:background .12s;background:linear-gradient(to bottom,var(--bg-paper),var(--bg-sink))}
.categoria-summary::-webkit-details-marker{display:none}
.categoria-summary::before{content:'+';font-family:var(--mono);font-size:20px;font-weight:400;color:var(--ink-muted);width:16px;text-align:center;transition:transform .18s ease;flex-shrink:0}
.categoria-block[open] .categoria-summary::before{content:'−';color:var(--ink)}

<script>
/* ============================ CONFIG ============================ */

};

/* ============================ BOOTSTRAP PAT (PAT-1) ============================
   Read-only PAT frammentato per accedere al repo privato CollinettaAI-auth.
   Rigenera e sostituisci i frammenti se ruoti il token. */
const _b1 = 'github_pat_1';
const _b2 = '1AKSFWIQ0rA';
const _b3 = 'zzEWQT2eBw_gd';
const _b4 = 'fmyokfIGfG';
const _b5 = 'MRsppaoDEE';
const _b6 = 'z86UUxo6Xc';
const _b7 = 'qbFwoeEEQ6cY';
const _b8 = 'VBLW26SUkBHLrgG';
const BOOTSTRAP_PAT = _b1 + _b2 + _b3 + _b4 + _b5 + _b6 + _b7 + _b8;

/* ============================ UTILITIES ============================ */
const $ = (id) => document.getElementById(id);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function timeAgo(iso) {
  if (!iso) return '—';
  const d = new Date(iso); const now = new Date(); const diff = (now - d) / 1000;
  if (diff < 60) return 'pochi secondi fa';
  if (diff < 3600) return `${Math.floor(diff/60)} minuti fa`;
  if (diff < 86400) return `${Math.floor(diff/3600)} ore fa`;
  if (diff < 604800) return `${Math.floor(diff/86400)} giorni fa`;
  return d.toLocaleDateString('it-IT', { day: 'numeric', month: 'short', year: 'numeric' });
}

function nowIso() { return new Date().toISOString(); }

// Navigation history bidirezionale: back/forward
const navHistory = [];
let navHistoryIndex = -1;
let navHistoryMoving = false; // evita push durante goBack/goForward
function pushHistory(route, params) {
  if (navHistoryMoving) return;
  const top = navHistory[navHistoryIndex];
  if (top && top.route === route && JSON.stringify(top.params || {}) === JSON.stringify(params || {})) return;
  // Nuova navigazione: taglia via la coda (forward) oltre l'index attuale
  if (navHistoryIndex < navHistory.length - 1) {
    navHistory.length = navHistoryIndex + 1;
  }
  navHistory.push({ route, params: params || {} });
  navHistoryIndex = navHistory.length - 1;
  if (navHistory.length > 50) {
    navHistory.shift();
    navHistoryIndex--;
  }
  updateNavHistoryButtons();
}
function goBack() {
  if (navHistoryIndex <= 0) return;
  navHistoryIndex--;
  const prev = navHistory[navHistoryIndex];
  navHistoryMoving = true;
  navigate(prev.route, prev.params);
  navHistoryMoving = false;
  updateNavHistoryButtons();
}
function goForward() {
  if (navHistoryIndex >= navHistory.length - 1) return;
  navHistoryIndex++;
  const next = navHistory[navHistoryIndex];
  navHistoryMoving = true;
  navigate(next.route, next.params);
  navHistoryMoving = false;
  updateNavHistoryButtons();
}
function updateNavHistoryButtons() {
  const back = document.getElementById('btn-nav-back');
  const fwd = document.getElementById('btn-nav-forward');
  if (back) back.disabled = navHistoryIndex <= 0;
  if (fwd) fwd.disabled = navHistoryIndex >= navHistory.length - 1;
}

// Standardized breadcrumb: ← Level1 › Level2 › Level3
// segments: [{label, route, params?}]
function buildBreadcrumb(segments) {
  if (!segments || segments.length === 0) return '';
  const parts = segments.map((s) => {
    const params = s.params ? JSON.stringify(s.params).replace(/"/g, '&quot;') : '{}';
    return `<span class="bc-segment" onclick="navigate('${escapeJs(s.route)}', ${params})">${escapeHtml(s.label)}</span>`;
  });
  return parts.join(' <span class="bc-sep">›</span> ');
}

/* ============================ CHIPS MULTI-SELECT ============================ */
// Component: type to filter existing values, click to add as chip, type new + Enter to create.
// State stored on the container element via dataset.values (JSON array)

function renderChipsField(opts) {
  // opts: { id, values:[], suggestions:[{id,label}], placeholder, allowNew:true }
  const valuesAttr = JSON.stringify(opts.values || []).replace(/"/g, '&quot;');
  const initialChips = (opts.values || []).map(v => {
    const sugg = (opts.suggestions || []).find(s => s.id === v);
    const label = sugg ? sugg.label : v;
    return `<span class="chip" data-value="${escapeHtml(v)}">
      <span class="chip-label">${escapeHtml(label)}</span>
      <button type="button" class="chip-remove" onclick="event.stopPropagation();chipsRemove('${escapeJs(opts.id)}','${escapeJs(v)}')" aria-label="Rimuovi">×</button>
    </span>`;
  }).join('');

  return `
    <div class="chips-wrap" id="${opts.id}" data-values="${valuesAttr}" data-allow-new="${opts.allowNew !== false ? '1' : '0'}">
      <div class="chips-list">${initialChips}<input type="text" class="chips-input" id="${opts.id}-input" placeholder="${escapeHtml(opts.placeholder || 'aggiungi…')}" autocomplete="off"></div>
      <div class="chips-suggest" id="${opts.id}-suggest"></div>
    </div>`;
}

function chipsInit(id, suggestions) {
  const container = document.getElementById(id);
  if (!container) return;
  const input = document.getElementById(id + '-input');
  const suggestBox = document.getElementById(id + '-suggest');
  // Store suggestions on the container for later
  container._suggestions = suggestions || [];

  function getValues() { return JSON.parse(container.dataset.values || '[]'); }
  function setValues(arr) {
    container.dataset.values = JSON.stringify(arr);
    if (state.editingContext) state.editingContext.isDirty = true;
  }

  function showSuggestions() {
    const q = input.value.trim().toLowerCase();
    const taken = new Set(getValues());
    const allowNew = container.dataset.allowNew === '1';
    const matches = container._suggestions
      .filter(s => !taken.has(s.id))
      .filter(s => !q || s.label.toLowerCase().includes(q) || s.id.toLowerCase().includes(q))
      .slice(0, 8);
    if (matches.length === 0 && (!q || !allowNew)) {
      suggestBox.innerHTML = q && !allowNew ? '<div class="chip-suggest-empty">Nessuna corrispondenza</div>' : '';
      suggestBox.classList.remove('open');
      return;
    }
    let html = matches.map(m => `<div class="chip-suggest-item" onmousedown="event.preventDefault();chipsAdd('${escapeJs(id)}','${escapeJs(m.id)}','${escapeJs(m.label)}')">
      <span>${escapeHtml(m.label)}</span>
      <span class="chip-suggest-id">${escapeHtml(m.id)}</span>
    </div>`).join('');
    if (q && allowNew && !container._suggestions.find(s => s.id === q || s.label.toLowerCase() === q.toLowerCase())) {
      // Allow creating a new value (sanitized to slug)
      const newId = q.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9-]+/g,'-').replace(/^-+|-+$/g,'');
      if (newId) {
        html += `<div class="chip-suggest-item chip-suggest-new" onmousedown="event.preventDefault();chipsAdd('${escapeJs(id)}','${escapeJs(newId)}','${escapeJs(q)}')">
          <span>+ Crea "${escapeHtml(q)}"</span>
          <span class="chip-suggest-id">${escapeHtml(newId)}</span>
        </div>`;
      }
    }
    suggestBox.innerHTML = html;
    suggestBox.classList.add('open');
  }

  function hideSuggestions() {
    setTimeout(() => suggestBox.classList.remove('open'), 150);
  }

  input.addEventListener('focus', showSuggestions);
  input.addEventListener('input', showSuggestions);
  input.addEventListener('blur', hideSuggestions);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const q = input.value.trim();
      if (!q) return;
      // Try exact match first, otherwise create new (if allowed)
      const exact = container._suggestions.find(s => s.label.toLowerCase() === q.toLowerCase() || s.id.toLowerCase() === q.toLowerCase());
      if (exact) chipsAdd(id, exact.id, exact.label);
      else if (container.dataset.allowNew === '1') {
        const newId = q.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9-]+/g,'-').replace(/^-+|-+$/g,'');
        if (newId) chipsAdd(id, newId, q);
      }
    } else if (e.key === 'Backspace' && input.value === '') {
      // Remove last chip
      const values = getValues();
      if (values.length > 0) chipsRemove(id, values[values.length - 1]);
    } else if (e.key === 'Escape') {
      input.value = '';
      hideSuggestions();
    }
  });
}

function chipsAdd(id, value, label) {
  const container = document.getElementById(id);
  if (!container) return;
  const values = JSON.parse(container.dataset.values || '[]');
  if (values.includes(value)) return;
  values.push(value);
  container.dataset.values = JSON.stringify(values);
  // Re-render chips
  const list = container.querySelector('.chips-list');
  const input = document.getElementById(id + '-input');
  const chip = document.createElement('span');
  chip.className = 'chip';
  chip.dataset.value = value;
  chip.innerHTML = `<span class="chip-label">${escapeHtml(label || value)}</span>
    <button type="button" class="chip-remove" onclick="event.stopPropagation();chipsRemove('${escapeJs(id)}','${escapeJs(value)}')" aria-label="Rimuovi">×</button>`;
  list.insertBefore(chip, input);
  input.value = '';
  input.focus();
  document.getElementById(id + '-suggest').innerHTML = '';
  document.getElementById(id + '-suggest').classList.remove('open');
  if (state.editingContext) state.editingContext.isDirty = true;
}

function chipsRemove(id, value) {
  const container = document.getElementById(id);
  if (!container) return;
  const values = JSON.parse(container.dataset.values || '[]').filter(v => v !== value);
  container.dataset.values = JSON.stringify(values);
  const chip = container.querySelector(`.chip[data-value="${CSS.escape(value)}"]`);
  if (chip) chip.remove();
  if (state.editingContext) state.editingContext.isDirty = true;
}

function chipsGet(id) {
  const container = document.getElementById(id);
  if (!container) return [];
  return JSON.parse(container.dataset.values || '[]');
}

// Helper: build suggestions for an existing free-form sub-categoria input
function buildSottocategorieForCategoria(cat) {
  const subs = new Set();
  state.index.procedure.forEach(p => {
    if (p.categoria === cat && p.sottocategoria) subs.add(p.sottocategoria);
  });
  return [...subs].sort().map(s => ({ id: s, label: SOTTO_LABELS[s] || s }));
}

// Helper: collect all unique tags across procedure + clinica
function collectAllTags() {
  const tags = new Set();
  state.index.procedure.forEach(p => (p.tag || []).forEach(t => tags.add(t)));
  (state.index.clinica || []).forEach(c => (c.tag || []).forEach(t => tags.add(t)));
  return [...tags].sort().map(t => ({ id: t, label: t }));
}

function collectAllTermini() {
  const terms = new Set();
  state.index.procedure.forEach(p => (p.termini_equivalenti || []).forEach(t => terms.add(t)));
  (state.index.clinica || []).forEach(c => (c.termini_equivalenti || []).forEach(t => terms.add(t)));
  return [...terms].sort().map(t => ({ id: t, label: t }));
}

function collectAllContattiSuggestions() {
  const out = [];
  getVisibleNumeriGroups().forEach(g => {
    (g.contatti || []).forEach(c => {
      if (c.id) out.push({ id: c.id, label: `${c.etichetta} · ${g.nome}` });
    });
  });
  return out.sort((a, b) => a.label.localeCompare(b.label));
}

/* ============================ USER PREFERENCES ============================ */
// Per-user home pins stored in content/user-prefs/{username}.yml
// pins: array of {type, ...keys}
//   {type:'procedura', slug}
//   {type:'clinica', slug}
//   {type:'modulo', slug}
//   {type:'tabella', slug}
//   {type:'capitolo', id}
//   {type:'sottocategoria', cat, sub}     // procedure subcategory
//   {type:'clinica-sub', sub}             // clinica subcategory
//   {type:'categoria', cat}               // procedure macro category
//   {type:'contatto', id}
//   {type:'gruppo', id}

const userPrefs = {
  async load() {
    if (!state.session || !state.session.username) return;
    const path = `content/user-prefs/${state.session.username}.yml`;
    state.userPrefsPath = path;
    try {
      const file = await gh.getFile(path);
      if (!file) {
        state.userPrefs = { pins: [], home_numeri: [], pin_order: {}, _sha: null };
        return;
      }
      const parsed = jsyaml.load(file.content) || {};
      state.userPrefs = {
        pins: Array.isArray(parsed.pins) ? parsed.pins : [],
        home_numeri: Array.isArray(parsed.home_numeri) ? parsed.home_numeri : [],
        pin_order: (parsed.pin_order && typeof parsed.pin_order === 'object') ? parsed.pin_order : {},
        _sha: file.sha
      };
    } catch (e) {
      console.warn('[userPrefs] load failed:', e);
      state.userPrefs = { pins: [], home_numeri: [], pin_order: {}, _sha: null };
    }
  },

  // Debounced save: collects multiple toggles in 2 seconds
  scheduleSave() {
    if (!state.userPrefs) return;
    if (state.userPrefs._saveTimer) clearTimeout(state.userPrefs._saveTimer);
    state.userPrefs._pending = true;
    state.userPrefs._saveTimer = setTimeout(() => {
      userPrefs.persist().catch(e => console.error('[userPrefs] save failed', e));
    }, 2000);
  },

  async persist() {
    if (!state.userPrefs || !state.session) return;
    state.userPrefs._pending = false;
    const path = state.userPrefsPath;
    const data = {
      pins: state.userPrefs.pins,
      home_numeri: state.userPrefs.home_numeri || [],
      pin_order: state.userPrefs.pin_order || {},
      ultima_modifica: nowIso(),
      modificato_da: state.session.username
    };
    const content = `# Preferenze home personali per ${state.session.username}\n# Gestite dall'app, non modificare a mano\n\n` +
      jsyaml.dump(data, { lineWidth: 120, noRefs: true, sortKeys: false });
    try {
      const res = await gh.putFile(path, content, state.userPrefs._sha, `chore: preferenze home di ${state.session.username}`);
      state.userPrefs._sha = res.content.sha;
    } catch (e) {
      if (e.code === 'CONFLICT') {
        // Reload and retry once
        await userPrefs.load();
        const res2 = await gh.putFile(path, content, state.userPrefs._sha, `chore: preferenze home di ${state.session.username} (retry)`);
        state.userPrefs._sha = res2.content.sha;
      } else {
        throw e;
      }
    }
  },

  // Check if a pin exists
  has(pin) {
    if (!state.userPrefs) return false;
    return state.userPrefs.pins.some(p => userPrefs.pinEquals(p, pin));
  },

  pinEquals(a, b) {
    if (!a || !b || a.type !== b.type) return false;
    switch (a.type) {
      case 'procedura':
      case 'clinica':
      case 'modulo':
      case 'tabella':
        return a.slug === b.slug;
      case 'capitolo':
      case 'contatto':
      case 'gruppo':
        return a.id === b.id;
      case 'sottocategoria':
        return a.cat === b.cat && a.sub === b.sub;
      case 'clinica-sub':
        return a.sub === b.sub;
      case 'categoria':
        return a.cat === b.cat;
    }
    return false;
  },

  // Toggle: add if not present, remove if present. Returns new state (true=pinned).
  toggle(pin) {
    if (!state.userPrefs) return false;
    const idx = state.userPrefs.pins.findIndex(p => userPrefs.pinEquals(p, pin));
    let nowPinned;
    if (idx >= 0) {
      state.userPrefs.pins.splice(idx, 1);
      nowPinned = false;
    } else {
      state.userPrefs.pins.push(pin);
      nowPinned = true;
    }
    userPrefs.scheduleSave();
    // Visual feedback
    if (typeof toast === 'function') {
      toast(nowPinned ? 'Aggiunto in home' : 'Rimosso dalla home', 'info', 1500);
    }
    return nowPinned;
  },

  // --- Home numeri (lista indipendente di contatti pinnati per la home) ---
  hasHomeNumero(cid) {
    if (!state.userPrefs) return false;
    return (state.userPrefs.home_numeri || []).includes(cid);
  },
  toggleHomeNumero(cid) {
    if (!state.userPrefs) return false;
    if (!state.userPrefs.home_numeri) state.userPrefs.home_numeri = [];
    const idx = state.userPrefs.home_numeri.indexOf(cid);
    let added;
    if (idx >= 0) { state.userPrefs.home_numeri.splice(idx, 1); added = false; }
    else { state.userPrefs.home_numeri.push(cid); added = true; }
    userPrefs.scheduleSave();
    return added;
  },
  reorderHomeNumeri(newOrder) {
    if (!state.userPrefs) return;
    state.userPrefs.home_numeri = newOrder;
    userPrefs.scheduleSave();
  },

  // --- Rubrica preferiti: ordinamento per UOC + contatti dentro UOC ---
  // Struttura: pin_order = { _uoc: ['gid1','gid2',...], 'gid1': ['cid1','cid2',...] }
  getUocOrder() {
    return (state.userPrefs && state.userPrefs.pin_order && state.userPrefs.pin_order._uoc) || [];
  },
  getContactOrder(gid) {
    return (state.userPrefs && state.userPrefs.pin_order && state.userPrefs.pin_order[gid]) || [];
  },
  setUocOrder(order) {
    if (!state.userPrefs) return;
    if (!state.userPrefs.pin_order) state.userPrefs.pin_order = {};
    state.userPrefs.pin_order._uoc = order;
    userPrefs.scheduleSave();
  },
  setContactOrder(gid, order) {
    if (!state.userPrefs) return;
    if (!state.userPrefs.pin_order) state.userPrefs.pin_order = {};
    state.userPrefs.pin_order[gid] = order;
    userPrefs.scheduleSave();
  }
};

// Convenience global for HTML onclick handlers
function togglePin(type, ...args) {
  let pin;
  switch (type) {
    case 'procedura':
    case 'clinica':
    case 'modulo':
    case 'tabella':
      pin = { type, slug: args[0] }; break;
    case 'capitolo':
    case 'contatto':
    case 'gruppo':
      pin = { type, id: args[0] }; break;
    case 'sottocategoria':
      pin = { type, cat: args[0], sub: args[1] }; break;
    case 'clinica-sub':
      pin = { type, sub: args[0] }; break;
    case 'categoria':
      pin = { type, cat: args[0] }; break;
    default: return;
  }
  userPrefs.toggle(pin);
  // Re-render current view for updated star state, and home-tree if on home
  if (state.currentView === 'home') renderHome();
  else {
    // Re-render just the star buttons on the current view
    document.querySelectorAll(`[data-pin-key]`).forEach(btn => {
      const key = btn.dataset.pinKey;
      if (key === pinKey(pin)) {
        const isPinned = userPrefs.has(pin);
        btn.classList.toggle('pinned', isPinned);
        btn.innerHTML = isPinned ? '★' : '☆';
        btn.setAttribute('title', isPinned ? 'Rimuovi dalla home' : 'Aggiungi alla home');
      }
    });
  }
}

// Rimuove prefisso tipo "U.O.C." / "U.O.S.D." / "U.O.S." dal nome UOC
function stripPrefixNome(name) {
  return String(name || '').replace(/^(U\.?O\.?C\.?|U\.?O\.?S\.?D\.?|U\.?O\.?S\.?|S\.?S\.?D\.?|S\.?S\.?|U\.?O\.?)\s+/i, '').trim();
}

function isPinned(type, id) {
  if (!userPrefs) return false;
  const pin = (type === 'gruppo' || type === 'contatto' || type === 'capitolo')
    ? { type, id }
    : { type, slug: id };
  return userPrefs.has(pin);
}

function pinKey(pin) {
  switch (pin.type) {
    case 'procedura': case 'clinica': case 'modulo': case 'tabella':
      return `${pin.type}:${pin.slug}`;
    case 'capitolo': case 'contatto': case 'gruppo':
      return `${pin.type}:${pin.id}`;
    case 'sottocategoria': return `sottocategoria:${pin.cat}:${pin.sub}`;
    case 'clinica-sub': return `clinica-sub:${pin.sub}`;
    case 'categoria': return `categoria:${pin.cat}`;
  }
  return pin.type;
}

function renderPinButton(type, ...args) {
  let pin;
  switch (type) {
    case 'procedura': case 'clinica': case 'modulo': case 'tabella':
      pin = { type, slug: args[0] }; break;
    case 'capitolo': case 'contatto': case 'gruppo':
      pin = { type, id: args[0] }; break;
    case 'sottocategoria':
      pin = { type, cat: args[0], sub: args[1] }; break;
    case 'clinica-sub':
      pin = { type, sub: args[0] }; break;
    case 'categoria':
      pin = { type, cat: args[0] }; break;
    default: return '';
  }
  const pinned = userPrefs.has(pin);
  const argStrs = args.map(a => `'${escapeJs(a)}'`).join(',');
  return `<button class="pin-star ${pinned ? 'pinned' : ''}" data-pin-key="${escapeHtml(pinKey(pin))}" onclick="event.stopPropagation();togglePin('${type}',${argStrs})" title="${pinned ? 'Rimuovi dalla home' : 'Aggiungi alla home'}" aria-label="Fissa in home">${pinned ? '★' : '☆'}</button>`;
}

// Transform relative img/* paths in Markdown to absolute raw GitHub URLs
function transformMarkdownImages(md, filePath) {
  if (!md || !filePath) return md;
  // filePath like "content/procedure/bedside/rachicentesi.md"
  // Get parent dir: "content/procedure/bedside"
  const parentDir = filePath.replace(/\/[^/]+$/, '');
  const baseUrl = `https://raw.githubusercontent.com/${CONFIG.REPO_OWNER}/${CONFIG.REPO_NAME}/${CONFIG.BRANCH}/${parentDir}/`;
  // Match Markdown images: ![alt](path) where path doesn't start with http, /, or data:
  return md.replace(/(!\[[^\]]*\]\()(?!https?:|\/|data:)([^)]+)(\))/g, (match, prefix, path, suffix) => {
    return prefix + baseUrl + path + suffix;
  });
}

// Render Markdown with image path transformation, sanitize, and add lightbox-ready data attributes
function renderMarkdownWithImages(md, filePath) {
  if (!md) return '';
  const transformed = transformMarkdownImages(md, filePath);
  const html = DOMPurify.sanitize(marked.parse(transformed), { ADD_ATTR: ['onclick', 'data-src', 'data-alt'] });
  // Wrap each <img> tag with click handler attribute (post-sanitize for security)
  // Use a temporary container to manipulate HTML
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  tmp.querySelectorAll('img').forEach(img => {
    const src = img.getAttribute('src');
    const alt = img.getAttribute('alt') || '';
    img.setAttribute('data-src', src);
    img.setAttribute('data-alt', alt);
    img.setAttribute('loading', 'lazy');
    img.setAttribute('onclick', `openLightbox('${escapeJs(src)}', '${escapeJs(alt)}')`);
  });
  return tmp.innerHTML;
}

// Lightbox
function openLightbox(src, alt) {
  closeLightbox(); // ensure no duplicates
  const lb = document.createElement('div');
  lb.className = 'lightbox';
  lb.id = 'lightbox-overlay';
  lb.innerHTML = `
    <button class="lightbox-close" aria-label="Chiudi" onclick="event.stopPropagation();closeLightbox()">✕</button>
    <img class="lightbox-img" src="${escapeHtml(src)}" alt="${escapeHtml(alt || '')}">
    ${alt ? `<div class="lightbox-caption">${escapeHtml(alt)}</div>` : ''}
  `;
  lb.addEventListener('click', closeLightbox);
  lb.querySelector('img').addEventListener('click', e => e.stopPropagation());
  document.body.appendChild(lb);
  document.body.style.overflow = 'hidden';
  document.addEventListener('keydown', lightboxKeyHandler);
}

function closeLightbox() {
  const lb = document.getElementById('lightbox-overlay');
  if (lb) lb.remove();
  document.body.style.overflow = '';
  document.removeEventListener('keydown', lightboxKeyHandler);
}

function lightboxKeyHandler(e) {
  if (e.key === 'Escape') closeLightbox();
}

// Compress and upload an image to GitHub, return relative path for Markdown insert
async function compressAndUploadImage(file, currentFilePath) {
  if (!file.type.startsWith('image/')) throw new Error('Non è un\'immagine');

  const options = {
    maxSizeMB: 1.5,
    maxWidthOrHeight: 1920,
    useWebWorker: true,
    fileType: 'image/webp',
    initialQuality: 0.80
  };

  const compressed = await imageCompression(file, options);

  // Sanitize filename: lowercase, no spaces, no accents
  const baseName = file.name.replace(/\.[^.]+$/, '')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9-]+/g, '-')
    .replace(/^-+|-+$/g, '')
    .substring(0, 60);

  // Build target path: same dir as the current .md, in img/ subfolder
  const parentDir = currentFilePath.replace(/\/[^/]+$/, '');
  const fileName = `${baseName || 'image'}-${Date.now().toString(36)}.webp`;
  const targetPath = `${parentDir}/img/${fileName}`;

  // Read as base64
  const base64 = await new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const result = reader.result;
      const b64 = result.split(',')[1]; // strip "data:image/webp;base64,"
      resolve(b64);
    };
    reader.onerror = () => reject(new Error('Lettura file fallita'));
    reader.readAsDataURL(compressed);
  });

  // Upload via PUT to GitHub contents API
  const url = `${CONFIG.API_BASE}/repos/${CONFIG.REPO_OWNER}/${CONFIG.REPO_NAME}/contents/${encodeURIComponent(targetPath).replace(/%2F/g, '/')}`;
  const res = await fetch(url, {
    method: 'PUT',
    headers: {
      'Authorization': `token ${state.session.token}`,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json',
      'X-GitHub-Api-Version': '2022-11-28'
    },
    body: JSON.stringify({
      message: `Carica immagine ${fileName} (by ${state.session.username})`,
      content: base64,
      branch: CONFIG.BRANCH
    })
  });

  if (!res.ok) {
    const errText = await res.text();
    throw new Error(`Upload fallito (HTTP ${res.status}): ${errText.substring(0, 200)}`);
  }

  return {
    fileName,
    relativePath: `img/${fileName}`,
    sizeBefore: file.size,
    sizeAfter: compressed.size
  };
}

// Wire a file input to upload + insert into the active Toast UI editor
function attachImageUploadHandler(inputId, statusId) {
  const input = document.getElementById(inputId);
  const status = document.getElementById(statusId);
  if (!input) return;
  input.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!state.editingContext || !state.editingContext.path) {
      toast('Salva prima la scheda per poter caricare immagini', 'warning');
      input.value = '';
      return;
    }
    if (status) status.textContent = 'Compressione...';
    try {
      const result = await compressAndUploadImage(file, state.editingContext.path);
      const sizeKb = Math.round(result.sizeAfter / 1024);
      const savings = Math.round((1 - result.sizeAfter / result.sizeBefore) * 100);
      if (status) status.textContent = `${result.fileName} · ${sizeKb}KB (-${savings}%)`;

      // Ask for alt/caption text
      const alt = prompt('Didascalia / testo alternativo (opzionale):', file.name.replace(/\.[^.]+$/, ''));
      const altText = alt || '';
      const markdownSnippet = `![${altText}](${result.relativePath})`;

      // Insert into the Toast UI editor at cursor
      if (state.editorInstance) {
        try {
          state.editorInstance.insertText(markdownSnippet);
        } catch (err) {
          // Fallback: append at end
          const current = state.editorInstance.getMarkdown();
          state.editorInstance.setMarkdown(current + '\n\n' + markdownSnippet + '\n');
        }
        state.editingContext.isDirty = true;
      }
      toast(`Immagine caricata (${sizeKb}KB)`, 'success', 3000);
      setTimeout(() => { if (status) status.textContent = ''; }, 5000);
    } catch (err) {
      console.error('Image upload error', err);
      toast('Errore upload: ' + err.message, 'error', 5000);
      if (status) status.textContent = 'Errore';
    } finally {
      input.value = '';
    }
  });
}

function toast(message, level = 'info', duration = 3500) {
  const stack = $('toast-stack');
  const el = document.createElement('div');
  el.className = `toast ${level}`;
  el.textContent = message;
  stack.appendChild(el);
  setTimeout(() => { el.classList.add('leaving'); setTimeout(() => el.remove(), 220); }, duration);
}

/* ============================ CRYPTO ============================ */
function base64ToBuffer(base64) {
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

async function deriveKey(passphrase, saltBuf, iterations) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: saltBuf, iterations, hash: 'SHA-256' },
    keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
  );
}

async function decryptUserData(entry, passphrase) {
  const salt = base64ToBuffer(entry.salt);
  const iv = base64ToBuffer(entry.iv);
  const ciphertext = base64ToBuffer(entry.ciphertext);
  const key = await deriveKey(passphrase, salt, entry.iterations || 250000);
  const plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
  const plainText = new TextDecoder().decode(plainBuf);
  // Payload is always a JSON object: {token, nome?, cognome?}
  return JSON.parse(plainText);
}

/* ============================ IN-MEMORY CACHES ============================ */
// Etag cache: path -> {etag, sha, content, type, lastChecked}
// Lives in memory only (never localStorage). Session-backed via sessionStorage for intra-session speed.
const etagCache = new Map();

function saveEtagCacheToSession() {
  try {
    const obj = {};
    etagCache.forEach((v, k) => { obj[k] = v; });
    sessionStorage.setItem('collinettaai.etags', JSON.stringify({
      _savedAt: nowIso(),
      entries: obj
    }));
  } catch (e) { console.warn('etag cache persist failed', e); }
}

function loadEtagCacheFromSession() {
  try {
    const raw = sessionStorage.getItem('collinettaai.etags');
    if (!raw) return;
    const parsed = JSON.parse(raw);
    // Invalidate cache older than 30 min
    if ((new Date() - new Date(parsed._savedAt)) > 30 * 60 * 1000) {
      sessionStorage.removeItem('collinettaai.etags');
      return;
    }
    Object.entries(parsed.entries || {}).forEach(([k, v]) => etagCache.set(k, v));
  } catch (e) { console.warn('etag cache load failed', e); }
}

// Rate limit monitor (visible to admin)
const rateLimit = { remaining: null, limit: null, resetAt: null, updatedAt: null };

function updateRateLimitFromHeaders(res) {
  const rem = res.headers.get('x-ratelimit-remaining');
  const lim = res.headers.get('x-ratelimit-limit');
  const reset = res.headers.get('x-ratelimit-reset');
  if (rem !== null) rateLimit.remaining = parseInt(rem, 10);
  if (lim !== null) rateLimit.limit = parseInt(lim, 10);
  if (reset !== null) rateLimit.resetAt = new Date(parseInt(reset, 10) * 1000);
  rateLimit.updatedAt = new Date();
  updateRateLimitIndicator();
}

function updateRateLimitIndicator() {
  const el = document.getElementById('rate-limit-indicator');
  if (!el) return;
  if (rateLimit.remaining === null) return;
  el.textContent = `API ${rateLimit.remaining}/${rateLimit.limit}`;
  el.classList.remove('warning', 'danger');
  if (rateLimit.remaining < 200) el.classList.add('danger');
  else if (rateLimit.remaining < 1000) el.classList.add('warning');
  if (rateLimit.resetAt) {
    const minToReset = Math.max(0, Math.ceil((rateLimit.resetAt - new Date()) / 60000));
    el.title = `GitHub API: ${rateLimit.remaining}/${rateLimit.limit} restanti. Reset tra ${minToReset} min.`;
  }
}

const gh = {
  _headers() {
    return {
      'Authorization': `token ${state.session.token}`,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28'
    };
  },
  _headersWithEtag(path) {
    const h = this._headers();
    const cached = etagCache.get(path);
    if (cached && cached.etag) h['If-None-Match'] = cached.etag;
    return h;
  },
  async getFile(path) {
    const cached = etagCache.get(path);
    const url = `${CONFIG.API_BASE}/repos/${CONFIG.REPO_OWNER}/${CONFIG.REPO_NAME}/contents/${encodeURIComponent(path).replace(/%2F/g, '/')}?ref=${CONFIG.BRANCH}`;
    const res = await fetch(url, { headers: this._headersWithEtag(path), cache: 'no-store' });
    updateRateLimitFromHeaders(res);
    if (res.status === 304 && cached) {
      // Not modified: return cached data
      return { content: cached.content, sha: cached.sha, path };
    }
    if (res.status === 404) { etagCache.delete(path); return null; }
    if (!res.ok) throw new Error(`GET ${path}: ${res.status}`);
    const data = await res.json();
    if (data.type !== 'file') return data;
    const content = data.content ? new TextDecoder().decode(base64ToBuffer(data.content.replace(/\n/g, ''))) : '';
    const etag = res.headers.get('etag');
    if (etag) etagCache.set(path, { etag, sha: data.sha, content, type: 'file', lastChecked: nowIso() });
    return { content, sha: data.sha, path: data.path };
  },
  async listDir(path) {
    const url = `${CONFIG.API_BASE}/repos/${CONFIG.REPO_OWNER}/${CONFIG.REPO_NAME}/contents/${encodeURIComponent(path).replace(/%2F/g, '/')}?ref=${CONFIG.BRANCH}`;
    const cached = etagCache.get('dir:' + path);
    const headers = this._headers();
    if (cached && cached.etag) headers['If-None-Match'] = cached.etag;
    const res = await fetch(url, { headers, cache: 'no-store' });
    updateRateLimitFromHeaders(res);
    if (res.status === 304 && cached) return cached.content;
    if (res.status === 404) { etagCache.delete('dir:' + path); return []; }
    if (!res.ok) throw new Error(`LIST ${path}: ${res.status}`);
    const data = await res.json();
    const etag = res.headers.get('etag');
    if (etag) etagCache.set('dir:' + path, { etag, content: data, type: 'dir', lastChecked: nowIso() });
    return data;
  },
  async getTree() {
    // Single call: gets entire repo tree recursively
    const url = `${CONFIG.API_BASE}/repos/${CONFIG.REPO_OWNER}/${CONFIG.REPO_NAME}/git/trees/${CONFIG.BRANCH}?recursive=1`;
    const cached = etagCache.get('tree:' + CONFIG.BRANCH);
    const headers = this._headers();
    if (cached && cached.etag) headers['If-None-Match'] = cached.etag;
    const res = await fetch(url, { headers, cache: 'no-store' });
    updateRateLimitFromHeaders(res);
    if (res.status === 304 && cached) return cached.content;
    if (!res.ok) throw new Error(`GET TREE: ${res.status}`);
    const data = await res.json();
    const etag = res.headers.get('etag');
    if (etag) etagCache.set('tree:' + CONFIG.BRANCH, { etag, content: data, type: 'tree', lastChecked: nowIso() });
    return data;
  },
  async putFile(path, content, sha, message) {
    const url = `${CONFIG.API_BASE}/repos/${CONFIG.REPO_OWNER}/${CONFIG.REPO_NAME}/contents/${encodeURIComponent(path).replace(/%2F/g, '/')}`;
    const enc = new TextEncoder();
    const bytes = enc.encode(content);
    let binary = '';
    bytes.forEach(b => binary += String.fromCharCode(b));
    const contentB64 = btoa(binary);
    const body = { message, content: contentB64, branch: CONFIG.BRANCH };
    if (sha) body.sha = sha;
    const res = await fetch(url, {
      method: 'PUT',
      headers: { ...this._headers(), 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (res.status === 409 || res.status === 422) {
      const txt = await res.text();
      if (txt.includes('does not match') || txt.includes('conflict') || res.status === 409) {
        const err = new Error('conflict'); err.code = 'CONFLICT'; throw err;
      }
      throw new Error(`PUT ${path}: ${res.status} ${txt}`);
    }
    if (!res.ok) throw new Error(`PUT ${path}: ${res.status} ${await res.text()}`);
    return await res.json();
  },
  async deleteFile(path, sha, message) {
    const url = `${CONFIG.API_BASE}/repos/${CONFIG.REPO_OWNER}/${CONFIG.REPO_NAME}/contents/${encodeURIComponent(path).replace(/%2F/g, '/')}`;
    const body = { message, sha, branch: CONFIG.BRANCH };
    const res = await fetch(url, {
      method: 'DELETE',
      headers: { ...this._headers(), 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error(`DELETE ${path}: ${res.status}`);
    return await res.json();
  }
};

/* ============================ CONTENT PARSING ============================ */
function parseMarkdown(text) {
  const m = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
  if (m) {
    let frontmatter = {};
    try { frontmatter = jsyaml.load(m[1]) || {}; } catch (e) { console.warn('YAML parse error', e); }
    return { frontmatter, body: m[2] || '' };
  }
  return { frontmatter: {}, body: text };
}

function stringifyMarkdown(frontmatter, body) {
  const yamlStr = jsyaml.dump(frontmatter, { lineWidth: 120, noRefs: true, sortKeys: false });
  return `---\n${yamlStr}---\n\n${String(body).trimStart()}`;
}
